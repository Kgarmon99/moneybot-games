<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8FAFC;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#22C55E" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- White Background -->
  <rect width="200" height="200" fill="url(#bgGrad)" rx="20"/>
  
  <!-- Subtle border -->
  <rect x="2" y="2" width="196" height="196" fill="none" stroke="#22C55E" stroke-width="2" rx="18" opacity="0.3"/>
  
  <!-- Game Icon -->
  <g transform="translate(100, 100)" filter="url(#shadow)">
    <rect x="-65" y="-65" width="55" height="55" fill="#22C55E" rx="8"/><rect x="10" y="-65" width="55" height="55" fill="#0F172A" rx="8" opacity="0.9"/><rect x="-65" y="10" width="55" height="55" fill="#0F172A" rx="8" opacity="0.7"/><rect x="10" y="10" width="55" height="55" fill="#0F172A" rx="8" opacity="0.5"/><text x="-37" y="-28" text-anchor="middle" fill="white" font-size="18" font-weight="bold">2</text><text x="37" y="-28" text-anchor="middle" fill="white" font-size="18" font-weight="bold">4</text>
  </g>
  
  <!-- MoneyBot Green accent corner -->
  <circle cx="170" cy="30" r="15" fill="#22C55E" opacity="0.1"/>
  <circle cx="170" cy="30" r="8" fill="#22C55E"/>
</svg>
