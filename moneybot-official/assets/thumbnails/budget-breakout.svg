<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#bgGrad)" rx="16"/>
  <g transform="translate(100, 100)" filter="url(#glow)">
    <rect x="-70" y="-60" width="30" height="15" rx="2" fill="#22C55E"/><rect x="-35" y="-60" width="30" height="15" rx="2" fill="white" opacity="0.9"/><rect x="0" y="-60" width="30" height="15" rx="2" fill="white" opacity="0.7"/><rect x="35" y="-60" width="30" height="15" rx="2" fill="white" opacity="0.5"/><circle cx="0" cy="40" r="8" fill="white"/><rect x="-20" y="55" width="40" height="10" rx="2" fill="#22C55E"/>
  </g>
  <circle cx="170" cy="30" r="12" fill="#22C55E" opacity="0.3"/>
  <circle cx="170" cy="30" r="6" fill="#22C55E"/>
</svg>
