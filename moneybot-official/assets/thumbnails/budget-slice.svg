<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16A34A;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bgGrad)" rx="16"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#22C55E" stroke-width="0.5" opacity="0.1"/>
  </pattern>
  <rect width="200" height="200" fill="url(#grid)" rx="16"/>
  
  <!-- Game Icon -->
  <g transform="translate(100, 100)" filter="url(#glow)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#22C55E" stroke-width="8"/><path d="M0 -50 L0 0 L35 35" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/><circle cx="0" cy="0" r="8" fill="#FBBF24"/>
  </g>
  
  <!-- MoneyBot accent corner -->
  <circle cx="170" cy="30" r="15" fill="#22C55E" opacity="0.2"/>
  <circle cx="170" cy="30" r="8" fill="#22C55E"/>
</svg>
