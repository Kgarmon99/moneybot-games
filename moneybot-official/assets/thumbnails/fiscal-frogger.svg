<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#bgGrad)" rx="16"/>
  <g transform="translate(100, 100)" filter="url(#glow)">
    <rect x="-100" y="20" width="200" height="60" fill="#1E293B"/><rect x="-100" y="-40" width="200" height="50" fill="#374151"/><circle cx="0" cy="45" r="12" fill="#22C55E"/><rect x="-70" y="-25" width="40" height="20" rx="4" fill="white" opacity="0.8"/><rect x="30" y="-25" width="40" height="20" rx="4" fill="white" opacity="0.6"/>
  </g>
  <circle cx="170" cy="30" r="12" fill="#22C55E" opacity="0.3"/>
  <circle cx="170" cy="30" r="6" fill="#22C55E"/>
</svg>
