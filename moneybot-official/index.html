<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyBot Gaming - 140 Financial Education Games</title>
    <link rel="icon" type="image/jpeg" href="assets/moneybot-logo-1.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --moneybot-green: #22C55E; --moneybot-black: #0F172A; --moneybot-white: #FFFFFF; --moneybot-gray: #64748B; --moneybot-gray-light: #F1F5F9; }
        body { font-family: 'Inter', sans-serif; background: var(--moneybot-white); min-height: 100vh; color: var(--moneybot-black); }
        .header { background: var(--moneybot-white); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--moneybot-green); position: sticky; top: 0; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 44px; height: 44px; border-radius: 12px; overflow: hidden; border: 2px solid var(--moneybot-green); }
        .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
        .logo-text { font-weight: 800; font-size: 24px; color: var(--moneybot-black); }
        .logo-text span { color: var(--moneybot-green); }
        .hero { background: linear-gradient(135deg, var(--moneybot-green) 0%, #16A34A 100%); padding: 40px 20px; text-align: center; color: white; }
        .hero-badge { display: inline-block; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; margin-bottom: 16px; }
        .hero-title { font-size: 32px; font-weight: 900; margin-bottom: 12px; }
        .hero-subtitle { font-size: 16px; opacity: 0.9; margin-bottom: 24px; }
        .hero-stats { display: flex; justify-content: center; gap: 40px; }
        .hero-stat { text-align: center; }
        .hero-stat-number { font-size: 36px; font-weight: 800; }
        .hero-stat-label { font-size: 12px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .search-section { padding: 20px; background: var(--moneybot-gray-light); }
        .search-bar { display: flex; align-items: center; background: white; border: 2px solid var(--moneybot-green); border-radius: 12px; padding: 12px 16px; gap: 12px; }
        .search-bar input { flex: 1; border: none; outline: none; font-size: 16px; font-family: inherit; }
        .search-bar input::placeholder { color: var(--moneybot-gray); }
        .categories { display: flex; gap: 8px; padding: 16px 20px; overflow-x: auto; scrollbar-width: none; background: var(--moneybot-white); border-bottom: 1px solid #E2E8F0; }
        .categories::-webkit-scrollbar { display: none; }
        .category-tab { padding: 10px 20px; border-radius: 20px; border: 2px solid #E2E8F0; background: white; color: var(--moneybot-gray); font-weight: 600; font-size: 14px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .category-tab:hover, .category-tab.active { background: var(--moneybot-green); border-color: var(--moneybot-green); color: white; }
        .section { padding: 24px 20px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .section-title { font-size: 20px; font-weight: 700; color: var(--moneybot-black); }
        .section-link { color: var(--moneybot-green); font-weight: 600; font-size: 14px; text-decoration: none; }
        .games-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .game-card { background: white; border-radius: 16px; overflow: hidden; border: 2px solid #E2E8F0; transition: all 0.2s; cursor: pointer; }
        .game-card:hover { border-color: var(--moneybot-green); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(34, 197, 94, 0.15); }
        .game-thumbnail { width: 100%; aspect-ratio: 1; background: var(--moneybot-gray-light); display: flex; align-items: center; justify-content: center; position: relative; }
        .game-thumbnail img { width: 60%; height: 60%; object-fit: contain; }
        .game-difficulty { position: absolute; top: 8px; right: 8px; padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .game-difficulty.easy { background: var(--moneybot-green); color: white; }
        .game-difficulty.medium { background: #FBBF24; color: white; }
        .game-difficulty.hard { background: #EF4444; color: white; }
        .game-info { padding: 12px; }
        .game-name { font-weight: 700; font-size: 14px; color: var(--moneybot-black); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--moneybot-gray); }
        .game-reward { display: flex; align-items: center; gap: 4px; color: var(--moneybot-green); font-weight: 600; }
        .progress-section { background: var(--moneybot-gray-light); padding: 20px; margin: 0 20px 20px; border-radius: 16px; }
        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .progress-title { font-weight: 700; font-size: 16px; }
        .progress-value { color: var(--moneybot-green); font-weight: 700; }
        .progress-bar { height: 8px; background: #E2E8F0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--moneybot-green); border-radius: 4px; width: 0%; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #E2E8F0; padding: 12px 20px; display: flex; justify-content: space-around; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--moneybot-gray); text-decoration: none; font-size: 12px; font-weight: 500; }
        .nav-item.active { color: var(--moneybot-green); }
        .nav-icon { font-size: 24px; }
        .spacer { height: 80px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon"><img src="assets/moneybot-logo-1.jpg" alt="MoneyBot"></div>
            <div class="logo-text">Money<span>Bot</span></div>
        </div>
    </header>
    
    <section class="hero">
        <div class="hero-badge">World's Largest</div>
        <h1 class="hero-title">MoneyBot Gaming</h1>
        <p class="hero-subtitle">Master money skills through play</p>
        <div class="hero-stats">
            <div class="hero-stat"><div class="hero-stat-number" id="totalGames">140</div><div class="hero-stat-label">Games</div></div>
            <div class="hero-stat"><div class="hero-stat-number">8</div><div class="hero-stat-label">Categories</div></div>
            <div class="hero-stat"><div class="hero-stat-number">∞</div><div class="hero-stat-label">Fun</div></div>
        </div>
    </section>
    
    <section class="search-section">
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" placeholder="Search games..." id="searchInput">
        </div>
    </section>
    
    <div class="categories">
        <button class="category-tab active" data-category="all">All Games</button>
        <button class="category-tab" data-category="basics">💡 Basics</button>
        <button class="category-tab" data-category="budget">💰 Budget</button>
        <button class="category-tab" data-category="save">💎 Save</button>
        <button class="category-tab" data-category="invest">📈 Invest</button>
        <button class="category-tab" data-category="career">💼 Career</button>
        <button class="category-tab" data-category="life">🏠 Life</button>
        <button class="category-tab" data-category="arcade">🎮 Arcade</button>
        <button class="category-tab" data-category="multiplayer">👥 Multiplayer</button>
    </div>
    
    <div class="progress-section">
        <div class="progress-header">
            <span class="progress-title">Your Progress</span>
            <span class="progress-value" id="progressText">0/140 Games</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
    </div>
    
    <section class="section">
        <div class="section-header">
            <h2 class="section-title">🎮 All Games</h2>
        </div>
        <div class="games-grid" id="gamesGrid">
            <!-- Games will be rendered here -->
        </div>
    </section>
    
    <div class="spacer"></div>
    
    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><span class="nav-icon">🎮</span><span>Games</span></a>
        <a href="#" class="nav-item"><span class="nav-icon">🏆</span><span>Achieve</span></a>
        <a href="#" class="nav-item"><span class="nav-icon">📊</span><span>Progress</span></a>
        <a href="#" class="nav-item"><span class="nav-icon">👤</span><span>Profile</span></a>
    </nav>
    
    <script src="games.js"></script>
    <script>
        // gamesData is loaded from games.js
        
        function renderGames(category = 'all') {
            const grid = document.getElementById('gamesGrid');
            const filtered = category === 'all' ? gamesData : gamesData.filter(g => g.category === category);
            
            grid.innerHTML = filtered.map(game => `
                <div class="game-card" onclick="location.href='../${game.id}/'">
                    <div class="game-thumbnail">
                        <img src="assets/thumbnails/${game.id}.svg" alt="${game.name}" onerror="this.src='assets/moneybot-logo-1.jpg'">
                        <span class="game-difficulty ${game.difficulty}">${game.difficulty}</span>
                    </div>
                    <div class="game-info">
                        <div class="game-name">${game.name}</div>
                        <div class="game-meta">
                            <span>⭐ ${game.xp}</span>
                            <span class="game-reward">🪙 ${game.coins}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderGames(tab.dataset.category);
            });
        });
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            const filtered = gamesData.filter(g => g.name.toLowerCase().includes(search));
            document.getElementById('gamesGrid').innerHTML = filtered.map(game => `
                <div class="game-card" onclick="location.href='../${game.id}/'">
                    <div class="game-thumbnail">
                        <img src="assets/thumbnails/${game.id}.svg" alt="${game.name}" onerror="this.src='assets/moneybot-logo-1.jpg'">
                        <span class="game-difficulty ${game.difficulty}">${game.difficulty}</span>
                    </div>
                    <div class="game-info">
                        <div class="game-name">${game.name}</div>
                        <div class="game-meta">
                            <span>⭐ ${game.xp}</span>
                            <span class="game-reward">🪙 ${game.coins}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        });
        
        // Initial render
        renderGames();
        document.getElementById('totalGames').textContent = gamesData.length;
        document.getElementById('progressText').textContent = '0/' + gamesData.length + ' Games';
    </script>
</body>
</html>
