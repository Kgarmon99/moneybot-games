<!DOCTYPE html>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; overflow-x: hidden; }
        
        /* ===== NAVBAR ===== */
        .nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,10,10,0.98); border-bottom: 1px solid #222; z-index: 1000; padding: 0 20px; }
        .nav-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; gap: 20px; }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #00ff88; flex-shrink: 0; }
        .nav-logo img { width: 36px; height: 36px; border-radius: 8px; }
        .nav-logo span { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
        .nav-search { flex: 1; max-width: 400px; position: relative; }
        .nav-search input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 10px 40px 10px 15px; border-radius: 8px; font-size: 14px; outline: none; }
        .nav-search input:focus { border-color: #00ff88; }
        .nav-search .clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.5; font-size: 18px; }
        .nav-search .clear:hover { opacity: 1; }
        .nav-right { display: flex; align-items: center; gap: 15px; font-size: 13px; }
        .nav-progress { display: flex; align-items: center; gap: 10px; }
        .xp-bar { width: 100px; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .xp-bar .fill { height: 100%; background: linear-gradient(90deg, #00ff88, #00cc66); border-radius: 3px; transition: width 0.3s; }
        
        /* ===== CATEGORY BAR ===== */
        .cat-bar { position: fixed; top: 60px; left: 0; right: 0; background: rgba(10,10,10,0.98); border-bottom: 1px solid #222; z-index: 999; padding: 10px 20px; overflow-x: auto; scrollbar-width: none; }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-inner { max-width: 1400px; margin: 0 auto; display: flex; gap: 8px; }
        .cat-btn { display: flex; align-items: center; gap: 6px; background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.2s; text-decoration: none; }
        .cat-btn:hover, .cat-btn.active { background: #00ff88; color: #000; border-color: #00ff88; }
        .cat-btn .emoji { font-size: 16px; }
        
        /* ===== MAIN CONTENT ===== */
        .main { padding: 130px 20px 60px; max-width: 1400px; margin: 0 auto; }
        
        /* ===== SECTION ===== */
        .section { margin-bottom: 40px; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; padding: 0 5px; }
        .section-title { font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .section-title .emoji { margin-right: 8px; }
        .see-all { color: #00ff88; text-decoration: none; font-size: 13px; font-weight: 600; text-transform: uppercase; }
        .see-all:hover { text-decoration: underline; }
        
        /* ===== CAROUSEL ===== */
        .carousel-wrap { position: relative; }
        .carousel { display: flex; gap: 15px; overflow-x: auto; scroll-behavior: smooth; scrollbar-width: none; padding: 5px; }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; background: rgba(0,255,136,0.9); color: #000; border: none; border-radius: 50%; font-size: 18px; font-weight: bold; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .carousel-wrap:hover .carousel-arrow { opacity: 1; }
        .carousel-arrow:hover { background: #00ff88; }
        .carousel-arrow.prev { left: -10px; }
        .carousel-arrow.next { right: -10px; }
        
        /* ===== GAME CARD ===== */
        .game-card { flex-shrink: 0; width: 200px; text-decoration: none; color: #fff; transition: transform 0.2s; }
        .game-card:hover { transform: scale(1.05); }
        .game-card:hover .game-title { color: #00ff88; }
        .game-thumb { width: 200px; height: 130px; border-radius: 12px; overflow: hidden; position: relative; background: linear-gradient(135deg, #1a1a2e, #0d1f0d); }
        .game-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .game-thumb .diff { position: absolute; bottom: 0; left: 0; right: 0; font-size: 10px; font-weight: 700; padding: 4px 10px; text-transform: uppercase; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); color: #fff; }
        .game-info { padding: 8px 5px 0; }
        .game-title { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .game-tag { font-size: 11px; color: #666; text-transform: capitalize; }
        
        /* ===== HERO ===== */
        .hero { display: flex; gap: 20px; margin-bottom: 40px; overflow-x: auto; scroll-behavior: smooth; scrollbar-width: none; padding: 5px; }
        .hero::-webkit-scrollbar { display: none; }
        .hero-card { flex-shrink: 0; width: 320px; height: 180px; border-radius: 16px; overflow: hidden; position: relative; text-decoration: none; color: #fff; }
        .hero-card img { width: 100%; height: 100%; object-fit: cover; }
        .hero-card .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; }
        .hero-card .title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
        .hero-card .tag { font-size: 12px; color: #00ff88; text-transform: uppercase; font-weight: 600; }
        
        /* ===== SEARCH RESULTS ===== */
        .search-results { display: none; }
        .search-results.active { display: block; }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .no-results { text-align: center; padding: 60px; color: #666; font-size: 16px; }
        
        /* ===== FOOTER ===== */
        .footer { text-align: center; padding: 40px; color: #444; font-size: 12px; border-top: 1px solid #1a1a1a; margin-top: 40px; }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .nav-inner { flex-wrap: wrap; height: auto; padding: 10px 0; }
            .nav-search { order: 3; width: 100%; max-width: none; }
            .main { padding: 160px 10px 40px; }
            .game-card { width: 150px; }
            .game-thumb { width: 150px; height: 90px; }
            .hero-card { width: 260px; height: 150px; }
            .carousel-arrow { display: none; }
        }
    </style>
</head>

            {id:'bot-tax-trail',title:'Tax Trail',thumb:'assets/thumbs-png/tax-trail.png',tags:['adventure'],diff:'medium',section:'all'},

        // Stub games to hide
        const stubGames = ['viralquizbot','botbiztycoon','botbuilder','botcitybuilder','botfundmanager','bothouse','botreactiontest','botrunner','botsquadmissions','botvsbot','budgetbot','moneyolympics'];
        const filteredGames = games.filter(g => !stubGames.includes(g.id));

        // ===== RENDER FUNCTIONS =====
        function showComingSoon(title, text, emoji) {
            if (title) document.getElementById('comingSoonTitle').innerText = title;
            if (text) document.getElementById('comingSoonText').innerText = text;
            if (emoji) document.getElementById('comingSoonEmoji').innerText = emoji;
            document.getElementById('comingSoonPopup').style.display = 'flex';
        }

        function closeComingSoon() {
            document.getElementById('comingSoonPopup').style.display = 'none';
        }

        function createCard(g) {
            const linkUrl = g.customUrl ? g.id : `../${g.id}/`;
            return `<a href="${linkUrl}" class="game-card" onclick="trackPlay('${g.title.replace(/'/g,"\'")}','${linkUrl}','${g.tags[0]}','${g.diff}')">
                <div class="game-thumb"><img src="${g.thumb}" alt="${g.title}" onerror="this.style.display='none';this.parentElement.innerHTML='<div style=display:flex;align-items:center;justify-content:center;height:100%;font-size:50px;>🎮</div>'"></div>
                <div class="game-info"><div class="game-title">${g.title}</div><div class="game-tag">${g.tags.join(', ')}</div></div>
            </a>`;
        }

        function createCarousel(games, sectionId) {
            if (!games.length) return '';
            const cards = games.map(createCard).join('');
            return `
            <div class="section" data-section="${sectionId}">
                <div class="carousel-wrap">
                    <div class="carousel" id="carousel-${sectionId}">${cards}</div>
                    <button class="carousel-arrow prev" onclick="scrollCarousel('carousel-${sectionId}',-1)">‹</button>
                    <button class="carousel-arrow next" onclick="scrollCarousel('carousel-${sectionId}',1)">›</button>
                </div>
            </div>`;
        }

        function createSection(title, emoji, games, sectionId) {
            if (!games.length) return '';
            return `
            <div class="section" data-section="${sectionId}">
                <div class="section-header">
                    <span class="section-title"><span class="emoji">${emoji}</span>${title}</span>
                </div>
                <div class="carousel-wrap">
                    <div class="carousel" id="carousel-${sectionId}">${games.map(createCard).join('')}</div>
                    <button class="carousel-arrow prev" onclick="scrollCarousel('carousel-${sectionId}',-1)">‹</button>
                    <button class="carousel-arrow next" onclick="scrollCarousel('carousel-${sectionId}',1)">›</button>
                </div>
            </div>`;
        }

        function scrollCarousel(id, dir) {
            const el = document.getElementById(id);
            el.scrollBy({ left: dir * 430, behavior: 'smooth' });
        }

        // ===== HERO =====
        function renderHero() {
            const heroGames = filteredGames.filter(g => g.section === 'featured').slice(0, 6);
            document.getElementById('hero').innerHTML = heroGames.map(g => {
                const linkUrl = g.customUrl ? g.id : `../${g.id}/`;
                return `<a href="${linkUrl}" class="hero-card" onclick="trackPlay('${g.title.replace(/'/g,"\'")}','${linkUrl}','${g.tags[0]}','${g.diff}')">
                    <img src="${g.thumb}" alt="${g.title}">
                    <div class="overlay">
                        <div class="title">${g.title}</div>
                        <div class="tag">${g.tags[0].toUpperCase()} · ${g.diff.toUpperCase()}</div>
                    </div>
                </a>`;
            }).join('');
        }

        // ===== SECTIONS =====
        function renderSections() {
            const sections = document.getElementById('sections');
            let html = '';
            
            html += createSection('YC Startup School', '🚀', filteredGames.filter(g => g.section === 'yc'), 'yc');
            html += createSection('Featured', '⭐', filteredGames.filter(g => g.section === 'featured'), 'featured');
            html += createSection('Arcade', '🎮', filteredGames.filter(g => g.tags.includes('arcade')), 'arcade');
            html += createSection('Simulation', '📊', filteredGames.filter(g => g.tags.includes('simulation')), 'simulation');
            html += createSection('Strategy', '🧠', filteredGames.filter(g => g.tags.includes('strategy')), 'strategy');
            html += createSection('Puzzle', '🧩', filteredGames.filter(g => g.tags.includes('puzzle')), 'puzzle');
            html += createSection('Tycoon', '🏢', filteredGames.filter(g => g.tags.includes('tycoon')), 'tycoon');
            html += createSection('Action', '⚡', filteredGames.filter(g => g.tags.includes('action')), 'action');
            html += createSection('Racing', '🏎️', filteredGames.filter(g => g.tags.includes('racing')), 'racing');
            html += createSection('Education', '📚', filteredGames.filter(g => g.tags.includes('education')), 'education');
            html += createSection('Tools & Calculators', '🛠️', filteredGames.filter(g => g.tags.includes('tool') || g.tags.includes('calculator')), 'tools');
            html += createSection('All Games', '🔥', filteredGames.filter(g => g.section === 'all'), 'all');
            
            sections.innerHTML = html;
        }

        // ===== SEARCH =====
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', () => {
            const q = searchInput.value.toLowerCase().trim();
            const main = document.getElementById('mainContent');
            const searchResults = document.getElementById('searchResults');
            const searchGrid = document.getElementById('searchGrid');
            const hero = document.getElementById('hero');
            const sections = document.getElementById('sections');
            
            if (!q) {
                searchResults.classList.remove('active');
                hero.style.display = 'flex';
                sections.style.display = 'block';
                return;
            }
            
            const matches = filteredGames.filter(g => 
                g.title.toLowerCase().includes(q) || 
                g.tags.some(t => t.includes(q))
            );
            
            hero.style.display = 'none';
            sections.style.display = 'none';
            searchResults.classList.add('active');
            
            if (!matches.length) {
                searchGrid.innerHTML = '<div class="no-results">No games found. Try a different search.</div>';
            } else {
                searchGrid.innerHTML = matches.map(createCard).join('');
            }
        });

        function clearSearch() {
            searchInput.value = '';
            searchInput.dispatchEvent(new Event('input'));
        }

        // ===== FILTER =====
        function setFilter(tag) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            event.target.closest('.cat-btn').classList.add('active');
            
            const hero = document.getElementById('hero');
            const sections = document.getElementById('sections');
            const searchResults = document.getElementById('searchResults');
            searchResults.classList.remove('active');
            
            if (tag === 'all') {
                hero.style.display = 'flex';
                sections.style.display = 'block';
                document.querySelectorAll('.section').forEach(s => s.style.display = 'block');
                return;
            }
            
            hero.style.display = 'none';
            sections.style.display = 'block';
            document.querySelectorAll('.section').forEach(s => {
                const sectionTag = s.dataset.section;
                if (sectionTag === tag || (tag === 'tools' && sectionTag === 'tools')) {
                    s.style.display = 'block';
                } else {
                    s.style.display = 'none';
                }
            });
        }

        // ===== PLAYER PROGRESS =====
        function loadProgress() { return JSON.parse(localStorage.getItem('mb_progress_v2')||'{"xp":0,"lvl":1,"games":{}}'); }
        function saveProgress(p) { localStorage.setItem('mb_progress_v2', JSON.stringify(p)); }
        function addXP(amount) { let p=loadProgress(); p.xp+=amount; let req=p.lvl*100; while(p.xp>=req){p.xp-=req;p.lvl++;req=p.lvl*100;} saveProgress(p); renderProgress(); }
        function renderProgress() {
            const p = loadProgress();
            if (p.xp > 0 || Object.keys(p.games).length > 0) {
                document.getElementById('navProgress').style.display = 'flex';
                document.getElementById('playerLvl').textContent = p.lvl;
                const req = p.lvl * 100;
                document.getElementById('xpFill').style.width = (p.xp/req*100) + '%';
            }
        }
        function trackPlay(name, url, tag, diff) {
            let p = loadProgress();
            if (!p.games[name]) { p.games[name] = {plays:0,first:Date.now()}; addXP(diff==='hard'?50:diff==='medium'?30:15); }
            p.games[name].plays++;
            p.games[name].last = Date.now();
            saveProgress(p);
        }

        // Clear old cached data
        localStorage.removeItem('mb_recent_v1');

        // ===== INIT =====
        renderHero();
        renderSections();
        renderProgress();
    </script>
