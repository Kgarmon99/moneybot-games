<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Shadow -->
  <ellipse cx="100" cy="215" rx="60" ry="20" fill="rgba(0,0,0,0.3)"/>
  
  <!-- Body -->
  <rect x="40" y="50" width="120" height="150" rx="30" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="3"/>
  
  <!-- Body Gradient Overlay -->
  <rect x="40" y="50" width="120" height="150" rx="30" fill="url(#bodyGrad)"/>
  
  <!-- Screen/Face -->
  <rect x="55" y="65" width="90" height="70" rx="15" fill="#0F172A"/>
  
  <!-- Eyes -->
  <ellipse cx="85" cy="100" rx="12" ry="16" fill="#22C55E">
    <animate attributeName="ry" values="16;14;16" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="115" cy="100" rx="12" ry="16" fill="#22C55E">
    <animate attributeName="ry" values="16;14;16" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Smile -->
  <path d="M 85 125 Q 100 135 115 125" stroke="#22C55E" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Antenna -->
  <line x1="100" y1="50" x2="100" y2="20" stroke="#FBBF24" stroke-width="6" stroke-linecap="round"/>
  <circle cx="100" cy="15" r="10" fill="#FBBF24">
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Antenna Glow -->
  <circle cx="100" cy="15" r="15" fill="#FBBF24" opacity="0.3">
    <animate attributeName="r" values="15;18;15" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Body Detail -->
  <rect x="70" y="175" width="60" height="15" rx="7" fill="#22C55E" opacity="0.8"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#22C55E;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
</svg>