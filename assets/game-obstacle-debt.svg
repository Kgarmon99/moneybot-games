<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Warning Glow -->
  <circle cx="50" cy="50" r="48" fill="#EF4444" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Main Body -->
  <rect x="15" y="15" width="70" height="70" rx="12" fill="#7F1D1D" stroke="#EF4444" stroke-width="4"/>
  
  <!-- Inner Pattern -->
  <rect x="23" y="23" width="54" height="54" rx="8" fill="#991B1B"/>
  
  <!-- Credit Card Icon -->
  <rect x="30" y="35" width="40" height="28" rx="4" fill="#0F172A"/>
  <line x1="30" y1="42" x2="70" y2="42" stroke="#FBBF24" stroke-width="3"/>
  <line x1="34" y1="52" x2="50" y2="52" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  <line x1="34" y1="56" x2="45" y2="56" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  
  <!-- Warning Stripes -->
  <line x1="20" y1="20" x2="80" y2="80" stroke="#EF4444" stroke-width="3" opacity="0.5"/>
  <line x1="80" y1="20" x2="20" y2="80" stroke="#EF4444" stroke-width="3" opacity="0.5"/>
  
  <!-- Spin Animation -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="4s" repeatCount="indefinite"/>
    <path d="M 50 5 L 53 12 L 60 14 L 53 16 L 50 23 L 47 16 L 40 14 L 47 12 Z" fill="#EF4444"/>
  </g>
  
  <!-- X Mark -->
  <line x1="35" y1="35" x2="65" y2="65" stroke="#EF4444" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="65" y1="35" x2="35" y2="65" stroke="#EF4444" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
</svg>