<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Glow -->
  <circle cx="50" cy="50" r="45" fill="#22C55E" opacity="0.3">
    <animate attributeName="r" values="45;50;45" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Coin Body -->
  <circle cx="50" cy="50" r="35" fill="#22C55E"/>
  <circle cx="50" cy="50" r="35" fill="url(#coinGradGreen)"/>
  
  <!-- Inner Ring -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  
  <!-- Shine -->
  <ellipse cx="38" cy="38" rx="10" ry="6" fill="rgba(255,255,255,0.5)" transform="rotate(-45, 38, 38)"/>
  
  <!-- Plus Symbol -->
  <line x1="50" y1="35" x2="50" y2="65" stroke="#0F172A" stroke-width="6" stroke-linecap="round"/>
  <line x1="35" y1="50" x2="65" y2="50" stroke="#0F172A" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Sparkle -->
  <g opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
    <path d="M 75 25 L 77 30 L 82 32 L 77 34 L 75 39 L 73 34 L 68 32 L 73 30 Z" fill="#FBBF24"/>
  </g>

  <defs>
    <radialGradient id="coinGradGreen" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#4ADE80"/>
      <stop offset="100%" style="stop-color:#16A34A"/>
    </radialGradient>
  </defs>
</svg>