<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Shadow (stretched for running) -->
  <ellipse cx="100" cy="215" rx="70" ry="15" fill="rgba(0,0,0,0.2)"/>
  
  <!-- Body (leaning forward) -->
  <g transform="rotate(15, 100, 125)">
    <rect x="40" y="50" width="120" height="150" rx="30" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="3"/>
    
    <!-- Body Gradient Overlay -->
    <rect x="40" y="50" width="120" height="150" rx="30" fill="url(#bodyGradRun)"/>
    
    <!-- Screen/Face -->
    <rect x="55" y="65" width="90" height="70" rx="15" fill="#0F172A"/>
    
    <!-- Determined Eyes -->
    <ellipse cx="85" cy="100" rx="14" ry="12" fill="#22C55E"/>
    <ellipse cx="115" cy="100" rx="14" ry="12" fill="#22C55E"/>
    
    <!-- Focused Mouth -->
    <line x1="90" y1="125" x2="110" y2="125" stroke="#22C55E" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Antenna (streaming back) -->
    <line x1="100" y1="50" x2="130" y2="30" stroke="#FBBF24" stroke-width="6" stroke-linecap="round"/>
    <circle cx="135" cy="27" r="10" fill="#FBBF24"/>
    
    <!-- Body Detail -->
    <rect x="70" y="175" width="60" height="15" rx="7" fill="#22C55E" opacity="0.9"/>
  </g>
  
  <!-- Speed Lines -->
  <line x1="20" y1="100" x2="50" y2="100" stroke="#22C55E" stroke-width="2" opacity="0.6"/>
  <line x1="10" y1="130" x2="40" y2="130" stroke="#22C55E" stroke-width="2" opacity="0.4"/>
  <line x1="30" y1="160" x2="55" y2="160" stroke="#22C55E" stroke-width="2" opacity="0.5"/>
  
  <!-- Dust particles -->
  <circle cx="50" cy="200" r="3" fill="#E5E7EB" opacity="0.6"/>
  <circle cx="35" cy="195" r="2" fill="#E5E7EB" opacity="0.4"/>
  <circle cx="60" cy="205" r="4" fill="#E5E7EB" opacity="0.5"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="bodyGradRun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#22C55E;stop-opacity:0.35"/>
    </linearGradient>
  </defs>
</svg>
