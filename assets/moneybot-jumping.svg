<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Shadow (smaller when jumping) -->
  <ellipse cx="100" cy="220" rx="40" ry="12" fill="rgba(0,0,0,0.2)"/>
  
  <!-- Body (tilted for jumping) -->
  <g transform="rotate(-10, 100, 125)">
    <rect x="40" y="40" width="120" height="150" rx="30" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="3"/>
    
    <!-- Body Gradient Overlay -->
    <rect x="40" y="40" width="120" height="150" rx="30" fill="url(#bodyGradJump)"/>
    
    <!-- Screen/Face -->
    <rect x="55" y="55" width="90" height="70" rx="15" fill="#0F172A"/>
    
    <!-- Excited Eyes -->
    <ellipse cx="85" cy="90" rx="14" ry="18" fill="#22C55E"/>
    <ellipse cx="115" cy="90" rx="14" ry="18" fill="#22C55E"/>
    
    <!-- Big Smile -->
    <path d="M 80 115 Q 100 135 120 115" stroke="#22C55E" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Antenna (bouncing) -->
    <line x1="100" y1="40" x2="100" y2="10" stroke="#FBBF24" stroke-width="6" stroke-linecap="round"/>
    <circle cx="100" cy="5" r="12" fill="#FBBF24">
      <animate attributeName="cy" values="5;0;5" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Body Detail -->
    <rect x="70" y="165" width="60" height="15" rx="7" fill="#22C55E" opacity="0.9"/>
  </g>
  
  <!-- Motion lines -->
  <line x1="60" y1="200" x2="60" y2="220" stroke="#22C55E" stroke-width="3" opacity="0.5"/>
  <line x1="100" y1="205" x2="100" y2="225" stroke="#22C55E" stroke-width="3" opacity="0.5"/>
  <line x1="140" y1="200" x2="140" y2="220" stroke="#22C55E" stroke-width="3" opacity="0.5"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="bodyGradJump" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#22C55E;stop-opacity:0.35"/>
    </linearGradient>
  </defs>
</svg>
