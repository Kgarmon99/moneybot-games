<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#bgGrad)" rx="16"/>
  <g transform="translate(100, 100)" filter="url(#glow)">
    <rect x="-35" y="20" width="25" height="35" fill="#22C55E" rx="2"/><rect x="-5" y="0" width="25" height="55" fill="white" rx="2" opacity="0.9"/><rect x="25" y="-20" width="25" height="75" fill="white" rx="2" opacity="0.7"/><circle cx="35" cy="-45" r="12" fill="#FBBF24"/>
  </g>
  <circle cx="170" cy="30" r="12" fill="#22C55E" opacity="0.3"/>
  <circle cx="170" cy="30" r="6" fill="#22C55E"/>
</svg>
