<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <defs>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#16A34A"/>
    </linearGradient>
    <filter id="btnShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#22C55E" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Button Background -->
  <rect x="2" y="2" width="196" height="56" rx="12" fill="url(#btnGrad)" filter="url(#btnShadow)"/>
  
  <!-- Shine Effect -->
  <rect x="2" y="2" width="196" height="28" rx="12" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Button Text -->
  <text x="100" y="38" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">START GAME</text>
</svg>