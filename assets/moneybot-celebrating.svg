<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <!-- Confetti -->
  <g id="confetti">
    <rect x="30" y="20" width="8" height="8" fill="#22C55E" transform="rotate(20)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,200" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="160" y="10" width="6" height="6" fill="#FBBF24" transform="rotate(-15)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,220" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="50" y="5" width="10" height="10" fill="#3B82F6" transform="rotate(45)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,180" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="140" y="25" width="7" height="7" fill="#EC4899" transform="rotate(-30)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,190" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Shadow -->
  <ellipse cx="100" cy="255" rx="60" ry="20" fill="rgba(0,0,0,0.3)"/>

  <!-- Body (bouncing) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-20; 0,0" dur="0.6s" repeatCount="indefinite"/>
    
    <rect x="40" y="70" width="120" height="150" rx="30" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="3"/>
    <rect x="40" y="70" width="120" height="150" rx="30" fill="url(#bodyGradCelebrate)"/>
    
    <!-- Screen/Face -->
    <rect x="55" y="85" width="90" height="70" rx="15" fill="#0F172A"/>
    
    <!-- Happy Eyes (curved) -->
    <path d="M 75 105 Q 85 95 95 105" stroke="#22C55E" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 105 105 Q 115 95 125 105" stroke="#22C55E" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Big Smile -->
    <path d="M 80 125 Q 100 145 120 125" stroke="#22C55E" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Antenna -->
    <line x1="100" y1="70" x2="100" y2="40" stroke="#FBBF24" stroke-width="6" stroke-linecap="round"/>
    <circle cx="100" cy="35" r="10" fill="#FBBF24"/>
    <circle cx="100" cy="35" r="18" fill="#FBBF24" opacity="0.3"/>
    
    <!-- Arms raised -->
    <line x1="40" y1="120" x2="20" y2="90" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round"/>
    <line x1="160" y1="120" x2="180" y2="90" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Body Detail -->
    <rect x="70" y="195" width="60" height="15" rx="7" fill="#22C55E" opacity="0.8"/>
  </g>

  <defs>
    <linearGradient id="bodyGradCelebrate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
</svg>