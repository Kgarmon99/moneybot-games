<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Shadow -->
  <ellipse cx="100" cy="215" rx="60" ry="20" fill="rgba(0,0,0,0.3)"/>
  
  <!-- Body -->
  <rect x="40" y="50" width="120" height="150" rx="30" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="3"/>
  
  <!-- Body Gradient Overlay -->
  <rect x="40" y="50" width="120" height="150" rx="30" fill="url(#bodyGradSad)"/>
  
  <!-- Screen/Face -->
  <rect x="55" y="65" width="90" height="70" rx="15" fill="#0F172A"/>
  
  <!-- Sad Eyes -->
  <ellipse cx="85" cy="100" rx="12" ry="10" fill="#FF5252"/>
  <ellipse cx="115" cy="100" rx="12" ry="10" fill="#FF5252"/>
  
  <!-- Sad Mouth -->
  <path d="M 85 130 Q 100 120 115 130" stroke="#FF5252" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Tear -->
  <circle cx="75" cy="115" r="4" fill="#38BDF8" opacity="0.8">
    <animate attributeName="cy" values="115;140" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Antenna (drooping) -->
  <line x1="100" y1="50" x2="85" y2="25" stroke="#FBBF24" stroke-width="6" stroke-linecap="round"/>
  <circle cx="85" cy="20" r="8" fill="#FBBF24" opacity="0.5"/>
  
  <!-- Body Detail -->
  <rect x="70" y="175" width="60" height="15" rx="7" fill="#FF5252" opacity="0.6"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="bodyGradSad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5252;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#FF5252;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
</svg>
