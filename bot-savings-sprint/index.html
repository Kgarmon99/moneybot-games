<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyBot - Savings Sprint</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <a href="../moneybot-official/" class="back-btn">←</a>
            <div class="score-pill">
                <span class="label">NET WORTH</span>
                <span class="value" id="score">$0</span>
            </div>
            <div class="score-pill">
                <span class="label">DISTANCE</span>
                <span class="value" id="distance">0m</span>
            </div>
        </header>

        <div class="game-area">
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <!-- Start Screen -->
    <div class="overlay-screen" id="startScreen">
        <div class="modal-content">
            <div class="game-icon">🏃</div>
            <h1 class="game-title">SAVINGS SPRINT</h1>
            <p class="game-subtitle">
                Sprint to Financial Independence!<br><br>
                Drag up and down to dodge <b>Expenses</b> (🛍️📉) and collect <b>Yield</b> (💵💰).<br>
                Grab <b>Compound Boosts</b> (🚀) to go supersonic!<br>
            </p>
            <div class="stats-card">
                <div class="stats-label">Best Distance</div>
                <div class="stats-value" id="highScore">0m</div>
            </div>
            <button class="primary-btn" id="startBtn">START SPRINT</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay-screen hidden" id="gameOverScreen">
        <div class="modal-content">
            <div class="game-icon" style="color: #FB7185; text-shadow: 0 0 20px rgba(251,113,133,0.5);">💀</div>
            <h1 class="game-title" style="color: #FB7185;">BANKRUPT</h1>
            <p class="game-subtitle">The expenses caught up to you.</p>
            <div class="stats-card">
                <div class="stats-label">Final Net Worth</div>
                <div class="stats-value" id="finalScore" style="color: #00E676;">$0</div>
            </div>
            <div class="stats-card">
                <div class="stats-label">Distance Reached</div>
                <div class="stats-value" id="finalDist" style="color: #38BDF8;">0m</div>
            </div>
            <button class="primary-btn" id="restartBtn">SPRINT AGAIN</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
