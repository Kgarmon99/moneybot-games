<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyBot - Debt Destroyer | MoneyBot Gaming</title>
    <link rel="icon" type="image/svg+xml" href="../assets/moneybot-idle.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-dark: #00C853;
            --moneybot-red: #FF5252;
            --moneybot-dark: #1A1A2E;
            --moneybot-gray: #F5F5F7;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
        }
        
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border: none;
            color: var(--moneybot-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        
        .back-btn:active {
            transform: scale(0.95);
        }
        
        .score-display {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            color: var(--moneybot-dark);
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100vh;
            touch-action: none;
        }
        
        .start-screen, .level-complete-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            z-index: 200;
        }
        
        .level-complete-screen, .game-over-screen {
            display: none;
        }
        
        .logo {
            font-size: 72px;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
        }
        
        .title {
            font-size: 40px;
            font-weight: 800;
            color: #0F172A;
            margin-bottom: 12px;
            text-align: center;
            letter-spacing: -1px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 17px;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 40px;
            line-height: 1.5;
        }
        
        .start-btn {
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: #0F172A;
            border: none;
            padding: 22px 65px;
            font-size: 22px;
            font-weight: 800;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0, 230, 118, 0.5);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 50px rgba(0, 230, 118, 0.6);
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        .instructions {
            margin-top: 35px;
            color: rgba(255,255,255,0.5);
            text-align: center;
            font-size: 15px;
            line-height: 1.6;
        }
        
        .aim-indicator {
            position: absolute;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <a href="../moneybot-official/" class="back-btn">←</a>
            <div class="score-display">Score: <span id="score">0</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div class="start-screen" id="startScreen">
            <div class="logo">💸</div>
            <div class="title">Debt Destroyer</div>
            <div class="subtitle">Pull back to aim, release to launch!<br>Destroy debt blocks, save piggy banks</div>
            <button class="start-btn" onclick="startGame()">PLAY NOW</button>
            <div class="instructions">Drag anywhere to aim • Release to shoot<br>💰 Hit debt blocks • 🐷 Avoid piggy banks</div>
        </div>
        
        <div class="level-complete-screen" id="levelCompleteScreen">
            <div class="logo">🎉</div>
            <div class="title">Level Complete!</div>
            <div class="subtitle">Debt destroyed!</div>
            <button class="start-btn" onclick="nextLevel()">NEXT LEVEL</button>
        </div>
        
        <div class="game-over-screen" id="gameOverScreen">
            <div class="logo">😢</div>
            <div class="title">Out of Shots!</div>
            <div class="subtitle">Final Score: <span id="finalScore">0</span></div>
            <button class="start-btn" onclick="restartGame()">TRY AGAIN</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        function resizeCanvas() {
            canvas.width = Math.min(window.innerWidth, 430);
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        let gameRunning = false;
        let score = 0;
        let level = 1;
        let shotsLeft = 5;
        let projectiles = [];
        let targets = [];
        let particles = [];
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragCurrent = { x: 0, y: 0 };
        let launcher = { x: 80, y: canvas.height - 150 };
        let gravity = 0.4;
        
        class Projectile {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = 12;
                this.rotation = 0;
                this.active = true;
            }
            
            update() {
                if (!this.active) return false;
                
                this.x += this.vx;
                this.y += this.vy;
                this.vy += gravity;
                this.rotation += 0.1;
                
                // Bounce off walls
                if (this.x < this.radius || this.x > canvas.width - this.radius) {
                    this.vx *= -0.7;
                    this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                }
                
                // Check if out of bounds
                if (this.y > canvas.height + 50) {
                    return false;
                }
                
                return true;
            }
            
            draw() {
                if (!this.active) return;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // Money bag emoji
                ctx.font = '28px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('💰', 0, 0);
                
                ctx.restore();
            }
        }
        
        class Target {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.width = 45;
                this.height = 45;
                this.type = type; // 'debt' or 'piggy'
                this.destroyed = false;
                this.hit = false;
            }
            
            checkCollision(projectile) {
                if (this.destroyed || !projectile.active) return false;
                
                const centerX = this.x + this.width / 2;
                const centerY = this.y + this.height / 2;
                const dx = projectile.x - centerX;
                const dy = projectile.y - centerY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < projectile.radius + this.width / 2) {
                    this.hit = true;
                    
                    // Create particles
                    for (let i = 0; i < 12; i++) {
                        particles.push(new Particle(centerX, centerY, this.type === 'debt' ? '#FF5252' : '#00E676'));
                    }
                    
                    if (this.type === 'debt') {
                        this.destroyed = true;
                        score += 100;
                        if (navigator.vibrate) navigator.vibrate(30);
                    } else {
                        score = Math.max(0, score - 50);
                        if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                    }
                    
                    return true;
                }
                return false;
            }
            
            draw() {
                if (this.destroyed) return;
                
                const centerX = this.x + this.width / 2;
                const centerY = this.y + this.height / 2;
                
                // Draw block background
                ctx.fillStyle = this.type === 'debt' ? 'rgba(255, 82, 82, 0.2)' : 'rgba(0, 230, 118, 0.2)';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // Draw border
                ctx.strokeStyle = this.type === 'debt' ? '#FF5252' : '#00E676';
                ctx.lineWidth = 3;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
                
                // Draw emoji
                ctx.font = '32px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.type === 'debt' ? '💳' : '🐷', centerX, centerY);
            }
        }
        
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 12;
                this.vy = (Math.random() - 0.5) * 12;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 6 + 3;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.4;
                this.life -= 0.025;
                return this.life > 0;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        function initLevel() {
            targets = [];
            projectiles = [];
            particles = [];
            shotsLeft = 5;
            
            // Create pyramid of blocks
            const startX = canvas.width - 220;
            const startY = canvas.height - 180;
            const rows = 3 + Math.min(level, 4);
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col <= row; col++) {
                    const type = Math.random() > 0.25 ? 'debt' : 'piggy';
                    targets.push(new Target(
                        startX + col * 50 - row * 25,
                        startY - row * 50,
                        type
                    ));
                }
            }
            
            launcher = { x: 80, y: canvas.height - 150 };
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('levelCompleteScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            level = 1;
            initLevel();
            gameLoop();
        }
        
        function nextLevel() {
            level++;
            document.getElementById('levelCompleteScreen').style.display = 'none';
            initLevel();
            gameRunning = true;
            gameLoop();
        }
        
        function restartGame() {
            startGame();
        }
        
        function checkGameState() {
            const debtTargets = targets.filter(t => t.type === 'debt' && !t.destroyed);
            
            if (debtTargets.length === 0) {
                // Level complete
                gameRunning = false;
                document.getElementById('levelCompleteScreen').style.display = 'flex';
                return;
            }
            
            // Check if out of shots and no active projectiles
            if (shotsLeft <= 0 && projectiles.length === 0) {
                gameRunning = false;
                document.getElementById('finalScore').textContent = score;
                document.getElementById('gameOverScreen').style.display = 'flex';
            }
        }
        
        // Touch/Mouse handling
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }
        
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('touchstart', handleStart, {passive: false});
        
        function handleStart(e) {
            if (!gameRunning || shotsLeft <= 0) return;
            e.preventDefault();
            
            const pos = getPos(e);
            isDragging = true;
            dragStart = pos;
            dragCurrent = pos;
        }
        
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('touchmove', handleMove, {passive: false});
        
        function handleMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            dragCurrent = getPos(e);
        }
        
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchend', handleEnd);
        
        function handleEnd(e) {
            if (!isDragging) return;
            isDragging = false;
            
            const dx = dragStart.x - dragCurrent.x;
            const dy = dragStart.y - dragCurrent.y;
            const power = Math.min(Math.sqrt(dx * dx + dy * dy) / 8, 22);
            
            if (power > 3) {
                const angle = Math.atan2(dy, dx);
                
                projectiles.push(new Projectile(
                    launcher.x,
                    launcher.y,
                    Math.cos(angle) * power,
                    Math.sin(angle) * power
                ));
                
                shotsLeft--;
            }
            
            dragStart = null;
            dragCurrent = null;
        }
        
        function draw() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.5, '#B8E6F0');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Ground
            ctx.fillStyle = '#8B7355';
            ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
            
            // Grass
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(0, canvas.height - 90, canvas.width, 15);
            
            // Launcher/slingshot base
            ctx.fillStyle = '#5D4037';
            ctx.beginPath();
            ctx.arc(launcher.x, launcher.y + 20, 25, 0, Math.PI * 2);
            ctx.fill();
            
            // Slingshot
            ctx.strokeStyle = '#5D4037';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(launcher.x, launcher.y + 20);
            ctx.lineTo(launcher.x - 15, launcher.y - 30);
            ctx.moveTo(launcher.x, launcher.y + 20);
            ctx.lineTo(launcher.x + 15, launcher.y - 30);
            ctx.stroke();
            
            // Draw aim line
            if (isDragging && dragStart && dragCurrent) {
                ctx.beginPath();
                ctx.moveTo(launcher.x, launcher.y);
                const dx = dragStart.x - dragCurrent.x;
                const dy = dragStart.y - dragCurrent.y;
                ctx.lineTo(launcher.x + dx * 0.5, launcher.y + dy * 0.5);
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 4;
                ctx.setLineDash([8, 8]);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // Power indicator
                const power = Math.min(Math.sqrt(dx * dx + dy * dy) / 8, 22);
                ctx.fillStyle = `hsl(${120 - power * 5}, 100%, 50%)`;
                ctx.font = 'bold 16px Inter';
                ctx.textAlign = 'center';
                ctx.fillText(Math.round(power) + '%', launcher.x, launcher.y - 50);
            }
            
            // Draw projectiles
            projectiles = projectiles.filter(p => {
                const active = p.update();
                p.draw();
                
                // Check collisions
                targets.forEach(t => t.checkCollision(p));
                
                return active;
            });
            
            // Draw targets
            targets.forEach(t => t.draw());
            
            // Draw particles
            particles = particles.filter(p => {
                const alive = p.update();
                p.draw();
                return alive;
            });
            
            // Draw shots left
            ctx.fillStyle = 'white';
            ctx.font = 'bold 18px Inter';
            ctx.textAlign = 'left';
            ctx.fillText('Shots: ' + shotsLeft, 20, 100);
            
            // Update score display
            document.getElementById('score').textContent = score;
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            draw();
            checkGameState();
            
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
