<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>BotDash - MoneyBot</title>
    <link rel="icon" type="image/svg+xml" href="../assets/moneybot-idle.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
        
        :root {
            --mb-green: #00E676;
            --mb-dark: #0a0e1a;
            --mb-panel: #131b2e;
            --mb-red: #FF5252;
            --mb-gold: #FFD700;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--mb-dark); min-height: 100vh; color: #fff; overflow: hidden; }
        .app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: var(--mb-panel); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--mb-green); }
        .header-logo { display: flex; align-items: center; gap: 10px; }
        .moneybot-icon { width: 36px; height: 36px; border-radius: 8px; overflow: hidden; background: var(--mb-green); }
        .moneybot-icon img { width: 100%; height: 100%; object-fit: cover; }
        .header-title { font-weight: 800; font-size: 18px; color: #fff; }
        .back-btn { width: 40px; height: 40px; border-radius: 10px; background: var(--mb-green); border: none; color: var(--mb-dark); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; text-decoration: none; font-weight: 700; }
        
        .stats-bar { display: flex; justify-content: space-around; padding: 12px; background: rgba(0, 230, 118, 0.1); }
        .stat { text-align: center; }
        .stat-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 22px; font-weight: 800; color: var(--mb-green); }
        
        .game-area { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 12px; position: relative; }
        
        #gameCanvas { background: var(--mb-panel); border-radius: 16px; border: 2px solid rgba(0, 230, 118, 0.3); width: 100%; height: 400px; }
        
        .controls { display: flex; gap: 10px; padding: 8px 0; }
        .control-btn { flex: 1; padding: 16px; border: 2px solid var(--mb-green); background: transparent; color: var(--mb-green); border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .control-btn:active { background: var(--mb-green); color: var(--mb-dark); }
        .control-btn.jump { border-color: var(--mb-gold); color: var(--mb-gold); }
        .control-btn.jump:active { background: var(--mb-gold); color: var(--mb-dark); }
        
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--mb-dark); z-index: 200; padding: 40px; }
        .overlay-screen.hidden { display: none; }
        .game-icon { width: 120px; height: 120px; background: var(--mb-green); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; overflow: hidden; }
        .game-icon img { width: 80%; height: 80%; object-fit: contain; }
        .game-title { font-size: 32px; font-weight: 800; color: #fff; margin-bottom: 12px; }
        .game-subtitle { color: rgba(255,255,255,0.6); font-size: 16px; margin-bottom: 32px; text-align: center; line-height: 1.5; }
        .primary-btn { background: var(--mb-green); color: var(--mb-dark); border: none; padding: 18px 48px; font-size: 16px; font-weight: 700; border-radius: 12px; cursor: pointer; width: 100%; max-width: 280px; transition: transform 0.2s; }
        .primary-btn:active { transform: scale(0.98); }
        .instructions-list { text-align: left; margin: 20px 0; max-width: 300px; }
        .instructions-list li { color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 10px; list-style: none; padding-left: 24px; position: relative; }
        .instructions-list li::before { content: '✓'; position: absolute; left: 0; color: var(--mb-green); font-weight: 700; }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-logo">
                <a href="../moneybot-official/" class="back-btn">←</a>
                <div class="moneybot-icon"><img src="../assets/moneybot-idle.svg" /></div>
                <span class="header-title">BotDash</span>
            </div>
        </header>
        
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="best">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Coins</div>
                <div class="stat-value" id="coins">0</div>
            </div>
        </div>
        
        <div class="game-area">
            <canvas id="gameCanvas" width="390" height="400"></canvas>
            <div class="controls">
                <button class="control-btn" id="leftBtn">← LEFT</button>
                <button class="control-btn jump" id="jumpBtn">↑ JUMP</button>
                <button class="control-btn" id="rightBtn">RIGHT →</button>
            </div>
        </div>
    </div>
    
    <div class="overlay-screen" id="startScreen">
        <div class="game-icon">
            <img src="../assets/moneybot-running.svg" alt="MoneyBot">
        </div>
        <div class="game-title">BotDash</div>
        <div class="game-subtitle">Run, jump, collect coins!<br>Avoid debt obstacles!</div>
        <ul class="instructions-list">
            <li>Use arrow keys or buttons to move</li>
            <li>Jump over red debt blocks</li>
            <li>Collect gold coins for points</li>
            <li>Survive as long as possible!</li>
        </ul>
        <button class="primary-btn" id="startBtn">Start Running</button>
    </div>
    
    <div class="overlay-screen hidden" id="gameOverScreen">
        <div class="game-icon">
            <img src="../assets/moneybot-sad.svg" alt="MoneyBot">
        </div>
        <div class="game-title" style="color: var(--mb-red);">Game Over!</div>
        <div class="game-subtitle">Score: <span id="finalScore" style="color: var(--mb-green); font-weight: 800;">0</span></div>
        <div class="game-subtitle">Coins: <span id="finalCoins" style="color: var(--mb-gold); font-weight: 800;">0</span></div>
        <button class="primary-btn" id="restartBtn">Run Again</button>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let coins = 0;
        let best = localStorage.getItem('botdash_best') || 0;
        let speed = 3;
        let frameCount = 0;
        
        // Player
        let player = {
            x: 50,
            y: 300,
            width: 30,
            height: 30,
            dy: 0,
            grounded: false
        };
        
        // Game objects
        let obstacles = [];
        let coinItems = [];
        let particles = [];
        const groundY = 340;
        
        // Update UI
        document.getElementById('best').textContent = best;
        
        // Button event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        // Control buttons
        document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft(); });
        document.getElementById('leftBtn').addEventListener('mousedown', moveLeft);
        document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight(); });
        document.getElementById('rightBtn').addEventListener('mousedown', moveRight);
        document.getElementById('jumpBtn').addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        document.getElementById('jumpBtn').addEventListener('mousedown', jump);
        
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            
            // Reset game state
            gameRunning = true;
            score = 0;
            coins = 0;
            speed = 3;
            frameCount = 0;
            
            // Reset player - place on ground
            player.x = 50;
            player.y = groundY - player.height;
            player.dy = 0;
            player.grounded = true;
            
            // Clear arrays
            obstacles = [];
            coinItems = [];
            particles = [];
            
            updateUI();
            gameLoop();
        }
        
        function jump() {
            if (!gameRunning) return;
            if (player.grounded) {
                player.dy = -12;
                player.grounded = false;
            }
        }
        
        function moveLeft() {
            if (!gameRunning) return;
            player.x = Math.max(0, player.x - 15);
        }
        
        function moveRight() {
            if (!gameRunning) return;
            player.x = Math.min(canvas.width - player.width, player.x + 15);
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            frameCount++;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function update() {
            // Gravity
            player.dy += 0.6;
            player.y += player.dy;
            
            // Ground collision
            if (player.y + player.height >= groundY) {
                player.y = groundY - player.height;
                player.dy = 0;
                player.grounded = true;
            }
            
            // Check if player fell off screen
            if (player.y > canvas.height) {
                gameOver();
                return;
            }
            
            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= speed;
                
                // Remove if off screen
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score += 10;
                    continue;
                }
                
                // Collision check
                if (checkCollision(player, obstacles[i])) {
                    gameOver();
                    return;
                }
            }
            
            // Update coins
            for (let i = coinItems.length - 1; i >= 0; i--) {
                coinItems[i].x -= speed;
                
                // Remove if off screen
                if (coinItems[i].x + coinItems[i].size < 0) {
                    coinItems.splice(i, 1);
                    continue;
                }
                
                // Collection check
                if (checkCoinCollision(player, coinItems[i])) {
                    coins++;
                    score += 50;
                    coinItems.splice(i, 1);
                }
            }
            
            // Spawn obstacles (after 2 seconds)
            if (frameCount > 120 && Math.random() < 0.02) {
                obstacles.push({
                    x: canvas.width,
                    y: groundY - 30,
                    width: 30,
                    height: 30
                });
            }
            
            // Spawn coins
            if (frameCount > 60 && Math.random() < 0.03) {
                coinItems.push({
                    x: canvas.width,
                    y: groundY - 80 - Math.random() * 100,
                    size: 20
                });
            }
            
            // Increase speed gradually
            speed = 3 + Math.floor(score / 500);
            
            updateUI();
        }
        
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }
        
        function checkCoinCollision(player, coin) {
            const dx = (player.x + player.width/2) - coin.x;
            const dy = (player.y + player.height/2) - coin.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < 25;
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid background
            ctx.strokeStyle = 'rgba(0, 230, 118, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            
            // Draw ground
            ctx.fillStyle = '#131b2e';
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            ctx.fillStyle = '#00E676';
            ctx.fillRect(0, groundY, canvas.width, 3);
            
            // Draw player (MoneyBot)
            ctx.fillStyle = '#00E676';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Player eyes
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(player.x + 5, player.y + 8, 6, 8);
            ctx.fillRect(player.x + 19, player.y + 8, 6, 8);
            
            // Player smile
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(player.x + 8, player.y + 22, 14, 3);
            
            // Draw obstacles
            obstacles.forEach(obs => {
                ctx.fillStyle = '#FF5252';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.fillStyle = '#FF1744';
                ctx.fillRect(obs.x + 5, obs.y + 5, obs.width - 10, obs.height - 10);
                
                // X mark
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(obs.x + 8, obs.y + 8);
                ctx.lineTo(obs.x + obs.width - 8, obs.y + obs.height - 8);
                ctx.moveTo(obs.x + obs.width - 8, obs.y + 8);
                ctx.lineTo(obs.x + 8, obs.y + obs.height - 8);
                ctx.stroke();
            });
            
            // Draw coins
            coinItems.forEach(coin => {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, coin.size/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFA500';
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, coin.size/2 - 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 14px Inter';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', coin.x, coin.y);
            });
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('coins').textContent = coins;
        }
        
        function gameOver() {
            gameRunning = false;
            
            if (score > best) {
                best = score;
                localStorage.setItem('botdash_best', best);
                document.getElementById('best').textContent = best;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalCoins').textContent = coins;
            
            // Show game over screen
            const gameOverScreen = document.getElementById('gameOverScreen');
            gameOverScreen.classList.remove('hidden');
            gameOverScreen.style.display = 'flex';
        }
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === ' ') jump();
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
        });
    </script>
</body>
</html>
