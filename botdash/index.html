<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BotDash - MoneyBot</title>
    <link rel="icon" type="image/svg+xml" href="../assets/moneybot-idle.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
        
        :root {
            --mb-green: #00E676;
            --mb-dark: #0a0e1a;
            --mb-panel: #131b2e;
            --mb-red: #FF5252;
            --mb-gold: #FFD700;
            --mb-blue: #448AFF;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--mb-dark); min-height: 100vh; color: #fff; overflow: hidden; }
        .app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: var(--mb-panel); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--mb-green); }
        .header-logo { display: flex; align-items: center; gap: 10px; }
        .moneybot-icon { width: 36px; height: 36px; border-radius: 8px; overflow: hidden; background: var(--mb-green); }
        .moneybot-icon img { width: 100%; height: 100%; object-fit: cover; }
        .header-title { font-weight: 800; font-size: 18px; color: #fff; }
        .back-btn { width: 40px; height: 40px; border-radius: 10px; background: var(--mb-green); border: none; color: var(--mb-dark); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; text-decoration: none; font-weight: 700; }
        
        .stats-bar { display: flex; justify-content: space-around; padding: 12px; background: rgba(0, 230, 118, 0.1); }
        .stat { text-align: center; }
        .stat-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 22px; font-weight: 800; color: var(--mb-green); }
        
        .game-area { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 12px; position: relative; }
        
        #gameCanvas { background: var(--mb-panel); border-radius: 16px; border: 2px solid rgba(0, 230, 118, 0.3); width: 100%; height: 550px; }
        
        .controls { display: flex; gap: 10px; padding: 8px 0; }
        .control-btn { flex: 1; padding: 18px; border: 2px solid var(--mb-green); background: transparent; color: var(--mb-green); border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .control-btn:active { background: var(--mb-green); color: var(--mb-dark); }
        .control-btn.jump { border-color: var(--mb-gold); color: var(--mb-gold); }
        .control-btn.jump:active { background: var(--mb-gold); color: var(--mb-dark); }
        
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--mb-dark); z-index: 200; padding: 40px; }
        .overlay-screen.hidden { display: none; }
        .game-icon { width: 120px; height: 120px; background: var(--mb-green); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; overflow: hidden; }
        .game-icon img { width: 80%; height: 80%; object-fit: contain; }
        .game-title { font-size: 32px; font-weight: 800; color: #fff; margin-bottom: 12px; }
        .game-subtitle { color: rgba(255,255,255,0.6); font-size: 16px; margin-bottom: 32px; text-align: center; line-height: 1.5; }
        .primary-btn { background: var(--mb-green); color: var(--mb-dark); border: none; padding: 18px 48px; font-size: 16px; font-weight: 700; border-radius: 12px; cursor: pointer; width: 100%; max-width: 280px; transition: transform 0.2s; }
        .primary-btn:active { transform: scale(0.98); }
        .instructions-list { text-align: left; margin: 20px 0; max-width: 300px; }
        .instructions-list li { color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 10px; list-style: none; padding-left: 24px; position: relative; }
        .instructions-list li::before { content: '✓'; position: absolute; left: 0; color: var(--mb-green); font-weight: 700; }
        
        .powerup-indicator { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; color: var(--mb-gold); display: none; }
        .powerup-indicator.active { display: block; }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-logo">
                <a href="../moneybot-official/" class="back-btn">←</a>
                <div class="moneybot-icon"><img src="../assets/moneybot-idle.svg" /></div>
                <span class="header-title">BotDash</span>
            </div>
        </header>
        
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="best">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Coins</div>
                <div class="stat-value" id="coins">0</div>
            </div>
        </div>
        
        <div class="game-area">
            <div style="position: relative;">
                <canvas id="gameCanvas" width="390" height="550"></canvas>
                <div class="powerup-indicator" id="powerupIndicator">⚡ SPEED BOOST!</div>
            </div>
            <div class="controls">
                <button class="control-btn" id="leftBtn">← LEFT</button>
                <button class="control-btn jump" id="jumpBtn">↑ JUMP</button>
                <button class="control-btn" id="rightBtn">RIGHT →</button>
            </div>
        </div>
    </div>
    
    <div class="overlay-screen" id="startScreen">
        <div class="game-icon">
            <img src="../assets/moneybot-running.svg" alt="MoneyBot">
        </div>
        <div class="game-title">BotDash</div>
        <div class="game-subtitle">3-Lane Endless Runner!<br>Dodge debt, collect coins!</div>
        <ul class="instructions-list">
            <li>Swipe or use arrows to switch lanes</li>
            <li>Jump over obstacles</li>
            <li>Collect gold coins</li>
            <li>Grab blue orbs for invincibility</li>
            <li>Survive as long as possible!</li>
        </ul>
        <button class="primary-btn" id="startBtn">Start Running</button>
    </div>
    
    <div class="overlay-screen hidden" id="gameOverScreen">
        <div class="game-icon">
            <img src="../assets/moneybot-sad.svg" alt="MoneyBot">
        </div>
        <div class="game-title" style="color: var(--mb-red);">Game Over!</div>
        <div class="game-subtitle">Score: <span id="finalScore" style="color: var(--mb-green); font-weight: 800;">0</span></div>
        <div class="game-subtitle">Coins: <span id="finalCoins" style="color: var(--mb-gold); font-weight: 800;">0</span></div>
        <div class="game-subtitle">Best: <span id="finalBest" style="color: var(--mb-blue); font-weight: 800;">0</span></div>
        <button class="primary-btn" id="restartBtn">Run Again</button>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game constants
        const LANES = 3;
        const LANE_WIDTH = canvas.width / LANES;
        const GROUND_Y = 480;
        const PLAYER_SIZE = 40;
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let coins = 0;
        let best = localStorage.getItem('botdash_best') || 0;
        let speed = 4;
        let frameCount = 0;
        let gameSpeed = 1;
        let powerupActive = false;
        let powerupTimer = 0;
        
        // Player - lane-based system
        let player = {
            lane: 1, // 0, 1, 2
            x: 0,
            y: GROUND_Y - PLAYER_SIZE,
            width: PLAYER_SIZE,
            height: PLAYER_SIZE,
            dy: 0,
            grounded: true,
            jumping: false,
            invincible: false,
            invincibleTimer: 0,
            targetX: 0
        };
        
        // Game objects
        let obstacles = [];
        let coinItems = [];
        let powerups = [];
        let particles = [];
        let floatingTexts = [];
        let laneLines = [];
        
        // Initialize player position
        function updatePlayerX() {
            player.targetX = player.lane * LANE_WIDTH + (LANE_WIDTH - PLAYER_SIZE) / 2;
            // Smooth transition
            player.x += (player.targetX - player.x) * 0.2;
        }
        
        // Update UI
        document.getElementById('best').textContent = best;
        
        // Button event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        // Control buttons
        document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft(); });
        document.getElementById('leftBtn').addEventListener('mousedown', moveLeft);
        document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight(); });
        document.getElementById('rightBtn').addEventListener('mousedown', moveRight);
        document.getElementById('jumpBtn').addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        document.getElementById('jumpBtn').addEventListener('mousedown', jump);
        
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('powerupIndicator').classList.remove('active');
            
            // Reset game state
            gameRunning = true;
            score = 0;
            coins = 0;
            speed = 4;
            frameCount = 0;
            gameSpeed = 1;
            powerupActive = false;
            powerupTimer = 0;
            
            // Reset player
            player.lane = 1;
            player.y = GROUND_Y - PLAYER_SIZE;
            player.dy = 0;
            player.grounded = true;
            player.jumping = false;
            player.invincible = false;
            player.invincibleTimer = 0;
            updatePlayerX();
            
            // Clear arrays
            obstacles = [];
            coinItems = [];
            powerups = [];
            particles = [];
            floatingTexts = [];
            
            updateUI();
            gameLoop();
        }
        
        function moveLeft() {
            if (!gameRunning) return;
            if (player.lane > 0) {
                player.lane--;
            }
        }
        
        function moveRight() {
            if (!gameRunning) return;
            if (player.lane < LANES - 1) {
                player.lane++;
            }
        }
        
        function jump() {
            if (!gameRunning) return;
            if (player.grounded && !player.jumping) {
                player.dy = -16;
                player.grounded = false;
                player.jumping = true;
                createParticles(player.x + PLAYER_SIZE/2, player.y + PLAYER_SIZE, '#00E676', 10);
            }
        }
        
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    dx: (Math.random() - 0.5) * 8,
                    dy: (Math.random() - 0.5) * 8,
                    life: 1,
                    color,
                    size: Math.random() * 5 + 2
                });
            }
        }
        
        function createFloatingText(x, y, text, color) {
            floatingTexts.push({
                x, y,
                text,
                color,
                life: 1,
                dy: -2
            });
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            frameCount++;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function update() {
            // Update player X position (smooth lane transition)
            updatePlayerX();
            
            // Powerup timer
            if (powerupActive) {
                powerupTimer--;
                if (powerupTimer <= 0) {
                    powerupActive = false;
                    gameSpeed = 1;
                    document.getElementById('powerupIndicator').classList.remove('active');
                }
            }
            
            // Invincibility timer
            if (player.invincible) {
                player.invincibleTimer--;
                if (player.invincibleTimer <= 0) {
                    player.invincible = false;
                }
            }
            
            // Gravity
            if (!player.grounded) {
                player.dy += 0.8;
                player.y += player.dy;
                
                // Ground collision
                if (player.y + PLAYER_SIZE >= GROUND_Y) {
                    player.y = GROUND_Y - PLAYER_SIZE;
                    player.dy = 0;
                    player.grounded = true;
                    player.jumping = false;
                }
            }
            
            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += speed * gameSpeed;
                
                // Remove if off screen
                if (obstacles[i].y > canvas.height) {
                    obstacles.splice(i, 1);
                    score += 15;
                    continue;
                }
                
                // Collision check (only if not invincible)
                if (!player.invincible && checkCollision(player, obstacles[i])) {
                    createParticles(player.x + PLAYER_SIZE/2, player.y + PLAYER_SIZE/2, '#FF5252', 20);
                    gameOver();
                    return;
                }
            }
            
            // Update coins
            for (let i = coinItems.length - 1; i >= 0; i--) {
                coinItems[i].y += speed * gameSpeed;
                
                // Remove if off screen
                if (coinItems[i].y > canvas.height) {
                    coinItems.splice(i, 1);
                    continue;
                }
                
                // Collection check
                if (checkCoinCollision(player, coinItems[i])) {
                    coins++;
                    score += 50;
                    createParticles(coinItems[i].x, coinItems[i].y, '#FFD700', 8);
                    createFloatingText(coinItems[i].x, coinItems[i].y, '+50', '#FFD700');
                    coinItems.splice(i, 1);
                }
            }
            
            // Update powerups
            for (let i = powerups.length - 1; i >= 0; i--) {
                powerups[i].y += speed * gameSpeed;
                
                // Remove if off screen
                if (powerups[i].y > canvas.height) {
                    powerups.splice(i, 1);
                    continue;
                }
                
                // Collection check
                if (checkCoinCollision(player, powerups[i])) {
                    activatePowerup();
                    createParticles(powerups[i].x, powerups[i].y, '#448AFF', 12);
                    createFloatingText(powerups[i].x, powerups[i].y, 'INVINCIBLE!', '#448AFF');
                    powerups.splice(i, 1);
                }
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].dx;
                particles[i].y += particles[i].dy;
                particles[i].life -= 0.03;
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // Update floating texts
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].y += floatingTexts[i].dy;
                floatingTexts[i].life -= 0.02;
                if (floatingTexts[i].life <= 0) {
                    floatingTexts.splice(i, 1);
                }
            }
            
            // Spawn obstacles
            if (frameCount > 60 && Math.random() < 0.03) {
                const lane = Math.floor(Math.random() * LANES);
                const laneX = lane * LANE_WIDTH + (LANE_WIDTH - 35) / 2;
                obstacles.push({
                    x: laneX,
                    y: -50,
                    width: 35,
                    height: 35,
                    lane: lane
                });
            }
            
            // Spawn coins (in rows or patterns)
            if (frameCount > 30 && Math.random() < 0.05) {
                const pattern = Math.random();
                if (pattern < 0.4) {
                    // Single coin in random lane
                    const lane = Math.floor(Math.random() * LANES);
                    const laneX = lane * LANE_WIDTH + LANE_WIDTH / 2;
                    coinItems.push({
                        x: laneX,
                        y: -30,
                        size: 20
                    });
                } else if (pattern < 0.7) {
                    // Row of coins across all lanes
                    for (let lane = 0; lane < LANES; lane++) {
                        const laneX = lane * LANE_WIDTH + LANE_WIDTH / 2;
                        coinItems.push({
                            x: laneX,
                            y: -30,
                            size: 18
                        });
                    }
                } else {
                    // V pattern
                    const centerLane = 1;
                    const laneX = centerLane * LANE_WIDTH + LANE_WIDTH / 2;
                    coinItems.push({
                        x: laneX,
                        y: -30,
                        size: 20
                    });
                    // Side coins slightly lower
                    setTimeout(() => {
                        if (gameRunning) {
                            coinItems.push({
                                x: 0 * LANE_WIDTH + LANE_WIDTH / 2,
                                y: -20,
                                size: 18
                            });
                            coinItems.push({
                                x: 2 * LANE_WIDTH + LANE_WIDTH / 2,
                                y: -20,
                                size: 18
                            });
                        }
                    }, 100);
                }
            }
            
            // Spawn powerups (very rare)
            if (frameCount > 200 && Math.random() < 0.003) {
                const lane = Math.floor(Math.random() * LANES);
                const laneX = lane * LANE_WIDTH + LANE_WIDTH / 2;
                powerups.push({
                    x: laneX,
                    y: -30,
                    size: 24
                });
            }
            
            // Increase speed gradually
            if (frameCount % 600 === 0) {
                speed += 0.5;
            }
            
            updateUI();
        }
        
        function activatePowerup() {
            powerupActive = true;
            powerupTimer = 360; // 6 seconds at 60fps
            player.invincible = true;
            player.invincibleTimer = 360;
            document.getElementById('powerupIndicator').classList.add('active');
        }
        
        function checkCollision(rect1, rect2) {
            // More forgiving collision for gameplay feel
            const padding = 8;
            return rect1.x + padding < rect2.x + rect2.width - padding &&
                   rect1.x + rect1.width - padding > rect2.x + padding &&
                   rect1.y + padding < rect2.y + rect2.height - padding &&
                   rect1.y + rect1.height - padding > rect2.y + padding;
        }
        
        function checkCoinCollision(player, coin) {
            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;
            const dx = playerCenterX - coin.x;
            const dy = playerCenterY - coin.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < 30;
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw lane markings
            drawLanes();
            
            // Draw background elements
            drawBackground();
            
            // Draw ground
            ctx.fillStyle = '#131b2e';
            ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
            ctx.fillStyle = '#00E676';
            ctx.fillRect(0, GROUND_Y, canvas.width, 3);
            
            // Draw game objects (sorted by Y for depth)
            const allObjects = [
                ...obstacles.map(o => ({...o, type: 'obstacle'})),
                ...coinItems.map(c => ({...c, type: 'coin'})),
                ...powerups.map(p => ({...p, type: 'powerup'}))
            ];
            
            allObjects.sort((a, b) => a.y - b.y);
            
            allObjects.forEach(obj => {
                if (obj.type === 'obstacle') {
                    drawObstacle(obj);
                } else if (obj.type === 'coin') {
                    drawCoin(obj);
                } else if (obj.type === 'powerup') {
                    drawPowerup(obj);
                }
            });
            
            // Draw player
            drawPlayer();
            
            // Draw particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
            
            // Draw floating texts
            floatingTexts.forEach(ft => {
                ctx.globalAlpha = ft.life;
                ctx.fillStyle = ft.color;
                ctx.font = 'bold 16px Inter';
                ctx.textAlign = 'center';
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.globalAlpha = 1;
            });
            
            // Draw speed lines when powerup active
            if (powerupActive) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 2;
                for (let i = 0; i < 8; i++) {
                    const x = Math.random() * canvas.width;
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }
            }
        }
        
        function drawLanes() {
            // Draw lane dividers
            ctx.strokeStyle = 'rgba(0, 230, 118, 0.1)';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);
            
            for (let i = 1; i < LANES; i++) {
                const x = i * LANE_WIDTH;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, GROUND_Y);
                ctx.stroke();
            }
            
            ctx.setLineDash([]);
        }
        
        function drawBackground() {
            // Draw distant buildings
            ctx.fillStyle = '#0d1220';
            const buildingOffset = (frameCount * speed * 0.1) % 100;
            for (let i = -1; i < canvas.width / 60 + 1; i++) {
                const height = 40 + Math.sin(i * 1.5) * 25 + Math.cos(i * 0.7) * 15;
                ctx.fillRect(i * 60 - buildingOffset, GROUND_Y - height, 55, height);
            }
            
            // Draw stars
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 30; i++) {
                const x = (i * 47 + frameCount * 0.05) % canvas.width;
                const y = 20 + (i * 31) % 120;
                ctx.globalAlpha = 0.2 + Math.sin(frameCount * 0.03 + i) * 0.15;
                ctx.fillRect(x, y, 2, 2);
            }
            ctx.globalAlpha = 1;
        }
        
        function drawPlayer() {
            // Invincibility flash
            if (player.invincible && Math.floor(frameCount / 3) % 2 === 0) {
                ctx.globalAlpha = 0.4;
            }
            
            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.ellipse(player.x + PLAYER_SIZE/2, GROUND_Y - 5, PLAYER_SIZE/2, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Player body
            ctx.fillStyle = '#00E676';
            ctx.fillRect(player.x, player.y, PLAYER_SIZE, PLAYER_SIZE);
            
            // Player border
            ctx.strokeStyle = '#00C853';
            ctx.lineWidth = 2;
            ctx.strokeRect(player.x, player.y, PLAYER_SIZE, PLAYER_SIZE);
            
            // Player eyes
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(player.x + 7, player.y + 8, 9, 11);
            ctx.fillRect(player.x + 24, player.y + 8, 9, 11);
            
            // Eye shine
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + 10, player.y + 10, 4, 4);
            ctx.fillRect(player.x + 27, player.y + 10, 4, 4);
            
            // Player smile
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(player.x + 12, player.y + 24, 16, 4);
            
            // Antenna
            ctx.strokeStyle = '#00E676';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(player.x + PLAYER_SIZE/2, player.y);
            ctx.lineTo(player.x + PLAYER_SIZE/2, player.y - 10);
            ctx.stroke();
            
            // Antenna ball
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(player.x + PLAYER_SIZE/2, player.y - 12, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Powerup glow
            if (powerupActive) {
                ctx.strokeStyle = 'rgba(68, 138, 255, 0.6)';
                ctx.lineWidth = 3;
                ctx.strokeRect(player.x - 4, player.y - 4, PLAYER_SIZE + 8, PLAYER_SIZE + 8);
                
                // Inner glow
                ctx.fillStyle = 'rgba(68, 138, 255, 0.15)';
                ctx.fillRect(player.x - 2, player.y - 2, PLAYER_SIZE + 4, PLAYER_SIZE + 4);
            }
            
            ctx.globalAlpha = 1;
        }
        
        function drawObstacle(obs) {
            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.beginPath();
            ctx.ellipse(obs.x + obs.width/2, GROUND_Y - 3, obs.width/2, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Obstacle body
            ctx.fillStyle = '#FF5252';
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            
            // Inner
            ctx.fillStyle = '#FF1744';
            ctx.fillRect(obs.x + 4, obs.y + 4, obs.width - 8, obs.height - 8);
            
            // X mark
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(obs.x + 8, obs.y + 8);
            ctx.lineTo(obs.x + obs.width - 8, obs.y + obs.height - 8);
            ctx.moveTo(obs.x + obs.width - 8, obs.y + 8);
            ctx.lineTo(obs.x + 8, obs.y + obs.height - 8);
            ctx.stroke();
            
            // Warning border
            ctx.strokeStyle = 'rgba(255, 82, 82, 0.5)';
            ctx.lineWidth = 2;
            ctx.strokeRect(obs.x - 2, obs.y - 2, obs.width + 4, obs.height + 4);
        }
        
        function drawCoin(coin) {
            // Glow
            ctx.fillStyle = 'rgba(255, 215, 0, 0.25)';
            ctx.beginPath();
            ctx.arc(coin.x, coin.y, coin.size/2 + 6, 0, Math.PI * 2);
            ctx.fill();
            
            // Outer
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(coin.x, coin.y, coin.size/2, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner
            ctx.fillStyle = '#FFA000';
            ctx.beginPath();
            ctx.arc(coin.x, coin.y, coin.size/2 - 4, 0, Math.PI * 2);
            ctx.fill();
            
            // $ symbol
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 13px Inter';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', coin.x, coin.y);
            
            // Shine
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.arc(coin.x - 3, coin.y - 3, 3, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawPowerup(powerup) {
            // Glow
            ctx.fillStyle = 'rgba(68, 138, 255, 0.35)';
            ctx.beginPath();
            ctx.arc(powerup.x, powerup.y, powerup.size/2 + 8, 0, Math.PI * 2);
            ctx.fill();
            
            // Outer
            ctx.fillStyle = '#448AFF';
            ctx.beginPath();
            ctx.arc(powerup.x, powerup.y, powerup.size/2, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner
            ctx.fillStyle = '#2962FF';
            ctx.beginPath();
            ctx.arc(powerup.x, powerup.y, powerup.size/2 - 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Lightning bolt
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px Inter';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⚡', powerup.x, powerup.y);
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('coins').textContent = coins;
        }
        
        function gameOver() {
            gameRunning = false;
            
            if (score > best) {
                best = score;
                localStorage.setItem('botdash_best', best);
                document.getElementById('best').textContent = best;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalCoins').textContent = coins;
            document.getElementById('finalBest').textContent = best;
            
            const gameOverScreen = document.getElementById('gameOverScreen');
            gameOverScreen.classList.remove('hidden');
            gameOverScreen.style.display = 'flex';
        }
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === ' ') {
                e.preventDefault();
                jump();
            }
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                moveLeft();
            }
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                moveRight();
            }
        });
        
        // Touch swipe controls
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                // Horizontal swipe
                if (dx > 30) moveRight();
                else if (dx < -30) moveLeft();
            } else {
                // Vertical swipe
                if (dy < -30) jump();
            }
        });
    </script>
</body>
</html>
