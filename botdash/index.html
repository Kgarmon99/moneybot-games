<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BotDash - MoneyBot</title>
    <link rel="icon" type="image/svg+xml" href="../assets/moneybot-idle.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
        
        :root {
            --mb-green: #00E676;
            --mb-dark: #0a0e1a;
            --mb-panel: #131b2e;
            --mb-red: #FF5252;
            --mb-gold: #FFD700;
            --mb-blue: #448AFF;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--mb-dark); min-height: 100vh; color: #fff; overflow: hidden; }
        .app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: var(--mb-panel); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--mb-green); }
        .header-logo { display: flex; align-items: center; gap: 10px; }
        .moneybot-icon { width: 36px; height: 36px; border-radius: 8px; overflow: hidden; background: var(--mb-green); }
        .moneybot-icon img { width: 100%; height: 100%; object-fit: cover; }
        .header-title { font-weight: 800; font-size: 18px; color: #fff; }
        .back-btn { width: 40px; height: 40px; border-radius: 10px; background: var(--mb-green); border: none; color: var(--mb-dark); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; text-decoration: none; font-weight: 700; }
        
        .stats-bar { display: flex; justify-content: space-around; padding: 12px; background: rgba(0, 230, 118, 0.1); }
        .stat { text-align: center; }
        .stat-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 22px; font-weight: 800; color: var(--mb-green); }
        
        .game-area { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 12px; position: relative; }
        
        #gameCanvas { background: var(--mb-panel); border-radius: 16px; border: 2px solid rgba(0, 230, 118, 0.3); width: 100%; height: 550px; }
        
        .controls { display: flex; gap: 10px; padding: 8px 0; }
        .control-btn { flex: 1; padding: 18px; border: 2px solid var(--mb-green); background: transparent; color: var(--mb-green); border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .control-btn:active { background: var(--mb-green); color: var(--mb-dark); }
        
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--mb-dark); z-index: 200; padding: 40px; }
        .overlay-screen.hidden { display: none; }
        .game-icon { width: 120px; height: 120px; background: var(--mb-green); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; overflow: hidden; }
        .game-icon img { width: 80%; height: 80%; object-fit: contain; }
        .game-title { font-size: 32px; font-weight: 800; color: #fff; margin-bottom: 12px; }
        .game-subtitle { color: rgba(255,255,255,0.6); font-size: 16px; margin-bottom: 32px; text-align: center; line-height: 1.5; }
        .primary-btn { background: var(--mb-green); color: var(--mb-dark); border: none; padding: 18px 48px; font-size: 16px; font-weight: 700; border-radius: 12px; cursor: pointer; width: 100%; max-width: 280px; transition: transform 0.2s; }
        .primary-btn:active { transform: scale(0.98); }
        .instructions-list { text-align: left; margin: 20px 0; max-width: 300px; }
        .instructions-list li { color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 10px; list-style: none; padding-left: 24px; position: relative; }
        .instructions-list li::before { content: '✓'; position: absolute; left: 0; color: var(--mb-green); font-weight: 700; }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-logo">
                <a href="../moneybot-official/" class="back-btn">←</a>
                <div class="moneybot-icon"><img src="../assets/moneybot-idle.svg" /></div>
                <span class="header-title">BotDash</span>
            </div>
        </header>
        
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-label">Height</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="best">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Coins</div>
                <div class="stat-value" id="coins">0</div>
            </div>
        </div>
        
        <div class="game-area">
            <canvas id="gameCanvas" width="390" height="550"></canvas>
            <div class="controls">
                <button class="control-btn" id="leftBtn">← LEFT</button>
                <button class="control-btn" id="jumpBtn">JUMP ↑</button>
                <button class="control-btn" id="rightBtn">RIGHT →</button>
            </div>
        </div>
    </div>
    
    <div class="overlay-screen" id="startScreen">
        <div class="game-icon">
            <img src="../assets/moneybot-jumping.svg" alt="MoneyBot">
        </div>
        <div class="game-title">BotDash</div>
        <div class="game-subtitle">Jump up through platforms!<br>Collect coins, avoid debt!</div>
        <ul class="instructions-list">
            <li>Use arrows or buttons to move</li>
            <li>Jump on green platforms to go up</li>
            <li>Collect gold coins for points</li>
            <li>Avoid red debt blocks</li>
            <li>Don't fall off the screen!</li>
        </ul>
        <button class="primary-btn" id="startBtn">Start Jumping</button>
    </div>
    
    <div class="overlay-screen hidden" id="gameOverScreen">
        <div class="game-icon">
            <img src="../assets/moneybot-sad.svg" alt="MoneyBot">
        </div>
        <div class="game-title" style="color: var(--mb-red);">Game Over!</div>
        <div class="game-subtitle">Height: <span id="finalScore" style="color: var(--mb-green); font-weight: 800;">0</span></div>
        <div class="game-subtitle">Coins: <span id="finalCoins" style="color: var(--mb-gold); font-weight: 800;">0</span></div>
        <div class="game-subtitle">Best: <span id="finalBest" style="color: var(--mb-blue); font-weight: 800;">0</span></div>
        <button class="primary-btn" id="restartBtn">Jump Again</button>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game constants
        const GRAVITY = 0.4;
        const JUMP_FORCE = -11;
        const PLAYER_SIZE = 32;
        const PLATFORM_WIDTH = 80;
        const PLATFORM_HEIGHT = 12;
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let coins = 0;
        let best = localStorage.getItem('botdash_best') || 0;
        let camera = 0;
        let frameCount = 0;
        
        // Player
        let player = {
            x: canvas.width / 2 - PLAYER_SIZE / 2,
            y: 400,
            width: PLAYER_SIZE,
            height: PLAYER_SIZE,
            dy: 0,
            dx: 0,
            grounded: false,
            facing: 1 // 1 = right, -1 = left
        };
        
        // Game objects
        let platforms = [];
        let coinItems = [];
        let obstacles = [];
        let particles = [];
        let floatingTexts = [];
        
        // Update UI
        document.getElementById('best').textContent = best;
        
        // Button event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        // Control buttons
        document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft(); });
        document.getElementById('leftBtn').addEventListener('mousedown', moveLeft);
        document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight(); });
        document.getElementById('rightBtn').addEventListener('mousedown', moveRight);
        document.getElementById('jumpBtn').addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        document.getElementById('jumpBtn').addEventListener('mousedown', jump);
        
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            
            // Reset game state
            gameRunning = true;
            score = 0;
            coins = 0;
            camera = 0;
            frameCount = 0;
            
            // Reset player
            player.x = canvas.width / 2 - PLAYER_SIZE / 2;
            player.y = 400;
            player.dy = 0;
            player.dx = 0;
            player.grounded = false;
            player.facing = 1;
            
            // Clear arrays
            platforms = [];
            coinItems = [];
            obstacles = [];
            particles = [];
            floatingTexts = [];
            
            // Create initial platforms
            createInitialPlatforms();
            
            updateUI();
            gameLoop();
        }
        
        function createInitialPlatforms() {
            // Starting platform
            platforms.push({
                x: canvas.width / 2 - PLATFORM_WIDTH / 2,
                y: 450,
                width: PLATFORM_WIDTH,
                height: PLATFORM_HEIGHT,
                type: 'normal'
            });
            
            // Generate platforms going up
            let currentY = 450;
            for (let i = 0; i < 20; i++) {
                currentY -= 80 + Math.random() * 60;
                const x = Math.random() * (canvas.width - PLATFORM_WIDTH);
                const type = Math.random() > 0.8 ? 'moving' : 'normal';
                platforms.push({
                    x: x,
                    y: currentY,
                    width: PLATFORM_WIDTH,
                    height: PLATFORM_HEIGHT,
                    type: type,
                    moveSpeed: type === 'moving' ? (Math.random() > 0.5 ? 1.5 : -1.5) : 0
                });
                
                // Add coins on some platforms
                if (Math.random() > 0.5) {
                    coinItems.push({
                        x: x + PLATFORM_WIDTH / 2,
                        y: currentY - 25,
                        size: 16,
                        collected: false
                    });
                }
                
                // Add obstacles on some platforms
                if (i > 3 && Math.random() > 0.7) {
                    obstacles.push({
                        x: x + 10,
                        y: currentY - 20,
                        width: 20,
                        height: 20
                    });
                }
            }
        }
        
        function moveLeft() {
            if (!gameRunning) return;
            player.dx = -5;
            player.facing = -1;
        }
        
        function moveRight() {
            if (!gameRunning) return;
            player.dx = 5;
            player.facing = 1;
        }
        
        function jump() {
            if (!gameRunning) return;
            if (player.grounded) {
                player.dy = JUMP_FORCE;
                player.grounded = false;
                createParticles(player.x + PLAYER_SIZE / 2, player.y + PLAYER_SIZE, '#00E676', 8);
            }
        }
        
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    dx: (Math.random() - 0.5) * 6,
                    dy: (Math.random() - 0.5) * 6,
                    life: 1,
                    color,
                    size: Math.random() * 4 + 2
                });
            }
        }
        
        function createFloatingText(x, y, text, color) {
            floatingTexts.push({
                x, y,
                text,
                color,
                life: 1,
                dy: -2
            });
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            frameCount++;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function update() {
            // Apply gravity
            player.dy += GRAVITY;
            player.y += player.dy;
            player.x += player.dx;
            
            // Friction
            player.dx *= 0.9;
            
            // Screen wrap
            if (player.x + PLAYER_SIZE < 0) {
                player.x = canvas.width;
            } else if (player.x > canvas.width) {
                player.x = -PLAYER_SIZE;
            }
            
            // Update camera to follow player
            const targetCamera = player.y - canvas.height * 0.6;
            if (targetCamera < camera) {
                camera = targetCamera;
            }
            
            // Update score based on height
            const height = Math.max(0, Math.floor((450 - player.y) / 10));
            if (height > score) {
                score = height;
            }
            
            // Check if player fell off screen
            if (player.y - camera > canvas.height + 100) {
                gameOver();
                return;
            }
            
            // Platform collisions
            player.grounded = false;
            for (let platform of platforms) {
                // Move moving platforms
                if (platform.type === 'moving') {
                    platform.x += platform.moveSpeed;
                    if (platform.x <= 0 || platform.x + platform.width >= canvas.width) {
                        platform.moveSpeed *= -1;
                    }
                }
                
                // Check collision (only when falling and above platform)
                if (player.dy > 0 &&
                    player.x + player.width > platform.x &&
                    player.x < platform.x + platform.width &&
                    player.y + player.height >= platform.y &&
                    player.y + player.height <= platform.y + platform.height + player.dy + 5) {
                    
                    player.y = platform.y - player.height;
                    player.dy = 0;
                    player.grounded = true;
                    
                    // Move with platform
                    if (platform.type === 'moving') {
                        player.x += platform.moveSpeed;
                    }
                }
            }
            
            // Coin collection
            for (let i = coinItems.length - 1; i >= 0; i--) {
                const coin = coinItems[i];
                if (!coin.collected && checkCoinCollision(player, coin)) {
                    coin.collected = true;
                    coins++;
                    score += 10;
                    createParticles(coin.x, coin.y, '#FFD700', 6);
                    createFloatingText(coin.x, coin.y, '+10', '#FFD700');
                    coinItems.splice(i, 1);
                }
            }
            
            // Obstacle collisions
            for (let obstacle of obstacles) {
                if (checkCollision(player, obstacle)) {
                    createParticles(player.x + PLAYER_SIZE / 2, player.y + PLAYER_SIZE / 2, '#FF5252', 15);
                    gameOver();
                    return;
                }
            }
            
            // Generate new platforms as player goes up
            const highestPlatform = platforms.length > 0 ? platforms[platforms.length - 1].y : 450;
            if (highestPlatform > camera - 200) {
                generatePlatform(highestPlatform - 80 - Math.random() * 60);
            }
            
            // Remove platforms below camera
            for (let i = platforms.length - 1; i >= 0; i--) {
                if (platforms[i].y > camera + canvas.height + 100) {
                    platforms.splice(i, 1);
                }
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].dx;
                particles[i].y += particles[i].dy;
                particles[i].life -= 0.03;
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // Update floating texts
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].y += floatingTexts[i].dy;
                floatingTexts[i].life -= 0.02;
                if (floatingTexts[i].life <= 0) {
                    floatingTexts.splice(i, 1);
                }
            }
            
            updateUI();
        }
        
        function generatePlatform(y) {
            const x = Math.random() * (canvas.width - PLATFORM_WIDTH);
            const type = Math.random() > 0.75 ? 'moving' : 'normal';
            platforms.push({
                x: x,
                y: y,
                width: PLATFORM_WIDTH,
                height: PLATFORM_HEIGHT,
                type: type,
                moveSpeed: type === 'moving' ? (Math.random() > 0.5 ? 1.5 : -1.5) : 0
            });
            
            // Add coins
            if (Math.random() > 0.4) {
                coinItems.push({
                    x: x + PLATFORM_WIDTH / 2,
                    y: y - 25,
                    size: 16,
                    collected: false
                });
            }
            
            // Add obstacles
            if (Math.random() > 0.75) {
                obstacles.push({
                    x: x + 10,
                    y: y - 20,
                    width: 20,
                    height: 20
                });
            }
        }
        
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }
        
        function checkCoinCollision(player, coin) {
            const dx = (player.x + player.width / 2) - coin.x;
            const dy = (player.y + player.height / 2) - coin.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < 25;
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw background
            drawBackground();
            
            ctx.save();
            ctx.translate(0, -camera);
            
            // Draw platforms
            platforms.forEach(platform => {
                // Platform shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fillRect(platform.x + 3, platform.y + 3, platform.width, platform.height);
                
                // Platform body
                if (platform.type === 'moving') {
                    ctx.fillStyle = '#00B0FF';
                } else {
                    ctx.fillStyle = '#00E676';
                }
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
                
                // Platform top highlight
                ctx.fillStyle = platform.type === 'moving' ? '#40C4FF' : '#69F0AE';
                ctx.fillRect(platform.x, platform.y, platform.width, 3);
                
                // Platform border
                ctx.strokeStyle = platform.type === 'moving' ? '#0091EA' : '#00C853';
                ctx.lineWidth = 1;
                ctx.strokeRect(platform.x, platform.y, platform.width, platform.height);
            });
            
            // Draw coins
            coinItems.forEach(coin => {
                if (coin.collected) return;
                
                // Glow
                ctx.fillStyle = 'rgba(255, 215, 0, 0.25)';
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, coin.size / 2 + 5, 0, Math.PI * 2);
                ctx.fill();
                
                // Coin body
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, coin.size / 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Inner
                ctx.fillStyle = '#FFA000';
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, coin.size / 2 - 3, 0, Math.PI * 2);
                ctx.fill();
                
                // $ symbol
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 11px Inter';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', coin.x, coin.y);
            });
            
            // Draw obstacles
            obstacles.forEach(obstacle => {
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.beginPath();
                ctx.ellipse(obstacle.x + obstacle.width / 2, obstacle.y + obstacle.height + 3, obstacle.width / 2, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Body
                ctx.fillStyle = '#FF5252';
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                
                // Inner
                ctx.fillStyle = '#FF1744';
                ctx.fillRect(obstacle.x + 3, obstacle.y + 3, obstacle.width - 6, obstacle.height - 6);
                
                // X mark
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(obstacle.x + 5, obstacle.y + 5);
                ctx.lineTo(obstacle.x + obstacle.width - 5, obstacle.y + obstacle.height - 5);
                ctx.moveTo(obstacle.x + obstacle.width - 5, obstacle.y + 5);
                ctx.lineTo(obstacle.x + 5, obstacle.y + obstacle.height - 5);
                ctx.stroke();
            });
            
            // Draw player
            drawPlayer();
            
            // Draw particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
            
            // Draw floating texts
            floatingTexts.forEach(ft => {
                ctx.globalAlpha = ft.life;
                ctx.fillStyle = ft.color;
                ctx.font = 'bold 14px Inter';
                ctx.textAlign = 'center';
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.globalAlpha = 1;
            });
            
            ctx.restore();
        }
        
        function drawBackground() {
            // Draw stars
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 40; i++) {
                const x = (i * 73) % canvas.width;
                const y = ((i * 47 + camera * 0.1) % (canvas.height + 100)) - 50;
                ctx.globalAlpha = 0.15 + Math.sin(frameCount * 0.02 + i) * 0.1;
                ctx.fillRect(x, y, 2, 2);
            }
            ctx.globalAlpha = 1;
        }
        
        function drawPlayer() {
            const screenY = player.y;
            
            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.beginPath();
            ctx.ellipse(player.x + PLAYER_SIZE / 2, screenY + PLAYER_SIZE + 2, PLAYER_SIZE / 2, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Squash and stretch
            let stretchX = 0;
            let stretchY = 0;
            if (player.dy < -5) {
                stretchY = -4;
                stretchX = 2;
            } else if (player.dy > 5) {
                stretchY = 4;
                stretchX = -2;
            }
            
            // Body
            ctx.fillStyle = '#00E676';
            ctx.fillRect(player.x - stretchX, screenY - stretchY, PLAYER_SIZE + stretchX * 2, PLAYER_SIZE + stretchY * 2);
            
            // Border
            ctx.strokeStyle = '#00C853';
            ctx.lineWidth = 2;
            ctx.strokeRect(player.x - stretchX, screenY - stretchY, PLAYER_SIZE + stretchX * 2, PLAYER_SIZE + stretchY * 2);
            
            // Eyes
            const eyeOffset = player.facing === 1 ? 4 : -4;
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(player.x + 6 + eyeOffset, screenY + 7, 7, 9);
            ctx.fillRect(player.x + 19 + eyeOffset, screenY + 7, 7, 9);
            
            // Eye shine
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + 8 + eyeOffset, screenY + 9, 3, 3);
            ctx.fillRect(player.x + 21 + eyeOffset, screenY + 9, 3, 3);
            
            // Smile
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(player.x + 10, screenY + 20, 12, 3);
            
            // Antenna
            ctx.strokeStyle = '#00E676';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(player.x + PLAYER_SIZE / 2, screenY - stretchY);
            ctx.lineTo(player.x + PLAYER_SIZE / 2, screenY - stretchY - 8);
            ctx.stroke();
            
            // Antenna ball
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(player.x + PLAYER_SIZE / 2, screenY - stretchY - 10, 3, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('coins').textContent = coins;
        }
        
        function gameOver() {
            gameRunning = false;
            
            if (score > best) {
                best = score;
                localStorage.setItem('botdash_best', best);
                document.getElementById('best').textContent = best;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalCoins').textContent = coins;
            document.getElementById('finalBest').textContent = best;
            
            const gameOverScreen = document.getElementById('gameOverScreen');
            gameOverScreen.classList.remove('hidden');
            gameOverScreen.style.display = 'flex';
        }
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                moveLeft();
            }
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                moveRight();
            }
            if (e.key === 'ArrowUp' || e.key === ' ') {
                e.preventDefault();
                jump();
            }
        });
        
        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) moveRight();
                else if (dx < -30) moveLeft();
            } else {
                if (dy < -30) jump();
            }
        });
    </script>
</body>
</html>
