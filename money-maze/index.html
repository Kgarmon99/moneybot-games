<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyBot - Money Maze | MoneyBot Gaming</title>
    <link rel="icon" type="image/svg+xml" href="../assets/moneybot-idle.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
        :root { --moneybot-dark: #0F172A; --moneybot-green: #22C55E; --moneybot-neon-light: #33FFB5; --moneybot-graphite: #0F172A; --moneybot-charcoal: #1E293B; --moneybot-white: #FFFFFF; --moneybot-gray: #888888; --moneybot-blue: #3B82F6; --moneybot-purple: #8B5CF6; --moneybot-gold: #FBBF24; --moneybot-red: #EF4444; --glow-neon: 0 0 10px #22C55E, 0 0 20px #22C55E; --glow-strong: 0 0 20px #22C55E, 0 0 40px #22C55E; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--moneybot-black); min-height: 100vh; overflow: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 255, 153, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 153, 0.03) 1px, transparent 1px); background-size: 80px 80px; pointer-events: none; z-index: 0; }
        body::after { content: ''; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 255, 153, 0.08) 0%, transparent 70%); pointer-events: none; z-index: 0; animation: pulse 4s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.2); } }
        .app { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; z-index: 1; display: flex; flex-direction: column; }
        .header { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); padding: 16px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid rgba(34, 197, 94, 0.2); }
        .header-logo { display: flex; align-items: center; gap: 12px; }
        .moneybot-brand { display: flex; align-items: center; gap: 8px; }
        .moneybot-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--moneybot-neon), var(--moneybot-blue)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: var(--glow-neon); }
        .back-btn { width: 44px; height: 44px; border-radius: 8px; background: rgba(34, 197, 94, 0.2); border: none; color: var(--moneybot-neon); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; text-decoration: none; transition: all 0.2s; }
        .back-btn:hover { background: rgba(34, 197, 94, 0.2); transform: scale(1.05); }
        .back-btn:active { transform: scale(0.95); }
        .header-title { font-weight: 800; font-size: 18px; color: var(--moneybot-white); }
        .score-pill { background: linear-gradient(135deg, var(--moneybot-neon), var(--moneybot-blue)); color: var(--moneybot-black); padding: 10px 20px; border-radius: 25px; font-weight: 700; font-size: 16px; box-shadow: var(--glow-neon); }
        .game-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #gameCanvas { background: var(--moneybot-graphite); border-radius: 16px; box-shadow: var(--glow-neon); }
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px); z-index: 200; padding: 40px; }
        .overlay-screen.hidden { display: none; }
        .game-icon { width: 80px; height: 80px; background: linear-gradient(135deg, var(--moneybot-neon), var(--moneybot-blue)); border-radius: 32px; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 30px; box-shadow: var(--glow-strong); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .game-title { font-size: 40px; font-weight: 800; color: var(--moneybot-white); margin-bottom: 12px; }
        .game-subtitle { color: var(--moneybot-gray); font-size: 17px; margin-bottom: 40px; text-align: center; }
        .stats-card { background: var(--moneybot-graphite); border-radius: 16px; padding: 24px 40px; margin-bottom: 30px; text-align: center; border: 1px solid rgba(34, 197, 94, 0.2); }
        .stats-label { font-size: 13px; color: var(--moneybot-gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stats-value { font-size: 40px; font-weight: 800; color: var(--moneybot-neon); }
        .primary-btn { background: linear-gradient(135deg, var(--moneybot-neon), var(--moneybot-blue)); color: var(--moneybot-black); border: none; padding: 16px 32px; font-size: 18px; font-weight: 700; border-radius: 16px; cursor: pointer; box-shadow: var(--glow-neon); transition: all 0.3s; width: 100%; max-width: 280px; }
        .primary-btn:hover { transform: scale(1.05); box-shadow: var(--glow-strong); }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-logo">
                <a href="../moneybot-official/" class="back-btn">←</a>
                <div class="moneybot-brand">
                    <div class="moneybot-icon"><img src="assets/moneybot-logo-1.jpg" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;" /></div>
                    <span class="header-title">MoneyBot</span>
                </div>
            </div>
            <div class="score-pill">$<span id="score">0</span></div>
        </div>
        <div class="game-area">
            <canvas id="gameCanvas" width="350" height="350"></canvas>
        </div>
    </div>
    <div class="overlay-screen" id="startScreen">
        <div class="game-icon">🌀</div>
        <div class="game-title">Money Maze</div>
        <div class="game-subtitle">Navigate the maze!<br>Collect coins, find the exit</div>
        <div class="stats-card">
            <div class="stats-label">Best Score</div>
            <div class="stats-value" id="highScore">$0</div>
        </div>
        <button class="primary-btn" onclick="startGame()">Enter Maze</button>
    </div>
    <div class="overlay-screen hidden" id="gameOverScreen">
        <div class="game-icon" style="background: linear-gradient(135deg, var(--moneybot-gold), var(--moneybot-neon));">🏆</div>
        <div class="game-title">Escaped!</div>
        <div class="game-subtitle">You collected $<span id="finalScore" style="color: var(--moneybot-neon); font-weight: 800;">0</span></div>
        <button class="primary-btn" onclick="restartGame()">Play Again</button>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CELL_SIZE = 35;
        const MAZE_SIZE = 10;
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('moneyMazeHighScore') || 0;
        let player = { x: 0, y: 0 };
        let maze = [];
        let coins = [];
        let exit = { x: 9, y: 9 };
        document.getElementById('highScore').textContent = '$' + highScore;
        function generateMaze() {
            maze = [];
            for (let y = 0; y < MAZE_SIZE; y++) {
                maze[y] = [];
                for (let x = 0; x < MAZE_SIZE; x++) {
                    maze[y][x] = Math.random() > 0.7 ? 1 : 0;
                }
            }
            maze[0][0] = 0;
            maze[9][9] = 0;
            coins = [];
            for (let i = 0; i < 8; i++) {
                let cx, cy;
                do {
                    cx = Math.floor(Math.random() * MAZE_SIZE);
                    cy = Math.floor(Math.random() * MAZE_SIZE);
                } while (maze[cy][cx] === 1 || (cx === 0 && cy === 0) || (cx === 9 && cy === 9));
                coins.push({ x: cx, y: cy, collected: false, value: 25 + Math.floor(Math.random() * 75) });
            }
        }
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            gameRunning = true;
            score = 0;
            player = { x: 0, y: 0 };
            generateMaze();
            updateScore();
            draw();
        }
        function restartGame() {
            startGame();
        }
        function move(dx, dy) {
            if (!gameRunning) return;
            const newX = player.x + dx;
            const newY = player.y + dy;
            if (newX >= 0 && newX < MAZE_SIZE && newY >= 0 && newY < MAZE_SIZE && maze[newY][newX] === 0) {
                player.x = newX;
                player.y = newY;
                coins.forEach(coin => {
                    if (!coin.collected && coin.x === player.x && coin.y === player.y) {
                        coin.collected = true;
                        score += coin.value;
                        if (navigator.vibrate) navigator.vibrate(10);
                    }
                });
                if (player.x === exit.x && player.y === exit.y) {
                    gameOver();
                }
                updateScore();
                draw();
            }
        }
        function gameOver() {
            gameRunning = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('moneyMazeHighScore', highScore);
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        function draw() {
            ctx.fillStyle = var(--moneybot-black);
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let y = 0; y < MAZE_SIZE; y++) {
                for (let x = 0; x < MAZE_SIZE; x++) {
                    if (maze[y][x] === 1) {
                        ctx.fillStyle = var(--moneybot-charcoal);
                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    } else {
                        ctx.strokeStyle = 'rgba(34, 197, 94, 0.2)';
                        ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    }
                }
            }
            ctx.font = '20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            coins.forEach(coin => {
                if (!coin.collected) {
                    ctx.fillText('🪙', coin.x * CELL_SIZE + CELL_SIZE / 2, coin.y * CELL_SIZE + CELL_SIZE / 2);
                }
            });
            ctx.fillText('🚪', exit.x * CELL_SIZE + CELL_SIZE / 2, exit.y * CELL_SIZE + CELL_SIZE / 2);
            ctx.shadowBlur = 20;
            ctx.shadowColor = var(--moneybot-neon);
            ctx.fillText('MoneyBot', player.x * CELL_SIZE + CELL_SIZE / 2, player.y * CELL_SIZE + CELL_SIZE / 2);
            ctx.shadowBlur = 0;
        }
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key === 'ArrowUp') move(0, -1);
            if (e.key === 'ArrowDown') move(0, 1);
            if (e.key === 'ArrowLeft') move(-1, 0);
            if (e.key === 'ArrowRight') move(1, 0);
        });
        let touchStartX = 0;
        let touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning) return;
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 30) move(1, 0);
                else if (diffX < -30) move(-1, 0);
            } else {
                if (diffY > 30) move(0, 1);
                else if (diffY < -30) move(0, -1);
            }
        });
    </script>
</body>
</html>
