<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Stack | MoneyBot Gaming</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
        :root { --moneybot-black: #000000; --moneybot-neon: #00FF99; --moneybot-neon-light: #33FFB5; --moneybot-graphite: #0D0D0D; --moneybot-charcoal: #1A1A1A; --moneybot-white: #FFFFFF; --moneybot-gray: #888888; --moneybot-blue: #00D4FF; --moneybot-purple: #7B61FF; --moneybot-gold: #FFD700; --moneybot-red: #FF4D4D; --glow-neon: 0 0 10px #00FF99, 0 0 20px #00FF99; --glow-strong: 0 0 20px #00FF99, 0 0 40px #00FF99; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--moneybot-black); min-height: 100vh; overflow: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 255, 153, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 153, 0.03) 1px, transparent 1px); background-size: 80px 80px; pointer-events: none; z-index: 0; }
        body::after { content: ''; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 255, 153, 0.08) 0%, transparent 70%); pointer-events: none; z-index: 0; animation: pulse 4s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.2); } }
        .app { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; z-index: 1; display: flex; flex-direction: column; }
        .header { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid rgba(0, 255, 153, 0.1); }
        .header-logo { display: flex; align-items: center; gap: 12px; }
        .moneybot-brand { display: flex; align-items: center; gap: 8px; }
        .moneybot-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--moneybot-neon), var(--moneybot-blue)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: var(--glow-neon); }
        .back-btn { width: 44px; height: 44px; border-radius: 14px; background: rgba(0, 255, 153, 0.1); border: none; color: var(--moneybot-neon); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; text-decoration: none; transition: all 0.2s; }
        .back-btn:hover { background: rgba(0, 255, 153, 0.2); transform: scale(1.05); }
        .back-btn:active { transform: scale(0.95); }
        .header-title { font-weight: 800; font-size: 18px; color: var(--moneybot-white); }
        .score-pill { background: linear-gradient(135deg, var(--moneybot-neon), var(--moneybot-blue)); color: var(--moneybot-black); padding: 10px 20px; border-radius: 25px; font-weight: 700; font-size: 16px; box-shadow: var(--glow-neon); }
        .game-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #gameCanvas { background: var(--moneybot-graphite); border-radius: 20px; box-shadow: var(--glow-neon); }
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px); z-index: 200; padding: 40px; }
        .overlay-screen.hidden { display: none; }
        .game-icon { width: 120px; height: 120px; background: linear-gradient(135deg, var(--moneybot-neon), var(--moneybot-blue)); border-radius: 32px; display: flex; align-items: center; justify-content: center; font-size: 60px; margin-bottom: 30px; box-shadow: var(--glow-strong); animation: stack 2s ease-in-out infinite; }
        @keyframes stack { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .game-title { font-size: 36px; font-weight: 900; color: var(--moneybot-white); margin-bottom: 12px; }
        .game-subtitle { color: var(--moneybot-gray); font-size: 17px; margin-bottom: 40px; text-align: center; }
        .stats-card { background: var(--moneybot-graphite); border-radius: 20px; padding: 24px 40px; margin-bottom: 30px; text-align: center; border: 1px solid rgba(0, 255, 153, 0.2); }
        .stats-label { font-size: 13px; color: var(--moneybot-gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stats-value { font-size: 36px; font-weight: 800; color: var(--moneybot-neon); }
        .primary-btn { background: linear-gradient(135deg, var(--moneybot-neon), var(--moneybot-blue)); color: var(--moneybot-black); border: none; padding: 20px 60px; font-size: 18px; font-weight: 700; border-radius: 16px; cursor: pointer; box-shadow: var(--glow-neon); transition: all 0.3s; width: 100%; max-width: 280px; }
        .primary-btn:hover { transform: scale(1.05); box-shadow: var(--glow-strong); }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-logo">
                <a href="../moneybot-official/" class="back-btn">←</a>
                <div class="moneybot-brand">
                    <div class="moneybot-icon">🤖</div>
                    <span class="header-title">Stock Stack</span>
                </div>
            </div>
            <div class="score-pill">$<span id="score">0</span></div>
        </div>
        <div class="game-area">
            <canvas id="gameCanvas" width="350" height="500"></canvas>
        </div>
    </div>
    <div class="overlay-screen" id="startScreen">
        <div class="game-icon">📊</div>
        <div class="game-title">Stock Stack</div>
        <div class="game-subtitle">Stack stock cards!<br>Build your portfolio tower</div>
        <div class="stats-card">
            <div class="stats-label">Best Stack</div>
            <div class="stats-value" id="highScore">$0</div>
        </div>
        <button class="primary-btn" onclick="startGame()">Start Stacking</button>
    </div>
    <div class="overlay-screen hidden" id="gameOverScreen">
        <div class="game-icon" style="background: linear-gradient(135deg, var(--moneybot-red), #ff0000);">📉</div>
        <div class="game-title">Market Crash!</div>
        <div class="game-subtitle">Portfolio: $<span id="finalScore" style="color: var(--moneybot-neon); font-weight: 800;">0</span></div>
        <button class="primary-btn" onclick="restartGame()">Stack Again</button>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('stockStackHighScore') || 0;
        let blocks = [];
        let currentBlock = null;
        let swingAngle = 0;
        let swingSpeed = 0.03;
        let blockWidth = 120;
        let blockHeight = 30;
        let gameLoop;
        document.getElementById('highScore').textContent = '$' + highScore;
        const stockTypes = [
            { name: 'TECH', color: '#00D4FF', value: 100 },
            { name: 'FINANCE', color: '#00FF99', value: 80 },
            { name: 'ENERGY', color: '#FFD700', value: 60 },
            { name: 'HEALTH', color: '#7B61FF', value: 90 }
        ];
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            gameRunning = true;
            score = 0;
            blocks = [];
            blockWidth = 120;
            swingSpeed = 0.03;
            blocks.push({
                x: 175,
                y: 450,
                width: blockWidth,
                height: blockHeight,
                type: stockTypes[0]
            });
            initBlock();
            updateScore();
            gameLoop = requestAnimationFrame(update);
        }
        function restartGame() {
            startGame();
        }
        function initBlock() {
            const lastBlock = blocks[blocks.length - 1];
            currentBlock = {
                x: 175 + Math.sin(swingAngle) * 150,
                y: lastBlock.y - blockHeight - 5,
                width: blockWidth,
                height: blockHeight,
                type: stockTypes[Math.floor(Math.random() * stockTypes.length)],
                dropped: false
            };
        }
        function dropBlock() {
            if (!gameRunning || !currentBlock || currentBlock.dropped) return;
            currentBlock.dropped = true;
            const lastBlock = blocks[blocks.length - 1];
            const overlap = calculateOverlap(currentBlock, lastBlock);
            if (overlap <= 0) {
                gameOver();
                return;
            }
            const offsetX = currentBlock.x - lastBlock.x;
            currentBlock.width = overlap;
            currentBlock.x = lastBlock.x + (offsetX > 0 ? offsetX : 0);
            blockWidth = currentBlock.width;
            score += currentBlock.type.value;
            if (navigator.vibrate) navigator.vibrate(10);
            blocks.push(currentBlock);
            swingSpeed += 0.005;
            updateScore();
            setTimeout(() => initBlock(), 200);
        }
        function calculateOverlap(block1, block2) {
            const left1 = block1.x - block1.width / 2;
            const right1 = block1.x + block1.width / 2;
            const left2 = block2.x - block2.width / 2;
            const right2 = block2.x + block2.width / 2;
            const overlapLeft = Math.max(left1, left2);
            const overlapRight = Math.min(right1, right2);
            return Math.max(0, overlapRight - overlapLeft);
        }
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(gameLoop);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('stockStackHighScore', highScore);
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        function update() {
            if (!gameRunning || !currentBlock || currentBlock.dropped) return;
            swingAngle += swingSpeed;
            if (Math.abs(swingAngle) > Math.PI / 2) {
                swingSpeed *= -1;
            }
            const lastBlock = blocks[blocks.length - 1];
            currentBlock.x = lastBlock.x + Math.sin(swingAngle) * 150;
            draw();
            gameLoop = requestAnimationFrame(update);
        }
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        function draw() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            blocks.forEach((block, index) => {
                ctx.fillStyle = block.type.color;
                ctx.fillRect(block.x - block.width / 2, block.y, block.width, block.height);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(block.x - block.width / 2, block.y, block.width, 3);
                ctx.fillStyle = '#000000';
                ctx.font = 'bold 12px Inter';
                ctx.textAlign = 'center';
                ctx.fillText(block.type.name, block.x, block.y + block.height / 2 + 4);
            });
            if (currentBlock && !currentBlock.dropped) {
                ctx.fillStyle = currentBlock.type.color;
                ctx.fillRect(currentBlock.x - currentBlock.width / 2, currentBlock.y, currentBlock.width, currentBlock.height);
                ctx.strokeStyle = '#00FF99';
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(currentBlock.x, currentBlock.y + currentBlock.height);
                ctx.lineTo(currentBlock.x, canvas.height);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                dropBlock();
            }
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            dropBlock();
        });
        canvas.addEventListener('click', () => {
            dropBlock();
        });
    </script>
</body>
</html>
