<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Blaster 2.0 | Neon Shooter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            margin: 0; padding: 0; background: #050505; color: #fff;
            font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none;
            user-select: none; -webkit-user-select: none;
        }

        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;
        }

        .hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
        }

        .stat-box {
            background: rgba(10, 10, 10, 0.85); border: 2px solid #00ff88;
            padding: 10px 15px; border-radius: 12px; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            transition: transform 0.1s;
        }
        .stat-box.pulse { transform: scale(1.1); box-shadow: 0 0 30px rgba(0, 255, 136, 0.6); }

        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .stat-value { font-size: 24px; font-weight: 900; color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
        .hp-value { color: #ff3366; text-shadow: 0 0 10px rgba(255, 51, 102, 0.5); border-color: #ff3366; }

        #screens { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(5,5,5,0.9); pointer-events: auto; }

        .title-glow {
            font-size: 54px; font-weight: 900; color: #00ff88; text-transform: uppercase;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.6); margin-bottom: 15px; text-align: center; line-height: 1.1;
        }

        .subtitle { font-size: 16px; color: #aaa; margin-bottom: 40px; text-align: center; max-width: 400px; line-height: 1.5; }

        button {
            background: linear-gradient(90deg, #00ff88, #00cc66); border: none;
            padding: 16px 48px; border-radius: 30px; font-size: 20px; font-weight: 900;
            color: #000; cursor: pointer; box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.1s;
        }
        button:active { transform: scale(0.95); }

        .floating-text {
            position: absolute; font-size: 24px; font-weight: 900; text-shadow: 0 0 10px currentColor;
            pointer-events: none; animation: floatUp 0.8s ease-out forwards; opacity: 1; z-index: 15; text-align: center; width: 100px; margin-left: -50px;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-40px) scale(1.2); opacity: 0; }
        }

        #damageFlash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #ff3366; opacity: 0; pointer-events: none; z-index: 15; transition: opacity 0.1s;
        }
        
        .controls-hint {
            position: absolute; bottom: 40px; left: 0; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); font-size: 14px; text-transform: uppercase; letter-spacing: 2px;
            pointer-events: none; z-index: 10;
        }
        
        #powerupDisplay {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            font-size: 24px; font-weight: 900; color: #00ccff; text-shadow: 0 0 15px rgba(0,204,255,0.8);
            opacity: 0; transition: opacity 0.2s;
        }
        #powerupDisplay.active { opacity: 1; }
    </style>
</head>
<body>

    <div id="damageFlash"></div>

    <div class="ui-layer">
        <div class="hud" id="hud" style="display:none;">
            <div class="stat-box" id="scoreBox">
                <div class="stat-label">Saved</div>
                <div class="stat-value" id="scoreDisplay">$0</div>
            </div>
            <div class="stat-box hp-value" id="hpBox" style="border-color:#ff3366;">
                <div class="stat-label">Budget</div>
                <div class="stat-value" id="hpDisplay" style="color:#ff3366;">100%</div>
            </div>
        </div>
        
        <div id="powerupDisplay">FIREPOWER UPGRADED</div>
        
        <div class="controls-hint" id="controlsHint" style="display:none;">
            Drag to Move & Auto-Fire
        </div>
    </div>

    <div id="screens">
        <div class="title-glow" id="mainTitle">BUDGET BLASTER<br><span style="font-size:32px; color:#ff3366;">EXPENSE INVASION</span></div>
        <div class="subtitle" id="mainSub">
            <span style="color:#00ff88;font-weight:bold;">🟩 Blast Expenses:</span> Shoot red blocks<br>
            <span style="color:#00ccff;font-weight:bold;">🟦 Collect Savings:</span> Upgrade your weapons<br>
            <span style="color:#ff3366;font-weight:bold;">🟥 Defend Budget:</span> Don't let expenses pass!<br><br>
            Drag to steer. Your ship auto-fires.
        </div>
        <button id="mainBtn" onclick="startGame()">Start Blasting</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- GAME STATE ---
        let state = 'menu'; 
        let score = 0; 
        let budget = 100;
        let frameCount = 0;
        let shakeTime = 0;
        let difficulty = 1;
        let weaponLevel = 1; // 1: single, 2: double, 3: spread
        let bgOffsetY = 0;

        // --- ENTITIES ---
        const player = { x: width/2, y: height - 100, targetX: width/2, size: 20, color: '#00ff88', lastFire: 0 };
        let bullets = [];
        let enemies = [];
        let powerups = [];
        let particles = [];
        let stars = [];

        // Setup stars
        for(let i=0; i<50; i++) stars.push({x: Math.random()*width, y: Math.random()*height, speed: Math.random()*3+1});

        // --- INPUT ---
        let isDragging = false;
        function updatePlayerPos(clientX) { player.targetX = clientX; }
        
        canvas.addEventListener('touchstart', e => { if(state === 'play') { isDragging = true; updatePlayerPos(e.touches[0].clientX); }});
        canvas.addEventListener('touchmove', e => { if(isDragging && state === 'play') updatePlayerPos(e.touches[0].clientX); });
        canvas.addEventListener('touchend', () => isDragging = false);
        canvas.addEventListener('mousedown', e => { if(state === 'play') { isDragging = true; updatePlayerPos(e.clientX); }});
        canvas.addEventListener('mousemove', e => { if(isDragging && state === 'play') updatePlayerPos(e.clientX); });
        canvas.addEventListener('mouseup', () => isDragging = false);

        // --- FLOW ---
        function startGame() {
            document.getElementById('screens').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            document.getElementById('controlsHint').style.display = 'block';
            
            score = 0;
            budget = 100;
            difficulty = 1;
            weaponLevel = 1;
            frameCount = 0;
            
            bullets = [];
            enemies = [];
            powerups = [];
            particles = [];
            
            player.x = width/2;
            player.targetX = width/2;
            player.lastFire = 0;
            
            state = 'play';
            updateUI();
            requestAnimationFrame(loop);
        }

        function gameOver() {
            state = 'over';
            shakeTime = 30;
            triggerFlash();
            document.getElementById('screens').style.display = 'flex';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('controlsHint').style.display = 'none';
            
            document.getElementById('mainTitle').innerHTML = 'BUDGET BLOWN<br><span style="font-size:32px;color:#ff3366;">Mission Failed</span>';
            document.getElementById('mainSub').innerHTML = `Total Savings: <span style="color:#00ff88;font-weight:bold;">$${score.toLocaleString()}</span><br>Max Weapon Level: ${weaponLevel}`;
            document.getElementById('mainBtn').innerText = 'Reboot System';
        }

        // --- JUICE ---
        function pulseUI(id) {
            const el = document.getElementById(id);
            el.classList.add('pulse');
            setTimeout(() => el.classList.remove('pulse'), 150);
        }

        function triggerFlash() {
            const flash = document.getElementById('damageFlash');
            flash.style.opacity = '0.5';
            setTimeout(() => flash.style.opacity = '0', 100);
        }

        function showPowerupText() {
            const el = document.getElementById('powerupDisplay');
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 1500);
        }

        function spawnParticles(x, y, color, count, speed=10) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * speed,
                    vy: (Math.random() - 0.5) * speed,
                    life: 1, color: color, size: Math.random() * 3 + 2
                });
            }
        }

        function spawnText(x, y, text, color) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.style.left = x + 'px'; el.style.top = y + 'px';
            el.style.color = color; el.innerText = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = '$' + score.toLocaleString();
            document.getElementById('hpDisplay').innerText = Math.max(0, Math.floor(budget)) + '%';
        }

        function takeDamage(amt) {
            budget -= amt;
            shakeTime = 15;
            triggerFlash();
            pulseUI('hpBox');
            updateUI();
            if (budget <= 0) gameOver();
        }

        // --- LOOP ---
        function loop() {
            if (state !== 'play' && state !== 'over') return;

            // --- RENDER BACKGROUND ---
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            if (shakeTime > 0) {
                ctx.translate((Math.random()-0.5)*15, (Math.random()-0.5)*15);
                shakeTime--;
            }

            // Draw Stars
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            for (let s of stars) {
                s.y += s.speed;
                if (s.y > height) { s.y = 0; s.x = Math.random() * width; }
                ctx.fillRect(s.x, s.y, 2, 2);
            }

            if (state === 'play') {
                frameCount++;
                difficulty = 1 + (frameCount / 1800); // Ramps up every 30s

                // Player Movement
                player.x += (player.targetX - player.x) * 0.2;
                player.x = Math.max(player.size, Math.min(width - player.size, player.x));

                // Auto Fire
                const fireRate = weaponLevel >= 3 ? 8 : 12; // Frames between shots
                if (frameCount - player.lastFire >= fireRate) {
                    player.lastFire = frameCount;
                    if (weaponLevel === 1) {
                        bullets.push({ x: player.x, y: player.y - 20, vx: 0, vy: -15, color: '#00ff88', dmg: 10 });
                    } else if (weaponLevel === 2) {
                        bullets.push({ x: player.x - 10, y: player.y - 20, vx: 0, vy: -15, color: '#00ff88', dmg: 10 });
                        bullets.push({ x: player.x + 10, y: player.y - 20, vx: 0, vy: -15, color: '#00ff88', dmg: 10 });
                    } else {
                        bullets.push({ x: player.x, y: player.y - 20, vx: 0, vy: -15, color: '#00ff88', dmg: 10 });
                        bullets.push({ x: player.x - 15, y: player.y - 15, vx: -3, vy: -14, color: '#00ff88', dmg: 10 });
                        bullets.push({ x: player.x + 15, y: player.y - 15, vx: 3, vy: -14, color: '#00ff88', dmg: 10 });
                    }
                }

                // Spawn Enemies (Expenses)
                if (Math.random() < 0.03 * difficulty) {
                    const size = 15 + Math.random() * 20;
                    enemies.push({
                        x: Math.random() * (width - size*2) + size,
                        y: -50,
                        size: size,
                        hp: size * 1.5 * difficulty,
                        maxHp: size * 1.5 * difficulty,
                        speed: (1 + Math.random() * 3) * (0.8 + difficulty*0.2),
                        value: Math.floor(size * 10)
                    });
                }
            }

            // Update & Draw Bullets
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ff88';
            ctx.fillStyle = '#00ff88';
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx; b.y += b.vy;
                ctx.fillRect(b.x - 3, b.y - 10, 6, 20);
                if (b.y < -50) bullets.splice(i, 1);
            }

            // Update & Draw Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if (state === 'play') e.y += e.speed;

                // Draw Enemy
                ctx.shadowColor = '#ff3366'; ctx.shadowBlur = 15;
                ctx.fillStyle = `rgba(255, 51, 102, ${e.hp/e.maxHp})`;
                ctx.fillRect(e.x - e.size, e.y - e.size, e.size*2, e.size*2);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                ctx.strokeRect(e.x - e.size, e.y - e.size, e.size*2, e.size*2);

                // Bullet Collision Check
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    if (b.x > e.x - e.size && b.x < e.x + e.size && b.y > e.y - e.size && b.y < e.y + e.size) {
                        e.hp -= b.dmg;
                        spawnParticles(b.x, b.y, '#fff', 3, 5);
                        bullets.splice(j, 1);
                        
                        if (e.hp <= 0) {
                            score += e.value;
                            pulseUI('scoreBox');
                            spawnParticles(e.x, e.y, '#ff3366', 20, 15);
                            spawnText(e.x, e.y, `+$${e.value}`, '#00ff88');
                            
                            // Chance to drop powerup
                            if (Math.random() < 0.05 && weaponLevel < 3) {
                                powerups.push({ x: e.x, y: e.y, size: 12, speed: 3 });
                            }
                            
                            enemies.splice(i, 1);
                            updateUI();
                            break; // Enemy dead, stop checking bullets for this enemy
                        }
                    }
                }
                
                if (enemies[i]) { // If still alive
                    // Player Collision
                    if (state === 'play') {
                        const dx = player.x - e.x; const dy = player.y - e.y;
                        if (Math.sqrt(dx*dx + dy*dy) < player.size + e.size) {
                            takeDamage(15);
                            spawnParticles(e.x, e.y, '#ff3366', 30, 20);
                            enemies.splice(i, 1);
                            continue;
                        }
                        
                        // Passed bottom
                        if (e.y > height + 50) {
                            takeDamage(5); // Penalty for letting expenses through
                            spawnText(e.x, height-50, "-5%", "#ff3366");
                            enemies.splice(i, 1);
                        }
                    }
                }
            }

            // Update & Draw Powerups
            if (state === 'play') {
                for (let i = powerups.length - 1; i >= 0; i--) {
                    let p = powerups[i];
                    p.y += p.speed;
                    
                    ctx.shadowColor = '#00ccff'; ctx.shadowBlur = 20;
                    ctx.fillStyle = '#00ccff';
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Inter'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('UP', p.x, p.y);
                    
                    // Collect
                    const dx = player.x - p.x; const dy = player.y - p.y;
                    if (Math.sqrt(dx*dx + dy*dy) < player.size + p.size) {
                        weaponLevel = Math.min(3, weaponLevel + 1);
                        showPowerupText();
                        spawnParticles(p.x, p.y, '#00ccff', 20, 10);
                        powerups.splice(i, 1);
                    } else if (p.y > height + 50) {
                        powerups.splice(i, 1);
                    }
                }
            }

            // Draw Player Ship
            if (state === 'play') {
                ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 20;
                ctx.fillStyle = '#00ff88';
                
                // Ship core
                ctx.beginPath();
                ctx.moveTo(player.x, player.y - player.size);
                ctx.lineTo(player.x + player.size, player.y + player.size);
                ctx.lineTo(player.x, player.y + player.size - 10);
                ctx.lineTo(player.x - player.size, player.y + player.size);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                
                // Engine thrust
                ctx.fillStyle = 'rgba(0, 255, 136, 0.8)';
                ctx.beginPath();
                ctx.moveTo(player.x - 10, player.y + player.size - 8);
                ctx.lineTo(player.x + 10, player.y + player.size - 8);
                ctx.lineTo(player.x, player.y + player.size + 15 + Math.random()*10);
                ctx.fill();
            }

            // Draw Particles
            ctx.shadowBlur = 0;
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.05;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1;

            ctx.restore();
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
