<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONEY GLITCH: CONTROLLER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        :root {
            --jeopardy-blue: #0b0b12; /* Dark bg */
            --jeopardy-yellow: #00ff88; /* Neon Green */
            --correct-green: #00ff88;
            --wrong-red: #ff3366;
            --bg: #0b0b12;
            --mb-purple: #cc00ff;
        }

        body {
            background: var(--bg); color: #fff; margin: 0; font-family: 'Rajdhani', sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none;
            -webkit-touch-callout: none; text-align: center;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Views */
        .view { display: none; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 20px; width: 100%; box-sizing: border-box; }
        .active { display: flex; }

        h1 { color: var(--jeopardy-yellow); font-family: 'Orbitron', sans-serif; font-size: 3rem; margin-bottom: 30px; text-transform: uppercase; text-shadow: 0 0 15px rgba(0,255,136,0.8); line-height: 1.1;}
        input[type="text"], input[type="number"] { width: 80%; max-width: 300px; padding: 15px; font-size: 2rem; text-align: center; font-family: 'Orbitron', sans-serif; border: 2px solid var(--jeopardy-yellow); background: rgba(0, 255, 136, 0.1); color: #fff; margin-bottom: 20px; border-radius: 8px;}
        input:focus { outline: none; box-shadow: 0 0 15px rgba(0, 255, 136, 0.5); }
        button.action-btn { width: 80%; max-width: 300px; background: transparent; color: var(--jeopardy-yellow); border: 2px solid var(--jeopardy-yellow); padding: 20px; font-size: 2rem; font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 8px; box-shadow: inset 0 0 10px rgba(0,255,136,0.3), 0 0 10px rgba(0,255,136,0.3); transition: all 0.2s;}
        button.action-btn:active { transform: scale(0.95); background: var(--jeopardy-yellow); color: #000; }

        /* Status Bar */
        #status-bar { position: absolute; top: 0; left: 0; width: 100%; background: #111; padding: 15px; display: flex; justify-content: space-between; box-sizing: border-box; font-size: 1.5rem; font-family: 'Orbitron', sans-serif; border-bottom: 2px solid var(--mb-purple); box-shadow: 0 0 15px rgba(204,0,255,0.4); }
        .score-positive { color: var(--correct-green); text-shadow: 0 0 10px var(--correct-green); }
        .score-negative { color: var(--wrong-red); text-shadow: 0 0 10px var(--wrong-red); }

        /* The Big Buzzer */
        #buzzer-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; margin-top: 50px; }
        .buzzer { width: 250px; height: 250px; border-radius: 50%; background: radial-gradient(circle, #00ff88 40%, #008040 100%); border: 10px solid #004d26; box-shadow: 0 15px 0 #00331a, 0 0 50px rgba(0,255,136,0.5); cursor: pointer; transition: all 0.1s; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; color: #fff; font-family: 'Orbitron', sans-serif; font-weight: 900; text-shadow: 2px 2px 0 #000; }
        .buzzer:active { transform: translateY(10px); box-shadow: 0 5px 0 #00331a, 0 0 80px rgba(0,255,136,1); background: radial-gradient(circle, #33ff99 40%, #00b359 100%); }
        .buzzer.locked { background: #333; border-color: #222; box-shadow: 0 15px 0 #111; pointer-events: none; color: #666; text-shadow: none; }

        /* Options Grid */
        #options-container { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 400px; margin-top: 50px;}
        .option-btn { background: rgba(204,0,255,0.1); color: #fff; border: 2px solid var(--mb-purple); padding: 20px 10px; font-size: 1.4rem; font-family: 'Orbitron', sans-serif; cursor: pointer; text-transform: uppercase; border-radius: 8px; box-shadow: inset 0 0 10px rgba(204,0,255,0.3); transition: all 0.2s;}
        .option-btn:active { background: var(--mb-purple); color: #000; }

        .message { font-size: 2rem; color: var(--mb-purple); font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px rgba(204,0,255,0.5); text-align: center; margin-top: 100px; line-height: 1.5; }
    </style>
</head>
<body>

    <!-- Lobby View -->
    <div id="view-lobby" class="view active">
        <h1>MONEY GLITCH</h1>
        <p style="font-size: 1.5rem; color: #aaa;">Enter your alias to join the game.</p>
        <input type="text" id="name-input" placeholder="Player Name" maxlength="12">
        <button class="action-btn" onclick="joinGame()">Connect</button>
    </div>

    <!-- Main Game View -->
    <div id="view-game" class="view">
        <div id="status-bar">
            <span id="player-name">Player</span>
            <span id="player-score" class="score-positive">$0</span>
        </div>

        <!-- Dynamic Content Area -->
        <div id="buzzer-container">
            <div class="buzzer locked" id="main-buzzer" onclick="buzzIn()">BUZZ</div>
        </div>

        <div id="wager-container" style="display:none; width: 100%;">
            <h2 style="color:var(--jeopardy-yellow);">MONEY GLITCH!</h2>
            <p>Enter Wager:</p>
            <input type="number" id="wager-input" step="5" placeholder="$">
            <button class="action-btn" onclick="submitWager()">Submit</button>
        </div>

        <div id="options-container" style="display:none;"></div>
        
        <div id="wait-message" class="message" style="display:none;">Look at the big screen...</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const currentPath = window.location.pathname;
        const basePath = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
        
        // Dynamic Server Connection Logic
        const urlParams = new URLSearchParams(window.location.search);
        const urlServerParam = urlParams.get('server');
        
        let serverUrl = window.location.origin;
        if (urlServerParam) {
            serverUrl = urlServerParam;
        } else if (window.location.hostname.includes('github.io')) {
            serverUrl = 'https://money-glitch.onrender.com'; // Fallback if no param
        }

        const socket = io(serverUrl, {
            path: (serverUrl.includes('github.io') || serverUrl.includes('render.com') || urlServerParam) ? '/socket.io' : basePath + 'socket.io'
        });
        let myId = null;
        let lastState = null;

        function joinGame() {
            const name = document.getElementById('name-input').value.trim() || 'Player';
            socket.emit('join_game', name);
            myId = socket.id;
            document.getElementById('view-lobby').classList.remove('active');
            document.getElementById('view-game').classList.add('active');
        }

        function buzzIn() {
            socket.emit('buzz_in');
        }

        function submitWager() {
            const w = parseInt(document.getElementById('wager-input').value);
            if(w >= 5) socket.emit('submit_wager', w);
        }

        function submitAnswer(idx) {
            socket.emit('submit_answer', idx);
        }

        // Force reload from server
        socket.on('force_reload', () => {
            location.reload();
        });

        socket.on('state_update', (state) => {
            lastState = state;
            if(!myId) return; // not joined yet
            const me = state.players[myId];
            if(!me) {
                // kicked/reset
                document.getElementById('view-lobby').classList.add('active');
                document.getElementById('view-game').classList.remove('active');
                return;
            }

            // Update Status
            document.getElementById('player-name').innerText = me.name;
            const scoreEl = document.getElementById('player-score');
            scoreEl.innerText = `$${me.score}`;
            scoreEl.className = me.score < 0 ? 'score-negative' : 'score-positive';

            // Hide everything by default
            const buzzer = document.getElementById('main-buzzer');
            const buzzerCont = document.getElementById('buzzer-container');
            const wagerCont = document.getElementById('wager-container');
            const optionsCont = document.getElementById('options-container');
            const waitMsg = document.getElementById('wait-message');

            buzzerCont.style.display = 'none';
            wagerCont.style.display = 'none';
            optionsCont.style.display = 'none';
            waitMsg.style.display = 'none';

            // Phase Logic
            if(state.phase === 'lobby' || state.phase === 'board' || state.phase === 'feedback') {
                waitMsg.innerText = "Look at the big screen...";
                waitMsg.style.display = 'block';
            } 
            else if (state.phase === 'clue_reading') {
                buzzerCont.style.display = 'flex';
                if(me.locked) {
                    buzzer.classList.add('locked');
                    buzzer.innerText = "LOCKED";
                } else {
                    buzzer.classList.remove('locked');
                    buzzer.innerText = "BUZZ";
                }
            }
            else if (state.phase === 'wager') {
                if(state.activeBuzzer === myId) {
                    wagerCont.style.display = 'block';
                    document.getElementById('wager-input').max = Math.max(me.score, 1000);
                } else {
                    waitMsg.innerText = "Someone else hit the Money Glitch...";
                    waitMsg.style.display = 'block';
                }
            }
            else if (state.phase === 'answering') {
                if(state.activeBuzzer === myId) {
                    optionsCont.style.display = 'grid';
                    // Rebuild buttons every time
                    optionsCont.innerHTML = '';
                    state.activeQuestion.options.forEach((opt, idx) => {
                        const b = document.createElement('button');
                        b.className = 'option-btn';
                        b.innerText = opt;
                        b.onclick = () => submitAnswer(idx);
                        optionsCont.appendChild(b);
                    });
                } else {
                    waitMsg.innerText = "Someone else is answering...";
                    waitMsg.style.display = 'block';
                }
            }
        });
    </script>
</body>
</html>
