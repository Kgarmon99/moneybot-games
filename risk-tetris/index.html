<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyBot - Risk Tetris | MoneyBot</title>
    <link rel="icon" type="image/svg+xml" href="../assets/moneybot-idle.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-light: #69F0AE;
            --moneybot-green-dark: #00C853;
            --moneybot-dark: #1A1A2E;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--moneybot-gray);
            min-height: 100vh;
            color: var(--moneybot-text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 230, 118, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 230, 118, 0.05) 0%, transparent 50%),
                var(--moneybot-gray);
            pointer-events: none;
            z-index: 0;
        }
        
        .app {
            position: relative;
            z-index: 1;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--moneybot-gray);
        }
        
        .header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(0, 230, 118, 0.1);
            color: var(--moneybot-green);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
            text-decoration: none;
        }
        
        .back-btn svg {
            width: 20px;
            height: 20px;
        }
        
        .header-title {
            font-weight: 700;
            font-size: 17px;
            letter-spacing: -0.3px;
        }
        
        .score-display {
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: white;
            padding: 8px 16px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(0, 230, 118, 0.3);
        }
        
        .game-container {
            padding: 20px;
            display: flex;
            gap: 16px;
        }
        
        .board-section {
            flex: 1;
        }
        
        .game-board {
            background: white;
            border-radius: 16px;
            padding: 12px;
            box-shadow: var(--shadow-md);
        }
        
        #gameCanvas {
            display: block;
            border-radius: 8px;
        }
        
        .side-panel {
            width: 100px;
        }
        
        .next-piece {
            background: white;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            margin-bottom: 16px;
        }
        
        .next-label {
            font-size: 11px;
            color: var(--moneybot-text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        #nextCanvas {
            border-radius: 8px;
        }
        
        .stats-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        
        .stats-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--moneybot-green);
            margin-bottom: 4px;
        }
        
        .stats-label {
            font-size: 11px;
            color: var(--moneybot-text-secondary);
            text-transform: uppercase;
        }
        
        .controls {
            padding: 0 20px 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        
        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: white;
            border: none;
            box-shadow: var(--shadow-sm);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .control-btn:active {
            background: var(--moneybot-green);
            transform: scale(0.95);
        }
        
        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            z-index: 200;
        }
        
        .game-over-screen {
            display: none;
        }
        
        .logo {
            font-size: 64px;
            margin-bottom: 10px;
        }
        
        .title {
            font-size: 32px;
            font-weight: 800;
            color: white;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 40px;
        }
        
        .start-btn {
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 230, 118, 0.4);
            transition: transform 0.2s;
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    
    <div class="app">
        <header class="header">
            <div class="header-logo">
                <a href="../moneybot-official/" class="back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </a>
                <span class="header-title">MoneyBot</span>
            </div>
            <div class="score-display">Score: <span id="score">0</span></div>
        </header>
        
        <div class="game-container">
            <div class="board-section">
                <div class="game-board">
                    <canvas id="gameCanvas" width="240" height="400"></canvas>
                </div>
            </div>
            
            <div class="side-panel">
                <div class="next-piece">
                    <div class="next-label">Next</div>
                    <canvas id="nextCanvas" width="80" height="80"></canvas>
                </div>
                
                <div class="stats-card">
                    <div class="stats-value" id="lines">0</div>
                    <div class="stats-label">Lines</div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="control-btn" id="leftBtn">←</button>
            <button class="control-btn" id="rotateBtn">↻</button>
            <button class="control-btn" id="downBtn">↓</button>
            <button class="control-btn" id="rightBtn">→</button>
        </div>
    </div>
    
    <div class="start-screen" id="startScreen">
        <div class="logo">⚠️</div>
        <div class="title">Risk Tetris</div>
        <div class="subtitle">Balance your portfolio!<br>Different assets have different risks</div>
        <button class="start-btn" onclick="startGame()">PLAY NOW</button>
    </div>
    
    <div class="game-over-screen" id="gameOverScreen">
        <div class="logo">📉</div>
        <div class="title">Portfolio Crash!</div>
        <div class="subtitle">Score: <span id="finalScore">0</span></div>
        <button class="start-btn" onclick="restartGame()">TRY AGAIN</button>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 24;
        
        const ASSETS = {
            I: { shape: [[1,1,1,1]], color: '#00E676', name: 'Cash' },
            O: { shape: [[1,1],[1,1]], color: '#3B82F6', name: 'Bonds' },
            T: { shape: [[0,1,0],[1,1,1]], color: '#8B5CF6', name: 'Crypto' },
            S: { shape: [[0,1,1],[1,1,0]], color: '#F59E0B', name: 'Gold' },
            Z: { shape: [[1,1,0],[0,1,1]], color: '#EF4444', name: 'Stocks' },
            J: { shape: [[1,0,0],[1,1,1]], color: '#14B8A6', name: 'Real Estate' },
            L: { shape: [[0,0,1],[1,1,1]], color: '#F97316', name: 'Commodities' }
        };
        
        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let lines = 0;
        let gameRunning = false;
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        
        function randomPiece() {
            const types = Object.keys(ASSETS);
            const type = types[Math.floor(Math.random() * types.length)];
            return {
                type: type,
                shape: ASSETS[type].shape,
                color: ASSETS[type].color,
                x: Math.floor(COLS / 2) - Math.floor(ASSETS[type].shape[0].length / 2),
                y: 0
            };
        }
        
        function draw() {
            // Clear board
            ctx.fillStyle = '#0F172A';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid lines
            ctx.strokeStyle = '#1E293B';
            ctx.lineWidth = 1;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BLOCK_SIZE, 0);
                ctx.lineTo(i * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(canvas.width, i * BLOCK_SIZE);
                ctx.stroke();
            }
            
            // Draw board
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c]) {
                        ctx.fillStyle = board[r][c];
                        ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                    }
                }
            }
            
            // Draw current piece
            if (currentPiece) {
                ctx.fillStyle = currentPiece.color;
                currentPiece.shape.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value) {
                            ctx.fillRect(
                                (currentPiece.x + x) * BLOCK_SIZE,
                                (currentPiece.y + y) * BLOCK_SIZE,
                                BLOCK_SIZE - 2,
                                BLOCK_SIZE - 2
                            );
                        }
                    });
                });
            }
            
            // Draw next piece
            nextCtx.fillStyle = '#F5F5F7';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (nextPiece) {
                nextCtx.fillStyle = nextPiece.color;
                const offsetX = (nextCanvas.width - nextPiece.shape[0].length * 20) / 2;
                const offsetY = (nextCanvas.height - nextPiece.shape.length * 20) / 2;
                nextPiece.shape.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value) {
                            nextCtx.fillRect(offsetX + x * 20, offsetY + y * 20, 18, 18);
                        }
                    });
                });
            }
        }
        
        function collision(piece, offsetX = 0, offsetY = 0) {
            return piece.shape.some((row, y) => {
                return row.some((value, x) => {
                    if (!value) return false;
                    const newX = piece.x + x + offsetX;
                    const newY = piece.y + y + offsetY;
                    return newX < 0 || newX >= COLS || newY >= ROWS || (newY >= 0 && board[newY][newX]);
                });
            });
        }
        
        function merge() {
            currentPiece.shape.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) {
                        board[currentPiece.y + y][currentPiece.x + x] = currentPiece.color;
                    }
                });
            });
        }
        
        function rotate() {
            const rotated = currentPiece.shape[0].map((_, i) =>
                currentPiece.shape.map(row => row[i]).reverse()
            );
            const previousShape = currentPiece.shape;
            currentPiece.shape = rotated;
            if (collision(currentPiece)) {
                currentPiece.shape = previousShape;
            }
        }
        
        function clearLines() {
            let linesCleared = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(cell => cell !== 0)) {
                    board.splice(r, 1);
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    r++;
                }
            }
            if (linesCleared > 0) {
                lines += linesCleared;
                score += linesCleared * 100 * linesCleared;
                document.getElementById('score').textContent = score;
                document.getElementById('lines').textContent = lines;
                if (navigator.vibrate) navigator.vibrate([20, 10, 20]);
            }
        }
        
        function spawnPiece() {
            currentPiece = nextPiece || randomPiece();
            nextPiece = randomPiece();
            if (collision(currentPiece)) {
                gameOver();
            }
        }
        
        function update(time = 0) {
            if (!gameRunning) return;
            
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            
            if (dropCounter > dropInterval) {
                if (!collision(currentPiece, 0, 1)) {
                    currentPiece.y++;
                } else {
                    merge();
                    clearLines();
                    spawnPiece();
                }
                dropCounter = 0;
            }
            
            draw();
            requestAnimationFrame(update);
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            score = 0;
            lines = 0;
            gameRunning = true;
            nextPiece = randomPiece();
            spawnPiece();
            document.getElementById('score').textContent = score;
            document.getElementById('lines').textContent = lines;
            update();
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            startGame();
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft' && !collision(currentPiece, -1, 0)) currentPiece.x--;
            if (e.key === 'ArrowRight' && !collision(currentPiece, 1, 0)) currentPiece.x++;
            if (e.key === 'ArrowDown' && !collision(currentPiece, 0, 1)) currentPiece.y++;
            if (e.key === 'ArrowUp') rotate();
        });
        
        document.getElementById('leftBtn').addEventListener('click', () => {
            if (gameRunning && !collision(currentPiece, -1, 0)) currentPiece.x--;
        });
        document.getElementById('rightBtn').addEventListener('click', () => {
            if (gameRunning && !collision(currentPiece, 1, 0)) currentPiece.x++;
        });
        document.getElementById('downBtn').addEventListener('click', () => {
            if (gameRunning && !collision(currentPiece, 0, 1)) currentPiece.y++;
        });
        document.getElementById('rotateBtn').addEventListener('click', () => {
            if (gameRunning) rotate();
        });
    </script>
</body>
</html>
