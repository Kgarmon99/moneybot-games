<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mortgage Calculator — MoneyBot</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:#000;color:#0f0;min-height:100vh;line-height:1.6}
.matrix-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.05;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,0,0.03) 2px,rgba(0,255,0,0.03) 4px)}
.container{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:40px 20px}
.nav{display:flex;align-items:center;gap:12px;margin-bottom:40px;text-decoration:none;color:#0f0}
.nav img{width:32px;height:32px;border-radius:4px;border:1px solid #0f0}
.nav span{font-size:18px;font-weight:700}
.card{background:#000;border:1px solid #0f0;padding:30px;margin-bottom:20px}
.card h1{font-size:28px;margin-bottom:8px;text-shadow:0 0 10px #0f0}
.card .subtitle{font-size:13px;opacity:0.7;margin-bottom:30px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;opacity:0.8}
input,select{width:100%;background:#000;border:1px solid #0f0;color:#0f0;padding:12px;font-family:inherit;font-size:16px;outline:none}
input:focus,select:focus{box-shadow:0 0 10px rgba(0,255,0,0.3)}
input[type="range"]{padding:0;margin-top:8px}
.range-val{font-size:14px;margin-top:4px;opacity:0.9}
button{background:#0f0;color:#000;border:none;padding:14px 32px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;width:100%;margin-top:10px}
button:hover{box-shadow:0 0 20px #0f0}
.results{margin-top:30px;padding-top:30px;border-top:1px solid #0f0;display:none}
.results.active{display:block}
.big-number{font-size:42px;font-weight:700;text-shadow:0 0 20px #0f0;margin-bottom:5px}
.big-label{font-size:12px;text-transform:uppercase;opacity:0.7;margin-bottom:25px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:25px}
@media(max-width:600px){.stats-grid{grid-template-columns:1fr}}
.stat-box{border:1px solid #0f0;padding:15px;text-align:center}
.stat-box .num{font-size:20px;font-weight:700}
.stat-box .lbl{font-size:11px;text-transform:uppercase;opacity:0.7;margin-top:4px}
.back-link{display:inline-block;margin-top:20px;color:#0f0;text-decoration:none;border:1px solid #0f0;padding:10px 20px;font-size:13px;text-transform:uppercase}
.back-link:hover{box-shadow:0 0 10px #0f0}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:12px}
th,td{border:1px solid #0f0;padding:6px;text-align:right}
th{text-align:center;text-transform:uppercase;font-size:10px;opacity:0.8}
tr:nth-child(even){background:rgba(0,255,0,0.05)}
.highlight{background:rgba(0,255,0,0.15)!important}
</style>
</head>
<body>
<div class="matrix-bg"></div>
<div class="container">
<a href="../moneybot-official/" class="nav"><img src="../moneybot-official/assets/moneybot-logo-1.jpg" alt="MoneyBot"><span>MoneyBot</span></a>
<div class="card">
<h1>Mortgage Calculator</h1>
<p class="subtitle">Know your numbers before you sign. The bank won't teach you this.</p>
<div class="form-row">
<div><label>Home Price ($)</label><input type="number" id="price" value="400000" min="0" step="1000"></div>
<div><label>Down Payment ($)</label><input type="number" id="down" value="80000" min="0" step="1000"></div>
</div>
<div class="form-row">
<div><label>Interest Rate (%)</label><input type="range" id="rateRange" min="1" max="15" value="6.5" step="0.1"><div class="range-val" id="rateVal">6.5%</div></div>
<div><label>Loan Term</label><select id="term"><option value="15">15 years</option><option value="20">20 years</option><option value="30" selected>30 years</option></select></div>
</div>
<div class="form-row">
<div><label>Property Tax / Year ($)</label><input type="number" id="tax" value="4800" min="0" step="100"></div>
<div><label>Insurance / Year ($)</label><input type="number" id="insurance" value="1200" min="0" step="100"></div>
</div>
<button onclick="calculate()">Calculate Payment</button>
<div class="results" id="results">
<div class="big-number" id="monthlyTotal">$0</div>
<div class="big-label">Total Monthly Payment</div>
<div class="stats-grid">
<div class="stat-box"><div class="num" id="piti">$0</div><div class="lbl">P&I Only</div></div>
<div class="stat-box"><div class="num" id="totalCost">$0</div><div class="lbl">Total Loan Cost</div></div>
<div class="stat-box"><div class="num" id="totalInterest">$0</div><div class="lbl">Total Interest</div></div>
</div>
<table>
<thead><tr><th>Year</th><th>Balance</th><th>Principal</th><th>Interest</th><th>Cum. Interest</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>
<a href="../moneybot-official/" class="back-link">← Back to Games</a>
</div>
<script>
const $=id=>document.getElementById(id);
const fmt=n=>'$'+Math.round(n).toLocaleString();
$('rateRange').oninput=()=>{$('rateVal').textContent=$('rateRange').value+'%'};
function calculate(){
const price=parseFloat($('price').value)||0;
const down=parseFloat($('down').value)||0;
const rate=parseFloat($('rateRange').value)/100;
const years=parseInt($('term').value);
const tax=parseFloat($('tax').value)||0;
const ins=parseFloat($('insurance').value)||0;
const loan=price-down;
const n=years*12;
const r=rate/12;
const pmi=loan*Math.pow(1+r,n)*r/(Math.pow(1+r,n)-1);
const monthlyTax=tax/12;
const monthlyIns=ins/12;
const total=pmi+monthlyTax+monthlyIns;
$('monthlyTotal').textContent=fmt(total)+'/mo';
$('piti').textContent=fmt(pmi)+'/mo';
let bal=loan;let cumInt=0;
let rows='';
for(let y=1;y<=years;y++){
let yPrin=0,yInt=0;
for(let m=0;m<12;m++){
const i=bal*r;const p=pmi-i;
bal-=p;yPrin+=p;yInt+=i;cumInt+=i;
if(bal<0)bal=0;
}
rows+=`<tr><td>${y}</td><td>${fmt(bal)}</td><td>${fmt(yPrin)}</td><td>${fmt(yInt)}</td><td>${fmt(cumInt)}</td></tr>`;
}
$('totalCost').textContent=fmt(loan+cumInt);
$('totalInterest').textContent=fmt(cumInt);
$('tbody').innerHTML=rows;
$('results').classList.add('active');
}
calculate();
</script>
</body>
</html>
