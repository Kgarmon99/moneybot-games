<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Emergency Fund Escape - MoneyBot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FFFFFF;
            color: #07111F;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            touch-action: none;
        }
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { font-size: 24px; color: #00C853; margin-bottom: 5px; }
        .header p { color: #64748B; font-size: 13px; }
        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat-box {
            background: #F8FAFC;
            padding: 12px 20px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #E2E8F0;
        }
        .stat-box .label { font-size: 11px; color: #64748B; text-transform: uppercase; }
        .stat-box .value { font-size: 20px; font-weight: 700; color: #00C853; }
        .game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 500px;
            background: linear-gradient(180deg, #E8F5E9 0%, #F8FAFC 100%);
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #00C853;
        }
        .player {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #00C853;
            border-radius: 50%;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(0,200,83,0.3);
            transition: left 0.1s;
        }
        .item {
            position: absolute;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .item.paycheck { background: #00C853; }
        .item.bill { background: #FF5252; }
        .progress-bar {
            width: 100%;
            max-width: 400px;
            height: 30px;
            background: #E2E8F0;
            border-radius: 15px;
            margin-top: 15px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00C853, #00E676);
            border-radius: 15px;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: 700;
            font-size: 12px;
        }
        .goal-text {
            margin-top: 10px;
            font-size: 14px;
            color: #64748B;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 12px 30px;
            background: #00C853;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn:disabled { background: #CBD5E1; }
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .game-over.show { display: flex; }
        .game-over h2 { font-size: 28px; margin-bottom: 10px; }
        .game-over.win h2 { color: #00E676; }
        .game-over.lose h2 { color: #FF5252; }
    </style>
</head>
<body>
  <a href="../moneybot-official/" style="position: fixed; top: 16px; left: 16px; background: #00C853; color: white; padding: 10px 16px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 14px; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">← Back to Games</a>
    <a href="../moneybot-official/" style="position:fixed;top:10px;left:10px;z-index:9999;background:#00C853;color:white;padding:10px 16px;border-radius:8px;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;font-weight:600;box-shadow:0 2px 12px rgba(0,0,0,0.3);">← Back to Games</a>
    <div class="header">
        <h1>🏃 Emergency Fund Escape</h1>
        <p>Dodge bills, collect paychecks, build your 6-month fund!</p>
    </div>

    <div class="stats">
        <div class="stat-box">
            <div class="label">Fund</div>
            <div class="value" id="fund">$0</div>
        </div>
        <div class="stat-box">
            <div class="label">Goal</div>
            <div class="value" id="goal">$15K</div>
        </div>
        <div class="stat-box">
            <div class="label">Lives</div>
            <div class="value" id="lives">3</div>
        </div>
    </div>

    <div class="game-container" id="gameContainer">
        <div class="player" id="player">🏃</div>
        <div class="game-over" id="gameOver">
            <h2 id="gameOverTitle">Game Over</h2>
            <p id="gameOverText"></p>
            <button class="btn" onclick="restart()">Play Again</button>
        </div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
    </div>
    <div class="goal-text">Build 6-month emergency fund: <span id="progressText">$0 / $15,000</span></div>

    <div class="controls">
        <button class="btn" id="startBtn" onclick="startGame()">START</button>
    </div>

    <script>
        const container = document.getElementById('gameContainer');
        const player = document.getElementById('player');
        const fundEl = document.getElementById('fund');
        const livesEl = document.getElementById('lives');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const gameOver = document.getElementById('gameOver');
        const gameOverTitle = document.getElementById('gameOverTitle');
        const gameOverText = document.getElementById('gameOverText');
        const startBtn = document.getElementById('startBtn');

        let fund = 0;
        let goal = 15000;
        let lives = 3;
        let isPlaying = false;
        let playerX = 50;
        let items = [];
        let gameLoop;
        let spawnLoop;

        const containerWidth = 400;
        const playerSpeed = 5;

        // Touch controls
        let touchStartX = 0;
        container.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        container.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            const diff = touchX - touchStartX;
            playerX += diff / 10;
            playerX = Math.max(5, Math.min(95, playerX));
            player.style.left = playerX + '%';
            touchStartX = touchX;
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            if (e.key === 'ArrowLeft') {
                playerX = Math.max(5, playerX - playerSpeed);
            } else if (e.key === 'ArrowRight') {
                playerX = Math.min(95, playerX + playerSpeed);
            }
            player.style.left = playerX + '%';
        });

        function spawnItem() {
            const item = document.createElement('div');
            item.className = 'item';
            const isPaycheck = Math.random() > 0.4;
            item.classList.add(isPaycheck ? 'paycheck' : 'bill');
            item.textContent = isPaycheck ? '💰' : '📄';
            item.style.left = Math.random() * 90 + 5 + '%';
            item.style.top = '-40px';
            item.dataset.type = isPaycheck ? 'paycheck' : 'bill';
            item.dataset.value = isPaycheck ? Math.floor(Math.random() * 800 + 200) : Math.floor(Math.random() * 500 + 100);
            container.appendChild(item);
            items.push(item);
        }

        function update() {
            items.forEach((item, index) => {
                let top = parseFloat(item.style.top);
                top += 3;
                item.style.top = top + 'px';

                // Collision detection
                const itemRect = item.getBoundingClientRect();
                const playerRect = player.getBoundingClientRect();

                if (itemRect.bottom > playerRect.top &&
                    itemRect.top < playerRect.bottom &&
                    itemRect.left < playerRect.right &&
                    itemRect.right > playerRect.left) {
                    
                    const value = parseInt(item.dataset.value);
                    if (item.dataset.type === 'paycheck') {
                        fund += value;
                    } else {
                        fund = Math.max(0, fund - value);
                        lives--;
                        livesEl.textContent = lives;
                    }
                    
                    item.remove();
                    items.splice(index, 1);
                    updateDisplay();

                    if (lives <= 0) endGame(false);
                    if (fund >= goal) endGame(true);
                }

                if (top > 500) {
                    item.remove();
                    items.splice(index, 1);
                }
            });
        }

        function updateDisplay() {
            fundEl.textContent = '$' + fund.toLocaleString();
            const pct = Math.min(100, (fund / goal) * 100);
            progressFill.style.width = pct + '%';
            progressFill.textContent = Math.floor(pct) + '%';
            progressText.textContent = '$' + fund.toLocaleString() + ' / $15,000';
        }

        function startGame() {
            isPlaying = true;
            startBtn.disabled = true;
            gameLoop = setInterval(update, 20);
            spawnLoop = setInterval(spawnItem, 1200);
        }

        function endGame(won) {
            isPlaying = false;
            clearInterval(gameLoop);
            clearInterval(spawnLoop);
            gameOver.classList.add('show');
            if (won) {
                gameOver.classList.add('win');
                gameOverTitle.textContent = '🎉 Fund Complete!';
                gameOverText.textContent = `You built a $${fund.toLocaleString()} emergency fund! You're financially secure.`;
            } else {
                gameOver.classList.add('lose');
                gameOverTitle.textContent = '💸 Game Over';
                gameOverText.textContent = `You saved $${fund.toLocaleString()} but ran out of lives. Keep trying!`;
            }
        }

        function restart() {
            fund = 0;
            lives = 3;
            playerX = 50;
            player.style.left = '50%';
            items.forEach(i => i.remove());
            items = [];
            gameOver.classList.remove('show', 'win', 'lose');
            startBtn.disabled = false;
            updateDisplay();
        }

        updateDisplay();
    </script>
</body>
</html>
