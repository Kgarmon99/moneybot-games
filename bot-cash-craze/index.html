<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cash Craze - MoneyBot</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
        body { font-family: 'Outfit', sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; overflow: hidden; }
        .app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,255,136,0.05); border-bottom: 1px solid rgba(0,255,136,0.15); }
        .back-btn { width: 36px; height: 36px; border-radius: 8px; background: rgba(0,255,136,0.15); border: none; color: #00ff88; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; text-decoration: none; }
        .header-title { font-weight: 800; font-size: 16px; color: #00ff88; }
        .stats { display: flex; gap: 16px; font-size: 13px; }
        .stat { text-align: center; }
        .stat-val { font-weight: 800; color: #FFD700; }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; }
        .game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; position: relative; }
        #gameCanvas { border-radius: 12px; box-shadow: 0 0 40px rgba(0,255,136,0.15); }
        .overlay { position: fixed; inset: 0; background: rgba(10,10,15,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 30px; }
        .overlay.hidden { display: none; }
        .overlay-icon { font-size: 56px; margin-bottom: 12px; }
        .overlay h1 { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
        .overlay p { color: #888; font-size: 14px; text-align: center; margin-bottom: 20px; }
        .btn { padding: 14px 36px; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; border: none; }
        .btn-primary { background: linear-gradient(135deg, #00ff88, #00cc6a); color: #0a0a0f; }
        .progress-bar { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 200px; height: 6px; background: #1a1a2e; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #FFD700); border-radius: 3px; transition: width 0.3s; }
        .level-text { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #888; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <a href="../moneybot-official/" class="back-btn">←</a>
            <span class="header-title">💎 Cash Craze</span>
            <div class="stats">
                <div class="stat"><div class="stat-val" id="scoreVal">0</div><div class="stat-label">Score</div></div>
                <div class="stat"><div class="stat-val" id="movesVal">30</div><div class="stat-label">Moves</div></div>
                <div class="stat"><div class="stat-val" id="levelVal">1</div><div class="stat-label">Level</div></div>
            </div>
        </div>
        <div class="game-area">
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
            <div class="level-text" id="levelText">$500 to next level</div>
            <canvas id="gameCanvas" width="400" height="480"></canvas>
        </div>
    </div>

    <div class="overlay" id="startOverlay">
        <div class="overlay-icon">💎</div>
        <h1>Cash Craze</h1>
        <p>Match 3+ money symbols to score!<br>Swap adjacent tiles.<br>Reach the target to level up!</p>
        <div class="stats" style="margin-bottom:20px;gap:24px;">
            <div class="stat"><div class="stat-val" id="bestLevel">1</div><div class="stat-label">Best Level</div></div>
        </div>
        <button class="btn btn-primary" id="startBtn">PLAY</button>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-icon" id="endIcon">🏆</div>
        <h1 id="endTitle">Level Complete!</h1>
        <p id="endText">You reached level 5!</p>
        <div class="stats" style="margin-bottom:20px;gap:24px;">
            <div class="stat"><div class="stat-val" id="endScore">0</div><div class="stat-label">Score</div></div>
            <div class="stat"><div class="stat-val" id="endLevel">1</div><div class="stat-label">Level</div></div>
            <div class="stat"><div class="stat-val" id="endCombos">0</div><div class="stat-label">Combos</div></div>
        </div>
        <button class="btn btn-primary" id="restartBtn">PLAY AGAIN</button>
    </div>

    <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const SYMBOLS = [
        { emoji: '💵', color: '#85bb65', value: 10 },
        { emoji: '💰', color: '#FFD700', value: 20 },
        { emoji: '💎', color: '#00CCFF', value: 50 },
        { emoji: '🪙', color: '#C0C0C0', value: 15 },
        { emoji: '💳', color: '#FF6B35', value: 25 }
    ];

    let game = {
        running: false,
        score: 0,
        level: 1,
        moves: 30,
        target: 500,
        combo: 0,
        totalCombos: 0,
        bestLevel: parseInt(localStorage.getItem('cashcraze_bestlevel') || '1')
    };

    const GRID_W = 6, GRID_H = 7, CELL = 60;
    let grid = [];
    let selected = null;
    let animating = false;
    let particles = [];
    let floatingTexts = [];
    let animId;

    function initGrid() {
        grid = [];
        for (let y = 0; y < GRID_H; y++) {
            grid[y] = [];
            for (let x = 0; x < GRID_W; x++) {
                grid[y][x] = Math.floor(Math.random() * SYMBOLS.length);
            }
        }
        // Remove initial matches
        while (findMatches().length > 0) {
            removeMatches();
            fillGaps();
        }
    }

    function findMatches() {
        const matches = [];
        const matched = new Set();

        // Horizontal
        for (let y = 0; y < GRID_H; y++) {
            for (let x = 0; x < GRID_W - 2; x++) {
                if (grid[y][x] === grid[y][x+1] && grid[y][x] === grid[y][x+2]) {
                    let len = 3;
                    while (x + len < GRID_W && grid[y][x] === grid[y][x+len]) len++;
                    for (let i = 0; i < len; i++) matched.add(`${x+i},${y}`);
                    matches.push({ x, y, len, dir: 'h', type: grid[y][x] });
                }
            }
        }

        // Vertical
        for (let x = 0; x < GRID_W; x++) {
            for (let y = 0; y < GRID_H - 2; y++) {
                if (grid[y][x] === grid[y+1][x] && grid[y][x] === grid[y+2][x]) {
                    let len = 3;
                    while (y + len < GRID_H && grid[y][x] === grid[y+len][x]) len++;
                    for (let i = 0; i < len; i++) matched.add(`${x},${y+i}`);
                    matches.push({ x, y, len, dir: 'v', type: grid[y][x] });
                }
            }
        }

        return [...matched].map(s => s.split(',').map(Number));
    }

    function removeMatches() {
        const matches = findMatches();
        if (matches.length === 0) return false;

        game.combo++;
        if (game.combo > 1) game.totalCombos++;

        matches.forEach(([x, y]) => {
            const sym = SYMBOLS[grid[y][x]];
            const px = 20 + x * CELL + CELL/2;
            const py = 20 + y * CELL + CELL/2;

            // Score
            let points = sym.value * game.level;
            if (game.combo > 1) points *= game.combo;
            game.score += points;

            // Particles
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: px, y: py,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10 - 3,
                    life: 1,
                    color: sym.color,
                    size: Math.random() * 6 + 3
                });
            }

            // Floating text
            if (game.combo > 1) {
                floatingTexts.push({ x: px, y: py, text: `${game.combo}x COMBO! +$${points}`, color: '#FF6B35', life: 1, vy: -3 });
            } else {
                floatingTexts.push({ x: px, y: py, text: `+$${points}`, color: sym.color, life: 1, vy: -2 });
            }

            grid[y][x] = -1;
        });

        if (navigator.vibrate) navigator.vibrate(game.combo > 1 ? [20, 10, 20] : 15);
        return true;
    }

    function fillGaps() {
        for (let x = 0; x < GRID_W; x++) {
            let writeY = GRID_H - 1;
            for (let y = GRID_H - 1; y >= 0; y--) {
                if (grid[y][x] !== -1) {
                    grid[writeY][x] = grid[y][x];
                    writeY--;
                }
            }
            while (writeY >= 0) {
                grid[writeY][x] = Math.floor(Math.random() * SYMBOLS.length);
                writeY--;
            }
        }
    }

    function checkLevelUp() {
        if (game.score >= game.target) {
            game.level++;
            game.moves += 15;
            game.target = Math.floor(game.target * 1.5);
            game.combo = 0;

            // Celebration particles
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: canvas.width / 2, y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    life: 1.5,
                    color: '#00FF88',
                    size: Math.random() * 8 + 4
                });
            }

            floatingTexts.push({
                x: canvas.width / 2, y: canvas.height / 2 - 50,
                text: `LEVEL ${game.level}!`, color: '#00FF88', life: 2, vy: -4, size: 24
            });

            if (navigator.vibrate) navigator.vibrate([30, 20, 30, 20, 30]);
        }
    }

    function trySwap(x1, y1, x2, y2) {
        if (animating) return false;
        if (Math.abs(x1-x2) + Math.abs(y1-y2) !== 1) return false;

        // Swap
        const temp = grid[y1][x1];
        grid[y1][x1] = grid[y2][x2];
        grid[y2][x2] = temp;

        // Check if valid
        if (findMatches().length === 0) {
            // Swap back
            grid[y2][x2] = grid[y1][x1];
            grid[y1][x1] = temp;
            return false;
        }

        game.moves--;
        game.combo = 0;
        animating = true;

        // Process matches with cascade
        setTimeout(() => processMatches(), 200);
        return true;
    }

    function processMatches() {
        if (removeMatches()) {
            fillGaps();
            checkLevelUp();
            updateUI();

            // Check for more matches (cascade)
            setTimeout(() => {
                if (findMatches().length > 0) {
                    processMatches();
                } else {
                    animating = false;
                    game.combo = 0;
                    if (game.moves <= 0) {
                        setTimeout(endGame, 500);
                    }
                }
            }, 300);
        } else {
            animating = false;
            if (game.moves <= 0) {
                setTimeout(endGame, 500);
            }
        }
    }

    function draw() {
        // Background
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Grid background
        ctx.fillStyle = 'rgba(0,255,136,0.03)';
        ctx.fillRect(18, 18, GRID_W * CELL + 4, GRID_H * CELL + 4);

        // Cells
        for (let y = 0; y < GRID_H; y++) {
            for (let x = 0; x < GRID_W; x++) {
                const px = 20 + x * CELL;
                const py = 20 + y * CELL;

                // Cell background
                ctx.fillStyle = selected && selected.x === x && selected.y === y
                    ? 'rgba(0,255,136,0.2)'
                    : 'rgba(255,255,255,0.03)';
                ctx.fillRect(px, py, CELL - 2, CELL - 2);
                ctx.strokeStyle = selected && selected.x === x && selected.y === y
                    ? 'rgba(0,255,136,0.5)'
                    : 'rgba(255,255,255,0.05)';
                ctx.lineWidth = 1;
                ctx.strokeRect(px, py, CELL - 2, CELL - 2);

                if (grid[y][x] !== -1) {
                    const sym = SYMBOLS[grid[y][x]];
                    ctx.font = '32px Outfit';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(sym.emoji, px + CELL/2 - 1, py + CELL/2 + 2);
                }
            }
        }

        // Particles
        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;

        // Floating texts
        floatingTexts.forEach(t => {
            ctx.globalAlpha = t.life;
            ctx.fillStyle = t.color;
            ctx.font = `bold ${t.size || 16}px Outfit`;
            ctx.textAlign = 'center';
            ctx.fillText(t.text, t.x, t.y);
        });
        ctx.globalAlpha = 1;
    }

    function update() {
        // Particles
        particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.3;
            p.life -= 0.025;
        });
        particles = particles.filter(p => p.life > 0);

        // Floating texts
        floatingTexts.forEach(t => {
            t.y += t.vy;
            t.life -= 0.015;
        });
        floatingTexts = floatingTexts.filter(t => t.life > 0);

        draw();
        animId = requestAnimationFrame(update);
    }

    function updateUI() {
        document.getElementById('scoreVal').textContent = game.score.toLocaleString();
        document.getElementById('movesVal').textContent = game.moves;
        document.getElementById('levelVal').textContent = game.level;
        const progress = Math.min(100, (game.score / game.target) * 100);
        document.getElementById('progressFill').style.width = progress + '%';
        document.getElementById('levelText').textContent = `$${(game.target - game.score).toLocaleString()} to level ${game.level + 1}`;
    }

    function startGame() {
        document.getElementById('startOverlay').classList.add('hidden');
        document.getElementById('gameOverOverlay').classList.add('hidden');
        game.running = true;
        game.score = 0;
        game.level = 1;
        game.moves = 30;
        game.target = 500;
        game.combo = 0;
        game.totalCombos = 0;
        particles = [];
        floatingTexts = [];
        selected = null;
        initGrid();
        updateUI();
        update();
    }

    function endGame() {
        game.running = false;
        cancelAnimationFrame(animId);
        game.bestLevel = Math.max(game.bestLevel, game.level);
        localStorage.setItem('cashcraze_bestlevel', game.bestLevel);

        const isGreat = game.level >= 5;
        document.getElementById('endIcon').textContent = isGreat ? '🏆' : '💎';
        document.getElementById('endTitle').textContent = isGreat ? 'Amazing!' : 'Game Over';
        document.getElementById('endText').textContent = `You reached level ${game.level} with $${game.score.toLocaleString()}!`;
        document.getElementById('endScore').textContent = game.score.toLocaleString();
        document.getElementById('endLevel').textContent = game.level;
        document.getElementById('endCombos').textContent = game.totalCombos;
        document.getElementById('gameOverOverlay').classList.remove('hidden');
    }

    // Input
    canvas.addEventListener('click', e => {
        if (!game.running || animating) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = Math.floor(((e.clientX - rect.left) * scaleX - 20) / CELL);
        const y = Math.floor(((e.clientY - rect.top) * scaleY - 20) / CELL);

        if (x < 0 || x >= GRID_W || y < 0 || y >= GRID_H) return;

        if (!selected) {
            selected = { x, y };
        } else {
            if (selected.x === x && selected.y === y) {
                selected = null;
            } else {
                if (trySwap(selected.x, selected.y, x, y)) {
                    selected = null;
                } else {
                    selected = { x, y };
                }
            }
        }
    });

    canvas.addEventListener('touchstart', e => {
        if (!game.running || animating) return;
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = Math.floor(((touch.clientX - rect.left) * scaleX - 20) / CELL);
        const y = Math.floor(((touch.clientY - rect.top) * scaleY - 20) / CELL);

        if (x < 0 || x >= GRID_W || y < 0 || y >= GRID_H) return;

        if (!selected) {
            selected = { x, y };
        } else {
            if (selected.x === x && selected.y === y) {
                selected = null;
            } else {
                if (trySwap(selected.x, selected.y, x, y)) {
                    selected = null;
                } else {
                    selected = { x, y };
                }
            }
        }
        e.preventDefault();
    }, { passive: false });

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);
    document.getElementById('bestLevel').textContent = game.bestLevel;
    </script>
</body>
</html>
