<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compound 2048 | MoneyBot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-light: #69F0AE;
            --moneybot-green-dark: #00C853;
            --moneybot-gold: #FBBF24;
            --moneybot-dark: #1A1A2E;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
            --moneybot-text-secondary: #6B7280;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
            background: var(--moneybot-gray);
            min-height: 100vh;
            color: var(--moneybot-text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Animated Background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 230, 118, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 230, 118, 0.05) 0%, transparent 50%),
                var(--moneybot-gray);
            pointer-events: none;
            z-index: 0;
        }
        
        /* App Container */
        .app {
            position: relative;
            z-index: 1;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--moneybot-gray);
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
        }
        
        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(0, 230, 118, 0.1);
            color: var(--moneybot-green);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
            text-decoration: none;
        }
        
        .back-btn:hover {
            background: rgba(0, 230, 118, 0.2);
            transform: translateX(-2px);
        }
        
        .back-btn:active {
            transform: scale(0.92);
        }
        
        .header-title {
            font-weight: 700;
            font-size: 17px;
            letter-spacing: -0.3px;
        }
        
        .header-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(0, 230, 118, 0.1);
            color: var(--moneybot-green);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
        }
        
        .icon-btn:active {
            transform: scale(0.92);
            background: rgba(0, 230, 118, 0.2);
        }
        
        /* Score Card */
        .score-card {
            background: linear-gradient(135deg, var(--moneybot-green) 0%, var(--moneybot-green-dark) 100%);
            margin: 16px 20px;
            padding: 24px;
            border-radius: 24px;
            color: white;
            box-shadow: 
                0 20px 40px rgba(0, 230, 118, 0.3),
                inset 0 1px 0 rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }
        
        .score-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: shimmer 8s infinite linear;
        }
        
        @keyframes shimmer {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .score-label {
            font-size: 13px;
            font-weight: 500;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }
        
        .score-value {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 8px 0;
            position: relative;
            z-index: 1;
        }
        
        .score-stats {
            display: flex;
            gap: 24px;
            position: relative;
            z-index: 1;
        }
        
        .score-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0.9;
        }
        
        /* Game Board Container */
        .board-container {
            background: #1A1A2E;
            margin: 0 20px 20px;
            padding: 12px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
        }
        
        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            aspect-ratio: 1;
        }
        
        .tile {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            transition: all 0.15s var(--ease-spring);
            position: relative;
            overflow: hidden;
        }
        
        .tile.new {
            animation: popIn 0.3s var(--ease-spring);
        }
        
        .tile.merged {
            animation: merge 0.3s var(--ease-spring);
        }
        
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes merge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        /* Tile Colors */
        .tile[data-value="2"] { background: #F1F5F9; color: #64748B; }
        .tile[data-value="4"] { background: #E2E8F0; color: #64748B; }
        .tile[data-value="8"] { background: #BFDBFE; color: #1E40AF; }
        .tile[data-value="16"] { background: #93C5FD; color: #1E3A8A; }
        .tile[data-value="32"] { background: #60A5FA; color: white; }
        .tile[data-value="64"] { background: #3B82F6; color: white; }
        .tile[data-value="128"] { 
            background: linear-gradient(135deg, #00E676, #00C853); 
            color: white; 
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(0, 230, 118, 0.4);
        }
        .tile[data-value="256"] { 
            background: linear-gradient(135deg, #00C853, #00BFA5); 
            color: white; 
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(0, 230, 118, 0.5);
        }
        .tile[data-value="512"] { 
            background: linear-gradient(135deg, #FBBF24, #F59E0B); 
            color: white; 
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.5);
        }
        .tile[data-value="1024"] { 
            background: linear-gradient(135deg, #F59E0B, #EF4444); 
            color: white; 
            font-size: 0.95rem;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.5);
        }
        .tile[data-value="2048"] { 
            background: linear-gradient(135deg, #00E676, #FBBF24); 
            color: white; 
            font-size: 0.95rem;
            box-shadow: 0 0 30px rgba(0, 230, 118, 0.6);
            animation: glow 2s infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 230, 118, 0.6); }
            50% { box-shadow: 0 0 40px rgba(0, 230, 118, 0.8); }
        }
        
        /* Controls */
        .controls {
            padding: 0 20px;
            display: flex;
            gap: 12px;
        }
        
        .new-game-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--moneybot-green) 0%, var(--moneybot-green-dark) 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 
                0 8px 24px rgba(0, 230, 118, 0.4),
                inset 0 1px 0 rgba(255,255,255,0.2);
            transition: all 0.2s var(--ease-spring);
        }
        
        .new-game-btn:active {
            transform: scale(0.96);
        }
        
        /* Instructions */
        .instructions {
            margin: 20px 20px 0;
            padding: 16px 20px;
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
        }
        
        .instructions-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--moneybot-text);
            margin-bottom: 8px;
        }
        
        .instructions-text {
            font-size: 13px;
            color: var(--moneybot-text-secondary);
            line-height: 1.6;
        }
        
        /* Game Over Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            max-width: 320px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.4s var(--ease-spring);
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--moneybot-text);
        }
        
        .modal-subtitle {
            font-size: 15px;
            color: var(--moneybot-text-secondary);
            margin-bottom: 24px;
        }
        
        .modal-score {
            font-size: 36px;
            font-weight: 800;
            color: var(--moneybot-green);
            margin-bottom: 24px;
        }
        
        .modal-btn {
            width: 100%;
            background: var(--moneybot-green);
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
        }
        
        .modal-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    
    <div class="app">
        <header class="header">
            <div class="header-logo">
                <a href="../moneybot-official/" class="back-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </a>
                <span class="header-title">Compound 2048</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="newGame()">🔄</button>
            </div>
        </header>
        
        <div class="score-card">
            <div class="score-label">Portfolio Value</div>
            <div class="score-value" id="score">$0</div>
            <div class="score-stats">
                <div class="score-stat">
                    <span>🏆</span>
                    <span>Best: $<span id="best">0</span></span>
                </div>
            </div>
        </div>
        
        <div class="board-container">
            <div id="game-board"></div>
        </div>
        
        <div class="controls">
            <button class="new-game-btn" onclick="newGame()">New Game</button>
        </div>
        
        <div class="instructions">
            <div class="instructions-title">How to Play</div>
            <div class="instructions-text">
                Swipe or use arrow keys to merge tiles. Each merge represents compound interest growth! 
                Reach $2048 to become a millionaire!
            </div>
        </div>
    </div>
    
    <div class="modal" id="winModal">
        <div class="modal-content">
            <div class="modal-icon">🎉</div>
            <div class="modal-title">Millionaire!</div>
            <div class="modal-subtitle">You reached $2048!</div>
            <div class="modal-score" id="winScore">$0</div>
            <button class="modal-btn" onclick="continueGame()">Keep Going</button>
        </div>
    </div>
    
    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <div class="modal-icon">📊</div>
            <div class="modal-title">Game Over</div>
            <div class="modal-subtitle">No more moves available</div>
            <div class="modal-score" id="finalScore">$0</div>
            <button class="modal-btn" onclick="newGame()">Try Again</button>
        </div>
    </div>
    
    <script>
        const board = document.getElementById('game-board');
        let grid = [];
        let score = 0;
        let best = localStorage.getItem('compound2048-best') || 0;
        let hasWon = false;
        
        document.getElementById('best').textContent = best;
        
        function init() {
            grid = Array(4).fill().map(() => Array(4).fill(0));
            addRandomTile();
            addRandomTile();
            render();
        }
        
        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) empty.push({r, c});
                }
            }
            if (empty.length > 0) {
                const {r, c} = empty[Math.floor(Math.random() * empty.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }
        
        function render() {
            board.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    if (grid[r][c] !== 0) {
                        tile.textContent = '$' + grid[r][c];
                        tile.dataset.value = grid[r][c];
                    }
                    board.appendChild(tile);
                }
            }
            document.getElementById('score').textContent = '$' + score.toLocaleString();
        }
        
        function move(direction) {
            let moved = false;
            const newGrid = grid.map(row => [...row]);
            
            if (direction === 'left' || direction === 'right') {
                for (let r = 0; r < 4; r++) {
                    let row = [...grid[r]];
                    if (direction === 'right') row.reverse();
                    
                    row = slide(row);
                    row = merge(row);
                    row = slide(row);
                    
                    if (direction === 'right') row.reverse();
                    
                    for (let c = 0; c < 4; c++) {
                        if (newGrid[r][c] !== row[c]) moved = true;
                        newGrid[r][c] = row[c];
                    }
                }
            } else {
                for (let c = 0; c < 4; c++) {
                    let col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
                    if (direction === 'down') col.reverse();
                    
                    col = slide(col);
                    col = merge(col);
                    col = slide(col);
                    
                    if (direction === 'down') col.reverse();
                    
                    for (let r = 0; r < 4; r++) {
                        if (newGrid[r][c] !== col[r]) moved = true;
                        newGrid[r][c] = col[r];
                    }
                }
            }
            
            if (moved) {
                if (navigator.vibrate) navigator.vibrate(15);
                grid = newGrid;
                addRandomTile();
                render();
                
                // Check for 2048
                if (!hasWon && grid.some(row => row.includes(2048))) {
                    hasWon = true;
                    document.getElementById('winScore').textContent = '$' + score.toLocaleString();
                    document.getElementById('winModal').classList.add('show');
                }
                
                // Check game over
                if (isGameOver()) {
                    document.getElementById('finalScore').textContent = '$' + score.toLocaleString();
                    document.getElementById('gameOverModal').classList.add('show');
                }
                
                if (score > best) {
                    best = score;
                    localStorage.setItem('compound2048-best', best);
                    document.getElementById('best').textContent = best;
                }
            }
        }
        
        function slide(row) {
            const filtered = row.filter(x => x !== 0);
            while (filtered.length < 4) filtered.push(0);
            return filtered;
        }
        
        function merge(row) {
            for (let i = 0; i < 3; i++) {
                if (row[i] !== 0 && row[i] === row[i + 1]) {
                    row[i] *= 2;
                    score += row[i];
                    row[i + 1] = 0;
                    if (navigator.vibrate) navigator.vibrate([20, 30, 20]);
                }
            }
            return row;
        }
        
        function isGameOver() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) return false;
                    if (c < 3 && grid[r][c] === grid[r][c + 1]) return false;
                    if (r < 3 && grid[r][c] === grid[r + 1][c]) return false;
                }
            }
            return true;
        }
        
        function newGame() {
            score = 0;
            hasWon = false;
            document.getElementById('winModal').classList.remove('show');
            document.getElementById('gameOverModal').classList.remove('show');
            init();
        }
        
        function continueGame() {
            document.getElementById('winModal').classList.remove('show');
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
            if (e.key === 'ArrowUp') move('up');
            if (e.key === 'ArrowDown') move('down');
        });
        
        let touchStartX, touchStartY;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    move(dx > 0 ? 'right' : 'left');
                } else {
                    move(dy > 0 ? 'down' : 'up');
                }
            }
        });
        
        init();
    </script>
</body>
</html>
