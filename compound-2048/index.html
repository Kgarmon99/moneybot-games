<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compound 2048 - Merge for Wealth</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --mb-green: #22C55E; --mb-gold: #FBBF24; --mb-dark: #0F172A; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #F8FAFC 0%, #E2E8F0 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: var(--mb-dark); font-size: 2rem; font-weight: 800; margin-bottom: 10px; }
        .subtitle { color: #64748B; margin-bottom: 20px; text-align: center; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 15px 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--mb-green); }
        .stat-label { font-size: 0.75rem; color: #64748B; text-transform: uppercase; }
        #game-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #CBD5E1; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .tile { width: 80px; height: 80px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; transition: all 0.15s; }
        .tile[data-value="2"] { background: #F1F5F9; color: #64748B; }
        .tile[data-value="4"] { background: #E2E8F0; color: #64748B; }
        .tile[data-value="8"] { background: #BFDBFE; color: #1E40AF; }
        .tile[data-value="16"] { background: #93C5FD; color: #1E3A8A; }
        .tile[data-value="32"] { background: #60A5FA; color: white; }
        .tile[data-value="64"] { background: #3B82F6; color: white; }
        .tile[data-value="128"] { background: #2563EB; color: white; font-size: 1rem; }
        .tile[data-value="256"] { background: #22C55E; color: white; font-size: 1rem; }
        .tile[data-value="512"] { background: #16A34A; color: white; font-size: 1rem; }
        .tile[data-value="1024"] { background: #FBBF24; color: white; font-size: 0.9rem; }
        .tile[data-value="2048"] { background: linear-gradient(135deg, #FBBF24, #F59E0B); color: white; font-size: 0.9rem; box-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
        .btn { background: linear-gradient(135deg, var(--mb-green), #16A34A); color: white; border: none; padding: 15px 40px; font-size: 1.1rem; font-weight: 700; border-radius: 50px; cursor: pointer; }
        .instructions { text-align: center; color: #64748B; margin-top: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>💰 Compound 2048</h1>
    <p class="subtitle">Merge numbers to reach $1M! Learn compound growth.</p>
    <div class="stats">
        <div class="stat-box">
            <div class="stat-value" id="score">$0</div>
            <div class="stat-label">Portfolio</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="best">$0</div>
            <div class="stat-label">Best</div>
        </div>
    </div>
    <div id="game-board"></div>
    <button class="btn" onclick="newGame()">New Game</button>
    <p class="instructions">Use Arrow Keys or Swipe to merge tiles<br>Each merge represents compound interest growth!</p>
    <script>
        const board = document.getElementById('game-board');
        let grid = [];
        let score = 0;
        let best = localStorage.getItem('compound2048-best') || 0;
        document.getElementById('best').textContent = '$' + best;
        
        function init() {
            grid = Array(4).fill().map(() => Array(4).fill(0));
            addRandomTile();
            addRandomTile();
            render();
        }
        
        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) empty.push({r, c});
                }
            }
            if (empty.length > 0) {
                const {r, c} = empty[Math.floor(Math.random() * empty.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }
        
        function render() {
            board.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    if (grid[r][c] !== 0) {
                        tile.textContent = '$' + grid[r][c];
                        tile.dataset.value = grid[r][c];
                    }
                    board.appendChild(tile);
                }
            }
            document.getElementById('score').textContent = '$' + score;
        }
        
        function move(direction) {
            let moved = false;
            const newGrid = grid.map(row => [...row]);
            
            if (direction === 'left' || direction === 'right') {
                for (let r = 0; r < 4; r++) {
                    let row = [...grid[r]];
                    if (direction === 'right') row.reverse();
                    
                    row = slide(row);
                    row = merge(row);
                    row = slide(row);
                    
                    if (direction === 'right') row.reverse();
                    
                    for (let c = 0; c < 4; c++) {
                        if (newGrid[r][c] !== row[c]) moved = true;
                        newGrid[r][c] = row[c];
                    }
                }
            } else {
                for (let c = 0; c < 4; c++) {
                    let col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
                    if (direction === 'down') col.reverse();
                    
                    col = slide(col);
                    col = merge(col);
                    col = slide(col);
                    
                    if (direction === 'down') col.reverse();
                    
                    for (let r = 0; r < 4; r++) {
                        if (newGrid[r][c] !== col[r]) moved = true;
                        newGrid[r][c] = col[r];
                    }
                }
            }
            
            if (moved) {
                grid = newGrid;
                addRandomTile();
                render();
                if (score > best) {
                    best = score;
                    localStorage.setItem('compound2048-best', best);
                    document.getElementById('best').textContent = '$' + best;
                }
            }
        }
        
        function slide(row) {
            const filtered = row.filter(x => x !== 0);
            while (filtered.length < 4) filtered.push(0);
            return filtered;
        }
        
        function merge(row) {
            for (let i = 0; i < 3; i++) {
                if (row[i] !== 0 && row[i] === row[i + 1]) {
                    row[i] *= 2;
                    score += row[i];
                    row[i + 1] = 0;
                }
            }
            return row;
        }
        
        function newGame() {
            score = 0;
            init();
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
            if (e.key === 'ArrowUp') move('up');
            if (e.key === 'ArrowDown') move('down');
        });
        
        let touchStartX, touchStartY;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) move('right');
                else if (dx < -30) move('left');
            } else {
                if (dy > 30) move('down');
                else if (dy < -30) move('up');
            }
        });
        
        init();
    </script>
</body>
</html>
