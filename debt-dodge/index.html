<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyBot - Debt Dodge | MoneyBot Gaming</title>
    <link rel="icon" type="image/svg+xml" href="../assets/moneybot-idle.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
        :root { --moneybot-dark: #FFFFFF; --moneybot-green: #22C55E; --moneybot-neon-light: #33FFB5; --moneybot-graphite: #FFFFFF; --moneybot-charcoal: #F8FAFC; --moneybot-white: #FFFFFF; --moneybot-gray: #888888; --moneybot-blue: #3B82F6; --moneybot-purple: #8B5CF6; --moneybot-gold: #FBBF24; --moneybot-red: #EF4444; --glow-neon: 0 0 10px #22C55E, 0 0 20px #22C55E; --glow-strong: 0 0 20px #22C55E, 0 0 40px #22C55E; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--moneybot-black); min-height: 100vh; overflow: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 255, 153, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 153, 0.03) 1px, transparent 1px); background-size: 80px 80px; pointer-events: none; z-index: 0; }
        body::after { content: ''; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 255, 153, 0.08) 0%, transparent 70%); pointer-events: none; z-index: 0; animation: pulse 4s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.2); } }
        .app { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; z-index: 1; display: flex; flex-direction: column; }
        .header { background: rgba(0, 0, 0, 0.05); backdrop-filter: blur(20px); padding: 16px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid rgba(34, 197, 94, 0.2); }
        .header-logo { display: flex; align-items: center; gap: 12px; }
        .moneybot-brand { display: flex; align-items: center; gap: 8px; }
        .moneybot-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--moneybot-neon), var(--moneybot-blue)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: var(--glow-neon); }
        .back-btn { width: 44px; height: 44px; border-radius: 8px; background: rgba(34, 197, 94, 0.2); border: none; color: var(--moneybot-neon); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; text-decoration: none; transition: all 0.2s; }
        .back-btn:hover { background: rgba(34, 197, 94, 0.2); transform: scale(1.05); }
        .back-btn:active { transform: scale(0.95); }
        .header-title { font-weight: 800; font-size: 18px; color: #0F172A; }
        .score-pill { background: linear-gradient(135deg, var(--moneybot-neon), var(--moneybot-blue)); color: var(--moneybot-black); padding: 10px 20px; border-radius: 25px; font-weight: 700; font-size: 16px; box-shadow: var(--glow-neon); }
        .game-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #gameCanvas { background: #FFFFFF; border-radius: 16px; box-shadow: var(--glow-neon); }
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px); z-index: 200; padding: 40px; }
        .overlay-screen.hidden { display: none; }
        .game-icon { width: 80px; height: 80px; background: linear-gradient(135deg, var(--moneybot-neon), var(--moneybot-blue)); border-radius: 32px; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 30px; box-shadow: var(--glow-strong); animation: dodge 0.5s ease-in-out infinite; }
        @keyframes dodge { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(15px); } }
        .game-title { font-size: 40px; font-weight: 800; color: #0F172A; margin-bottom: 12px; }
        .game-subtitle { color: var(--moneybot-gray); font-size: 17px; margin-bottom: 40px; text-align: center; }
        .stats-card { background: #FFFFFF; border-radius: 16px; padding: 24px 40px; margin-bottom: 30px; text-align: center; border: 1px solid rgba(34, 197, 94, 0.2); }
        .stats-label { font-size: 13px; color: var(--moneybot-gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stats-value { font-size: 40px; font-weight: 800; color: var(--moneybot-neon); }
        .primary-btn { background: linear-gradient(135deg, var(--moneybot-neon), var(--moneybot-blue)); color: var(--moneybot-black); border: none; padding: 16px 32px; font-size: 18px; font-weight: 700; border-radius: 16px; cursor: pointer; box-shadow: var(--glow-neon); transition: all 0.3s; width: 100%; max-width: 280px; }
        .primary-btn:hover { transform: scale(1.05); box-shadow: var(--glow-strong); }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-logo">
                <a href="../moneybot-official/" class="back-btn">←</a>
                <div class="moneybot-brand">
                    <div class="moneybot-icon"><img src="assets/moneybot-logo-1.jpg" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;" /></div>
                    <span class="header-title">MoneyBot</span>
                </div>
            </div>
            <div class="score-pill">$<span id="score">0</span></div>
        </div>
        <div class="game-area">
            <canvas id="gameCanvas" width="350" height="500"></canvas>
        </div>
    </div>
    <div class="overlay-screen" id="startScreen">
        <div class="game-icon">🏃</div>
        <div class="game-title">Debt Dodge</div>
        <div class="game-subtitle">Dodge debt collectors!<br>Collect paychecks, avoid bills</div>
        <div class="stats-card">
            <div class="stats-label">Best Run</div>
            <div class="stats-value" id="highScore">$0</div>
        </div>
        <button class="primary-btn" onclick="startGame()">Start Dodging</button>
    </div>
    <div class="overlay-screen hidden" id="gameOverScreen">
        <div class="game-icon" style="background: linear-gradient(135deg, var(--moneybot-red), #ff0000);">💀</div>
        <div class="game-title">Caught!</div>
        <div class="game-subtitle">You saved $<span id="finalScore" style="color: var(--moneybot-neon); font-weight: 800;">0</span></div>
        <button class="primary-btn" onclick="restartGame()">Try Again</button>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('debtDodgeHighScore') || 0;
        let player = { x: 175, y: 400, size: 30 };
        let collectors = [];
        let paychecks = [];
        let gameLoop;
        document.getElementById('highScore').textContent = '$' + highScore;
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            gameRunning = true;
            score = 0;
            player.x = 175;
            collectors = [];
            paychecks = [];
            updateScore();
            gameLoop = requestAnimationFrame(update);
        }
        function restartGame() {
            startGame();
        }
        function update() {
            if (!gameRunning) return;
            score += 1;
            if (Math.random() < 0.03) {
                collectors.push({
                    x: Math.random() * 300 + 25,
                    y: -30,
                    speed: 3 + Math.random() * 2
                });
            }
            if (Math.random() < 0.02) {
                paychecks.push({
                    x: Math.random() * 300 + 25,
                    y: -30,
                    speed: 3,
                    value: 50 + Math.floor(Math.random() * 100)
                });
            }
            collectors = collectors.filter(c => {
                c.y += c.speed;
                if (Math.abs(c.x - player.x) < 30 && Math.abs(c.y - player.y) < 30) {
                    gameOver();
                    return false;
                }
                return c.y < canvas.height + 50;
            });
            paychecks = paychecks.filter(p => {
                p.y += p.speed;
                if (Math.abs(p.x - player.x) < 30 && Math.abs(p.y - player.y) < 30) {
                    score += p.value;
                    if (navigator.vibrate) navigator.vibrate(10);
                    return false;
                }
                return p.y < canvas.height + 50;
            });
            updateScore();
            draw();
            gameLoop = requestAnimationFrame(update);
        }
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(gameLoop);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('debtDodgeHighScore', highScore);
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        function draw() {
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = '35px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#22C55E';
            ctx.fillText('🏃', player.x, player.y);
            ctx.shadowBlur = 0;
            collectors.forEach(c => {
                ctx.fillText('💀', c.x, c.y);
            });
            paychecks.forEach(p => {
                ctx.fillText('💰', p.x, p.y);
            });
        }
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft') player.x = Math.max(30, player.x - 15);
            if (e.key === 'ArrowRight') player.x = Math.min(320, player.x + 15);
        });
        canvas.addEventListener('touchmove', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            player.x = Math.max(30, Math.min(320, e.touches[0].clientX - rect.left));
        });
        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            player.x = Math.max(30, Math.min(320, e.clientX - rect.left));
        });
    </script>
</body>
</html>
