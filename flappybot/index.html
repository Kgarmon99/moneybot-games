<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- VERSION: 2025-04-30-0720 - White MoneyBot character, no background -->
    <title>FlappyBot - Fly to Financial Freedom</title>
    <link rel="icon" type="image/jpeg" href="assets/moneybot-logo-1.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
            user-select: none; 
        }
        
        :root { 
            --moneybot-green: #22C55E; 
            --moneybot-dark: #0F172A; 
            --moneybot-white: #FFFFFF;
            --moneybot-gold: #FFD700;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0a0a1a;
            min-height: 100vh;
            overflow: hidden;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
        }
        
        .score-number {
            font-size: 72px;
            font-weight: 900;
            color: #22C55E;
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.8), 0 0 40px rgba(34, 197, 94, 0.4), 0 0 60px rgba(34, 197, 94, 0.2);
            line-height: 1;
            animation: scorePulse 1s ease-in-out infinite;
        }
        
        @keyframes scorePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .best-score {
            font-size: 16px;
            font-weight: 600;
            color: #22C55E;
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.8);
            margin-top: 5px;
        }
        
        .medal {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: medalPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .medal.bronze { background: linear-gradient(135deg, #CD7F32, #8B4513); display: flex; }
        .medal.silver { background: linear-gradient(135deg, #C0C0C0, #808080); display: flex; }
        .medal.gold { background: linear-gradient(135deg, #FFD700, #FFA500); display: flex; }
        .medal.platinum { background: linear-gradient(135deg, #E5E4E2, #A0A0A0); display: flex; }
        
        @keyframes medalPop {
            0% { transform: translateX(-50%) scale(0) rotate(-180deg); }
            100% { transform: translateX(-50%) scale(1) rotate(0deg); }
        }
        
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.6);
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        
        .game-over-screen { display: none; }
        
        .logo {
            font-size: 48px;
            font-weight: 900;
            color: white;
            text-shadow: 4px 4px 0 var(--moneybot-green), 8px 8px 0 rgba(0,0,0,0.3);
            margin-bottom: 10px;
            animation: float 2s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .subtitle {
            font-size: 18px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .btn {
            background: linear-gradient(135deg, var(--moneybot-green), #16A34A);
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(34,197,94,0.4), 0 4px 0 #15803d;
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 15px rgba(34,197,94,0.4), 0 0 0 #15803d;
        }
        
        .instructions {
            margin-top: 30px;
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            text-align: center;
        }
        
        .theme-selector {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .theme-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 24px;
        }
        
        .theme-btn:hover {
            transform: scale(1.1);
        }
        
        .theme-btn.active {
            border-color: #22C55E;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.6);
        }
        
        .theme-btn.locked {
            opacity: 0.5;
            cursor: not-allowed;
            position: relative;
        }
        
        .theme-btn.locked::after {
            content: '🔒';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
        }
        
        .theme-deepSpace { background: linear-gradient(135deg, #000000, #1a1a2e); }
        .theme-nebula { background: linear-gradient(135deg, #2d1b4e, #1a0a2e); }
        .theme-galaxy { background: linear-gradient(135deg, #0a1628, #1a3a5c); }
        .theme-sunset { background: linear-gradient(135deg, #2d1810, #4a2512); }
        .theme-matrix { background: linear-gradient(135deg, #000500, #003300); }
        .theme-aurora { background: linear-gradient(135deg, #00ff88, #0088ff); }
        .theme-volcano { background: linear-gradient(135deg, #ff4400, #880000); }
        .theme-cyber { background: linear-gradient(135deg, #ff00ff, #00ffff); }
        
        .bot-selector {
            margin: 15px 0;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .bot-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        
        .bot-btn:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.2);
        }
        
        .bot-btn.active {
            border-color: #22C55E;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.6);
        }
        
        .bot-btn.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .unlock-text {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }
        
        .trail-selector {
            margin: 15px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .trail-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .trail-btn:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.2);
        }
        
        .trail-btn.active {
            border-color: #22C55E;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.6);
        }
        
        .trail-btn.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }
        
        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #22C55E;
        }
        
        .settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }
        
        .settings-modal.show {
            display: flex;
        }
        
        .settings-content {
            background: linear-gradient(135deg, #1a1a2e, #2d2d44);
            border-radius: 20px;
            padding: 30px;
            max-width: 90%;
            max-height: 80%;
            overflow-y: auto;
            border: 2px solid #22C55E;
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.3);
        }
        
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .settings-title {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
        }
        
        .settings-section {
            margin-bottom: 25px;
        }
        
        .settings-label {
            font-size: 16px;
            color: #888;
            margin-bottom: 10px;
        }
        
        .tap-icon {
            font-size: 40px;
            animation: tapPulse 1s ease-in-out infinite;
        }
        
        @keyframes tapPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.9); opacity: 0.7; }
        }
        
        .stats-box {
            background: white;
            border-radius: 20px;
            padding: 25px 40px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .stats-label {
            font-size: 14px;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .stats-value {
            font-size: 48px;
            font-weight: 900;
            color: var(--moneybot-dark);
        }
        
        .new-best {
            color: var(--moneybot-green);
            animation: pulse 0.5s ease-in-out 3;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .share-btn {
            background: linear-gradient(135deg, #1DA1F2, #0d8bd9);
            margin-top: 15px;
        }
        
        .combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
            color: var(--moneybot-gold);
            text-shadow: 3px 3px 0 rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }
        
        .combo-display.show {
            animation: comboAnim 1s ease-out forwards;
        }
        
        @keyframes comboAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            80% { opacity: 1; transform: translate(-50%, -70%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(0.8); }
        }
        
        .streak-flames {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 30px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .streak-flames.active {
            opacity: 1;
            animation: flames 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes flames {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer">
        <div class="score-display">
            <div class="score-number" id="scoreDisplay">0</div>
            <div class="best-score">Best: <span id="bestScore">0</span></div>
        </div>
        
        <div class="medal" id="medal"></div>
        
        <div class="combo-display" id="comboDisplay">🔥 x2</div>
        
        <div class="streak-flames" id="streakFlames">🔥🔥🔥</div>
    </div>
    
    <!-- Settings Button -->
    <button class="settings-btn" onclick="game.openSettings()" title="Settings">⚙️</button>
    
    <!-- Settings Modal -->
    <div class="settings-modal" id="settingsModal">
        <div class="settings-content">
            <div class="settings-header">
                <div class="settings-title">⚙️ Settings</div>
                <button class="close-btn" onclick="game.closeSettings()">×</button>
            </div>
            
            <div class="settings-section">
                <div class="settings-label">Choose Your Bot</div>
                <div class="bot-selector" id="settingsBotSelector">
                    <button class="bot-btn active" onclick="game.setBot('classic')" data-bot="classic">🤖</button>
                    <button class="bot-btn locked" onclick="game.setBot('gold')" data-bot="gold">🥇</button>
                    <button class="bot-btn locked" onclick="game.setBot('neon')" data-bot="neon">🌈</button>
                    <button class="bot-btn locked" onclick="game.setBot('ninja')" data-bot="ninja">🥷</button>
                    <button class="bot-btn locked" onclick="game.setBot('alien')" data-bot="alien">👽</button>
                </div>
            </div>
            
            <div class="settings-section">
                <div class="settings-label">Choose Theme</div>
                <div class="theme-selector" id="settingsThemeSelector">
                    <button class="theme-btn theme-deepSpace active" onclick="game.setTheme('deepSpace')" data-theme="deepSpace">🌌</button>
                    <button class="theme-btn theme-nebula" onclick="game.setTheme('nebula')" data-theme="nebula">🌸</button>
                    <button class="theme-btn theme-galaxy" onclick="game.setTheme('galaxy')" data-theme="galaxy">🌀</button>
                    <button class="theme-btn theme-sunset locked" onclick="game.setTheme('sunset')" data-theme="sunset">🌅</button>
                    <button class="theme-btn theme-matrix locked" onclick="game.setTheme('matrix')" data-theme="matrix">💻</button>
                    <button class="theme-btn theme-aurora locked" onclick="game.setTheme('aurora')" data-theme="aurora">🌟</button>
                    <button class="theme-btn theme-volcano locked" onclick="game.setTheme('volcano')" data-theme="volcano">🌋</button>
                    <button class="theme-btn theme-cyber locked" onclick="game.setTheme('cyber')" data-theme="cyber">⚡</button>
                </div>
            </div>
            
            <div class="settings-section">
                <div class="settings-label">Choose Trail Effect</div>
                <div class="trail-selector" id="settingsTrailSelector">
                    <button class="trail-btn active" onclick="game.setTrail('none')" data-trail="none" title="No Trail">❌</button>
                    <button class="trail-btn" onclick="game.setTrail('coins')" data-trail="coins" title="Coins - 5 pts">🪙</button>
                    <button class="trail-btn locked" onclick="game.setTrail('rainbow')" data-trail="rainbow" title="Rainbow - 15 pts">🌈</button>
                    <button class="trail-btn locked" onclick="game.setTrail('fire')" data-trail="fire" title="Fire - 35 pts">🔥</button>
                    <button class="trail-btn locked" onclick="game.setTrail('sparkles')" data-trail="sparkles" title="Sparkles - 55 pts">✨</button>
                    <button class="trail-btn locked" onclick="game.setTrail('bubbles')" data-trail="bubbles" title="Bubbles - 90 pts">🫧</button>
                    <button class="trail-btn locked" onclick="game.setTrail('neon')" data-trail="neon" title="Neon - 120 pts">💫</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="start-screen" id="startScreen">
        <div class="logo">🤖 FLAPPYBOT</div>
        <div class="subtitle">Fly through the market volatility!<br>Tap to flap, avoid the red zones</div>
        
        <div style="font-size: 14px; color: #888; margin-bottom: 10px;">Choose Your Bot</div>
        <div class="bot-selector" id="botSelector">
            <button class="bot-btn active" onclick="game.setBot('classic')" data-bot="classic" title="Classic Bot (Unlocked)">🤖</button>
            <button class="bot-btn locked" onclick="game.setBot('gold')" data-bot="gold" title="Gold Bot">🥇</button>
            <button class="bot-btn locked" onclick="game.setBot('neon')" data-bot="neon" title="Neon Bot">🌈</button>
            <button class="bot-btn locked" onclick="game.setBot('ninja')" data-bot="ninja" title="Ninja Bot">🥷</button>
            <button class="bot-btn locked" onclick="game.setBot('alien')" data-bot="alien" title="Alien Bot">👽</button>
        </div>
        
        <div style="font-size: 14px; color: #888; margin-bottom: 10px;">Choose Theme</div>
        <div class="theme-selector" id="themeSelector">
            <button class="theme-btn theme-deepSpace active" onclick="game.setTheme('deepSpace')" data-theme="deepSpace" title="Deep Space (Unlocked)">🌌</button>
            <button class="theme-btn theme-nebula" onclick="game.setTheme('nebula')" data-theme="nebula" title="Nebula - Unlock at 10 pts">🌸</button>
            <button class="theme-btn theme-galaxy" onclick="game.setTheme('galaxy')" data-theme="galaxy" title="Galaxy - Unlock at 20 pts">🌀</button>
            <button class="theme-btn theme-sunset locked" onclick="game.setTheme('sunset')" data-theme="sunset" title="Sunset - Unlock at 30 pts">🌅</button>
            <button class="theme-btn theme-matrix locked" onclick="game.setTheme('matrix')" data-theme="matrix" title="Matrix - Unlock at 50 pts">💻</button>
            <button class="theme-btn theme-aurora locked" onclick="game.setTheme('aurora')" data-theme="aurora" title="Aurora - Unlock at 75 pts">🌟</button>
            <button class="theme-btn theme-volcano locked" onclick="game.setTheme('volcano')" data-theme="volcano" title="Volcano - Unlock at 100 pts">🌋</button>
            <button class="theme-btn theme-cyber locked" onclick="game.setTheme('cyber')" data-theme="cyber" title="Cyber - Unlock at 150 pts">⚡</button>
        </div>
        <button class="btn" onclick="game.start()">PLAY NOW</button>
        <div class="instructions">
            <div class="tap-icon">👆</div>
            <div>Tap or press SPACE to fly</div>
        </div>
    </div>
    
    <div class="game-over-screen" id="gameOverScreen">
        <div class="stats-box">
            <div class="stats-label">Score</div>
            <div class="stats-value" id="finalScore">0</div>
        </div>
        <div class="stats-box">
            <div class="stats-label">Best</div>
            <div class="stats-value" id="finalBest">0</div>
        </div>
        <button class="btn" onclick="game.restart()">PLAY AGAIN</button>
        <button class="btn share-btn" onclick="game.share()">📤 SHARE SCORE</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game constants
        const GRAVITY = 0.4;
        const FLAP_STRENGTH = -7;
        const PIPE_SPEED = 3;
        const PIPE_SPAWN_RATE = 120;
        const PIPE_GAP = 160;
        
        // Game state
        const game = {
            state: 'menu', // menu, playing, gameover
            score: 0,
            bestScore: parseInt(localStorage.getItem('flappybot_best')) || 0,
            currentTheme: localStorage.getItem('flappybot_theme') || 'deepSpace',
            currentBot: localStorage.getItem('flappybot_bot') || 'classic',
            currentTrail: localStorage.getItem('flappybot_trail') || 'coins',
            unlockedThemes: JSON.parse(localStorage.getItem('flappybot_unlockedThemes')) || ['deepSpace'],
            unlockedBots: JSON.parse(localStorage.getItem('flappybot_unlockedBots')) || ['classic'],
            unlockedTrails: JSON.parse(localStorage.getItem('flappybot_unlockedTrails')) || ['none', 'coins'],
            frames: 0,
            combo: 0,
            lastPipeX: 0,
            
            // Bird
            bird: {
                x: 100,
                y: 0,
                velocity: 0,
                width: 34,
                height: 24,
                rotation: 0,
                wingFrame: 0
            },
            
            // Pipes
            pipes: [],
            
            // Particles
            particles: [],
            
            // Background
            bgOffset: 0,
            groundOffset: 0,
            
            // Player image
            playerImage: null,
            playerImageLoaded: false,
            
            // Screen shake
            shakeIntensity: 0,
            
            init() {
                // Load player image
                this.playerImage = new Image();
                this.playerImage.src = 'assets/player-rembg.png';
                this.playerImage.onload = () => {
                    this.playerImageLoaded = true;
                };
                
                // Set initial theme, bot, and trail
                this.setTheme(this.currentTheme);
                this.setBot(this.currentBot);
                this.setTrail(this.currentTrail);
                
                // Update unlocks based on best score
                this.updateUnlocks();
                
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                // Input handlers
                canvas.addEventListener('click', () => this.flap());
                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.flap();
                });
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space' || e.code === 'ArrowUp') {
                        e.preventDefault();
                        this.flap();
                    }
                });
                
                document.getElementById('bestScore').textContent = this.bestScore;
                
                // Start loop
                this.loop();
            },
            
            resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                this.bird.y = canvas.height / 2;
            },
            
            themeUnlocks: {
                deepSpace: 0,
                nebula: 10,
                galaxy: 20,
                sunset: 30,
                matrix: 50,
                aurora: 75,
                volcano: 100,
                cyber: 150
            },
            
            botUnlocks: {
                classic: 0,
                gold: 25,
                neon: 40,
                ninja: 60,
                alien: 80
            },
            
            trailUnlocks: {
                none: 0,
                coins: 5,
                rainbow: 15,
                fire: 35,
                sparkles: 55,
                bubbles: 90,
                neon: 120
            },
            
            openSettings() {
                document.getElementById('settingsModal').classList.add('show');
                this.updateSettingsUI();
            },
            
            closeSettings() {
                document.getElementById('settingsModal').classList.remove('show');
            },
            
            updateSettingsUI() {
                // Update bot buttons in settings
                document.querySelectorAll('#settingsBotSelector .bot-btn').forEach(btn => {
                    const bot = btn.dataset.bot;
                    btn.classList.remove('active', 'locked');
                    
                    if (this.unlockedBots.includes(bot)) {
                        if (this.currentBot === bot) {
                            btn.classList.add('active');
                        }
                    } else {
                        btn.classList.add('locked');
                    }
                });
                
                // Update theme buttons in settings
                document.querySelectorAll('#settingsThemeSelector .theme-btn').forEach(btn => {
                    const theme = btn.dataset.theme;
                    btn.classList.remove('active', 'locked');
                    
                    if (this.unlockedThemes.includes(theme)) {
                        if (this.currentTheme === theme) {
                            btn.classList.add('active');
                        }
                    } else {
                        btn.classList.add('locked');
                    }
                });
                
                // Update trail buttons in settings
                document.querySelectorAll('#settingsTrailSelector .trail-btn').forEach(btn => {
                    const trail = btn.dataset.trail;
                    btn.classList.remove('active', 'locked');
                    
                    if (this.unlockedTrails.includes(trail)) {
                        if (this.currentTrail === trail) {
                            btn.classList.add('active');
                        }
                    } else {
                        btn.classList.add('locked');
                    }
                });
            },
            
            updateUnlocks() {
                // Check theme unlocks
                for (const [theme, required] of Object.entries(this.themeUnlocks)) {
                    if (this.bestScore >= required && !this.unlockedThemes.includes(theme)) {
                        this.unlockedThemes.push(theme);
                    }
                }
                
                // Check bot unlocks
                for (const [bot, required] of Object.entries(this.botUnlocks)) {
                    if (this.bestScore >= required && !this.unlockedBots.includes(bot)) {
                        this.unlockedBots.push(bot);
                    }
                }
                
                // Check trail unlocks
                for (const [trail, required] of Object.entries(this.trailUnlocks)) {
                    if (this.bestScore >= required && !this.unlockedTrails.includes(trail)) {
                        this.unlockedTrails.push(trail);
                    }
                }
                
                // Save unlocks
                localStorage.setItem('flappybot_unlockedThemes', JSON.stringify(this.unlockedThemes));
                localStorage.setItem('flappybot_unlockedBots', JSON.stringify(this.unlockedBots));
                localStorage.setItem('flappybot_unlockedTrails', JSON.stringify(this.unlockedTrails));
                
                // Update UI
                this.updateUnlockUI();
            },
            
            updateUnlockUI() {
                // Update theme buttons
                document.querySelectorAll('.theme-btn').forEach(btn => {
                    const theme = btn.dataset.theme;
                    const required = this.themeUnlocks[theme];
                    if (this.unlockedThemes.includes(theme)) {
                        btn.classList.remove('locked');
                        btn.title = theme.charAt(0).toUpperCase() + theme.slice(1);
                    } else {
                        btn.classList.add('locked');
                        btn.title = `Unlock at ${required} pts`;
                    }
                });
                
                // Update bot buttons
                document.querySelectorAll('.bot-btn').forEach(btn => {
                    const bot = btn.dataset.bot;
                    const required = this.botUnlocks[bot];
                    if (this.unlockedBots.includes(bot)) {
                        btn.classList.remove('locked');
                        btn.title = bot.charAt(0).toUpperCase() + bot.slice(1) + ' Bot';
                    } else {
                        btn.classList.add('locked');
                        btn.title = `Unlock at ${required} pts`;
                    }
                });
            },
            
            setTheme(themeName) {
                // Check if unlocked
                if (!this.unlockedThemes.includes(themeName)) {
                    const required = this.themeUnlocks[themeName];
                    alert(`Unlock ${themeName} by scoring ${required} points!`);
                    return;
                }
                
                this.currentTheme = themeName;
                
                // Update button states in both start screen and settings
                document.querySelectorAll('.theme-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.theme === themeName) {
                        btn.classList.add('active');
                    }
                });
                
                // Save preference
                localStorage.setItem('flappybot_theme', themeName);
            },
            
            setBot(botName) {
                // Check if unlocked
                if (!this.unlockedBots.includes(botName)) {
                    const required = this.botUnlocks[botName];
                    alert(`Unlock ${botName} bot by scoring ${required} points!`);
                    return;
                }
                
                this.currentBot = botName;
                
                // Update button states in both start screen and settings
                document.querySelectorAll('.bot-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.bot === botName) {
                        btn.classList.add('active');
                    }
                });
                
                // Save preference
                localStorage.setItem('flappybot_bot', botName);
                
                // Apply bot effects (color filters, etc.)
                this.applyBotEffect(botName);
            },
            
            applyBotEffect(botName) {
                // Bot effects will be applied during drawing
                this.botEffect = botName;
            },
            
            setTrail(trailName) {
                // Check if unlocked
                if (!this.unlockedTrails.includes(trailName)) {
                    const required = this.trailUnlocks[trailName];
                    alert(`Unlock ${trailName} trail by scoring ${required} points!`);
                    return;
                }
                
                this.currentTrail = trailName;
                
                // Update button states
                document.querySelectorAll('.trail-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.trail === trailName) {
                        btn.classList.add('active');
                    }
                });
                
                // Save preference
                localStorage.setItem('flappybot_trail', trailName);
            },
            
            start() {
                this.state = 'playing';
                this.score = 0;
                this.combo = 0;
                this.frames = 0;
                this.pipes = [];
                this.particles = [];
                this.bird.y = canvas.height / 2;
                this.bird.velocity = 0;
                this.bird.rotation = 0;
                
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('gameOverScreen').style.display = 'none';
                document.getElementById('scoreDisplay').textContent = '0';
                document.getElementById('medal').className = 'medal';
                
                this.spawnPipe();
            },
            
            flap() {
                if (this.state === 'playing') {
                    this.bird.velocity = FLAP_STRENGTH;
                    this.createParticles(this.bird.x - 10, this.bird.y + 12, 5, '#22C55E');
                    // Add coin trail particles
                    this.createCoinTrail(3);
                }
            },
            
            createCoinTrail(count) {
                const trailColors = {
                    none: null,
                    coins: '#FFD700',
                    rainbow: `hsl(${(this.frames * 10) % 360}, 100%, 50%)`,
                    fire: ['#FF4500', '#FF6347', '#FFA500'][Math.floor(Math.random() * 3)],
                    sparkles: '#FFFFFF',
                    bubbles: ['#00BFFF', '#87CEEB', '#ADD8E6'][Math.floor(Math.random() * 3)],
                    neon: ['#FF00FF', '#00FFFF', '#39FF14'][Math.floor(Math.random() * 3)]
                };
                
                const color = trailColors[this.currentTrail];
                if (!color) return; // No trail
                
                for (let i = 0; i < count; i++) {
                    const particle = {
                        x: this.bird.x - 25 - i * 20,
                        y: this.bird.y + 25 + (Math.random() - 0.5) * 15,
                        vx: -3 - Math.random() * 3,
                        vy: (Math.random() - 0.5) * 3,
                        life: 1,
                        color: color,
                        size: 10 + Math.random() * 8,
                        isCoin: true,
                        hasTrail: true
                    };
                    
                    // Special effects for different trails
                    if (this.currentTrail === 'sparkles') {
                        particle.size = 5 + Math.random() * 10;
                        particle.twinkle = true;
                    } else if (this.currentTrail === 'bubbles') {
                        particle.vy = -1 - Math.random() * 2; // Float up
                    } else if (this.currentTrail === 'neon') {
                        particle.glow = true;
                    }
                    
                    this.particles.push(particle);
                }
            },
            
            spawnPipe() {
                const minHeight = 50;
                const maxHeight = canvas.height - PIPE_GAP - minHeight - 100;
                const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
                
                this.pipes.push({
                    x: canvas.width,
                    topHeight: topHeight,
                    bottomY: topHeight + PIPE_GAP,
                    width: 60,
                    passed: false,
                    color: Math.random() > 0.5 ? '#22C55E' : '#16A34A'
                });
            },
            
            createParticles(x, y, count, color) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        life: 1,
                        color: color,
                        size: Math.random() * 6 + 3,
                        glow: true
                    });
                }
            },
            
            createCoinParticles(x, y) {
                for (let i = 0; i < 10; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8 - 2,
                        life: 1,
                        color: '#FFD700',
                        size: Math.random() * 6 + 4,
                        isCoin: true
                    });
                }
            },
            
            update() {
                if (this.state !== 'playing') return;
                
                this.frames++;
                
                // Update bird
                this.bird.velocity += GRAVITY;
                this.bird.y += this.bird.velocity;
                this.bird.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.bird.velocity * 0.1)));
                this.bird.wingFrame = Math.floor(this.frames / 5) % 3;
                
                // Add coin trail during flight
                if (this.frames % 10 === 0) {
                    this.createCoinTrail(1);
                }
                
                // Check ceiling collision only (no ground in space)
                if (this.bird.y < 0) {
                    this.gameOver();
                    return;
                }
                
                // Wrap around bottom (space has no ground)
                if (this.bird.y > canvas.height) {
                    this.bird.y = canvas.height;
                    this.bird.velocity = 0;
                }
                
                // Update pipes
                if (this.frames % PIPE_SPAWN_RATE === 0) {
                    this.spawnPipe();
                }
                
                for (let i = this.pipes.length - 1; i >= 0; i--) {
                    const pipe = this.pipes[i];
                    pipe.x -= PIPE_SPEED;
                    
                    // Check collision
                    if (this.bird.x + this.bird.width > pipe.x && 
                        this.bird.x < pipe.x + pipe.width) {
                        if (this.bird.y < pipe.topHeight || 
                            this.bird.y + this.bird.height > pipe.bottomY) {
                            this.gameOver();
                            return;
                        }
                    }
                    
                    // Score point
                    if (!pipe.passed && pipe.x + pipe.width < this.bird.x) {
                        pipe.passed = true;
                        this.score++;
                        this.combo++;
                        document.getElementById('scoreDisplay').textContent = this.score;
                        this.createCoinParticles(pipe.x + pipe.width / 2, canvas.height / 2);
                        
                        // Show combo
                        if (this.combo >= 5) {
                            const comboDisplay = document.getElementById('comboDisplay');
                            comboDisplay.textContent = '🔥 x' + this.combo;
                            comboDisplay.classList.remove('show');
                            void comboDisplay.offsetWidth;
                            comboDisplay.classList.add('show');
                        }
                        
                        // Update medal
                        this.updateMedal();
                    }
                    
                    // Remove off-screen pipes
                    if (pipe.x + pipe.width < 0) {
                        this.pipes.splice(i, 1);
                    }
                }
                
                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.2;
                    p.life -= 0.02;
                    
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }
                
                // Update backgrounds
                this.bgOffset -= 0.5;
                this.groundOffset -= PIPE_SPEED;
                if (this.groundOffset <= -24) this.groundOffset = 0;
            },
            
            updateMedal() {
                const medal = document.getElementById('medal');
                if (this.score >= 50) {
                    medal.className = 'medal platinum';
                    medal.textContent = '💎';
                } else if (this.score >= 30) {
                    medal.className = 'medal gold';
                    medal.textContent = '🥇';
                } else if (this.score >= 15) {
                    medal.className = 'medal silver';
                    medal.textContent = '🥈';
                } else if (this.score >= 5) {
                    medal.className = 'medal bronze';
                    medal.textContent = '🥉';
                }
            },
            
            draw() {
                // Screen shake effect
                let shakeX = 0, shakeY = 0;
                if (this.shakeIntensity > 0) {
                    shakeX = (Math.random() - 0.5) * this.shakeIntensity;
                    shakeY = (Math.random() - 0.5) * this.shakeIntensity;
                    this.shakeIntensity *= 0.9;
                    if (this.shakeIntensity < 0.5) this.shakeIntensity = 0;
                }
                
                ctx.save();
                ctx.translate(shakeX, shakeY);
                
                // Clear canvas
                ctx.clearRect(-shakeX, -shakeY, canvas.width, canvas.height);
                
                // Draw space background
                this.drawSpace();
                
                // Draw green glowy aura barriers
                for (const pipe of this.pipes) {
                    // Strong glow effect for aura
                    ctx.shadowBlur = 40;
                    ctx.shadowColor = '#00E676';
                    
                    // Top aura bar - glowing green gradient
                    const topGradient = ctx.createLinearGradient(pipe.x - 20, 0, pipe.x + pipe.width + 20, 0);
                    topGradient.addColorStop(0, 'rgba(0, 230, 118, 0)');
                    topGradient.addColorStop(0.3, 'rgba(0, 230, 118, 0.4)');
                    topGradient.addColorStop(0.5, 'rgba(0, 230, 118, 0.8)');
                    topGradient.addColorStop(0.7, 'rgba(0, 230, 118, 0.4)');
                    topGradient.addColorStop(1, 'rgba(0, 230, 118, 0)');
                    ctx.fillStyle = topGradient;
                    ctx.fillRect(pipe.x - 30, 0, pipe.width + 60, pipe.topHeight);
                    
                    // Aura core - brighter center
                    ctx.shadowBlur = 20;
                    const coreGradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipe.width, 0);
                    coreGradient.addColorStop(0, 'rgba(0, 255, 150, 0.3)');
                    coreGradient.addColorStop(0.5, 'rgba(0, 255, 150, 0.9)');
                    coreGradient.addColorStop(1, 'rgba(0, 255, 150, 0.3)');
                    ctx.fillStyle = coreGradient;
                    ctx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
                    
                    // Bottom aura bar
                    ctx.shadowBlur = 40;
                    ctx.fillStyle = topGradient;
                    ctx.fillRect(pipe.x - 30, pipe.bottomY, pipe.width + 60, canvas.height - pipe.bottomY);
                    
                    // Bottom aura core
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = coreGradient;
                    ctx.fillRect(pipe.x, pipe.bottomY, pipe.width, canvas.height - pipe.bottomY);
                    
                    // Pulsing energy effect
                    const pulseIntensity = Math.sin(this.frames * 0.1) * 0.3 + 0.7;
                    ctx.fillStyle = `rgba(255, 255, 255, ${pulseIntensity * 0.5})`;
                    ctx.fillRect(pipe.x + 10, 0, 5, pipe.topHeight);
                    ctx.fillRect(pipe.x + 10, pipe.bottomY, 5, canvas.height - pipe.bottomY);
                    
                    ctx.shadowBlur = 0;
                }
                
                // Draw particles with glow
                for (const p of this.particles) {
                    ctx.globalAlpha = p.life;
                    if (p.glow) {
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = p.color;
                    }
                    if (p.isCoin) {
                        // Motion blur trail for coins
                        if (p.hasTrail) {
                            const trailGradient = ctx.createLinearGradient(p.x + p.size, p.y, p.x - p.size * 2, p.y);
                            trailGradient.addColorStop(0, 'rgba(255, 215, 0, 0.6)');
                            trailGradient.addColorStop(1, 'rgba(255, 215, 0, 0)');
                            ctx.fillStyle = trailGradient;
                            ctx.beginPath();
                            ctx.ellipse(p.x - p.size, p.y, p.size * 1.5, p.size * 0.6, 0, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        // Coin body with 3D gradient
                        const coinGradient = ctx.createRadialGradient(p.x - 2, p.y - 2, 1, p.x, p.y, p.size);
                        coinGradient.addColorStop(0, '#FFECB3');
                        coinGradient.addColorStop(0.4, '#FFD700');
                        coinGradient.addColorStop(1, '#FFA000');
                        ctx.fillStyle = coinGradient;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        // Coin border
                        ctx.strokeStyle = '#FF8F00';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        // Coin highlight
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                        ctx.beginPath();
                        ctx.arc(p.x - 3, p.y - 3, p.size * 0.3, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                }
                
                // Draw MoneyBot character using Gemini-generated sprite
                ctx.save();
                ctx.translate(this.bird.x + this.bird.width / 2, this.bird.y + this.bird.height / 2);
                ctx.rotate(this.bird.rotation * 0.3);
                
                if (this.playerImageLoaded && this.playerImage.width > 0) {
                    // Wider, less tall character
                    const imgWidth = 110;
                    const imgHeight = 85;
                    ctx.drawImage(this.playerImage, -imgWidth/2, -imgHeight/2, imgWidth, imgHeight);
                }
                
                ctx.restore();
                
                // End screen shake
                ctx.restore();
            },
            
            drawSpace() {
                const themes = {
                    deepSpace: () => {
                        // Pure black with white stars
                        ctx.fillStyle = '#000000';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        this.drawStars('#FFFFFF');
                        this.drawPlanets(['#FFD700', '#FF6B6B', '#4ECDC4']);
                    },
                    nebula: () => {
                        // Purple/pink nebula background
                        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                        gradient.addColorStop(0, '#0a001a');
                        gradient.addColorStop(0.5, '#1a0a2e');
                        gradient.addColorStop(1, '#2d1b4e');
                        ctx.fillStyle = gradient;
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        
                        // Nebula clouds
                        this.drawNebulaClouds();
                        this.drawStars('#FFE4E1');
                        this.drawPlanets(['#FF69B4', '#9370DB', '#00CED1']);
                    },
                    galaxy: () => {
                        // Blue spiral galaxy theme
                        const gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
                        gradient.addColorStop(0, '#0a1628');
                        gradient.addColorStop(0.5, '#1a3a5c');
                        gradient.addColorStop(1, '#000000');
                        ctx.fillStyle = gradient;
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        
                        this.drawGalaxySpiral();
                        this.drawStars('#E0F7FA');
                        this.drawPlanets(['#4169E1', '#00BFFF', '#87CEEB']);
                    },
                    sunset: () => {
                        // Orange/red sunset space
                        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                        gradient.addColorStop(0, '#2d1810');
                        gradient.addColorStop(0.5, '#4a2512');
                        gradient.addColorStop(1, '#1a0f0a');
                        ctx.fillStyle = gradient;
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        
                        this.drawStars('#FFD700');
                        this.drawPlanets(['#FF4500', '#FF6347', '#FFA500']);
                    },
                    matrix: () => {
                        // Green digital rain theme
                        ctx.fillStyle = '#000500';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        
                        this.drawMatrixRain();
                        this.drawStars('#00FF41');
                        this.drawPlanets(['#00FF00', '#32CD32', '#90EE90']);
                    }
                };
                
                // Use current theme or default to deepSpace
                const currentTheme = this.currentTheme || 'deepSpace';
                if (themes[currentTheme]) {
                    themes[currentTheme]();
                } else {
                    themes.deepSpace();
                }
            },
            
            drawNebulaClouds() {
                const nebulaOffset = (this.frames * 0.1) % canvas.width;
                const nebulas = [
                    { x: 200 - nebulaOffset, y: 200, color: 'rgba(138, 43, 226, 0.3)', size: 150 },
                    { x: 600 - nebulaOffset, y: 400, color: 'rgba(255, 20, 147, 0.2)', size: 200 },
                    { x: 1000 - nebulaOffset, y: 150, color: 'rgba(75, 0, 130, 0.25)', size: 180 },
                ];
                
                for (const nebula of nebulas) {
                    const gradient = ctx.createRadialGradient(nebula.x, nebula.y, 0, nebula.x, nebula.y, nebula.size);
                    gradient.addColorStop(0, nebula.color);
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(nebula.x, nebula.y, nebula.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            },
            
            drawGalaxySpiral() {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(this.frames * 0.002);
                
                // Draw spiral arms
                for (let arm = 0; arm < 3; arm++) {
                    ctx.rotate((Math.PI * 2) / 3);
                    ctx.strokeStyle = 'rgba(100, 149, 237, 0.3)';
                    ctx.lineWidth = 20;
                    ctx.beginPath();
                    for (let i = 0; i < 100; i++) {
                        const angle = i * 0.1;
                        const radius = i * 3;
                        const x = Math.cos(angle) * radius;
                        const y = Math.sin(angle) * radius;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                }
                ctx.restore();
            },
            
            drawMatrixRain() {
                if (!this.matrixDrops) {
                    this.matrixDrops = [];
                    for (let i = 0; i < 30; i++) {
                        this.matrixDrops.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            speed: 2 + Math.random() * 3,
                            length: 10 + Math.random() * 20
                        });
                    }
                }
                
                ctx.fillStyle = '#00FF41';
                ctx.font = '14px monospace';
                for (const drop of this.matrixDrops) {
                    const char = String.fromCharCode(0x30A0 + Math.random() * 96);
                    ctx.fillText(char, drop.x, drop.y);
                    drop.y += drop.speed;
                    if (drop.y > canvas.height) {
                        drop.y = -20;
                        drop.x = Math.random() * canvas.width;
                    }
                }
            },
            
            drawStars(color = '#FFFFFF') {
                // Twinkling stars
                const starOffset = (this.frames * 0.2) % canvas.width;
                
                // Static stars
                ctx.fillStyle = color;
                for (let i = 0; i < 100; i++) {
                    const x = (i * 137.5 + starOffset) % canvas.width;
                    const y = (i * 73.3) % canvas.height;
                    const size = (i % 3) + 1;
                    const twinkle = Math.sin(this.frames * 0.1 + i) * 0.5 + 0.5;
                    ctx.globalAlpha = 0.3 + twinkle * 0.7;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                
                // Shooting stars
                if (this.frames % 200 === 0) {
                    this.shootingStar = {
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height * 0.5,
                        vx: -5 - Math.random() * 5,
                        vy: 2 + Math.random() * 2,
                        life: 30
                    };
                }
                
                if (this.shootingStar && this.shootingStar.life > 0) {
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(this.shootingStar.x, this.shootingStar.y);
                    ctx.lineTo(this.shootingStar.x - this.shootingStar.vx * 5, this.shootingStar.y - this.shootingStar.vy * 5);
                    ctx.stroke();
                    
                    this.shootingStar.x += this.shootingStar.vx;
                    this.shootingStar.y += this.shootingStar.vy;
                    this.shootingStar.life--;
                }
            },
            
            drawNebula() {
                // Purple/pink nebula clouds
                const nebulaOffset = (this.frames * 0.1) % canvas.width;
                
                const nebulas = [
                    { x: 200 - nebulaOffset, y: 200, color: 'rgba(138, 43, 226, 0.3)', size: 150 },
                    { x: 600 - nebulaOffset, y: 400, color: 'rgba(255, 20, 147, 0.2)', size: 200 },
                    { x: 1000 - nebulaOffset, y: 150, color: 'rgba(75, 0, 130, 0.25)', size: 180 },
                    { x: canvas.width + 200 - nebulaOffset, y: 200, color: 'rgba(138, 43, 226, 0.3)', size: 150 },
                    { x: canvas.width + 600 - nebulaOffset, y: 400, color: 'rgba(255, 20, 147, 0.2)', size: 200 },
                ];
                
                for (const nebula of nebulas) {
                    const gradient = ctx.createRadialGradient(nebula.x, nebula.y, 0, nebula.x, nebula.y, nebula.size);
                    gradient.addColorStop(0, nebula.color);
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(nebula.x, nebula.y, nebula.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            },
            
            drawPlanets(colors = ['#FFD700', '#FF6B6B', '#4ECDC4']) {
                const planetOffset = (this.frames * 0.05) % canvas.width;
                
                // Planet 1 - Saturn-like with customizable color
                const saturnX = 150 - planetOffset;
                const saturnY = 120;
                const saturnGradient = ctx.createRadialGradient(saturnX - 20, saturnY - 20, 0, saturnX, saturnY, 40);
                saturnGradient.addColorStop(0, colors[0]);
                saturnGradient.addColorStop(0.5, colors[0]);
                saturnGradient.addColorStop(1, colors[0]);
                ctx.fillStyle = saturnGradient;
                ctx.beginPath();
                ctx.arc(saturnX, saturnY, 35, 0, Math.PI * 2);
                ctx.fill();
                
                // Rings
                ctx.strokeStyle = colors[0] + '99'; // Add transparency
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.ellipse(saturnX, saturnY, 60, 20, Math.PI / 6, 0, Math.PI * 2);
                ctx.stroke();
                
                // Planet 2
                const blueX = canvas.width - 100 - planetOffset;
                const blueY = canvas.height - 200;
                const blueGradient = ctx.createRadialGradient(blueX - 15, blueY - 15, 0, blueX, blueY, 30);
                blueGradient.addColorStop(0, colors[1]);
                blueGradient.addColorStop(0.5, colors[1]);
                blueGradient.addColorStop(1, colors[1]);
                ctx.fillStyle = blueGradient;
                ctx.beginPath();
                ctx.arc(blueX, blueY, 25, 0, Math.PI * 2);
                ctx.fill();
                
                // Wrap around planets
                if (saturnX < -100) {
                    const wrapX = saturnX + canvas.width + 200;
                    ctx.fillStyle = saturnGradient;
                    ctx.beginPath();
                    ctx.arc(wrapX, saturnY, 35, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = colors[0] + '99';
                    ctx.lineWidth = 8;
                    ctx.beginPath();
                    ctx.ellipse(wrapX, saturnY, 60, 20, Math.PI / 6, 0, Math.PI * 2);
                    ctx.stroke();
                }
            },
            
            gameOver() {
                this.state = 'gameover';
                this.shakeIntensity = 20; // Screen shake on death
                
                // Check for new unlocks based on this game's score
                const prevBest = this.bestScore;
                
                // Create explosion particles
                this.createParticles(this.bird.x, this.bird.y, 30, '#FF4444');
                this.createParticles(this.bird.x, this.bird.y, 20, '#FFD700');
                
                // Update best score
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    localStorage.setItem('flappybot_best', this.bestScore);
                }
                
                // Show game over screen
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('finalBest').textContent = this.bestScore;
                
                if (this.score >= this.bestScore && this.score > 0) {
                    document.getElementById('finalScore').classList.add('new-best');
                } else {
                    document.getElementById('finalScore').classList.remove('new-best');
                }
                
                document.getElementById('gameOverScreen').style.display = 'flex';
                document.getElementById('bestScore').textContent = this.bestScore;
                
                // Check for new unlocks
                this.updateUnlocks();
                
                // Show unlock notification if something new was unlocked
                if (this.bestScore > prevBest) {
                    this.checkNewUnlocks(prevBest, this.bestScore);
                }
            },
            
            checkNewUnlocks(oldScore, newScore) {
                const newThemes = [];
                const newBots = [];
                
                for (const [theme, required] of Object.entries(this.themeUnlocks)) {
                    if (oldScore < required && newScore >= required) {
                        newThemes.push(theme);
                    }
                }
                
                for (const [bot, required] of Object.entries(this.botUnlocks)) {
                    if (oldScore < required && newScore >= required) {
                        newBots.push(bot);
                    }
                }
                
                const newTrails = [];
                for (const [trail, required] of Object.entries(this.trailUnlocks)) {
                    if (oldScore < required && newScore >= required) {
                        newTrails.push(trail);
                    }
                }
                
                if (newThemes.length > 0 || newBots.length > 0 || newTrails.length > 0) {
                    let message = '🎉 NEW UNLOCKS! 🎉\n\n';
                    if (newThemes.length > 0) {
                        message += 'Themes: ' + newThemes.join(', ') + '\n';
                    }
                    if (newBots.length > 0) {
                        message += 'Bots: ' + newBots.join(', ') + '\n';
                    }
                    if (newTrails.length > 0) {
                        message += 'Trails: ' + newTrails.join(', ') + '\n';
                    }
                    setTimeout(() => alert(message), 500);
                }
            },
            
            restart() {
                document.getElementById('gameOverScreen').style.display = 'none';
                this.start();
            },
            
            share() {
                const text = `I scored ${this.score} in FlappyBot! Can you beat me? 🐦💰`;
                if (navigator.share) {
                    navigator.share({
                        title: 'FlappyBot',
                        text: text,
                        url: window.location.href
                    });
                } else {
                    navigator.clipboard.writeText(text + ' ' + window.location.href);
                    alert('Score copied to clipboard!');
                }
            },
            
            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        };
        
        // Initialize game
        game.init();
    </script>
</body>
