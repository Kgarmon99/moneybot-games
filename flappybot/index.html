<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>FlappyBot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
        
        body { font-family: 'Inter', sans-serif; background: #000; min-height: 100vh; overflow: hidden; }
        
        #gameCanvas { display: block; width: 100%; height: 100vh; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .score-display { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 100; }
        .score-number { font-size: 72px; font-weight: 900; color: #22C55E; text-shadow: 0 0 30px rgba(34, 197, 94, 0.8); line-height: 1; }
        .best-score { font-size: 14px; color: #22C55E; margin-top: 5px; opacity: 0.8; }
        
        .near-miss { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; font-weight: 900; color: #FFD700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.8); opacity: 0; pointer-events: none; z-index: 150; }
        .near-miss.show { animation: nearMissPop 0.8s ease-out forwards; }
        @keyframes nearMissPop { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(0.9); } }
        
        .challenge-banner { position: absolute; top: 110px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #FFD700, #FFA500); padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; color: #000; z-index: 100; }
        
        .start-screen, .game-over-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); pointer-events: auto; }
        .game-over-screen { display: none; }
        
        .logo { font-size: 42px; font-weight: 900; color: white; text-shadow: 3px 3px 0 #22C55E; margin-bottom: 10px; }
        .subtitle { font-size: 16px; color: rgba(255,255,255,0.8); margin-bottom: 30px; text-align: center; }
        
        .btn { background: linear-gradient(135deg, #22C55E, #16A34A); color: white; border: none; padding: 18px 45px; border-radius: 50px; font-size: 22px; font-weight: 800; cursor: pointer; box-shadow: 0 6px 25px rgba(34,197,94,0.4); transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        
        .stats-box { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 20px 35px; margin-bottom: 15px; text-align: center; }
        .stats-label { font-size: 12px; color: #888; text-transform: uppercase; }
        .stats-value { font-size: 42px; font-weight: 900; color: white; }
        .new-best { color: #FFD700; }
        
        .settings-btn { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid #22C55E; font-size: 20px; cursor: pointer; z-index: 9999; }
        
        .settings-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .settings-modal.show { display: flex; }
        .settings-content { background: linear-gradient(135deg, #1a1a2e, #2d2d44); border-radius: 20px; padding: 25px; width: 90%; max-width: 380px; border: 2px solid #22C55E; max-height: 80%; overflow-y: auto; }
        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .settings-title { font-size: 20px; font-weight: 800; color: white; }
        .close-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        
        .settings-tabs { display: flex; gap: 8px; margin-bottom: 15px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 10px; }
        .tab-btn { flex: 1; padding: 10px 5px; border: none; background: transparent; color: #888; font-size: 12px; font-weight: 600; cursor: pointer; border-radius: 8px; }
        .tab-btn.active { background: #22C55E; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .section-desc { font-size: 12px; color: #888; margin-bottom: 12px; text-align: center; }
        
        .grid-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .grid-btn { aspect-ratio: 1; border-radius: 12px; border: 2px solid transparent; background: rgba(255,255,255,0.05); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; position: relative; }
        .grid-btn.active { border-color: #22C55E; background: rgba(34, 197, 94, 0.15); }
        .grid-btn.locked { opacity: 0.4; cursor: not-allowed; }
        .grid-icon { font-size: 24px; margin-bottom: 4px; }
        .grid-name { font-size: 10px; font-weight: 600; color: white; }
        .grid-unlock { font-size: 9px; color: #22C55E; }
        .grid-btn.locked .grid-unlock { color: #666; }
        
        .current-selection { display: flex; gap: 20px; justify-content: center; margin: 20px 0; }
        .selection-item { display: flex; flex-direction: column; align-items: center; }
        .selection-icon { width: 50px; height: 50px; border-radius: 12px; background: rgba(255,255,255,0.1); border: 2px solid rgba(34, 197, 94, 0.5); display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; }
        .selection-icon img { width: 100%; height: 100%; object-fit: cover; }
        .selection-label { font-size: 10px; color: #888; text-align: center; margin-top: 6px; text-transform: uppercase; letter-spacing: 1px; }
        
        .preview-container { width: 120px; height: 120px; margin: 20px auto; border-radius: 50%; background: radial-gradient(circle, rgba(34,197,94,0.3) 0%, rgba(0,0,0,0) 70%); display: flex; align-items: center; justify-content: center; animation: float 3s ease-in-out infinite; }
        .preview-bot { width: 80px; height: 80px; object-fit: contain; filter: drop-shadow(0 0 20px rgba(34,197,94,0.5)); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .logo { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, #22C55E 0%, #FFD700 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-shadow: 0 0 30px rgba(34,197,94,0.3); margin-bottom: 10px; }
        .subtitle { font-size: 16px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer">
        <div class="score-display">
            <div class="score-number" id="scoreDisplay">0</div>
            <div class="best-score">Best: <span id="bestScore">0</span></div>
        </div>
        <div class="near-miss" id="nearMiss">CLOSE CALL! +5</div>
        <div class="challenge-banner" id="challengeBanner">🎯 Pass 10 pipes without flapping</div>
    </div>
    
    <button class="settings-btn" onclick="game.openSettings()">⚙️</button>
    
    <div class="settings-modal" id="settingsModal">
        <div class="settings-content">
            <div class="settings-header">
                <div class="settings-title">Customize</div>
                <button class="close-btn" onclick="game.closeSettings()">×</button>
            </div>
            <div class="settings-tabs">
                <button class="tab-btn active" onclick="game.switchTab('bots')" data-tab="bots">Bots</button>
                <button class="tab-btn" onclick="game.switchTab('themes')" data-tab="themes">Themes</button>
                <button class="tab-btn" onclick="game.switchTab('trails')" data-tab="trails">Trails</button>
            </div>
            <div class="tab-content active" id="tab-bots">
                <div class="section-desc">Choose your bot</div>
                <div class="grid-selector">
                    <button class="grid-btn active" onclick="game.setBot('classic')" data-bot="classic"><div class="grid-icon">🤖</div><div class="grid-name">Classic</div></button>
                    <button class="grid-btn locked" onclick="game.setBot('gold')" data-bot="gold"><div class="grid-icon">🥇</div><div class="grid-name">Gold</div><div class="grid-unlock">25</div></button>
                    <button class="grid-btn locked" onclick="game.setBot('neon')" data-bot="neon"><div class="grid-icon">🌈</div><div class="grid-name">Neon</div><div class="grid-unlock">50</div></button>
                    <button class="grid-btn locked" onclick="game.setBot('ninja')" data-bot="ninja"><div class="grid-icon">🥷</div><div class="grid-name">Ninja</div><div class="grid-unlock">75</div></button>
                    <button class="grid-btn locked" onclick="game.setBot('fire')" data-bot="fire"><div class="grid-icon">🔥</div><div class="grid-name">Fire</div><div class="grid-unlock">100</div></button>
                    <button class="grid-btn locked" onclick="game.setBot('pixel')" data-bot="pixel"><div class="grid-icon">👾</div><div class="grid-name">Pixel</div><div class="grid-unlock">150</div></button>
                    <button class="grid-btn locked" onclick="game.setBot('alien')" data-bot="alien"><div class="grid-icon">👽</div><div class="grid-name">Alien</div><div class="grid-unlock">200</div></button>
                    <button class="grid-btn locked" onclick="game.setBot('ice')" data-bot="ice"><div class="grid-icon">❄️</div><div class="grid-name">Ice</div><div class="grid-unlock">250</div></button>
                    <button class="grid-btn locked" onclick="game.setBot('inferno')" data-bot="inferno"><div class="grid-icon">🔥</div><div class="grid-name">Inferno</div><div class="grid-unlock">300</div></button>
                    <button class="grid-btn locked" onclick="game.setBot('galaxy')" data-bot="galaxy"><div class="grid-icon">🌌</div><div class="grid-name">Galaxy</div><div class="grid-unlock">350</div></button>
                    <button class="grid-btn locked" onclick="game.setBot('cyber')" data-bot="cyber"><div class="grid-icon">⚡</div><div class="grid-name">Cyber</div><div class="grid-unlock">400</div></button>
                    <button class="grid-btn locked" onclick="game.setBot('zombie')" data-bot="zombie"><div class="grid-icon">💀</div><div class="grid-name">Zombie</div><div class="grid-unlock">450</div></button>
                    <button class="grid-btn locked" onclick="game.setBot('flame')" data-bot="flame"><div class="grid-icon">🔥</div><div class="grid-name">Flame</div><div class="grid-unlock">500</div></button>
                </div>
            </div>
            <div class="tab-content" id="tab-themes">
                <div class="section-desc">Choose theme</div>
                <div class="grid-selector">
                    <button class="grid-btn active" onclick="game.setTheme('deepSpace')" data-theme="deepSpace"><div class="grid-icon">🌌</div><div class="grid-name">Deep Space</div></button>
                    <button class="grid-btn" onclick="game.setTheme('nebula')" data-theme="nebula"><div class="grid-icon">🌸</div><div class="grid-name">Nebula</div></button>
                    <button class="grid-btn" onclick="game.setTheme('galaxy')" data-theme="galaxy"><div class="grid-icon">🌀</div><div class="grid-name">Galaxy</div></button>
                    <button class="grid-btn" onclick="game.setTheme('matrix')" data-theme="matrix"><div class="grid-icon">💻</div><div class="grid-name">Matrix</div></button>
                    <button class="grid-btn locked" onclick="game.setTheme('sunset')" data-theme="sunset"><div class="grid-icon">🌅</div><div class="grid-name">Sunset</div><div class="grid-unlock">30</div></button>
                    <button class="grid-btn locked" onclick="game.setTheme('moneyverse')" data-theme="moneyverse"><div class="grid-icon">💚</div><div class="grid-name">MoneyVerse</div><div class="grid-unlock">60</div></button>
                    <button class="grid-btn locked" onclick="game.setTheme('aurora')" data-theme="aurora"><div class="grid-icon">🌟</div><div class="grid-name">Aurora</div><div class="grid-unlock">80</div></button>
                    <button class="grid-btn locked" onclick="game.setTheme('cyberpunk')" data-theme="cyberpunk"><div class="grid-icon">🌃</div><div class="grid-name">Cyberpunk</div><div class="grid-unlock">120</div></button>
                    <button class="grid-btn locked" onclick="game.setTheme('volcano')" data-theme="volcano"><div class="grid-icon">🌋</div><div class="grid-name">Volcano</div><div class="grid-unlock">200</div></button>
                </div>
            </div>
            
            <!-- Trails Tab -->
            <div class="tab-content" id="tab-trails">
                <div class="section-desc">Choose trail effect</div>
                <div class="grid-selector">
                    <button class="grid-btn" onclick="game.setTrail('none')" data-trail="none"><div class="grid-icon">❌</div><div class="grid-name">None</div></button>
                    <button class="grid-btn active" onclick="game.setTrail('cash')" data-trail="cash"><div class="grid-icon">💵</div><div class="grid-name">Cash</div></button>
                    <button class="grid-btn" onclick="game.setTrail('coins')" data-trail="coins"><div class="grid-icon">🪙</div><div class="grid-name">Coins</div></button>
                    <button class="grid-btn locked" onclick="game.setTrail('green')" data-trail="green"><div class="grid-icon">💚</div><div class="grid-name">Money</div><div class="grid-unlock">20</div></button>
                    <button class="grid-btn locked" onclick="game.setTrail('fire')" data-trail="fire"><div class="grid-icon">🔥</div><div class="grid-name">Fire</div><div class="grid-unlock">40</div></button>
                    <button class="grid-btn locked" onclick="game.setTrail('rainbow')" data-trail="rainbow"><div class="grid-icon">🌈</div><div class="grid-name">Rainbow</div><div class="grid-unlock">70</div></button>
                    <button class="grid-btn locked" onclick="game.setTrail('neon')" data-trail="neon"><div class="grid-icon">⚡</div><div class="grid-name">Neon</div><div class="grid-unlock">100</div></button>
                    <button class="grid-btn locked" onclick="game.setTrail('stars')" data-trail="stars"><div class="grid-icon">⭐</div><div class="grid-name">Stars</div><div class="grid-unlock">150</div></button>
                    <button class="grid-btn locked" onclick="game.setTrail('bubbles')" data-trail="bubbles"><div class="grid-icon">🫧</div><div class="grid-name">Bubbles</div><div class="grid-unlock">250</div></button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="start-screen" id="startScreen">
        <div class="logo">🤖 FLAPPYBOT</div>
        <div class="subtitle">Tap to fly. Avoid barriers.</div>
        <div class="preview-container" id="previewContainer">
            <img class="preview-bot" id="previewBot" src="assets/player-rembg.png" alt="Selected Bot">
        </div>
        <div class="current-selection">
            <div class="selection-item">
                <div class="selection-icon" id="currentBotIcon">🤖</div>
                <div class="selection-label">Bot</div>
            </div>
            <div class="selection-item">
                <div class="selection-icon" id="currentThemeIcon">🌌</div>
                <div class="selection-label">World</div>
            </div>
            <div class="selection-item">
                <div class="selection-icon" id="currentTrailIcon">💵</div>
                <div class="selection-label">Trail</div>
            </div>
        </div>
        <button class="btn" onclick="game.start()">PLAY</button>
    </div>
    
    <div class="game-over-screen" id="gameOverScreen">
        <div class="stats-box"><div class="stats-label">Score</div><div class="stats-value" id="finalScore">0</div></div>
        <div class="stats-box"><div class="stats-label">Best</div><div class="stats-value" id="finalBest">0</div></div>
        <button class="btn" onclick="game.restart()">PLAY AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GRAVITY = 0.4;
        const FLAP_STRENGTH = -7;
        const PIPE_SPEED = 3;
        const PIPE_GAP = 160;
        
        // Audio context for sounds
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        function playCoinSound(pitch = 1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.frequency.value = 800 * pitch;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }
        
        function playNearMissSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.frequency.value = 1200;
            osc.type = 'square';
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.15);
        }
        
        const game = {
            state: 'menu',
            score: 0,
            bestScore: parseInt(localStorage.getItem('flappybot_best')) || 0,
            currentTheme: localStorage.getItem('flappybot_theme') || 'deepSpace',
            currentBot: localStorage.getItem('flappybot_bot') || 'classic',
            unlockedThemes: JSON.parse(localStorage.getItem('flappybot_unlockedThemes')) || ['deepSpace', 'nebula', 'galaxy', 'matrix', 'sunset', 'moneyverse', 'aurora', 'cyberpunk', 'volcano'],
            unlockedBots: JSON.parse(localStorage.getItem('flappybot_unlockedBots')) || ['classic', 'gold', 'neon', 'ninja', 'fire', 'pixel', 'alien', 'ice', 'inferno', 'galaxy', 'cyber', 'zombie', 'flame'],
            frames: 0,
            pipes: [],
            particles: [],
            shakeIntensity: 0,
            nearMissCount: 0,
            flapsThisGame: 0,
            
            bird: { x: 100, y: 0, velocity: 0, width: 34, height: 24, rotation: 0 },
            
            currentTrail: localStorage.getItem('flappybot_trail') || 'cash',
            unlockedTrails: JSON.parse(localStorage.getItem('flappybot_unlockedTrails')) || ['none', 'cash', 'coins', 'green', 'fire', 'rainbow', 'neon', 'stars', 'bubbles'],
            trailParticles: [],
            
            themeUnlocks: { deepSpace: 0, nebula: 0, galaxy: 0, matrix: 0, sunset: 30, moneyverse: 60, aurora: 80, cyberpunk: 120, volcano: 200 },
            botUnlocks: { classic: 0, gold: 25, neon: 50, ninja: 75, fire: 100, pixel: 150, alien: 200, ice: 250, inferno: 300, galaxy: 350, cyber: 400, zombie: 450, flame: 500 },
            trailUnlocks: { none: 0, cash: 0, coins: 0, green: 20, fire: 40, rainbow: 70, neon: 100, stars: 150, bubbles: 250 },
            
            trailColors: {
                none: null,
                cash: '#85BB65',
                coins: '#FFD700',
                green: '#22C55E',
                fire: ['#FF4500', '#FF8C00', '#FFD700'],
                rainbow: ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#4B0082', '#9400D3'],
                neon: '#FF00FF',
                stars: '#FFFFFF',
                bubbles: ['#87CEEB', '#ADD8E6', '#B0E0E6']
            },
            
            themes: {
                deepSpace: { bg: '#000000', stars: true },
                nebula: { bg: 'linear-gradient(135deg, #1a0a2e, #4a1942)', stars: true },
                galaxy: { bg: 'linear-gradient(135deg, #0a0a2e, #1a3a5c)', stars: true },
                matrix: { bg: '#000', matrix: true },
                sunset: { bg: 'linear-gradient(180deg, #1a0a2e, #4a1942, #ff6b35)', stars: true },
                moneyverse: { bg: '#000', grid: true, glow: true },
                aurora: { bg: 'linear-gradient(135deg, #0a0a1a, #1a3a3a, #2d5a4a)', stars: true },
                cyberpunk: { bg: 'linear-gradient(180deg, #1a0a2e, #0a0a1a)', city: true },
                volcano: { bg: 'linear-gradient(180deg, #1a0a0a, #3a1a1a, #ff4500)', stars: true }
            },
            
            init() {
                // Load bot images
                this.botImages = {
                    classic: this.loadImage('assets/player-rembg.png'),
                    gold: this.loadImage('assets/player-rembg.png'),
                    neon: this.loadImage('assets/bot-rainbow-rembg.png'),
                    ninja: this.loadImage('assets/bot-dark-rembg.png'),
                    alien: this.loadImage('assets/player-rembg.png'),
                    fire: this.loadImage('assets/bot-fire2-rembg.png'),
                    pixel: this.loadImage('assets/bot-pixel-rembg.png'),
                    ice: this.loadImage('assets/bot-frost-rembg.png'),
                    inferno: this.loadImage('assets/bot-inferno-rembg.png'),
                    galaxy: this.loadImage('assets/bot-cosmic-rembg.png'),
                    cyber: this.loadImage('assets/bot-cyber-rembg.png'),
                    zombie: this.loadImage('assets/bot-zombie-rembg.png'),
                    flame: this.loadImage('assets/bot-flame-rembg.png')
                };
                
                this.resize();
                this.initEventListeners();
                
                document.getElementById('bestScore').textContent = this.bestScore;
                this.updateStartScreenIndicators();
                this.updateUnlocks();
                this.updateSettingsUI();
                this.loop();
                window.addEventListener('resize', () => this.resize());
            },
            
            loadImage(src) {
                const img = new Image();
                img.src = src;
                img.loaded = false;
                img.onload = () => { img.loaded = true; };
                return img;
            },
            
            getCurrentBotImage() {
                // Each bot has its own unique image
                return this.botImages[this.currentBot] || this.botImages.classic;
            },
            
            initEventListeners() {
                canvas.addEventListener('click', () => this.flap());
                canvas.addEventListener('touchstart', (e) => { e.preventDefault(); this.flap(); });
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') { e.preventDefault(); this.flap(); }
                });
            },
            
            resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                this.bird.y = canvas.height / 2;
            },
            
            start() {
                this.state = 'playing';
                this.score = 0;
                this.frames = 0;
                this.pipes = [];
                this.particles = [];
                this.trailParticles = [];
                this.shakeIntensity = 0;
                this.nearMissCount = 0;
                this.flapsThisGame = 0;
                this.bird.y = canvas.height / 2;
                this.bird.velocity = 0;
                this.bird.rotation = 0;
                
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('gameOverScreen').style.display = 'none';
                document.getElementById('scoreDisplay').textContent = '0';
                document.getElementById('nearMiss').classList.remove('show');
                
                // Resume audio context
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                this.spawnPipe();
            },
            
            restart() {
                document.getElementById('gameOverScreen').style.display = 'none';
                this.start();
            },
            
            flap() {
                if (this.state === 'playing') {
                    this.bird.velocity = FLAP_STRENGTH;
                    this.flapsThisGame++;
                    this.createParticles(this.bird.x - 10, this.bird.y + 12, 3, '#22C55E');
                }
            },
            
            spawnPipe() {
                const minHeight = 80;
                const maxHeight = canvas.height - PIPE_GAP - minHeight;
                const topHeight = Math.floor(Math.random() * (maxHeight - minHeight) + minHeight);
                
                this.pipes.push({
                    x: canvas.width,
                    topHeight: topHeight,
                    bottomY: topHeight + PIPE_GAP,
                    width: 60,
                    passed: false,
                    nearMissTriggered: false
                });
            },
            
            update() {
                if (this.state !== 'playing') {
                    if (this.shakeIntensity > 0) this.shakeIntensity *= 0.9;
                    return;
                }
                
                this.frames++;
                
                // Bird physics
                this.bird.velocity += GRAVITY;
                this.bird.y += this.bird.velocity;
                this.bird.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.bird.velocity * 0.1)));
                
                // Ceiling collision
                if (this.bird.y < 0) {
                    this.bird.y = 0;
                    this.bird.velocity = 0;
                }
                
                // Floor collision
                if (this.bird.y + this.bird.height > canvas.height) {
                    this.gameOver();
                    return;
                }
                
                // Spawn pipes
                if (this.frames % 100 === 0) this.spawnPipe();
                
                // Update pipes
                for (let i = this.pipes.length - 1; i >= 0; i--) {
                    const pipe = this.pipes[i];
                    pipe.x -= PIPE_SPEED;
                    
                    // Collision
                    if (this.bird.x + this.bird.width > pipe.x && this.bird.x < pipe.x + pipe.width) {
                        if (this.bird.y < pipe.topHeight || this.bird.y + this.bird.height > pipe.bottomY) {
                            this.gameOver();
                            return;
                        }
                        // Near miss check
                        this.checkNearMiss(pipe);
                    }
                    
                    // Score
                    if (!pipe.passed && pipe.x + pipe.width < this.bird.x) {
                        pipe.passed = true;
                        this.score++;
                        document.getElementById('scoreDisplay').textContent = this.score;
                        playCoinSound(1 + (this.score % 10) * 0.1); // Escalating pitch
                        this.createCoinParticles();
                    }
                    
                    if (pipe.x + pipe.width < 0) this.pipes.splice(i, 1);
                }
                
                // Create trail particles
                if (this.currentTrail !== 'none' && this.frames % 3 === 0) {
                    this.createTrailParticle();
                }
                
                // Update trail particles
                for (let i = this.trailParticles.length - 1; i >= 0; i--) {
                    const p = this.trailParticles[i];
                    p.x -= PIPE_SPEED * 0.5;
                    p.y += p.vy;
                    p.life -= 0.02;
                    if (p.life <= 0) this.trailParticles.splice(i, 1);
                }
                
                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.03;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
                
                // Screen shake decay
                if (this.shakeIntensity > 0) this.shakeIntensity *= 0.9;
            },
            
            checkNearMiss(pipe) {
                const margin = 12;
                const nearTop = this.bird.y < pipe.topHeight + margin && this.bird.y > pipe.topHeight - margin;
                const nearBottom = this.bird.y + this.bird.height > pipe.bottomY - margin && this.bird.y + this.bird.height < pipe.bottomY + margin;
                
                if ((nearTop || nearBottom) && !pipe.nearMissTriggered) {
                    pipe.nearMissTriggered = true;
                    this.triggerNearMiss();
                }
            },
            
            triggerNearMiss() {
                this.nearMissCount++;
                this.score += 5;
                document.getElementById('scoreDisplay').textContent = this.score;
                
                const el = document.getElementById('nearMiss');
                el.classList.remove('show');
                void el.offsetWidth;
                el.classList.add('show');
                
                this.shakeIntensity = 4;
                playNearMissSound();
            },
            
            createTrailParticle() {
                const colors = this.trailColors[this.currentTrail];
                if (!colors) return;
                
                const color = Array.isArray(colors) ? colors[Math.floor(Math.random() * colors.length)] : colors;
                
                this.trailParticles.push({
                    x: this.bird.x,
                    y: this.bird.y + this.bird.height / 2 + (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 0.5,
                    life: 1,
                    color: color,
                    size: Math.random() * 6 + 3
                });
            },
            
            createParticles(x, y, count, color) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: x, y: y,
                        vx: (Math.random() - 0.5) * 4,
                        vy: (Math.random() - 0.5) * 4,
                        life: 1, color: color
                    });
                }
            },
            
            createCoinParticles() {
                for (let i = 0; i < 5; i++) {
                    this.particles.push({
                        x: this.bird.x + 20,
                        y: this.bird.y + 10,
                        vx: (Math.random() - 0.3) * 3,
                        vy: (Math.random() - 0.5) * 3,
                        life: 1, color: '#FFD700'
                    });
                }
            },
            
            draw() {
                // Draw themed background
                this.drawBackground();
                
                // Apply screen shake
                ctx.save();
                if (this.shakeIntensity > 0.5) {
                    const dx = (Math.random() - 0.5) * this.shakeIntensity;
                    const dy = (Math.random() - 0.5) * this.shakeIntensity;
                    ctx.translate(dx, dy);
                }
                
                // Draw trail particles
                if (this.currentTrail !== 'none') {
                    for (const p of this.trailParticles) {
                        ctx.globalAlpha = p.life * 0.7;
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                }
                
                // Draw pipes
                ctx.fillStyle = '#22C55E';
                ctx.shadowColor = '#22C55E';
                ctx.shadowBlur = 20;
                for (const pipe of this.pipes) {
                    ctx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
                    ctx.fillRect(pipe.x, pipe.bottomY, pipe.width, canvas.height - pipe.bottomY);
                }
                ctx.shadowBlur = 0;
                
                // Draw MoneyBot character
                ctx.save();
                ctx.translate(this.bird.x + this.bird.width/2, this.bird.y + this.bird.height/2);
                ctx.rotate(this.bird.rotation);
                
                const botImg = this.getCurrentBotImage();
                if (botImg && botImg.loaded) {
                    // Draw bot image with transparency
                    const size = 50;
                    ctx.drawImage(botImg, -size/2, -size/2, size, size);
                } else {
                    // Fallback rectangle
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(-this.bird.width/2, -this.bird.height/2, this.bird.width, this.bird.height);
                    ctx.fillStyle = '#22C55E';
                    ctx.fillRect(-5, -8, 8, 8);
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(5, 2, 10, 6);
                }
                
                ctx.restore();
                
                // Draw particles
                for (const p of this.particles) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 4, 4);
                }
                ctx.globalAlpha = 1;
                
                ctx.restore();
            },
            
            drawBackground() {
                const theme = this.themes[this.currentTheme] || this.themes.deepSpace;
                
                // Draw base background with gradient support
                if (theme.bg.startsWith('linear')) {
                    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    // Parse gradient colors from CSS
                    const colors = theme.bg.match(/#[a-fA-F0-9]{6}/g) || ['#000000', '#1a0a2e'];
                    colors.forEach((color, i) => {
                        gradient.addColorStop(i / (colors.length - 1), color);
                    });
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                } else {
                    ctx.fillStyle = theme.bg;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                
                // Draw stars if theme has them
                if (theme.stars) {
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    for (let i = 0; i < 30; i++) {
                        const x = (i * 137 + this.frames * 0.2) % canvas.width;
                        const y = (i * 73) % canvas.height;
                        ctx.fillRect(x, y, 1.5, 1.5);
                    }
                }
                
                // Matrix effect
                if (theme.matrix) {
                    ctx.fillStyle = 'rgba(0, 255, 0, 0.1)';
                    for (let i = 0; i < 20; i++) {
                        const x = (i * 50 + this.frames) % canvas.width;
                        ctx.fillRect(x, 0, 2, canvas.height);
                    }
                }
                
                // Grid effect (MoneyVerse)
                if (theme.grid) {
                    ctx.strokeStyle = 'rgba(34, 197, 94, 0.3)';
                    ctx.lineWidth = 1;
                    const gridSize = 50;
                    const offset = (this.frames * 2) % gridSize;
                    for (let x = 0; x < canvas.width; x += gridSize) {
                        ctx.beginPath();
                        ctx.moveTo(x, 0);
                        ctx.lineTo(x, canvas.height);
                        ctx.stroke();
                    }
                    for (let y = offset; y < canvas.height; y += gridSize) {
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        ctx.lineTo(canvas.width, y);
                        ctx.stroke();
                    }
                }
                
                // Orange glow at bottom (MoneyVerse)
                if (theme.glow) {
                    const glow = ctx.createLinearGradient(0, canvas.height - 200, 0, canvas.height);
                    glow.addColorStop(0, 'rgba(249, 115, 22, 0)');
                    glow.addColorStop(1, 'rgba(249, 115, 22, 0.3)');
                    ctx.fillStyle = glow;
                    ctx.fillRect(0, canvas.height - 200, canvas.width, 200);
                }
                
                // City lights (Cyberpunk)
                if (theme.city) {
                    ctx.fillStyle = 'rgba(255, 0, 255, 0.1)';
                    for (let i = 0; i < 10; i++) {
                        const h = 50 + (i % 3) * 30;
                        ctx.fillRect(i * (canvas.width / 10), canvas.height - h, 30, h);
                    }
                }
            },
            
            gameOver() {
                if (this.state === 'gameover') return; // Prevent multiple calls
                
                this.state = 'gameover';
                this.shakeIntensity = 15;
                
                try {
                    if (this.score > this.bestScore) {
                        this.bestScore = this.score;
                        localStorage.setItem('flappybot_best', this.bestScore);
                    }
                    
                    const finalScoreEl = document.getElementById('finalScore');
                    const finalBestEl = document.getElementById('finalBest');
                    const gameOverScreen = document.getElementById('gameOverScreen');
                    const bestScoreEl = document.getElementById('bestScore');
                    
                    if (finalScoreEl) finalScoreEl.textContent = this.score;
                    if (finalBestEl) finalBestEl.textContent = this.bestScore;
                    if (finalScoreEl) finalScoreEl.className = 'stats-value' + (this.score >= this.bestScore && this.score > 0 ? ' new-best' : '');
                    if (gameOverScreen) gameOverScreen.style.display = 'flex';
                    if (bestScoreEl) bestScoreEl.textContent = this.bestScore;
                    
                    this.updateUnlocks();
                } catch (e) {
                    console.error('Game over error:', e);
                }
            },
            
            updateUnlocks() {
                try {
                    let newUnlocks = false;
                    
                    for (const [theme, required] of Object.entries(this.themeUnlocks)) {
                        if (this.bestScore >= required && !this.unlockedThemes.includes(theme)) {
                            this.unlockedThemes.push(theme);
                            newUnlocks = true;
                        }
                    }
                    
                    for (const [bot, required] of Object.entries(this.botUnlocks)) {
                        if (this.bestScore >= required && !this.unlockedBots.includes(bot)) {
                            this.unlockedBots.push(bot);
                            newUnlocks = true;
                        }
                    }
                    
                    for (const [trail, required] of Object.entries(this.trailUnlocks)) {
                        if (this.bestScore >= required && !this.unlockedTrails.includes(trail)) {
                            this.unlockedTrails.push(trail);
                            newUnlocks = true;
                        }
                    }
                    
                    if (newUnlocks) {
                        localStorage.setItem('flappybot_unlockedThemes', JSON.stringify(this.unlockedThemes));
                        localStorage.setItem('flappybot_unlockedBots', JSON.stringify(this.unlockedBots));
                        localStorage.setItem('flappybot_unlockedTrails', JSON.stringify(this.unlockedTrails));
                    }
                    
                    this.updateSettingsUI();
                } catch (e) {
                    console.error('Update unlocks error:', e);
                }
            },
            
            setTheme(theme) {
                if (!this.unlockedThemes.includes(theme)) return;
                this.currentTheme = theme;
                localStorage.setItem('flappybot_theme', theme);
                document.querySelectorAll('[data-theme]').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });
                this.updateStartScreenIndicators();
            },
            
            setBot(bot) {
                if (!this.unlockedBots.includes(bot)) return;
                this.currentBot = bot;
                localStorage.setItem('flappybot_bot', bot);
                document.querySelectorAll('[data-bot]').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.bot === bot);
                });
                this.updateStartScreenIndicators();
            },
            
            setTrail(trail) {
                if (!this.unlockedTrails.includes(trail)) return;
                this.currentTrail = trail;
                localStorage.setItem('flappybot_trail', trail);
                document.querySelectorAll('[data-trail]').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.trail === trail);
                });
                this.updateStartScreenIndicators();
            },
            
            updateStartScreenIndicators() {
                const botIcons = { classic: '🤖', gold: '🥇', neon: '🌈', ninja: '🥷', fire: '🔥', pixel: '👾', alien: '👽', ice: '❄️', inferno: '🔥', galaxy: '🌌', cyber: '⚡', zombie: '💀', flame: '🔥' };
                const themeIcons = { deepSpace: '🌌', nebula: '🌸', galaxy: '🌀', matrix: '💻', sunset: '🌅', moneyverse: '💚', aurora: '🌟', cyberpunk: '🌃', volcano: '🌋' };
                const trailIcons = { none: '❌', cash: '💵', coins: '🪙', green: '💚', fire: '🔥', rainbow: '🌈', neon: '⚡', stars: '⭐', bubbles: '🫧' };
                document.getElementById('currentBotIcon').textContent = botIcons[this.currentBot] || '🤖';
                document.getElementById('currentThemeIcon').textContent = themeIcons[this.currentTheme] || '🌌';
                document.getElementById('currentTrailIcon').textContent = trailIcons[this.currentTrail] || '💵';
                
                // Update preview image
                const botImg = this.getCurrentBotImage();
                const previewImg = document.getElementById('previewBot');
                if (previewImg && botImg && botImg.src) {
                    previewImg.src = botImg.src;
                }
            },
            
            updateSettingsUI() {
                document.querySelectorAll('[data-bot]').forEach(btn => {
                    const bot = btn.dataset.bot;
                    btn.classList.toggle('locked', !this.unlockedBots.includes(bot));
                    btn.classList.toggle('active', this.currentBot === bot);
                });
                document.querySelectorAll('[data-theme]').forEach(btn => {
                    const theme = btn.dataset.theme;
                    btn.classList.toggle('locked', !this.unlockedThemes.includes(theme));
                    btn.classList.toggle('active', this.currentTheme === theme);
                });
                document.querySelectorAll('[data-trail]').forEach(btn => {
                    const trail = btn.dataset.trail;
                    btn.classList.toggle('locked', !this.unlockedTrails.includes(trail));
                    btn.classList.toggle('active', this.currentTrail === trail);
                });
            },
            
            openSettings() {
                document.getElementById('settingsModal').classList.add('show');
                this.switchTab('bots');
            },
            
            closeSettings() {
                document.getElementById('settingsModal').classList.remove('show');
            },
            
            switchTab(tab) {
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
            },
            
            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        };
        
        game.init();
    </script>
</body>
</html>
