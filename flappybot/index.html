<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🤖 FlappyBot by MoneyBot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
        
        :root {
            --mb-green: #22C55E;
            --mb-green-glow: rgba(34, 197, 94, 0.6);
            --mb-orange: #F97316;
            --mb-gold: #FFD700;
            --mb-dark: #0a0a0a;
        }
        
        body { font-family: 'Inter', sans-serif; background: #000; min-height: 100vh; overflow: hidden; }
        
        #gameCanvas { display: block; width: 100%; height: 100vh; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* MoneyBot branded score */
        .score-display { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 100; }
        .score-number { 
            font-size: 64px; 
            font-weight: 900; 
            color: var(--mb-green); 
            text-shadow: 0 0 10px var(--mb-green-glow), 0 0 40px var(--mb-green-glow);
            line-height: 1;
            font-family: 'Inter', sans-serif;
            letter-spacing: -2px;
        }
        .score-number::before { content: '$'; font-size: 40px; vertical-align: super; margin-right: 4px; }
        .best-score { 
            font-size: 13px; 
            color: var(--mb-orange); 
            margin-top: 5px; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .best-score::before { content: '💰 Best: $'; }
        
        /* Enhanced notification system */
        .notification {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            pointer-events: none;
            z-index: 200;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        .notification.near-miss { 
            top: 30%; 
            background: linear-gradient(135deg, var(--mb-gold), #FFA500);
            color: #000;
            text-shadow: none;
        }
        .notification.near-miss::before { content: '⚡ '; }
        
        .notification.milestone {
            top: 22%;
            background: linear-gradient(135deg, var(--mb-green), #16A34A);
            color: white;
            font-size: 20px;
        }
        
        .notification.unlock {
            top: 40%;
            background: linear-gradient(135deg, #8B5CF6, #6366F1);
            color: white;
            border: 2px solid var(--mb-gold);
        }
        .notification.unlock::before { content: '🎉 '; }
        
        .notification.show { 
            animation: notifyPop 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }
        
        @keyframes notifyPop { 
            0% { opacity: 0; transform: translateX(-50%) scale(0.3) translateY(20px); } 
            15% { opacity: 1; transform: translateX(-50%) scale(1.1) translateY(0); } 
            85% { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); } 
            100% { opacity: 0; transform: translateX(-50%) scale(0.9) translateY(-30px); } 
        }
        
        /* Floating +$ indicators */
        .float-text {
            position: absolute;
            font-size: 24px;
            font-weight: 900;
            color: var(--mb-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            z-index: 150;
            opacity: 0;
        }
        .float-text.show {
            animation: floatUp 1s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.2); }
        }
        
        /* MoneyBot branded screens */
        .start-screen, .game-over-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.85); pointer-events: auto;
            backdrop-filter: blur(10px);
        }
        .game-over-screen { display: none; }
        
        .brand-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .brand-logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--mb-green), #16A34A);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 0 20px var(--mb-green-glow);
        }
        .brand-text {
            font-size: 14px;
            color: var(--mb-green);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .logo { 
            font-size: 52px; 
            font-weight: 900; 
            color: white; 
            text-shadow: 
                0 0 20px var(--mb-green-glow),
                4px 4px 0 var(--mb-green);
            margin-bottom: 8px;
            letter-spacing: -2px;
        }
        .logo span { color: var(--mb-green); }
        
        .tagline { 
            font-size: 14px; 
            color: var(--mb-orange); 
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .btn { 
            background: linear-gradient(135deg, var(--mb-green), #16A34A); 
            color: white; border: none; 
            padding: 20px 50px; border-radius: 50px; 
            font-size: 20px; font-weight: 900; 
            cursor: pointer; 
            box-shadow: 0 0 30px var(--mb-green-glow), 0 6px 0 #15803d; 
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn:active { 
            transform: translateY(4px); 
            box-shadow: 0 0 20px var(--mb-green-glow), 0 0 0 #15803d; 
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, var(--mb-orange), #EA580C);
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.4), 0 6px 0 #C2410C;
            margin-top: 12px;
        }
        .btn-secondary:active {
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.4), 0 0 0 #C2410C;
        }
        
        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stats-box { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 16px; 
            padding: 18px 30px; 
            text-align: center;
            min-width: 100px;
        }
        .stats-label { 
            font-size: 11px; 
            color: #666; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .stats-value { 
            font-size: 36px; 
            font-weight: 900; 
            color: white; 
        }
        .stats-value.green { color: var(--mb-green); text-shadow: 0 0 10px var(--mb-green-glow); }
        .stats-value.gold { color: var(--mb-gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        
        /* Settings */
        .settings-btn { 
            position: fixed; top: 20px; right: 20px; 
            width: 48px; height: 48px; 
            border-radius: 50%; 
            background: rgba(34, 197, 94, 0.1); 
            border: 2px solid var(--mb-green); 
            font-size: 22px; 
            cursor: pointer; 
            z-index: 9999;
            transition: all 0.2s;
        }
        .settings-btn:hover {
            background: rgba(34, 197, 94, 0.2);
            box-shadow: 0 0 15px var(--mb-green-glow);
        }
        
        .settings-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            display: none; align-items: center; justify-content: center; 
            z-index: 2000; 
        }
        .settings-modal.show { display: flex; }
        .settings-content { 
            background: linear-gradient(180deg, #111, #0a0a0a); 
            border-radius: 24px; 
            padding: 30px; 
            width: 92%; 
            max-width: 400px; 
            border: 1px solid rgba(34, 197, 94, 0.3);
            max-height: 85%; 
            overflow-y: auto;
        }
        .settings-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(34, 197, 94, 0.2);
        }
        .settings-title { 
            font-size: 22px; 
            font-weight: 900; 
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .settings-title::before {
            content: '🤖';
            font-size: 24px;
        }
        .close-btn { 
            background: rgba(255,255,255,0.1); 
            border: none; 
            color: white; 
            font-size: 24px; 
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .settings-tabs { 
            display: flex; gap: 8px; 
            margin-bottom: 20px; 
            background: rgba(255,255,255,0.05); 
            padding: 6px; 
            border-radius: 12px; 
        }
        .tab-btn { 
            flex: 1; 
            padding: 12px 5px; 
            border: none; 
            background: transparent; 
            color: #666; 
            font-size: 13px; 
            font-weight: 700; 
            cursor: pointer; 
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .tab-btn.active { 
            background: var(--mb-green); 
            color: white;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .section-title {
            font-size: 13px;
            color: var(--mb-green);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .grid-selector { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            margin-bottom: 20px;
        }
        .grid-btn { 
            aspect-ratio: 1; 
            border-radius: 16px; 
            border: 2px solid transparent; 
            background: rgba(255,255,255,0.03); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; 
            position: relative;
            transition: all 0.2s;
        }
        .grid-btn:hover:not(.locked) {
            background: rgba(255,255,255,0.08);
            transform: translateY(-2px);
        }
        .grid-btn.active { 
            border-color: var(--mb-green); 
            background: rgba(34, 197, 94, 0.15);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }
        .grid-btn.locked { 
            opacity: 0.35; 
            cursor: not-allowed;
        }
        .grid-btn.locked::after {
            content: '🔒';
            position: absolute;
            font-size: 18px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .grid-icon { 
            font-size: 28px; 
            margin-bottom: 6px; 
        }
        .grid-name { 
            font-size: 11px; 
            font-weight: 700; 
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .grid-unlock { 
            font-size: 10px; 
            color: var(--mb-orange); 
            font-weight: 600;
            margin-top: 2px;
        }
        
        .current-selection { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            margin: 20px 0; 
        }
        .selection-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 50px;
        }
        .selection-pill .icon {
            font-size: 20px;
        }
        .selection-pill .label {
            font-size: 11px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .mb-footer {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #444;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 100;
        }
        .mb-footer span { color: var(--mb-green); }
    </style>
</head>
<body>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GRAVITY = 0.4;
        const FLAP_STRENGTH = -7;
        const PIPE_SPEED = 3;
        const PIPE_GAP = 160;
        
        // Audio
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        function playTone(freq, type = 'sine', duration = 0.1, vol = 0.3) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }
        
        function playScoreSound(multiplier = 1) {
            playTone(600 * multiplier, 'sine', 0.08, 0.25);
            setTimeout(() => playTone(800 * multiplier, 'sine', 0.08, 0.2), 50);
        }
        
        function playNearMissSound() {
            playTone(1200, 'square', 0.15, 0.2);
            setTimeout(() => playTone(1500, 'square', 0.1, 0.15), 80);
        }
        
        function playUnlockSound() {
            [400, 600, 800, 1000, 1200].forEach((f, i) => {
                setTimeout(() => playTone(f, 'sine', 0.1, 0.3), i * 80);
            });
        }
        
        const game = {
            state: 'menu',
            score: 0,
            bestScore: parseInt(localStorage.getItem('flappybot_best')) || 0,
            
            currentTheme: localStorage.getItem('flappybot_theme') || 'void',
            currentBot: localStorage.getItem('flappybot_bot') || 'classic',
            currentTrail: localStorage.getItem('flappybot_trail') || 'cash',
            
            unlockedThemes: JSON.parse(localStorage.getItem('flappybot_unlockedThemes')) || ['void', 'nebula', 'galaxy', 'matrix'],
            unlockedBots: JSON.parse(localStorage.getItem('flappybot_unlockedBots')) || ['classic'],
            unlockedTrails: JSON.parse(localStorage.getItem('flappybot_unlockedTrails')) || ['none', 'cash', 'coins'],
            
            frames: 0,
            pipes: [],
            particles: [],
            trailParticles: [],
            shakeIntensity: 0,
            nearMissCount: 0,
            
            bird: { x: 100, y: 0, velocity: 0, width: 34, height: 24, rotation: 0 },
            
            // Unlock thresholds
            themeUnlocks: { void: 0, nebula: 0, galaxy: 0, matrix: 0, sunset: 30, moneyverse: 60, aurora: 80, cyberpunk: 120, volcano: 200 },
            botUnlocks: { classic: 0, gold: 25, neon: 50, ninja: 75, cyber: 100, alien: 150 },
            trailUnlocks: { none: 0, cash: 0, coins: 0, green: 20, fire: 40, rainbow: 70, neon: 100, stars: 150, bubbles: 250 },
            
            // Visual configs
            botColors: {
                classic: '#FFFFFF',
                gold: '#FFD700',
                neon: '#FF00FF',
                ninja: '#333333',
                cyber: '#00FFFF',
                alien: '#00FF00'
            },
            
            trailColors: {
                none: null,
                cash: '#85BB65',
                coins: '#FFD700',
                green: '#22C55E',
                fire: ['#FF4500', '#FF8C00', '#FFD700'],
                rainbow: ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#4B0082', '#9400D3'],
                neon: '#FF00FF',
                stars: '#FFFFFF',
                bubbles: ['#87CEEB', '#ADD8E6', '#B0E0E6']
            },
            
            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                canvas.addEventListener('click', () => this.flap());
                canvas.addEventListener('touchstart', (e) => { e.preventDefault(); this.flap(); });
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') { e.preventDefault(); this.flap(); }
                });
                
                document.getElementById('bestScoreDisplay').textContent = this.bestScore;
                this.updateStartScreenIndicators();
                this.updateUnlocks();
                this.loop();
            },
            
            resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                this.bird.y = canvas.height / 2;
            },
            
            start() {
                this.state = 'playing';
                this.score = 0;
                this.frames = 0;
                this.pipes = [];
                this.particles = [];
                this.trailParticles = [];
                this.shakeIntensity = 0;
                this.nearMissCount = 0;
                this.bird.y = canvas.height / 2;
                this.bird.velocity = 0;
                this.bird.rotation = 0;
                
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('gameOverScreen').style.display = 'none';
                document.getElementById('scoreDisplay').textContent = '0';
                
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                this.spawnPipe();
            },
            
            restart() {
                document.getElementById('gameOverScreen').style.display = 'none';
                this.start();
            },
            
            flap() {
                if (this.state === 'playing') {
                    this.bird.velocity = FLAP_STRENGTH;
                    this.createFlapParticles();
                }
            },
            
            spawnPipe() {
                const minHeight = 80;
                const maxHeight = canvas.height - PIPE_GAP - minHeight;
                const topHeight = Math.floor(Math.random() * (maxHeight - minHeight) + minHeight);
                
                this.pipes.push({
                    x: canvas.width,
                    topHeight: topHeight,
                    bottomY: topHeight + PIPE_GAP,
                    width: 60,
                    passed: false,
                    nearMissTriggered: false
                });
            },
            
            update() {
                if (this.state !== 'playing') {
                    if (this.shakeIntensity > 0) this.shakeIntensity *= 0.9;
                    return;
                }
                
                this.frames++;
                
                // Bird physics
                this.bird.velocity += GRAVITY;
                this.bird.y += this.bird.velocity;
                this.bird.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, this.bird.velocity * 0.1));
                
                // Ceiling/floor
                if (this.bird.y < 0) { this.bird.y = 0; this.bird.velocity = 0; }
                if (this.bird.y + this.bird.height > canvas.height) { this.gameOver(); return; }
                
                // Spawn pipes
                if (this.frames % 100 === 0) this.spawnPipe();
                
                // Update pipes
                for (let i = this.pipes.length - 1; i >= 0; i--) {
                    const pipe = this.pipes[i];
                    pipe.x -= PIPE_SPEED;
                    
                    // Collision
                    if (this.bird.x + this.bird.width > pipe.x && this.bird.x < pipe.x + pipe.width) {
                        if (this.bird.y < pipe.topHeight || this.bird.y + this.bird.height > pipe.bottomY) {
                            this.gameOver();
                            return;
                        }
                        this.checkNearMiss(pipe);
                    }
                    
                    // Score
                    if (!pipe.passed && pipe.x + pipe.width < this.bird.x) {
                        pipe.passed = true;
                        this.score++;
                        document.getElementById('scoreDisplay').textContent = this.score;
                        playScoreSound(1 + (this.score % 10) * 0.05);
                        this.createScoreParticles();
                        this.showFloatText('+ $1', this.bird.x, this.bird.y);
                        
                        // Milestones
                        if (this.score === 10 || this.score === 25 || this.score === 50 || this.score === 100) {
                            this.showNotification('milestone', `$${this.score} EARNED! 🎉`);
                        }
                    }
                    
                    if (pipe.x + pipe.width < 0) this.pipes.splice(i, 1);
                }
                
                // Update trail particles
                if (this.currentTrail !== 'none' && this.frames % 3 === 0) {
                    this.createTrailParticle();
                }
                
                for (let i = this.trailParticles.length - 1; i >= 0; i--) {
                    const p = this.trailParticles[i];
                    p.x -= PIPE_SPEED * 0.5;
                    p.y += p.vy;
                    p.life -= 0.02;
                    if (p.life <= 0) this.trailParticles.splice(i, 1);
                }
                
                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1;
                    p.life -= 0.03;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
                
                if (this.shakeIntensity > 0) this.shakeIntensity *= 0.9;
            },
            
            createTrailParticle() {
                const colors = this.trailColors[this.currentTrail];
                const color = Array.isArray(colors) ? colors[Math.floor(Math.random() * colors.length)] : colors;
                
                this.trailParticles.push({
                    x: this.bird.x,
                    y: this.bird.y + this.bird.height / 2 + (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 0.5,
                    life: 1,
                    color: color,
                    size: Math.random() * 6 + 3
                });
            },
            
            checkNearMiss(pipe) {
                const margin = 12;
                const nearTop = this.bird.y < pipe.topHeight + margin && this.bird.y > pipe.topHeight - margin;
                const nearBottom = this.bird.y + this.bird.height > pipe.bottomY - margin && this.bird.y + this.bird.height < pipe.bottomY + margin;
                
                if ((nearTop || nearBottom) && !pipe.nearMissTriggered) {
                    pipe.nearMissTriggered = true;
                    this.triggerNearMiss();
                }
            },
            
            triggerNearMiss() {
                this.nearMissCount++;
                this.score += 5;
                document.getElementById('scoreDisplay').textContent = this.score;
                
                this.showNotification('near-miss', 'CLOSE CALL! +$5');
                this.showFloatText('+ $5', this.bird.x, this.bird.y - 30);
                
                this.shakeIntensity = 5;
                playNearMissSound();
            },
            
            showNotification(type, text) {
                const el = document.getElementById(type + 'Notify');
                el.textContent = text;
                el.classList.remove('show');
                void el.offsetWidth;
                el.classList.add('show');
            },
            
            showFloatText(text, x, y) {
                const container = document.getElementById('floatContainer');
                const el = document.createElement('div');
                el.className = 'float-text';
                el.textContent = text;
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                container.appendChild(el);
                
                void el.offsetWidth;
                el.classList.add('show');
                
                setTimeout(() => el.remove(), 1000);
            },
            
            createFlapParticles() {
                for (let i = 0; i < 5; i++) {
                    this.particles.push({
                        x: this.bird.x - 10,
                        y: this.bird.y + 12,
                        vx: (Math.random() - 0.8) * 4,
                        vy: (Math.random() - 0.5) * 3,
                        life: 0.8,
                        color: '#22C55E'
                    });
                }
            },
            
            createScoreParticles() {
                for (let i = 0; i < 8; i++) {
                    this.particles.push({
                        x: this.bird.x + 20,
                        y: this.bird.y + 10,
                        vx: (Math.random() - 0.3) * 5,
                        vy: (Math.random() - 0.5) * 5,
                        life: 1,
                        color: Math.random() > 0.5 ? '#FFD700' : '#22C55E'
                    });
                }
            },
            
            draw() {
                // Background based on theme
                this.drawBackground();
                
                ctx.save();
                if (this.shakeIntensity > 0.5) {
                    ctx.translate((Math.random() - 0.5) * this.shakeIntensity, (Math.random() - 0.5) * this.shakeIntensity);
                }
                
                // Draw trail
                for (const p of this.trailParticles) {
                    ctx.globalAlpha = p.life * 0.7;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                
                // Draw pipes
                ctx.fillStyle = '#22C55E';
                ctx.shadowColor = '#22C55E';
                ctx.shadowBlur = 15;
                for (const pipe of this.pipes) {
                    ctx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
                    ctx.fillRect(pipe.x, pipe.bottomY, pipe.width, canvas.height - pipe.bottomY);
                }
                ctx.shadowBlur = 0;
                
                // Draw bird with bot color
                ctx.save();
                ctx.translate(this.bird.x + this.bird.width/2, this.bird.y + this.bird.height/2);
                ctx.rotate(this.bird.rotation);
                
                const botColor = this.botColors[this.currentBot] || '#FFFFFF';
                ctx.fillStyle = botColor;
                ctx.shadowColor = botColor;
                ctx.shadowBlur = 10;
                ctx.fillRect(-this.bird.width/2, -this.bird.height/2, this.bird.width, this.bird.height);
                ctx.shadowBlur = 0;
                
                // Eye
                ctx.fillStyle = '#000';
                ctx.fillRect(-2, -8, 6, 6);
                ctx.fillStyle = '#FFF';
                ctx.fillRect(0, -6, 2, 2);
                
                // Beak
                ctx.fillStyle = '#F97316';
                ctx.fillRect(8, 0, 10, 6);
                
                ctx.restore();
                
                // Draw particles
                for (const p of this.particles) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 5, 5);
                }
                ctx.globalAlpha = 1;
                
                ctx.restore();
            },
            
            drawBackground() {
                const theme = this.currentTheme;
                
                if (theme === 'void') {
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                } else if (theme === 'nebula') {
                    const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    grad.addColorStop(0, '#0a0a1a');
                    grad.addColorStop(0.5, '#1a0a2e');
                    grad.addColorStop(1, '#2d1b4e');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                } else if (theme === 'galaxy') {
                    const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
                    grad.addColorStop(0, '#0a1628');
                    grad.addColorStop(1, '#000000');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                } else if (theme === 'matrix') {
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'rgba(0, 255, 0, 0.1)';
                    for (let i = 0; i < 20; i++) {
                        const x = (i * 50 + this.frames) % canvas.width;
                        ctx.fillRect(x, 0, 2, canvas.height);
                    }
                } else if (theme === 'sunset') {
                    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    grad.addColorStop(0, '#1a0a2e');
                    grad.addColorStop(0.5, '#4a1942');
                    grad.addColorStop(1, '#ff6b35');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                } else if (theme === 'moneyverse') {
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    // Green grid
                    ctx.strokeStyle = 'rgba(34, 197, 94, 0.3)';
                    ctx.lineWidth = 1;
                    const gridSize = 50;
                    const offset = (this.frames * 2) % gridSize;
                    for (let x = 0; x < canvas.width; x += gridSize) {
                        ctx.beginPath();
                        ctx.moveTo(x, 0);
                        ctx.lineTo(x, canvas.height);
                        ctx.stroke();
                    }
                    for (let y = offset; y < canvas.height; y += gridSize) {
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        ctx.lineTo(canvas.width, y);
                        ctx.stroke();
                    }
                    // Orange glow at bottom
                    const glow = ctx.createLinearGradient(0, canvas.height - 200, 0, canvas.height);
                    glow.addColorStop(0, 'rgba(249, 115, 22, 0)');
                    glow.addColorStop(1, 'rgba(249, 115, 22, 0.3)');
                    ctx.fillStyle = glow;
                    ctx.fillRect(0, canvas.height - 200, canvas.width, 200);
                } else if (theme === 'aurora') {
                    const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    grad.addColorStop(0, '#0a0a1a');
                    grad.addColorStop(0.3, '#1a3a3a');
                    grad.addColorStop(0.6, '#2d5a4a');
                    grad.addColorStop(1, '#0a2a3a');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                } else if (theme === 'cyberpunk') {
                    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    grad.addColorStop(0, '#1a0a2e');
                    grad.addColorStop(1, '#0a0a1a');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    // Neon city lights
                    ctx.fillStyle = 'rgba(255, 0, 255, 0.1)';
                    for (let i = 0; i < 10; i++) {
                        const h = Math.random() * 100 + 50;
                        ctx.fillRect(i * 100, canvas.height - h, 40, h);
                    }
                } else if (theme === 'volcano') {
                    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    grad.addColorStop(0, '#1a0a0a');
                    grad.addColorStop(0.7, '#3a1a1a');
                    grad.addColorStop(1, '#ff4500');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                
                // Stars for all themes
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                for (let i = 0; i < 30; i++) {
                    const x = (i * 137 + this.frames * 0.2) % canvas.width;
                    const y = (i * 73) % canvas.height;
                    ctx.fillRect(x, y, 1.5, 1.5);
                }
            },
            
            gameOver() {
                this.state = 'gameover';
                this.shakeIntensity = 20;
                
                const prevBest = this.bestScore;
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    localStorage.setItem('flappybot_best', this.bestScore);
                }
                
                document.getElementById('finalScore').textContent = '$' + this.score;
                document.getElementById('finalBest').textContent = '$' + this.bestScore;
                document.getElementById('bestScoreDisplay').textContent = this.bestScore;
                document.getElementById('gameOverScreen').style.display = 'flex';
                
                this.updateUnlocks();
                
                if (this.bestScore > prevBest) {
                    this.checkNewUnlocks(prevBest, this.bestScore);
                }
            },
            
            checkNewUnlocks(oldScore, newScore) {
                const newUnlocks = [];
                
                for (const [theme, required] of Object.entries(this.themeUnlocks)) {
                    if (oldScore < required && newScore >= required && !this.unlockedThemes.includes(theme)) {
                        newUnlocks.push(theme);
                    }
                }
                for (const [bot, required] of Object.entries(this.botUnlocks)) {
                    if (oldScore < required && newScore >= required && !this.unlockedBots.includes(bot)) {
                        newUnlocks.push(bot);
                    }
                }
                for (const [trail, required] of Object.entries(this.trailUnlocks)) {
                    if (oldScore < required && newScore >= required && !this.unlockedTrails.includes(trail)) {
                        newUnlocks.push(trail);
                    }
                }
                
                if (newUnlocks.length > 0) {
                    playUnlockSound();
                    setTimeout(() => {
                        this.showNotification('unlock', `🎉 UNLOCKED: ${newUnlocks.length} NEW ITEMS!`);
                    }, 500);
                }
            },
            
            updateUnlocks() {
                let changed = false;
                
                for (const [theme, required] of Object.entries(this.themeUnlocks)) {
                    if (this.bestScore >= required && !this.unlockedThemes.includes(theme)) {
                        this.unlockedThemes.push(theme);
                        changed = true;
                    }
                }
                for (const [bot, required] of Object.entries(this.botUnlocks)) {
                    if (this.bestScore >= required && !this.unlockedBots.includes(bot)) {
                        this.unlockedBots.push(bot);
                        changed = true;
                    }
                }
                for (const [trail, required] of Object.entries(this.trailUnlocks)) {
                    if (this.bestScore >= required && !this.unlockedTrails.includes(trail)) {
                        this.unlockedTrails.push(trail);
                        changed = true;
                    }
                }
                
                if (changed) {
                    localStorage.setItem('flappybot_unlockedThemes', JSON.stringify(this.unlockedThemes));
                    localStorage.setItem('flappybot_unlockedBots', JSON.stringify(this.unlockedBots));
                    localStorage.setItem('flappybot_unlockedTrails', JSON.stringify(this.unlockedTrails));
                }
                
                this.updateSettingsUI();
            },
            
            setTheme(theme) {
                if (!this.unlockedThemes.includes(theme)) return;
                this.currentTheme = theme;
                localStorage.setItem('flappybot_theme', theme);
                document.querySelectorAll('[data-theme]').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                    btn.classList.toggle('locked', !this.unlockedThemes.includes(btn.dataset.theme));
                });
                this.updateStartScreenIndicators();
            },
            
            setBot(bot) {
                if (!this.unlockedBots.includes(bot)) return;
                this.currentBot = bot;
                localStorage.setItem('flappybot_bot', bot);
                document.querySelectorAll('[data-bot]').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.bot === bot);
                    btn.classList.toggle('locked', !this.unlockedBots.includes(btn.dataset.bot));
                });
                this.updateStartScreenIndicators();
            },
            
            setTrail(trail) {
                if (!this.unlockedTrails.includes(trail)) return;
                this.currentTrail = trail;
                localStorage.setItem('flappybot_trail', trail);
                document.querySelectorAll('[data-trail]').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.trail === trail);
                    btn.classList.toggle('locked', !this.unlockedTrails.includes(btn.dataset.trail));
                });
                this.updateStartScreenIndicators();
            },
            
            updateStartScreenIndicators() {
                const botIcons = { classic: '🤖', gold: '🥇', neon: '🌈', ninja: '🥷', cyber: '⚡', alien: '👽' };
                const themeIcons = { void: '🌑', nebula: '🌸', galaxy: '🌀', matrix: '💻', sunset: '🌅', moneyverse: '💚', aurora: '🌟', cyberpunk: '🌃', volcano: '🌋' };
                const trailIcons = { none: '❌', cash: '💵', coins: '🪙', green: '💚', fire: '🔥', rainbow: '🌈', neon: '⚡', stars: '⭐', bubbles: '🫧' };
                
                document.getElementById('currentBotIcon').textContent = botIcons[this.currentBot] || '🤖';
                document.getElementById('currentThemeIcon').textContent = themeIcons[this.currentTheme] || '🌑';
                document.getElementById('currentTrailIcon').textContent = trailIcons[this.currentTrail] || '💵';
            },
            
            updateSettingsUI() {
                document.querySelectorAll('[data-bot]').forEach(btn => {
                    btn.classList.toggle('locked', !this.unlockedBots.includes(btn.dataset.bot));
                    btn.classList.toggle('active', this.currentBot === btn.dataset.bot);
                });
                document.querySelectorAll('[data-theme]').forEach(btn => {
                    btn.classList.toggle('locked', !this.unlockedThemes.includes(btn.dataset.theme));
                    btn.classList.toggle('active', this.currentTheme === btn.dataset.theme);
                });
                document.querySelectorAll('[data-trail]').forEach(btn => {
                    btn.classList.toggle('locked', !this.unlockedTrails.includes(btn.dataset.trail));
                    btn.classList.toggle('active', this.currentTrail === btn.dataset.trail);
                });
            },
            
            openSettings() {
                document.getElementById('settingsModal').classList.add('show');
                this.switchTab('bots');
                this.updateSettingsUI();
            },
            
            closeSettings() {
                document.getElementById('settingsModal').classList.remove('show');
            },
            
            switchTab(tab) {
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
            },
            
            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        };
        
        game.init();
    </script>
</body>
