<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- VERSION: 2025-04-30-0720 - White MoneyBot character, no background -->
    <title>FlappyBot - Fly to Financial Freedom</title>
    <link rel="icon" type="image/jpeg" href="assets/moneybot-logo-1.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
            user-select: none; 
        }
        
        :root { 
            --moneybot-green: #22C55E; 
            --moneybot-dark: #0F172A; 
            --moneybot-white: #FFFFFF;
            --moneybot-gold: #FFD700;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0a0a1a;
            min-height: 100vh;
            overflow: hidden;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
        }
        
        .score-number {
            font-size: 72px;
            font-weight: 900;
            color: #22C55E;
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.8), 0 0 40px rgba(34, 197, 94, 0.4), 0 0 60px rgba(34, 197, 94, 0.2);
            line-height: 1;
            animation: scorePulse 1s ease-in-out infinite;
        }
        
        @keyframes scorePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .best-score {
            font-size: 16px;
            font-weight: 600;
            color: #22C55E;
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.8);
            margin-top: 5px;
        }
        
        .medal {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: medalPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .medal.bronze { background: linear-gradient(135deg, #CD7F32, #8B4513); display: flex; }
        .medal.silver { background: linear-gradient(135deg, #C0C0C0, #808080); display: flex; }
        .medal.gold { background: linear-gradient(135deg, #FFD700, #FFA500); display: flex; }
        .medal.platinum { background: linear-gradient(135deg, #E5E4E2, #A0A0A0); display: flex; }
        
        @keyframes medalPop {
            0% { transform: translateX(-50%) scale(0) rotate(-180deg); }
            100% { transform: translateX(-50%) scale(1) rotate(0deg); }
        }
        
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.6);
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        
        .game-over-screen { display: none; }
        
        .logo {
            font-size: 48px;
            font-weight: 900;
            color: white;
            text-shadow: 4px 4px 0 var(--moneybot-green), 8px 8px 0 rgba(0,0,0,0.3);
            margin-bottom: 10px;
            animation: float 2s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .subtitle {
            font-size: 18px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .btn {
            background: linear-gradient(135deg, var(--moneybot-green), #16A34A);
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(34,197,94,0.4), 0 4px 0 #15803d;
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 15px rgba(34,197,94,0.4), 0 0 0 #15803d;
        }
        
        .instructions {
            margin-top: 30px;
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            text-align: center;
        }
        
        .tap-icon {
            font-size: 40px;
            animation: tapPulse 1s ease-in-out infinite;
        }
        
        @keyframes tapPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.9); opacity: 0.7; }
        }
        
        .stats-box {
            background: white;
            border-radius: 20px;
            padding: 25px 40px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .stats-label {
            font-size: 14px;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .stats-value {
            font-size: 48px;
            font-weight: 900;
            color: var(--moneybot-dark);
        }
        
        .new-best {
            color: var(--moneybot-green);
            animation: pulse 0.5s ease-in-out 3;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .share-btn {
            background: linear-gradient(135deg, #1DA1F2, #0d8bd9);
            margin-top: 15px;
        }
        
        .combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
            color: var(--moneybot-gold);
            text-shadow: 3px 3px 0 rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }
        
        .combo-display.show {
            animation: comboAnim 1s ease-out forwards;
        }
        
        @keyframes comboAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            80% { opacity: 1; transform: translate(-50%, -70%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(0.8); }
        }
        
        .streak-flames {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 30px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .streak-flames.active {
            opacity: 1;
            animation: flames 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes flames {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer">
        <div class="score-display">
            <div class="score-number" id="scoreDisplay">0</div>
            <div class="best-score">Best: <span id="bestScore">0</span></div>
        </div>
        
        <div class="medal" id="medal"></div>
        
        <div class="combo-display" id="comboDisplay">🔥 x2</div>
        
        <div class="streak-flames" id="streakFlames">🔥🔥🔥</div>
    </div>
    
    <div class="start-screen" id="startScreen">
        <div class="logo">🤖 FLAPPYBOT</div>
        <div class="subtitle">Fly through the market volatility!<br>Tap to flap, avoid the red zones</div>
        <button class="btn" onclick="game.start()">PLAY NOW</button>
        <div class="instructions">
            <div class="tap-icon">👆</div>
            <div>Tap or press SPACE to fly</div>
        </div>
    </div>
    
    <div class="game-over-screen" id="gameOverScreen">
        <div class="stats-box">
            <div class="stats-label">Score</div>
            <div class="stats-value" id="finalScore">0</div>
        </div>
        <div class="stats-box">
            <div class="stats-label">Best</div>
            <div class="stats-value" id="finalBest">0</div>
        </div>
        <button class="btn" onclick="game.restart()">PLAY AGAIN</button>
        <button class="btn share-btn" onclick="game.share()">📤 SHARE SCORE</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game constants
        const GRAVITY = 0.4;
        const FLAP_STRENGTH = -7;
        const PIPE_SPEED = 3;
        const PIPE_SPAWN_RATE = 120;
        const PIPE_GAP = 160;
        
        // Game state
        const game = {
            state: 'menu', // menu, playing, gameover
            score: 0,
            bestScore: parseInt(localStorage.getItem('flappybot_best')) || 0,
            frames: 0,
            combo: 0,
            lastPipeX: 0,
            
            // Bird
            bird: {
                x: 100,
                y: 0,
                velocity: 0,
                width: 34,
                height: 24,
                rotation: 0,
                wingFrame: 0
            },
            
            // Pipes
            pipes: [],
            
            // Particles
            particles: [],
            
            // Background
            bgOffset: 0,
            groundOffset: 0,
            
            // Player image
            playerImage: null,
            playerImageLoaded: false,
            
            // Screen shake
            shakeIntensity: 0,
            
            init() {
                // Load player image
                this.playerImage = new Image();
                this.playerImage.src = 'assets/player-user.png';
                this.playerImage.onload = () => {
                    this.playerImageLoaded = true;
                };
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                // Input handlers
                canvas.addEventListener('click', () => this.flap());
                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.flap();
                });
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space' || e.code === 'ArrowUp') {
                        e.preventDefault();
                        this.flap();
                    }
                });
                
                document.getElementById('bestScore').textContent = this.bestScore;
                
                // Start loop
                this.loop();
            },
            
            resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                this.bird.y = canvas.height / 2;
            },
            
            start() {
                this.state = 'playing';
                this.score = 0;
                this.combo = 0;
                this.frames = 0;
                this.pipes = [];
                this.particles = [];
                this.bird.y = canvas.height / 2;
                this.bird.velocity = 0;
                this.bird.rotation = 0;
                
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('gameOverScreen').style.display = 'none';
                document.getElementById('scoreDisplay').textContent = '0';
                document.getElementById('medal').className = 'medal';
                
                this.spawnPipe();
            },
            
            flap() {
                if (this.state === 'playing') {
                    this.bird.velocity = FLAP_STRENGTH;
                    this.createParticles(this.bird.x - 10, this.bird.y + 12, 5, '#22C55E');
                    // Add coin trail particles
                    this.createCoinTrail(3);
                }
            },
            
            createCoinTrail(count) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: this.bird.x - 25 - i * 20,
                        y: this.bird.y + 25 + (Math.random() - 0.5) * 15,
                        vx: -3 - Math.random() * 3,
                        vy: (Math.random() - 0.5) * 3,
                        life: 1,
                        color: '#FFD700',
                        size: 10 + Math.random() * 8,
                        isCoin: true,
                        hasTrail: true
                    });
                }
            },
            
            spawnPipe() {
                const minHeight = 50;
                const maxHeight = canvas.height - PIPE_GAP - minHeight - 100;
                const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
                
                this.pipes.push({
                    x: canvas.width,
                    topHeight: topHeight,
                    bottomY: topHeight + PIPE_GAP,
                    width: 60,
                    passed: false,
                    color: Math.random() > 0.5 ? '#22C55E' : '#16A34A'
                });
            },
            
            createParticles(x, y, count, color) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        life: 1,
                        color: color,
                        size: Math.random() * 6 + 3,
                        glow: true
                    });
                }
            },
            
            createCoinParticles(x, y) {
                for (let i = 0; i < 10; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8 - 2,
                        life: 1,
                        color: '#FFD700',
                        size: Math.random() * 6 + 4,
                        isCoin: true
                    });
                }
            },
            
            update() {
                if (this.state !== 'playing') return;
                
                this.frames++;
                
                // Update bird
                this.bird.velocity += GRAVITY;
                this.bird.y += this.bird.velocity;
                this.bird.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.bird.velocity * 0.1)));
                this.bird.wingFrame = Math.floor(this.frames / 5) % 3;
                
                // Add coin trail during flight
                if (this.frames % 10 === 0) {
                    this.createCoinTrail(1);
                }
                
                // Check ground/ceiling collision
                if (this.bird.y + this.bird.height > canvas.height - 80 || this.bird.y < 0) {
                    this.gameOver();
                    return;
                }
                
                // Update pipes
                if (this.frames % PIPE_SPAWN_RATE === 0) {
                    this.spawnPipe();
                }
                
                for (let i = this.pipes.length - 1; i >= 0; i--) {
                    const pipe = this.pipes[i];
                    pipe.x -= PIPE_SPEED;
                    
                    // Check collision
                    if (this.bird.x + this.bird.width > pipe.x && 
                        this.bird.x < pipe.x + pipe.width) {
                        if (this.bird.y < pipe.topHeight || 
                            this.bird.y + this.bird.height > pipe.bottomY) {
                            this.gameOver();
                            return;
                        }
                    }
                    
                    // Score point
                    if (!pipe.passed && pipe.x + pipe.width < this.bird.x) {
                        pipe.passed = true;
                        this.score++;
                        this.combo++;
                        document.getElementById('scoreDisplay').textContent = this.score;
                        this.createCoinParticles(pipe.x + pipe.width / 2, canvas.height / 2);
                        
                        // Show combo
                        if (this.combo >= 5) {
                            const comboDisplay = document.getElementById('comboDisplay');
                            comboDisplay.textContent = '🔥 x' + this.combo;
                            comboDisplay.classList.remove('show');
                            void comboDisplay.offsetWidth;
                            comboDisplay.classList.add('show');
                        }
                        
                        // Update medal
                        this.updateMedal();
                    }
                    
                    // Remove off-screen pipes
                    if (pipe.x + pipe.width < 0) {
                        this.pipes.splice(i, 1);
                    }
                }
                
                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.2;
                    p.life -= 0.02;
                    
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }
                
                // Update backgrounds
                this.bgOffset -= 0.5;
                this.groundOffset -= PIPE_SPEED;
                if (this.groundOffset <= -24) this.groundOffset = 0;
            },
            
            updateMedal() {
                const medal = document.getElementById('medal');
                if (this.score >= 50) {
                    medal.className = 'medal platinum';
                    medal.textContent = '💎';
                } else if (this.score >= 30) {
                    medal.className = 'medal gold';
                    medal.textContent = '🥇';
                } else if (this.score >= 15) {
                    medal.className = 'medal silver';
                    medal.textContent = '🥈';
                } else if (this.score >= 5) {
                    medal.className = 'medal bronze';
                    medal.textContent = '🥉';
                }
            },
            
            draw() {
                // Screen shake effect
                let shakeX = 0, shakeY = 0;
                if (this.shakeIntensity > 0) {
                    shakeX = (Math.random() - 0.5) * this.shakeIntensity;
                    shakeY = (Math.random() - 0.5) * this.shakeIntensity;
                    this.shakeIntensity *= 0.9;
                    if (this.shakeIntensity < 0.5) this.shakeIntensity = 0;
                }
                
                ctx.save();
                ctx.translate(shakeX, shakeY);
                
                // Clear canvas
                ctx.clearRect(-shakeX, -shakeY, canvas.width, canvas.height);
                
                // Draw space background
                this.drawSpace();
                
                // Draw space laser barriers
                for (const pipe of this.pipes) {
                    // Glow effect
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#22C55E';
                    
                    // Top laser beam
                    const topGradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipe.width, 0);
                    topGradient.addColorStop(0, 'rgba(34, 197, 94, 0.3)');
                    topGradient.addColorStop(0.5, 'rgba(34, 197, 94, 0.8)');
                    topGradient.addColorStop(1, 'rgba(34, 197, 94, 0.3)');
                    ctx.fillStyle = topGradient;
                    ctx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
                    
                    // Laser core - top
                    ctx.fillStyle = '#22C55E';
                    ctx.fillRect(pipe.x + 20, 0, 20, pipe.topHeight);
                    
                    // Energy pulses on laser
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    const pulseY = (this.frames * 2) % pipe.topHeight;
                    ctx.fillRect(pipe.x + 15, pulseY - 10, 30, 20);
                    
                    // Top emitter
                    ctx.fillStyle = '#1a1a3a';
                    ctx.fillRect(pipe.x - 5, pipe.topHeight - 25, pipe.width + 10, 25);
                    ctx.strokeStyle = '#22C55E';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(pipe.x - 5, pipe.topHeight - 25, pipe.width + 10, 25);
                    
                    // Emitter lights
                    ctx.fillStyle = '#22C55E';
                    ctx.beginPath();
                    ctx.arc(pipe.x + 15, pipe.topHeight - 12, 5, 0, Math.PI * 2);
                    ctx.arc(pipe.x + 45, pipe.topHeight - 12, 5, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Bottom laser beam
                    const bottomGradient = ctx.createLinearGradient(pipe.x, pipe.bottomY, pipe.x + pipe.width, pipe.bottomY);
                    bottomGradient.addColorStop(0, 'rgba(34, 197, 94, 0.3)');
                    bottomGradient.addColorStop(0.5, 'rgba(34, 197, 94, 0.8)');
                    bottomGradient.addColorStop(1, 'rgba(34, 197, 94, 0.3)');
                    ctx.fillStyle = bottomGradient;
                    ctx.fillRect(pipe.x, pipe.bottomY, pipe.width, canvas.height - pipe.bottomY);
                    
                    // Laser core - bottom
                    ctx.fillStyle = '#22C55E';
                    ctx.fillRect(pipe.x + 20, pipe.bottomY, 20, canvas.height - pipe.bottomY);
                    
                    // Energy pulses on bottom laser
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    const bottomPulseY = pipe.bottomY + (this.frames * 2) % (canvas.height - pipe.bottomY);
                    ctx.fillRect(pipe.x + 15, bottomPulseY - 10, 30, 20);
                    
                    // Bottom emitter
                    ctx.fillStyle = '#1a1a3a';
                    ctx.fillRect(pipe.x - 5, pipe.bottomY, pipe.width + 10, 25);
                    ctx.strokeRect(pipe.x - 5, pipe.bottomY, pipe.width + 10, 25);
                    
                    // Emitter lights
                    ctx.fillStyle = '#22C55E';
                    ctx.beginPath();
                    ctx.arc(pipe.x + 15, pipe.bottomY + 12, 5, 0, Math.PI * 2);
                    ctx.arc(pipe.x + 45, pipe.bottomY + 12, 5, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                }
                
                // Draw particles with glow
                for (const p of this.particles) {
                    ctx.globalAlpha = p.life;
                    if (p.glow) {
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = p.color;
                    }
                    if (p.isCoin) {
                        // Motion blur trail for coins
                        if (p.hasTrail) {
                            const trailGradient = ctx.createLinearGradient(p.x + p.size, p.y, p.x - p.size * 2, p.y);
                            trailGradient.addColorStop(0, 'rgba(255, 215, 0, 0.6)');
                            trailGradient.addColorStop(1, 'rgba(255, 215, 0, 0)');
                            ctx.fillStyle = trailGradient;
                            ctx.beginPath();
                            ctx.ellipse(p.x - p.size, p.y, p.size * 1.5, p.size * 0.6, 0, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        // Coin body with 3D gradient
                        const coinGradient = ctx.createRadialGradient(p.x - 2, p.y - 2, 1, p.x, p.y, p.size);
                        coinGradient.addColorStop(0, '#FFECB3');
                        coinGradient.addColorStop(0.4, '#FFD700');
                        coinGradient.addColorStop(1, '#FFA000');
                        ctx.fillStyle = coinGradient;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        // Coin border
                        ctx.strokeStyle = '#FF8F00';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        // Coin highlight
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                        ctx.beginPath();
                        ctx.arc(p.x - 3, p.y - 3, p.size * 0.3, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                }
                
                // Draw MoneyBot character using Gemini-generated sprite
                ctx.save();
                ctx.translate(this.bird.x + this.bird.width / 2, this.bird.y + this.bird.height / 2);
                ctx.rotate(this.bird.rotation * 0.3);
                
                if (this.playerImageLoaded && this.playerImage.width > 0) {
                    const imgSize = 90;
                    ctx.drawImage(this.playerImage, -imgSize/2, -imgSize/2, imgSize, imgSize);
                }
                
                ctx.restore();
                
                // Draw space station platform at bottom
                const platformGradient = ctx.createLinearGradient(0, canvas.height - 80, 0, canvas.height);
                platformGradient.addColorStop(0, '#2a2a4a');
                platformGradient.addColorStop(0.5, '#1a1a3a');
                platformGradient.addColorStop(1, '#0a0a1a');
                ctx.fillStyle = platformGradient;
                ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
                
                // Platform edge glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#22C55E';
                ctx.strokeStyle = '#22C55E';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, canvas.height - 80);
                ctx.lineTo(canvas.width, canvas.height - 80);
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                // End screen shake
                ctx.restore();
                
                // Platform grid pattern
                ctx.strokeStyle = 'rgba(34, 197, 94, 0.3)';
                ctx.lineWidth = 1;
                for (let x = this.groundOffset; x < canvas.width; x += 40) {
                    ctx.beginPath();
                    ctx.moveTo(x, canvas.height - 80);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }
                for (let y = canvas.height - 80; y < canvas.height; y += 20) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }
                
                // Platform lights
                ctx.fillStyle = '#22C55E';
                for (let x = this.groundOffset; x < canvas.width; x += 80) {
                    ctx.beginPath();
                    ctx.arc(x + 40, canvas.height - 70, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            },
            
            drawSpace() {
                // Deep space gradient
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#0a0a1a');
                gradient.addColorStop(0.5, '#1a1a3a');
                gradient.addColorStop(1, '#2a1a4a');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw stars
                this.drawStars();
                
                // Draw nebula
                this.drawNebula();
                
                // Draw planets
                this.drawPlanets();
            },
            
            drawStars() {
                // Twinkling stars
                const starOffset = (this.frames * 0.2) % canvas.width;
                
                // Static stars
                ctx.fillStyle = 'white';
                for (let i = 0; i < 100; i++) {
                    const x = (i * 137.5 + starOffset) % canvas.width;
                    const y = (i * 73.3) % canvas.height;
                    const size = (i % 3) + 1;
                    const twinkle = Math.sin(this.frames * 0.1 + i) * 0.5 + 0.5;
                    ctx.globalAlpha = 0.3 + twinkle * 0.7;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                
                // Shooting stars
                if (this.frames % 200 === 0) {
                    this.shootingStar = {
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height * 0.5,
                        vx: -5 - Math.random() * 5,
                        vy: 2 + Math.random() * 2,
                        life: 30
                    };
                }
                
                if (this.shootingStar && this.shootingStar.life > 0) {
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(this.shootingStar.x, this.shootingStar.y);
                    ctx.lineTo(this.shootingStar.x - this.shootingStar.vx * 5, this.shootingStar.y - this.shootingStar.vy * 5);
                    ctx.stroke();
                    
                    this.shootingStar.x += this.shootingStar.vx;
                    this.shootingStar.y += this.shootingStar.vy;
                    this.shootingStar.life--;
                }
            },
            
            drawNebula() {
                // Purple/pink nebula clouds
                const nebulaOffset = (this.frames * 0.1) % canvas.width;
                
                const nebulas = [
                    { x: 200 - nebulaOffset, y: 200, color: 'rgba(138, 43, 226, 0.3)', size: 150 },
                    { x: 600 - nebulaOffset, y: 400, color: 'rgba(255, 20, 147, 0.2)', size: 200 },
                    { x: 1000 - nebulaOffset, y: 150, color: 'rgba(75, 0, 130, 0.25)', size: 180 },
                    { x: canvas.width + 200 - nebulaOffset, y: 200, color: 'rgba(138, 43, 226, 0.3)', size: 150 },
                    { x: canvas.width + 600 - nebulaOffset, y: 400, color: 'rgba(255, 20, 147, 0.2)', size: 200 },
                ];
                
                for (const nebula of nebulas) {
                    const gradient = ctx.createRadialGradient(nebula.x, nebula.y, 0, nebula.x, nebula.y, nebula.size);
                    gradient.addColorStop(0, nebula.color);
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(nebula.x, nebula.y, nebula.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            },
            
            drawPlanets() {
                const planetOffset = (this.frames * 0.05) % canvas.width;
                
                // Saturn-like planet
                const saturnX = 150 - planetOffset;
                const saturnY = 120;
                
                // Planet body
                const saturnGradient = ctx.createRadialGradient(saturnX - 20, saturnY - 20, 0, saturnX, saturnY, 40);
                saturnGradient.addColorStop(0, '#FFD700');
                saturnGradient.addColorStop(0.5, '#FFA500');
                saturnGradient.addColorStop(1, '#FF8C00');
                ctx.fillStyle = saturnGradient;
                ctx.beginPath();
                ctx.arc(saturnX, saturnY, 35, 0, Math.PI * 2);
                ctx.fill();
                
                // Rings
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.6)';
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.ellipse(saturnX, saturnY, 60, 20, Math.PI / 6, 0, Math.PI * 2);
                ctx.stroke();
                
                // Blue planet
                const blueX = canvas.width - 100 - planetOffset;
                const blueY = canvas.height - 200;
                const blueGradient = ctx.createRadialGradient(blueX - 15, blueY - 15, 0, blueX, blueY, 30);
                blueGradient.addColorStop(0, '#4169E1');
                blueGradient.addColorStop(0.5, '#0000CD');
                blueGradient.addColorStop(1, '#00008B');
                ctx.fillStyle = blueGradient;
                ctx.beginPath();
                ctx.arc(blueX, blueY, 25, 0, Math.PI * 2);
                ctx.fill();
                
                // Wrap around planets
                if (saturnX < -100) {
                    const wrapX = saturnX + canvas.width + 200;
                    ctx.fillStyle = saturnGradient;
                    ctx.beginPath();
                    ctx.arc(wrapX, saturnY, 35, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 215, 0, 0.6)';
                    ctx.lineWidth = 8;
                    ctx.beginPath();
                    ctx.ellipse(wrapX, saturnY, 60, 20, Math.PI / 6, 0, Math.PI * 2);
                    ctx.stroke();
                }
            },
            
            gameOver() {
                this.state = 'gameover';
                this.shakeIntensity = 20; // Screen shake on death
                
                // Create explosion particles
                this.createParticles(this.bird.x, this.bird.y, 30, '#FF4444');
                this.createParticles(this.bird.x, this.bird.y, 20, '#FFD700');
                
                // Update best score
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    localStorage.setItem('flappybot_best', this.bestScore);
                }
                
                // Show game over screen
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('finalBest').textContent = this.bestScore;
                
                if (this.score >= this.bestScore && this.score > 0) {
                    document.getElementById('finalScore').classList.add('new-best');
                } else {
                    document.getElementById('finalScore').classList.remove('new-best');
                }
                
                document.getElementById('gameOverScreen').style.display = 'flex';
                document.getElementById('bestScore').textContent = this.bestScore;
            },
            
            restart() {
                document.getElementById('gameOverScreen').style.display = 'none';
                this.start();
            },
            
            share() {
                const text = `I scored ${this.score} in FlappyBot! Can you beat me? 🐦💰`;
                if (navigator.share) {
                    navigator.share({
                        title: 'FlappyBot',
                        text: text,
                        url: window.location.href
                    });
                } else {
                    navigator.clipboard.writeText(text + ' ' + window.location.href);
                    alert('Score copied to clipboard!');
                }
            },
            
            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        };
        
        // Initialize game
        game.init();
    </script>
