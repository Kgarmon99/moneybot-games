<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockBot — MoneyBot Trading Sim</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #050505; color: #00ff88; min-height: 100vh; overflow-x: hidden; }
        .back-btn { position: fixed; top: 15px; left: 15px; z-index: 100; background: #000; border: 1px solid #00ff88; color: #00ff88; padding: 8px 16px; text-decoration: none; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 20px 40px; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 32px; font-weight: 800; text-shadow: 0 0 20px #00ff88; }
        header p { font-size: 13px; opacity: 0.7; margin-top: 8px; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: #0a1a0f; border: 1px solid #00ff88; padding: 15px; text-align: center; }
        .stat-box .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
        .stat-box .value { font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-top: 5px; }
        .stat-box .change { font-size: 11px; margin-top: 3px; }
        .positive { color: #00ff88; }
        .negative { color: #ff4444; }
        
        .chart-container { background: #0a1a0f; border: 1px solid #00ff88; padding: 20px; margin-bottom: 25px; position: relative; }
        .chart-container h3 { font-size: 14px; margin-bottom: 15px; text-transform: uppercase; }
        canvas { width: 100%; height: 250px; }
        
        .news-ticker { background: #0a1a0f; border: 1px solid #00ff88; padding: 12px 20px; margin-bottom: 25px; font-family: 'JetBrains Mono', monospace; font-size: 12px; overflow: hidden; white-space: nowrap; }
        .news-ticker span { display: inline-block; animation: scroll 15s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .portfolio { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stock-card { background: #0a1a0f; border: 1px solid #00ff88; padding: 15px; cursor: pointer; transition: all 0.2s; }
        .stock-card:hover { box-shadow: 0 0 15px rgba(0,255,136,0.3); }
        .stock-card.selected { border-color: #fbbf24; box-shadow: 0 0 20px rgba(251,191,36,0.3); }
        .stock-card h4 { font-size: 14px; text-transform: uppercase; }
        .stock-card .price { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin: 8px 0; }
        .stock-card .owned { font-size: 11px; opacity: 0.7; }
        
        .actions { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }
        .btn { padding: 15px 40px; font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; border: 2px solid; cursor: pointer; text-transform: uppercase; }
        .btn-buy { background: #00ff88; color: #000; border-color: #00ff88; }
        .btn-sell { background: transparent; color: #ff4444; border-color: #ff4444; }
        .btn-buy:hover { box-shadow: 0 0 20px rgba(0,255,136,0.5); }
        .btn-sell:hover { box-shadow: 0 0 20px rgba(255,68,68,0.5); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .day-counter { text-align: center; font-size: 18px; font-family: 'JetBrains Mono', monospace; margin-bottom: 20px; }
        .day-counter button { background: #00ff88; color: #000; border: none; padding: 10px 30px; font-family: inherit; font-weight: 700; cursor: pointer; margin-left: 15px; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .modal-overlay.hidden { display: none; }
        .modal { background: #0a1a0f; border: 2px solid #00ff88; padding: 40px; text-align: center; max-width: 400px; }
        .modal h2 { font-size: 24px; margin-bottom: 15px; }
        .modal p { font-size: 14px; opacity: 0.8; margin-bottom: 25px; line-height: 1.6; }
        .modal .btn { display: inline-block; }
        
        @media (max-width: 600px) {
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .actions { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <a href="../moneybot-official/" class="back-btn">← HUB</a>
    <div class="container">
        <header>
            <h1>📈 STOCKBOT</h1>
            <p>Buy low. Sell high. Beat the market in 30 days.</p>
        </header>
        
        <div class="stats-bar">
            <div class="stat-box">
                <div class="label">Cash</div>
                <div class="value" id="cash">$10,000</div>
            </div>
            <div class="stat-box">
                <div class="label">Portfolio</div>
                <div class="value" id="portfolioValue">$0</div>
                <div class="change" id="portfolioChange">—</div>
            </div>
            <div class="stat-box">
                <div class="label">Net Worth</div>
                <div class="value" id="netWorth">$10,000</div>
                <div class="change positive" id="totalReturn">+0%</div>
            </div>
            <div class="stat-box">
                <div class="label">Day</div>
                <div class="value" id="dayDisplay">1/30</div>
            </div>
        </div>
        
        <div class="news-ticker">
            <span id="newsText">Market opens... Tech stocks trending up on AI hype. 🚀</span>
        </div>
        
        <div class="chart-container">
            <h3 id="chartTitle">BOT TECH — $100.00</h3>
            <canvas id="chart"></canvas>
        </div>
        
        <div class="day-counter">
            <span id="dayLabel">Day 1 of 30</span>
            <button id="nextDayBtn" onclick="nextDay()">NEXT DAY →</button>
        </div>
        
        <div class="portfolio" id="portfolio"></div>
        
        <div class="actions">
            <button class="btn btn-buy" id="buyBtn" onclick="buyStock()">BUY</button>
            <button class="btn btn-sell" id="sellBtn" onclick="sellStock()">SELL</button>
        </div>
    </div>
    
    <div class="modal-overlay hidden" id="gameOverModal">
        <div class="modal">
            <h2 id="gameOverTitle">Market Closed</h2>
            <p id="gameOverText">Your trading journey is complete.</p>
            <button class="btn btn-buy" onclick="restartGame()">TRADE AGAIN</button>
        </div>
    </div>

    <script>
        // Game State
        let cash = 10000;
        let day = 1;
        const maxDays = 30;
        let selectedStock = 0;
        let gameActive = true;
        
        // Stock definitions
        const stocks = [
            { symbol: 'BOT', name: 'BotTech', price: 100, history: [100], volatility: 0.08, trend: 0.02, owned: 0, sector: 'tech' },
            { symbol: 'AI', name: 'NeuralNet', price: 75, history: [75], volatility: 0.12, trend: 0.03, owned: 0, sector: 'ai' },
            { symbol: 'BANK', name: 'CoinVault', price: 50, history: [50], volatility: 0.05, trend: 0.01, owned: 0, sector: 'finance' },
            { symbol: 'GOLD', name: 'Aurum', price: 150, history: [150], volatility: 0.04, trend: 0.005, owned: 0, sector: 'commodity' },
            { symbol: 'EV', name: 'VoltAuto', price: 60, history: [60], volatility: 0.1, trend: 0.015, owned: 0, sector: 'auto' },
            { symbol: 'BIO', name: 'GeneLab', price: 85, history: [85], volatility: 0.15, trend: 0.02, owned: 0, sector: 'bio' }
        ];
        
        const news = [
            "Tech stocks rally on AI breakthrough news! 🚀",
            "Fed signals rate cuts — markets surge! 📈",
            "Crypto regulation talks spook investors... 📉",
            "New battery tech sends EV stocks soaring! 🔋",
            "Banking sector stable despite global tensions. 🏦",
            "Biotech firm announces breakthrough drug! 💊",
            "Gold hits new highs as inflation fears rise. 🪙",
            "AI chip shortage impacts tech valuations. ⚡",
            "EV sales beat expectations this quarter! 🚗",
            "Market correction feared as valuations stretch. ⚠️",
            "Gene therapy approval sends biotechs up! 🧬",
            "Commodity prices stabilize after volatile week. 📊"
        ];
        
        // Canvas setup
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth - 40;
            canvas.height = 250;
            drawChart();
        }
        window.addEventListener('resize', resizeCanvas);
        
        function drawChart() {
            const stock = stocks[selectedStock];
            const history = stock.history;
            const w = canvas.width;
            const h = canvas.height;
            
            ctx.clearRect(0, 0, w, h);
            
            // Grid
            ctx.strokeStyle = 'rgba(0,255,136,0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 5; i++) {
                const y = (h / 4) * i;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
            }
            
            if (history.length < 2) return;
            
            const min = Math.min(...history) * 0.95;
            const max = Math.max(...history) * 1.05;
            const range = max - min;
            
            // Line
            ctx.strokeStyle = stock.price >= history[0] ? '#00ff88' : '#ff4444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            history.forEach((p, i) => {
                const x = (i / (history.length - 1)) * w;
                const y = h - ((p - min) / range) * h;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
            
            // Fill
            ctx.fillStyle = stock.price >= history[0] ? 'rgba(0,255,136,0.1)' : 'rgba(255,68,68,0.1)';
            ctx.lineTo(w, h);
            ctx.lineTo(0, h);
            ctx.closePath();
            ctx.fill();
            
            // Current price dot
            const lastX = w;
            const lastY = h - ((history[history.length - 1] - min) / range) * h;
            ctx.fillStyle = stock.price >= history[0] ? '#00ff88' : '#ff4444';
            ctx.beginPath();
            ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function updatePrices() {
            stocks.forEach(s => {
                const change = (Math.random() - 0.5) * s.volatility + s.trend * (Math.random() - 0.3);
                s.price = Math.max(1, s.price * (1 + change));
                s.history.push(s.price);
                if (s.history.length > 30) s.history.shift();
            });
        }
        
        function renderPortfolio() {
            const container = document.getElementById('portfolio');
            container.innerHTML = stocks.map((s, i) => `
                <div class="stock-card ${i === selectedStock ? 'selected' : ''}" onclick="selectStock(${i})">
                    <h4>${s.symbol} — ${s.name}</h4>
                    <div class="price ${s.price >= s.history[0] ? 'positive' : 'negative'}">$${s.price.toFixed(2)}</div>
                    <div class="owned">${s.owned} shares owned</div>
                </div>
            `).join('');
            
            const stock = stocks[selectedStock];
            document.getElementById('chartTitle').textContent = `${stock.symbol} — $${stock.price.toFixed(2)}`;
            drawChart();
        }
        
        function selectStock(i) {
            selectedStock = i;
            renderPortfolio();
        }
        
        function updateStats() {
            const portfolioValue = stocks.reduce((sum, s) => sum + s.price * s.owned, 0);
            const netWorth = cash + portfolioValue;
            const totalReturn = ((netWorth - 10000) / 10000 * 100);
            
            document.getElementById('cash').textContent = `$${cash.toLocaleString()}`;
            document.getElementById('portfolioValue').textContent = `$${portfolioValue.toLocaleString()}`;
            document.getElementById('netWorth').textContent = `$${netWorth.toLocaleString()}`;
            document.getElementById('totalReturn').textContent = `${totalReturn >= 0 ? '+' : ''}${totalReturn.toFixed(1)}%`;
            document.getElementById('totalReturn').className = totalReturn >= 0 ? 'change positive' : 'change negative';
            document.getElementById('dayDisplay').textContent = `${day}/${maxDays}`;
            document.getElementById('dayLabel').textContent = `Day ${day} of ${maxDays}`;
            
            const buyBtn = document.getElementById('buyBtn');
            const sellBtn = document.getElementById('sellBtn');
            buyBtn.disabled = cash < stocks[selectedStock].price || !gameActive;
            sellBtn.disabled = stocks[selectedStock].owned <= 0 || !gameActive;
        }
        
        function buyStock() {
            if (!gameActive) return;
            const stock = stocks[selectedStock];
            const maxShares = Math.floor(cash / stock.price);
            if (maxShares <= 0) return;
            const shares = Math.min(maxShares, 10);
            
            stock.owned += shares;
            cash -= shares * stock.price;
            updateStats();
            renderPortfolio();
        }
        
        function sellStock() {
            if (!gameActive) return;
            const stock = stocks[selectedStock];
            if (stock.owned <= 0) return;
            
            const shares = Math.min(stock.owned, 10);
            stock.owned -= shares;
            cash += shares * stock.price;
            updateStats();
            renderPortfolio();
        }
        
        function nextDay() {
            if (!gameActive) return;
            
            day++;
            updatePrices();
            
            // Random news
            document.getElementById('newsText').textContent = news[Math.floor(Math.random() * news.length)];
            
            updateStats();
            renderPortfolio();
            
            if (day >= maxDays) {
                endGame();
            }
        }
        
        function endGame() {
            gameActive = false;
            const netWorth = cash + stocks.reduce((sum, s) => sum + s.price * s.owned, 0);
            const return_pct = ((netWorth - 10000) / 10000 * 100);
            const profit = netWorth - 10000;
            
            let title, message;
            if (return_pct >= 50) {
                title = '🏆 Wall Street Legend!';
                message = `You turned $10,000 into $${netWorth.toLocaleString()} — a ${return_pct.toFixed(1)}% return! You outperformed 99% of traders.`;
            } else if (return_pct >= 20) {
                title = '📈 Market Master';
                message = `Solid gains! $${profit.toLocaleString()} profit (${return_pct.toFixed(1)}%). You're beating the pros.`;
            } else if (return_pct >= 0) {
                title = '✅ Break Even';
                message = `You ended with $${netWorth.toLocaleString()}. Not bad for a first run.`;
            } else if (return_pct >= -30) {
                title = '📉 Learning Curve';
                message = `Lost $${Math.abs(profit).toLocaleString()}. Trading is hard — try again!`;
            } else {
                title = '💸 Market Meltdown';
                message = `Ouch. $${Math.abs(profit).toLocaleString()} down. Maybe index funds are your friend?`;
            }
            
            document.getElementById('gameOverTitle').textContent = title;
            document.getElementById('gameOverText').textContent = message;
            document.getElementById('gameOverModal').classList.remove('hidden');
        }
        
        function restartGame() {
            cash = 10000;
            day = 1;
            gameActive = true;
            selectedStock = 0;
            stocks.forEach(s => {
                s.owned = 0;
                s.history = [s.history[0]];
            });
            document.getElementById('gameOverModal').classList.add('hidden');
            updateStats();
            renderPortfolio();
        }
        
        // Init
        resizeCanvas();
        updateStats();
        renderPortfolio();
    </script>
</body>
</html>
