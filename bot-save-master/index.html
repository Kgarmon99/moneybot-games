<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyBot - Bot Save Master</title>
    <link rel="icon" type="image/jpeg" href="assets/moneybot-logo-1.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
        :root { --moneybot-green: #22C55E; --moneybot-dark: #0F172A; --moneybot-white: #FFFFFF; --moneybot-gray: #64748B; }
        body { font-family: 'Inter', sans-serif; background: #FFFFFF; min-height: 100vh; color: #0F172A; }
        .app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: #FFFFFF; padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #22C55E; }
        .header-logo { display: flex; align-items: center; gap: 12px; }
        .moneybot-icon { width: 40px; height: 40px; border-radius: 8px; overflow: hidden; }
        .moneybot-icon img { width: 100%; height: 100%; object-fit: cover; }
        .header-title { font-weight: 800; font-size: 18px; color: #0F172A; }
        .back-btn { width: 44px; height: 44px; border-radius: 12px; background: #22C55E; border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; text-decoration: none; }
        .game-container { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        #gameCanvas { background: #F1F5F9; border-radius: 16px; width: 100%; max-width: 390px; height: 400px; margin: 0 auto 20px; }
        .game-controls { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .control-btn { background: #22C55E; color: white; border: none; padding: 16px 32px; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; transition: all 0.2s; }
        .control-btn:hover { background: #16A34A; transform: scale(1.05); }
        .score-board { display: flex; justify-content: space-around; padding: 16px; background: #F1F5F9; border-radius: 12px; margin-bottom: 16px; }
        .score-item { text-align: center; }
        .score-label { font-size: 12px; color: #64748B; text-transform: uppercase; }
        .score-value { font-size: 24px; font-weight: 800; color: #22C55E; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .overlay.hidden { display: none; }
        .game-icon { width: 120px; height: 120px; background: linear-gradient(135deg, #22C55E, #16A34A); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 60px; margin-bottom: 24px; box-shadow: 0 8px 32px rgba(34, 197, 94, 0.3); }
        .game-title { font-size: 32px; font-weight: 900; color: #0F172A; margin-bottom: 8px; }
        .game-desc { color: #64748B; font-size: 16px; margin-bottom: 32px; text-align: center; padding: 0 40px; }
        .start-btn { background: linear-gradient(135deg, #22C55E, #16A34A); color: white; border: none; padding: 20px 60px; border-radius: 16px; font-size: 18px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3); transition: all 0.2s; }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-logo">
                <a href="../moneybot-official/" class="back-btn">←</a>
                <div class="moneybot-icon"><img src="assets/moneybot-logo-1.jpg" /></div>
                <span class="header-title">Bot Save Master</span>
            </div>
        </header>
        
        <div class="game-container">
            <div class="score-board">
                <div class="score-item">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">High Score</div>
                    <div class="score-value" id="highScore">0</div>
                </div>
            </div>
            
            <canvas id="gameCanvas" width="390" height="400"></canvas>
            
            <div class="game-controls">
                <button class="control-btn" onclick="game.action()">💎 Play</button>
            </div>
        </div>
    </div>
    
    <div class="overlay" id="startOverlay">
        <div class="game-icon">💎</div>
        <div class="game-title">Bot Save Master</div>
        <div class="game-desc">Master your money skills! Tap to play, collect coins, avoid debt.</div>
        <button class="start-btn" onclick="game.start()">Start Playing</button>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const game = {
            score: 0,
            highScore: localStorage.getItem('bot-save-master_highscore') || 0,
            running: false,
            entities: [],
            
            init() {
                document.getElementById('highScore').textContent = this.highScore;
                this.drawBackground();
            },
            
            start() {
                document.getElementById('startOverlay').classList.add('hidden');
                this.running = true;
                this.score = 0;
                this.entities = this.createEntities();
                this.updateScore();
                this.loop();
            },
            
            createEntities() {
                // Create game-specific entities
                const entities = [];
                for (let i = 0; i < 5; i++) {
                    entities.push({
                        x: Math.random() * 350 + 20,
                        y: Math.random() * 350 + 20,
                        type: Math.random() > 0.3 ? 'coin' : 'debt',
                        value: Math.random() > 0.3 ? 10 : -20,
                        size: 20
                    });
                }
                return entities;
            },
            
            action() {
                if (!this.running) {
                    this.start();
                    return;
                }
                
                // Game action - collect nearest entity
                this.entities.forEach((entity, index) => {
                    if (entity.type === 'coin') {
                        this.score += entity.value;
                        this.entities[index] = {
                            x: Math.random() * 350 + 20,
                            y: Math.random() * 350 + 20,
                            type: Math.random() > 0.3 ? 'coin' : 'debt',
                            value: Math.random() > 0.3 ? 10 : -20,
                            size: 20
                        };
                    }
                });
                
                this.updateScore();
                this.draw();
                
                // Check for new high score
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('bot-save-master_highscore', this.highScore);
                    document.getElementById('highScore').textContent = this.highScore;
                }
            },
            
            loop() {
                if (!this.running) return;
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            },
            
            update() {
                // Update game logic
                this.entities.forEach(entity => {
                    entity.y += 0.5;
                    if (entity.y > 400) {
                        entity.y = -20;
                        entity.x = Math.random() * 350 + 20;
                    }
                });
            },
            
            draw() {
                this.drawBackground();
                
                // Draw entities
                this.entities.forEach(entity => {
                    ctx.font = '30px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(
                        entity.type === 'coin' ? '🪙' : '💸',
                        entity.x,
                        entity.y
                    );
                });
                
                // Draw player
                ctx.fillStyle = '#22C55E';
                ctx.beginPath();
                ctx.arc(195, 350, 20, 0, Math.PI * 2);
                ctx.fill();
            },
            
            drawBackground() {
                ctx.fillStyle = '#F1F5F9';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw grid
                ctx.strokeStyle = '#E2E8F0';
                ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += 40) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i < canvas.height; i += 40) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(canvas.width, i);
                    ctx.stroke();
                }
            },
            
            updateScore() {
                document.getElementById('score').textContent = this.score;
            }
        };
        
        // Touch controls
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            game.action();
        });
        
        canvas.addEventListener('click', () => {
            game.action();
        });
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                game.action();
            }
        });
        
        // Initialize
        game.init();
    </script>
</body>
</html>
