<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Money Surfers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
        body { background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .ui { position: absolute; top: 0; left: 0; right: 0; padding: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .back-btn { width: 44px; height: 44px; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; color: #fff; font-size: 20px; pointer-events: auto; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .score-box { text-align: right; }
        .score-label { font-size: 12px; color: #FFD700; font-weight: 700; letter-spacing: 2px; }
        .score-value { font-size: 48px; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .coins-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 20px; margin-top: 10px; }
        .coin-icon { width: 24px; height: 24px; background: linear-gradient(135deg, #FFD700, #FFA500); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #8B4513; font-size: 14px; }
        .coins-value { font-size: 20px; font-weight: 800; color: #FFD700; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .overlay.hidden { display: none; }
        .logo { width: 100px; height: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 30px rgba(34,197,94,0.5)); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .title { font-size: 36px; font-weight: 900; color: #fff; margin-bottom: 10px; }
        .title span { color: #22C55E; }
        .btn { background: linear-gradient(135deg, #22C55E, #16A34A); color: #fff; border: none; padding: 20px 60px; border-radius: 50px; font-size: 24px; font-weight: 900; cursor: pointer; margin-top: 30px; box-shadow: 0 10px 40px rgba(34,197,94,0.4); }
        .game-over-title { font-size: 48px; font-weight: 900; color: #ef4444; margin-bottom: 20px; }
        .final-score { font-size: 72px; font-weight: 900; color: #fff; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    
    <div class="ui">
        <a href="../moneybot-official/" class="back-btn">←</a>
        <div class="score-box">
            <div class="score-label">SCORE</div>
            <div class="score-value" id="score">0</div>
            <div class="coins-box">
                <div class="coin-icon">$</div>
                <div class="coins-value" id="coins">0</div>
            </div>
        </div>
    </div>
    
    <div class="overlay" id="startScreen">
        <img src="../flappybot/assets/player-rembg.png" class="logo" alt="MoneyBot">
        <div class="title">Money<span>Surfers</span></div>
        <button class="btn" onclick="game.start()">PLAY</button>
    </div>
    
    <div class="overlay hidden" id="gameOverScreen">
        <div class="game-over-title">GAME OVER</div>
        <div class="final-score" id="finalScore">0</div>
        <button class="btn" onclick="game.restart()">AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const LANE_WIDTH = 100;
        const PLAYER_Y = 0.8;
        const HORIZON_Y = 0.25;
        const COLLISION_Y_TOLERANCE = 55;
        
        const playerImg = new Image();
        playerImg.src = '../flappybot/assets/player-rembg.png';
        
        const game = {
            state: 'menu',
            score: 0,
            coins: 0,
            lane: 1,
            targetLane: 1,
            playerX: 0,
            speed: 8,
            items: [],
            particles: [],
            
            resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                this.playerX = this.getLaneX(1);
            },
            
            getLaneX(lane) {
                const startX = (canvas.width - LANE_WIDTH * 3) / 2;
                return startX + lane * LANE_WIDTH + LANE_WIDTH / 2;
            },
            
            start() {
                this.state = 'playing';
                this.score = 0;
                this.coins = 0;
                this.lane = 1;
                this.targetLane = 1;
                this.playerX = this.getLaneX(1);
                this.speed = 8;
                this.items = [];
                this.particles = [];
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameOverScreen').classList.add('hidden');
                this.loop();
            },
            
            restart() {
                this.start();
            },
            
            gameOver() {
                this.state = 'gameover';
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOverScreen').classList.remove('hidden');
            },
            
            move(dir) {
                if (this.state !== 'playing') return;
                const newLane = this.targetLane + dir;
                if (newLane >= 0 && newLane <= 2) {
                    this.targetLane = newLane;
                }
            },
            
            spawn() {
                const lane = Math.floor(Math.random() * 3);
                const isTrain = Math.random() > 0.5;
                this.items.push({
                    type: isTrain ? 'train' : 'coin',
                    lane: lane,
                    y: canvas.height * HORIZON_Y - 80,
                    collected: false
                });
            },
            
            update() {
                if (this.state !== 'playing') return;
                
                this.score++;
                this.speed = Math.min(18, 8 + this.score / 300);
                document.getElementById('score').textContent = this.score;
                document.getElementById('coins').textContent = this.coins;
                
                // Smooth lane movement
                const targetX = this.getLaneX(this.targetLane);
                this.playerX += (targetX - this.playerX) * 0.2;
                this.lane = this.targetLane;
                
                // Spawn
                if (Math.random() < 0.02) this.spawn();

                const playerY = canvas.height * PLAYER_Y;
                
                // Update items
                for (let i = this.items.length - 1; i >= 0; i--) {
                    const item = this.items[i];
                    item.y += this.speed;
                    
                    const pos = this.getPos(item.lane, item.y);
                    
                    // Collision is intentionally lane-based and Y-based.
                    const sameLane = item.lane === this.lane;
                    const atPlayerY = Math.abs(item.y - playerY) <= COLLISION_Y_TOLERANCE;
                    if (sameLane && atPlayerY && !item.collected) {
                        if (item.type === 'train') {
                            this.gameOver();
                            return;
                        } else {
                            item.collected = true;
                            this.coins++;
                            this.createParticles(pos.x, pos.y);
                        }
                    }
                    
                    if (item.y > canvas.height + 200 || item.collected) {
                        this.items.splice(i, 1);
                    }
                }
                
                // Particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.5;
                    p.life -= 0.05;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
            },
            
            getPos(lane, y) {
                const horizonY = canvas.height * HORIZON_Y;
                const playerY = canvas.height * PLAYER_Y;
                const t = Math.max(0, Math.min(1, (y - horizonY) / (playerY - horizonY)));
                const scale = 0.3 + t * 0.7;
                const laneX = this.getLaneX(lane);
                const centerX = canvas.width / 2;
                const screenX = centerX + (laneX - centerX) * scale;
                return { x: screenX, y: y, scale: scale };
            },
            
            createParticles(x, y) {
                for (let i = 0; i < 10; i++) {
                    this.particles.push({
                        x: x, y: y,
                        vx: (Math.random() - 0.5) * 10,
                        vy: -Math.random() * 10 - 5,
                        life: 1,
                        color: '#FFD700'
                    });
                }
            },
            
            draw() {
                // Background
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const horizonY = canvas.height * HORIZON_Y;
                
                // Sky
                const grad = ctx.createLinearGradient(0, 0, 0, horizonY);
                grad.addColorStop(0, '#0d1b2a');
                grad.addColorStop(1, '#1b263b');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, horizonY);
                
                // City
                this.drawCity(horizonY);
                
                // Track
                this.drawTrack(horizonY);
                
                // Items
                this.items.sort((a, b) => a.y - b.y);
                this.items.forEach(item => {
                    if (!item.collected) {
                        const pos = this.getPos(item.lane, item.y);
                        if (pos.y > horizonY - 50) {
                            if (item.type === 'train') {
                                this.drawTrain(pos.x, pos.y, pos.scale);
                            } else {
                                this.drawCoin(pos.x, pos.y, pos.scale);
                            }
                        }
                    }
                });
                
                // Player
                this.drawPlayer();
                
                // Particles
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
            },
            
            drawCity(y) {
                const buildings = [
                    { x: 0.1, w: 0.12, h: 0.4 },
                    { x: 0.75, w: 0.15, h: 0.5 }
                ];
                buildings.forEach(b => {
                    const x = b.x * canvas.width;
                    const w = b.w * canvas.width;
                    const h = b.h * y;
                    ctx.fillStyle = '#0f0f1f';
                    ctx.fillRect(x, y - h, w, h);
                    ctx.fillStyle = 'rgba(255, 200, 50, 0.3)';
                    for (let wy = y - h + 30; wy < y - 20; wy += 40) {
                        for (let wx = x + 15; wx < x + w - 10; wx += 25) {
                            if ((wx + wy) % 50 < 30) ctx.fillRect(wx, wy, 10, 15);
                        }
                    }
                });
            },
            
            drawTrack(y) {
                const playerY = canvas.height * PLAYER_Y;
                const w = LANE_WIDTH * 3;
                
                // Track surface
                ctx.fillStyle = '#1a1a2e';
                ctx.beginPath();
                ctx.moveTo(canvas.width/2 - w*0.2, y);
                ctx.lineTo(canvas.width/2 + w*0.2, y);
                ctx.lineTo(canvas.width/2 + w*0.8, playerY);
                ctx.lineTo(canvas.width/2 - w*0.8, playerY);
                ctx.closePath();
                ctx.fill();
                
                // Lane lines
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 2;
                for (let i = 1; i < 3; i++) {
                    const t = i / 3;
                    const x1 = canvas.width/2 - w*0.2 + t * w*0.4;
                    const x2 = canvas.width/2 - w*0.8 + t * w*1.6;
                    ctx.beginPath();
                    ctx.moveTo(x1, y);
                    ctx.lineTo(x2, playerY);
                    ctx.stroke();
                }
                
                // Third rail
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(canvas.width/2 - w*0.22, y);
                ctx.lineTo(canvas.width/2 - w*0.85, playerY);
                ctx.stroke();
            },
            
            drawTrain(x, y, s) {
                const w = 90 * s;
                const h = 140 * s;
                
                ctx.fillStyle = '#dc2626';
                ctx.fillRect(x - w/2, y - h, w, h);
                
                ctx.fillStyle = '#1e3a5f';
                ctx.fillRect(x - w/2 + w*0.1, y - h + h*0.1, w*0.8, h*0.2);
                
                ctx.fillStyle = '#fca5a5';
                ctx.fillRect(x - w/2, y - h*0.4, w, h*0.05);
                
                ctx.fillStyle = '#fef08a';
                ctx.beginPath();
                ctx.arc(x - w*0.25, y - h*0.05, 10*s, 0, Math.PI*2);
                ctx.arc(x + w*0.25, y - h*0.05, 10*s, 0, Math.PI*2);
                ctx.fill();
            },
            
            drawCoin(x, y, s) {
                const size = 30 * s;
                const rot = Date.now() / 150;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.scale(Math.abs(Math.sin(rot)), 1);
                
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(0, 0, size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#FFA500';
                ctx.beginPath();
                ctx.arc(0, 0, size * 0.7, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#8B4513';
                ctx.font = `bold ${size}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', 0, 2);
                
                ctx.restore();
            },
            
            drawPlayer() {
                const y = canvas.height * PLAYER_Y;
                const size = 80;
                
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(this.playerX, y + 35, 35, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                
                if (playerImg.complete) {
                    ctx.drawImage(playerImg, this.playerX - size/2, y - size, size, size);
                } else {
                    ctx.fillStyle = '#22C55E';
                    ctx.fillRect(this.playerX - size/2, y - size, size, size);
                }
            },
            
            loop() {
                if (this.state !== 'playing') return;
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        };
        
        game.resize();
        window.addEventListener('resize', () => game.resize());
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') game.move(-1);
            if (e.key === 'ArrowRight') game.move(1);
        });
        
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        }, { passive: true });
        
        canvas.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) > 40) game.move(dx > 0 ? 1 : -1);
        }, { passive: true });
    </script>
</body>
</html>
