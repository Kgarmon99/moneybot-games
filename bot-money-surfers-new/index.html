<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#07111F">
    <title>Money Surfers — Cashflow Runner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="game"></canvas>
    
    <!-- HUD -->
    <div class="ui">
        <a href="../moneybot-official/" class="back-btn">←</a>
        <div class="score-box">
            <div class="score-label">Distance</div>
            <div class="score-value" id="score">0</div>
            
            <div class="runway-box">
                <div class="runway-label">Runway</div>
                <div class="runway-bar">
                    <div class="runway-fill" id="runwayFill" style="width: 30%"></div>
                </div>
                <div class="runway-value" id="runwayValue">30 months</div>
            </div>
            
            <div class="coins-box">
                <div class="coin-icon">$</div>
                <div class="coins-value" id="coins">0</div>
            </div>
        </div>
    </div>
    
    <!-- Start Screen -->
    <div class="overlay" id="startScreen">
        <img src="../../moneybot-code/references/mascot/canonical-operator-reference.png" class="logo" alt="MoneyBot" onerror="this.style.display='none'">
        <div class="title">Money<span>Surfers</span></div>
        <div class="subtitle">Collect income, avoid expenses, keep your runway alive!</div>
        <button class="btn" onclick="game.start()">PLAY</button>
    </div>
    
    <!-- Game Over Screen -->
    <div class="overlay hidden" id="gameOverScreen">
        <div class="game-over-title">Runway Depleted</div>
        <div class="game-over-reason" id="gameOverReason">Cashflow couldn't keep up!</div>
        
        <div class="stats-box">
            <div class="stats-row">
                <div class="stat">
                    <div class="stat-label">Distance</div>
                    <div class="stat-value" id="finalScore">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Income</div>
                    <div class="stat-value coins" id="finalCoins">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Runway Left</div>
                    <div class="stat-value" id="finalRunway">0</div>
                </div>
            </div>
        </div>
        
        <div class="tip-box">
            <div class="tip-title">Money Tip</div>
            <div class="tip-text" id="gameOverTip">Collect more income to extend your runway!</div>
        </div>
        
        <button class="btn" onclick="game.restart()">TRY AGAIN</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
