<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yield Merge - MoneyBot</title>
    <link rel="stylesheet" href="style.css">
    <!-- Matter.js Physics Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
    <a href="../moneybot-official/" class="back-btn">← Hub</a>
    
    <div id="game-container">
        <header id="hud">
            <div class="score-container">
                <span class="label">NET WORTH</span>
                <span id="score-display" class="value">$0</span>
            </div>
            <div class="next-container">
                <span class="label">NEXT</span>
                <div id="next-preview"></div>
            </div>
        </header>

        <main id="play-area">
            <canvas id="game-canvas" width="400" height="700"></canvas>
            <div id="danger-line"></div>
        </main>

        <div id="modal" class="modal active">
            <div class="modal-content">
                <h1 id="modal-title">Yield Merge</h1>
                <p id="modal-desc">
                    Combine assets to build the ultimate portfolio!<br><br>
                    🪙 + 🪙 = 💵<br>
                    💵 + 💵 = 📄<br><br>
                    Tap or drag to drop assets into the vault. Don't let them spill over the top line!
                </p>
                <button id="modal-btn" class="mb-btn-primary">START COMPOUNDING</button>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
