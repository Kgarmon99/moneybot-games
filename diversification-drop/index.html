<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyBot - Diversification Drop | MoneyBot</title>
    <link rel="icon" type="image/svg+xml" href="../assets/moneybot-idle.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-light: #69F0AE;
            --moneybot-green-dark: #00C853;
            --moneybot-gold: #FBBF24;
            --moneybot-red: #FF5252;
            --moneybot-dark: #1A1A2E;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--moneybot-gray);
            min-height: 100vh;
            color: var(--moneybot-text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 230, 118, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 230, 118, 0.05) 0%, transparent 50%),
                var(--moneybot-gray);
            pointer-events: none;
            z-index: 0;
        }
        
        .app {
            position: relative;
            z-index: 1;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--moneybot-gray);
        }
        
        .header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(0, 230, 118, 0.1);
            color: var(--moneybot-green);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
            text-decoration: none;
        }
        
        .back-btn:hover {
            background: rgba(0, 230, 118, 0.2);
            transform: translateX(-2px);
        }
        
        .back-btn svg {
            width: 20px;
            height: 20px;
        }
        
        .header-logo img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
        }
        
        .header-title {
            font-weight: 700;
            font-size: 17px;
            letter-spacing: -0.3px;
        }
        
        .balance-card {
            background: linear-gradient(135deg, var(--moneybot-green) 0%, var(--moneybot-green-dark) 100%);
            margin: 20px;
            padding: 24px;
            border-radius: 24px;
            color: #0F172A;
            box-shadow: 0 20px 40px rgba(0, 230, 118, 0.3);
        }
        
        .balance-label {
            font-size: 13px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .balance-amount {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        
        .game-container {
            margin: 0 20px 20px;
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--shadow-md);
        }
        
        #gameCanvas {
            width: 100%;
            height: 400px;
            border-radius: 16px;
            background: linear-gradient(180deg, #1A1A2E 0%, #FFFFFF 100%);
        }
        
        .multiplier-legend {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--moneybot-text-secondary);
            background: rgba(0,0,0,0.05);
            padding: 6px 12px;
            border-radius: 16px;
        }
        
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
        
        .controls {
            margin: 0 20px 20px;
        }
        
        .drop-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: #0F172A;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
            box-shadow: 0 8px 20px rgba(0, 230, 118, 0.3);
        }
        
        .drop-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 230, 118, 0.4);
        }
        
        .drop-btn:active {
            transform: scale(0.98);
        }
        
        .drop-btn:disabled {
            background: #CBD5E1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .stats-row {
            display: flex;
            gap: 12px;
            margin: 0 20px 20px;
        }
        
        .stat-card {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--moneybot-green);
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--moneybot-text-secondary);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    
    <div class="app">
        <header class="header">
            <div class="header-logo">
                <a href="../moneybot-official/" class="back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </a>
                <span class="header-title">MoneyBot</span>
            </div>
        </header>
        
        <div class="balance-card">
            <div class="balance-label">Portfolio Value</div>
            <div class="balance-amount" id="balance">$1,000</div>
        </div>
        
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="drops">5</div>
                <div class="stat-label">Drops Left</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="multiplier">0x</div>
                <div class="stat-label">Last Multiplier</div>
            </div>
        </div>
        
        <div class="game-container">
            <canvas id="gameCanvas" width="350" height="400"></canvas>
            
            <div class="multiplier-legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #EF4444;"></div>
                    <span>0.5x Safe</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #F59E0B;"></div>
                    <span>1x Balanced</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #22C55E;"></div>
                    <span>2x Growth</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #8B5CF6;"></div>
                    <span>5x Aggressive</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #FBBF24;"></div>
                    <span>10x Moonshot</span>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="drop-btn" id="dropBtn" onclick="dropCoin()">DROP COIN ($100)</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const PEG_RADIUS = 6;
        const COIN_RADIUS = 12;
        const MULTIPLIERS = [0.5, 0.5, 1, 1, 2, 2, 5, 10];
        const MULTIPLIER_COLORS = ['#EF4444', '#EF4444', '#F59E0B', '#F59E0B', '#22C55E', '#22C55E', '#8B5CF6', '#FBBF24'];
        
        let balance = 1000;
        let dropsLeft = 5;
        let coin = null;
        let pegs = [];
        let animating = false;
        
        function initPegs() {
            pegs = [];
            for (let row = 3; row < 15; row++) {
                for (let col = 0; col < 9; col++) {
                    const x = 40 + col * 35 + (row % 2) * 17;
                    const y = 40 + row * 25;
                    if (x > 20 && x < 330) pegs.push({ x, y });
                }
            }
        }
        
        function draw() {
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw pegs with glow
            pegs.forEach(peg => {
                ctx.shadowColor = 'rgba(0, 230, 118, 0.5)';
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#64748B';
                ctx.beginPath();
                ctx.arc(peg.x, peg.y, PEG_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
            
            // Draw multiplier slots
            const slotWidth = canvas.width / MULTIPLIERS.length;
            MULTIPLIERS.forEach((mult, i) => {
                ctx.fillStyle = MULTIPLIER_COLORS[i];
                ctx.fillRect(i * slotWidth, canvas.height - 50, slotWidth, 50);
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 12px Inter';
                ctx.textAlign = 'center';
                ctx.fillText(mult + 'x', i * slotWidth + slotWidth/2, canvas.height - 20);
            });
            
            // Draw coin with glow
            if (coin) {
                ctx.shadowColor = '#FBBF24';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#FBBF24';
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, COIN_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#92400E';
                ctx.font = 'bold 10px Inter';
                ctx.fillText('$', coin.x, coin.y + 3);
                ctx.shadowBlur = 0;
            }
        }
        
        function dropCoin() {
            if (animating || dropsLeft <= 0 || balance < 100) return;
            
            animating = true;
            balance -= 100;
            dropsLeft--;
            updateUI();
            
            coin = { 
                x: canvas.width / 2 + (Math.random() - 0.5) * 60, 
                y: 20, 
                vx: 0, 
                vy: 2 
            };
            
            function animate() {
                if (!coin) return;
                
                coin.vy += 0.3;
                coin.x += coin.vx;
                coin.y += coin.vy;
                
                // Bounce off pegs
                pegs.forEach(peg => {
                    const dx = coin.x - peg.x;
                    const dy = coin.y - peg.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < COIN_RADIUS + PEG_RADIUS) {
                        const angle = Math.atan2(dy, dx);
                        coin.vx = Math.cos(angle) * 3;
                        coin.vy = Math.abs(Math.sin(angle)) * 2;
                        
                        if (navigator.vibrate) navigator.vibrate(5);
                    }
                });
                
                // Wall bounce
                if (coin.x < COIN_RADIUS || coin.x > canvas.width - COIN_RADIUS) {
                    coin.vx *= -0.8;
                    coin.x = Math.max(COIN_RADIUS, Math.min(canvas.width - COIN_RADIUS, coin.x));
                }
                
                draw();
                
                if (coin.y < canvas.height - 50) {
                    requestAnimationFrame(animate);
                } else {
                    // Landed
                    const slotIndex = Math.floor(coin.x / (canvas.width / MULTIPLIERS.length));
                    const multiplier = MULTIPLIERS[Math.min(slotIndex, MULTIPLIERS.length - 1)];
                    const win = Math.floor(100 * multiplier);
                    balance += win;
                    
                    document.getElementById('multiplier').textContent = multiplier + 'x';
                    
                    setTimeout(() => {
                        coin = null;
                        animating = false;
                        updateUI();
                        
                        if (dropsLeft === 0) {
                            setTimeout(() => {
                                alert(`Game Over! Final Balance: $${balance}`);
                                resetGame();
                            }, 500);
                        }
                    }, 100);
                }
            }
            
            animate();
        }
        
        function resetGame() {
            balance = 1000;
            dropsLeft = 5;
            coin = null;
            animating = false;
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('balance').textContent = '$' + balance.toLocaleString();
            document.getElementById('drops').textContent = dropsLeft;
            document.getElementById('dropBtn').disabled = dropsLeft <= 0 || balance < 100;
            document.getElementById('dropBtn').textContent = dropsLeft <= 0 ? 'GAME OVER' : `DROP COIN ($100)`;
        }
        
        initPegs();
        draw();
        updateUI();
    </script>
</body>
</html>
