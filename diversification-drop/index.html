<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diversification Drop | MoneyBot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-light: #69F0AE;
            --moneybot-green-dark: #00C853;
            --moneybot-gold: #FBBF24;
            --moneybot-purple: #8B5CF6;
            --moneybot-dark: #1A1A2E;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
            --moneybot-text-secondary: #6B7280;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
            background: var(--moneybot-gray);
            min-height: 100vh;
            color: var(--moneybot-text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Animated Background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 230, 118, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 230, 118, 0.05) 0%, transparent 50%),
                var(--moneybot-gray);
            pointer-events: none;
            z-index: 0;
        }
        
        /* App Container */
        .app {
            position: relative;
            z-index: 1;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--moneybot-gray);
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
        }
        
        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(0, 230, 118, 0.1);
            color: var(--moneybot-green);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
            text-decoration: none;
        }
        
        .back-btn:hover {
            background: rgba(0, 230, 118, 0.2);
            transform: translateX(-2px);
        }
        
        .back-btn:active {
            transform: scale(0.92);
        }
        
        .header-title {
            font-weight: 700;
            font-size: 17px;
            letter-spacing: -0.3px;
        }
        
        .header-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(0, 230, 118, 0.1);
            color: var(--moneybot-green);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
        }
        
        .icon-btn:active {
            transform: scale(0.92);
            background: rgba(0, 230, 118, 0.2);
        }
        
        /* Stats Card */
        .stats-card {
            background: white;
            margin: 16px 20px;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            box-shadow: var(--shadow-md);
            gap: 16px;
        }
        
        .stat-item {
            text-align: center;
            flex: 1;
        }
        
        .stat-value {
            font-weight: 800;
            font-size: 28px;
            color: var(--moneybot-green);
            margin-bottom: 4px;
            transition: all 0.3s var(--ease-spring);
        }
        
        .stat-value.pulse {
            transform: scale(1.2);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--moneybot-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        /* Game Container */
        .game-container {
            background: linear-gradient(180deg, #1A1A2E 0%, #0F172A 100%);
            margin: 0 20px 20px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            position: relative;
        }
        
        #game-canvas {
            display: block;
            width: 100%;
        }
        
        /* Multiplier Legend */
        .legend {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 0 20px 20px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--moneybot-text-secondary);
            background: white;
            padding: 8px 12px;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
        }
        
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }
        
        /* Controls */
        .controls {
            padding: 0 20px;
            display: flex;
            gap: 12px;
        }
        
        .drop-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--moneybot-green) 0%, var(--moneybot-green-dark) 100%);
            color: white;
            border: none;
            padding: 18px 32px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 
                0 8px 24px rgba(0, 230, 118, 0.4),
                inset 0 1px 0 rgba(255,255,255,0.2);
            transition: all 0.2s var(--ease-spring);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .drop-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 12px 32px rgba(0, 230, 118, 0.5),
                inset 0 1px 0 rgba(255,255,255,0.2);
        }
        
        .drop-btn:active {
            transform: scale(0.96);
        }
        
        .drop-btn:disabled {
            background: #CBD5E1;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        
        .new-game-btn {
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
            color: white;
            border: none;
            padding: 18px 24px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
            transition: all 0.2s var(--ease-spring);
        }
        
        .new-game-btn:active {
            transform: scale(0.96);
        }
        
        /* Result Popup */
        .result-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 24px 32px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }
        
        .result-popup.show {
            animation: resultPop 1.5s ease forwards;
        }
        
        @keyframes resultPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -40%) scale(0.9); }
        }
        
        .result-multiplier {
            font-size: 36px;
            font-weight: 800;
            color: var(--moneybot-green);
            margin-bottom: 4px;
        }
        
        .result-amount {
            font-size: 18px;
            font-weight: 600;
            color: var(--moneybot-text);
        }
        
        /* Game Over Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            max-width: 320px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.4s var(--ease-spring);
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--moneybot-text);
        }
        
        .modal-subtitle {
            font-size: 15px;
            color: var(--moneybot-text-secondary);
            margin-bottom: 24px;
        }
        
        .modal-balance {
            font-size: 42px;
            font-weight: 800;
            color: var(--moneybot-green);
            margin-bottom: 24px;
        }
        
        .modal-btn {
            width: 100%;
            background: var(--moneybot-green);
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
        }
        
        .modal-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    
    <div class="app">
        <header class="header">
            <div class="header-logo">
                <a href="../moneybot-official/" class="back-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </a>
                <span class="header-title">Diversification Drop</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="newGame()">🔄</button>
            </div>
        </header>
        
        <div class="stats-card">
            <div class="stat-item">
                <div class="stat-value" id="balance">$1000</div>
                <div class="stat-label">Balance</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="drops">5</div>
                <div class="stat-label">Drops Left</div>
            </div>
        </div>
        
        <div class="game-container">
            <canvas id="game-canvas" width="350" height="500"></canvas>
            <div class="result-popup" id="resultPopup">
                <div class="result-multiplier" id="resultMultiplier">2x</div>
                <div class="result-amount" id="resultAmount">+$200</div>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #EF4444;"></div>
                <span>0.5x</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #F59E0B;"></div>
                <span>1x</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #00E676;"></div>
                <span>2x</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #8B5CF6;"></div>
                <span>5x</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #FBBF24;"></div>
                <span>10x</span>
            </div>
        </div>
        
        <div class="controls">
            <button class="drop-btn" id="dropBtn" onclick="dropCoin()">Drop Coin</button>
            <button class="new-game-btn" onclick="newGame()">New Game</button>
        </div>
    </div>
    
    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <div class="modal-icon">🎲</div>
            <div class="modal-title">Game Complete!</div>
            <div class="modal-subtitle">Your portfolio diversification results</div>
            <div class="modal-balance" id="modalBalance">$0</div>
            <button class="modal-btn" onclick="closeModal()">Play Again</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        const PEG_RADIUS = 5;
        const COIN_RADIUS = 12;
        const MULTIPLIERS = [0.5, 0.5, 1, 1, 2, 2, 5, 10];
        const MULTIPLIER_COLORS = ['#EF4444', '#EF4444', '#F59E0B', '#F59E0B', '#00E676', '#00E676', '#8B5CF6', '#FBBF24'];
        
        let balance = 1000;
        let dropsLeft = 5;
        let coin = null;
        let pegs = [];
        let animating = false;
        
        function initPegs() {
            pegs = [];
            for (let row = 3; row < 13; row++) {
                for (let col = 0; col < 9; col++) {
                    const x = 35 + col * 40 + (row % 2) * 20;
                    const y = 40 + row * 32;
                    if (x > 25 && x < 325) pegs.push({ x, y });
                }
            }
        }
        
        function draw() {
            // Background
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1A1A2E');
            gradient.addColorStop(1, '#0F172A');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw pegs with glow
            pegs.forEach(peg => {
                ctx.shadowColor = 'rgba(0, 230, 118, 0.5)';
                ctx.shadowBlur = 8;
                ctx.fillStyle = '#00E676';
                ctx.beginPath();
                ctx.arc(peg.x, peg.y, PEG_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
            
            // Draw multiplier slots
            const slotWidth = canvas.width / MULTIPLIERS.length;
            MULTIPLIERS.forEach((mult, i) => {
                const x = i * slotWidth;
                const y = canvas.height - 50;
                
                // Slot background
                ctx.fillStyle = MULTIPLIER_COLORS[i];
                ctx.fillRect(x, y, slotWidth, 50);
                
                // Slot highlight
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(x, y, slotWidth, 3);
                
                // Multiplier text
                ctx.fillStyle = 'white';
                ctx.font = 'bold 14px -apple-system, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(mult + 'x', x + slotWidth/2, y + 30);
            });
            
            // Draw coin
            if (coin) {
                // Coin glow
                ctx.shadowColor = '#FBBF24';
                ctx.shadowBlur = 20;
                
                // Coin body
                ctx.fillStyle = '#FBBF24';
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, COIN_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                
                // Inner shine
                ctx.fillStyle = '#FDE68A';
                ctx.beginPath();
                ctx.arc(coin.x - 3, coin.y - 3, 6, 0, Math.PI * 2);
                ctx.fill();
                
                // $ symbol
                ctx.fillStyle = '#92400E';
                ctx.font = 'bold 12px -apple-system, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('$', coin.x, coin.y + 4);
            }
        }
        
        function dropCoin() {
            if (animating || dropsLeft <= 0 || balance < 100) return;
            
            animating = true;
            balance -= 100;
            dropsLeft--;
            updateDisplay();
            if (navigator.vibrate) navigator.vibrate(20);
            
            coin = { 
                x: canvas.width/2 + (Math.random() - 0.5) * 60, 
                y: 20, 
                vx: 0, 
                vy: 0,
                trail: []
            };
            
            function animate() {
                if (!coin) return;
                
                // Physics
                coin.vy += 0.4;
                coin.x += coin.vx;
                coin.y += coin.vy;
                
                // Trail effect
                coin.trail.push({ x: coin.x, y: coin.y });
                if (coin.trail.length > 8) coin.trail.shift();
                
                // Bounce off pegs
                pegs.forEach(peg => {
                    const dx = coin.x - peg.x;
                    const dy = coin.y - peg.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < COIN_RADIUS + PEG_RADIUS) {
                        const angle = Math.atan2(dy, dx);
                        coin.vx = Math.cos(angle) * 3;
                        coin.vy = Math.abs(Math.sin(angle)) * 2;
                        if (navigator.vibrate) navigator.vibrate(5);
                    }
                });
                
                // Wall bounce
                if (coin.x < COIN_RADIUS) {
                    coin.vx = Math.abs(coin.vx) * 0.8;
                    coin.x = COIN_RADIUS;
                } else if (coin.x > canvas.width - COIN_RADIUS) {
                    coin.vx = -Math.abs(coin.vx) * 0.8;
                    coin.x = canvas.width - COIN_RADIUS;
                }
                
                draw();
                
                // Draw trail
                coin.trail.forEach((pos, i) => {
                    ctx.globalAlpha = i / coin.trail.length * 0.5;
                    ctx.fillStyle = '#FBBF24';
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, COIN_RADIUS * (i/coin.trail.length), 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
                
                if (coin.y < canvas.height - 60) {
                    requestAnimationFrame(animate);
                } else {
                    // Landed
                    const slotIndex = Math.floor(coin.x / (canvas.width / MULTIPLIERS.length));
                    const multiplier = MULTIPLIERS[Math.min(slotIndex, MULTIPLIERS.length - 1)];
                    const win = Math.floor(100 * multiplier);
                    balance += win;
                    
                    // Show result popup
                    const popup = document.getElementById('resultPopup');
                    document.getElementById('resultMultiplier').textContent = multiplier + 'x';
                    document.getElementById('resultAmount').textContent = '+$' + win;
                    popup.classList.add('show');
                    
                    if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
                    
                    setTimeout(() => {
                        popup.classList.remove('show');
                        coin = null;
                        animating = false;
                        updateDisplay();
                        if (dropsLeft === 0) endGame();
                    }, 1200);
                }
            }
            
            animate();
        }
        
        function updateDisplay() {
            const balanceEl = document.getElementById('balance');
            const dropsEl = document.getElementById('drops');
            
            balanceEl.textContent = '$' + balance.toLocaleString();
            dropsEl.textContent = dropsLeft;
            
            document.getElementById('dropBtn').disabled = dropsLeft <= 0 || balance < 100;
            
            if (balance > parseInt(balanceEl.dataset.value || 0)) {
                balanceEl.classList.add('pulse');
                setTimeout(() => balanceEl.classList.remove('pulse'), 300);
            }
            balanceEl.dataset.value = balance;
        }
        
        function endGame() {
            document.getElementById('modalBalance').textContent = '$' + balance.toLocaleString();
            document.getElementById('gameOverModal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('gameOverModal').classList.remove('show');
            newGame();
        }
        
        function newGame() {
            balance = 1000;
            dropsLeft = 5;
            coin = null;
            animating = false;
            updateDisplay();
            draw();
        }
        
        // Touch to drop
        canvas.addEventListener('click', dropCoin);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            dropCoin();
        });
        
        initPegs();
        draw();
        updateDisplay();
    </script>
</body>
</html>
