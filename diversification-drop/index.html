<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diversification Drop - Plinko Style</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --mb-green: #22C55E; --mb-gold: #FBBF24; --mb-dark: #0F172A; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #F8FAFC 0%, #E2E8F0 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: var(--mb-dark); font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #64748B; margin-bottom: 15px; text-align: center; font-size: 0.9rem; }
        #game-container { position: relative; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); padding: 20px; }
        canvas { display: block; border-radius: 10px; background: linear-gradient(180deg, #1E293B 0%, #0F172A 100%); }
        .stats { display: flex; gap: 20px; margin-bottom: 15px; justify-content: center; }
        .stat-box { background: white; padding: 10px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .stat-value { font-size: 1.3rem; font-weight: 700; color: var(--mb-green); }
        .stat-label { font-size: 0.7rem; color: #64748B; text-transform: uppercase; }
        .controls { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .btn { background: linear-gradient(135deg, var(--mb-green), #16A34A); color: white; border: none; padding: 12px 30px; font-size: 1rem; font-weight: 700; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); }
        .btn:disabled { background: #CBD5E1; cursor: not-allowed; box-shadow: none; }
        .multiplier-legend { display: flex; gap: 15px; margin-top: 15px; justify-content: center; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.85rem; color: #64748B; }
        .legend-color { width: 20px; height: 20px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🎲 Diversification Drop</h1>
    <p class="subtitle">Drop coins to build a diversified portfolio!<br>Based on The Price is Right Plinko</p>
    <div class="stats">
        <div class="stat-box">
            <div class="stat-value" id="balance">$1000</div>
            <div class="stat-label">Balance</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="drops">5</div>
            <div class="stat-label">Drops Left</div>
        </div>
    </div>
    <div id="game-container">
        <canvas id="canvas" width="400" height="600"></canvas>
    </div>
    <div class="controls">
        <button class="btn" id="dropBtn" onclick="dropCoin()">DROP COIN</button>
        <button class="btn" onclick="newGame()" style="background: linear-gradient(135deg, #3B82F6, #2563EB);">NEW GAME</button>
    </div>
    <div class="multiplier-legend">
        <div class="legend-item"><div class="legend-color" style="background: #EF4444;"></div>0.5x (Conservative)</div>
        <div class="legend-item"><div class="legend-color" style="background: #F59E0B;"></div>1x (Balanced)</div>
        <div class="legend-item"><div class="legend-color" style="background: #22C55E;"></div>2x (Growth)</div>
        <div class="legend-item"><div class="legend-color" style="background: #8B5CF6;"></div>5x (Aggressive)</div>
        <div class="legend-item"><div class="legend-color" style="background: #FBBF24;"></div>10x (Moonshot)</div>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const PEG_RADIUS = 6;
        const COIN_RADIUS = 12;
        const MULTIPLIERS = [0.5, 0.5, 1, 1, 2, 2, 5, 10];
        const MULTIPLIER_COLORS = ['#EF4444', '#EF4444', '#F59E0B', '#F59E0B', '#22C55E', '#22C55E', '#8B5CF6', '#FBBF24'];
        
        let balance = 1000;
        let dropsLeft = 5;
        let coin = null;
        let pegs = [];
        let animating = false;
        
        function initPegs() {
            pegs = [];
            for (let row = 3; row < 15; row++) {
                for (let col = 0; col < 9; col++) {
                    const x = 50 + col * 40 + (row % 2) * 20;
                    const y = 50 + row * 35;
                    if (x > 30 && x < 370) pegs.push({ x, y });
                }
            }
        }
        
        function draw() {
            ctx.fillStyle = '#0F172A';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw pegs
            ctx.fillStyle = '#64748B';
            pegs.forEach(peg => {
                ctx.beginPath();
                ctx.arc(peg.x, peg.y, PEG_RADIUS, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Draw multiplier slots
            const slotWidth = canvas.width / MULTIPLIERS.length;
            MULTIPLIERS.forEach((mult, i) => {
                ctx.fillStyle = MULTIPLIER_COLORS[i];
                ctx.fillRect(i * slotWidth, canvas.height - 60, slotWidth, 60);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 14px Inter';
                ctx.textAlign = 'center';
                ctx.fillText(mult + 'x', i * slotWidth + slotWidth/2, canvas.height - 25);
            });
            
            // Draw coin
            if (coin) {
                ctx.fillStyle = '#FBBF24';
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, COIN_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#0F172A';
                ctx.font = 'bold 10px Inter';
                ctx.fillText('$', coin.x, coin.y + 3);
            }
        }
        
        function dropCoin() {
            if (animating || dropsLeft <= 0 || balance < 100) return;
            
            animating = true;
            balance -= 100;
            dropsLeft--;
            updateDisplay();
            
            coin = { x: 200 + (Math.random() - 0.5) * 100, y: 20, vx: 0, vy: 2 };
            
            function animate() {
                if (!coin) return;
                
                coin.vy += 0.3;
                coin.x += coin.vx;
                coin.y += coin.vy;
                
                // Bounce off pegs
                pegs.forEach(peg => {
                    const dx = coin.x - peg.x;
                    const dy = coin.y - peg.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < COIN_RADIUS + PEG_RADIUS) {
                        const angle = Math.atan2(dy, dx);
                        coin.vx = Math.cos(angle) * 3;
                        coin.vy = Math.abs(Math.sin(angle)) * 2;
                    }
                });
                
                // Wall bounce
                if (coin.x < COIN_RADIUS || coin.x > canvas.width - COIN_RADIUS) {
                    coin.vx *= -0.8;
                    coin.x = Math.max(COIN_RADIUS, Math.min(canvas.width - COIN_RADIUS, coin.x));
                }
                
                draw();
                
                if (coin.y < canvas.height - 60) {
                    requestAnimationFrame(animate);
                } else {
                    // Landed
                    const slotIndex = Math.floor(coin.x / (canvas.width / MULTIPLIERS.length));
                    const multiplier = MULTIPLIERS[Math.min(slotIndex, MULTIPLIERS.length - 1)];
                    const win = Math.floor(100 * multiplier);
                    balance += win;
                    
                    setTimeout(() => {
                        alert(`Landed in ${multiplier}x slot! You won $${win}!`);
                        coin = null;
                        animating = false;
                        updateDisplay();
                        if (dropsLeft === 0) endGame();
                    }, 100);
                }
            }
            
            animate();
        }
        
        function endGame() {
            setTimeout(() => {
                alert(`Game Over! Final Balance: $${balance}`);
                newGame();
            }, 500);
        }
        
        function newGame() {
            balance = 1000;
            dropsLeft = 5;
            coin = null;
            animating = false;
            updateDisplay();
            draw();
        }
        
        function updateDisplay() {
            document.getElementById('balance').textContent = '$' + balance;
            document.getElementById('drops').textContent = dropsLeft;
            document.getElementById('dropBtn').disabled = dropsLeft <= 0 || balance < 100;
        }
        
        initPegs();
        draw();
    </script>
</body>
</html>
