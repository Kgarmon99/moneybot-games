<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debt Dodger 2.0 | MoneyBot Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff88;
            padding: 10px 15px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            transition: transform 0.1s;
        }
        
        .stat-box.pulse {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
        }

        .stat-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 900;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .debt-value {
            color: #ff3366;
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.5);
            border-color: #ff3366;
        }
        
        .debt-value.pulse {
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.6);
        }

        #centerUI {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .combo-text {
            font-size: 28px;
            font-weight: 900;
            color: #ffcc00;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.8);
            opacity: 0;
            transition: opacity 0.2s, transform 0.1s;
        }

        .combo-text.active {
            opacity: 1;
            transform: scale(1.2);
        }
        
        .bull-market-text {
            font-size: 16px;
            font-weight: 900;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
            margin-top: 5px;
            display: none;
        }

        #gameOver, #startScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        #gameOver { display: none; }

        h1 {
            font-size: 54px;
            color: #ff3366;
            margin: 0 0 10px 0;
            text-shadow: 0 0 30px rgba(255, 51, 102, 0.8);
            text-transform: uppercase;
        }

        .final-stats {
            font-size: 20px;
            margin-bottom: 30px;
            color: #aaa;
            text-align: center;
            line-height: 1.5;
        }

        button {
            background: linear-gradient(90deg, #00ff88, #00cc66);
            border: none;
            padding: 16px 48px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 900;
            color: #000;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.1s;
        }

        button:active { transform: scale(0.95); }

        .title-glow {
            font-size: 64px;
            font-weight: 900;
            color: #00ff88;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.6);
            margin-bottom: 15px;
            text-transform: uppercase;
            text-align: center;
        }

        .subtitle {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 40px;
            max-width: 450px;
            text-align: center;
            line-height: 1.6;
        }
        
        .control-hint {
            margin-top: 25px;
            color: #555;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        #damageFlash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ff3366;
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            transition: opacity 0.1s;
        }
    </style>
</head>
<body>

    <div id="damageFlash"></div>

    <div id="startScreen">
        <div class="title-glow">Debt Dodger</div>
        <div class="subtitle">
            <span style="color:#00ff88;font-weight:bold;">🟩 Assets:</span> Build Wealth<br>
            <span style="color:#ff3366;font-weight:bold;">🟥 Debt:</span> High APR Penalty<br>
            <span style="color:#00ffff;font-weight:bold;">🟦 Bull Market:</span> Magnet Powerup<br><br>
            Chain assets for combos! Compound interest accelerates.
        </div>
        <button onclick="startGame()">Start Investing</button>
        <div class="control-hint">Tap / Drag to move</div>
    </div>

    <div id="ui" style="display:none;">
        <div class="stat-box" id="nwBox">
            <div class="stat-label">Net Worth</div>
            <div class="stat-value" id="nwDisplay">$0</div>
        </div>
        <div class="stat-box debt-value" id="debtBox">
            <div class="stat-label">APR Debt</div>
            <div class="stat-value" id="debtDisplay" style="color:#ff3366;">$0</div>
        </div>
    </div>
    
    <div id="centerUI" style="display:none;">
        <div class="combo-text" id="comboDisplay">2x COMBO!</div>
        <div class="bull-market-text" id="bullDisplay">BULL MARKET ACTIVE</div>
    </div>

    <div id="gameOver">
        <h1>BANKRUPT</h1>
        <div class="final-stats" id="finalStats">Net Worth: $0</div>
        <button onclick="resetGame()">Play Again</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // Game State
        let state = 'start'; // start, play, over
        let netWorth = 0;
        let debt = 0;
        let frameCount = 0;
        let difficultyMultiplier = 1;
        let speedMultiplier = 1;
        let timeSurvived = 0;

        // Juice State
        let combo = 0;
        let shakeTime = 0;
        let isBullMarket = false;
        let bullMarketTimer = 0;
        let gridOffsetY = 0;

        // Visual Arrays
        let entities = [];
        let particles = [];
        let floatingTexts = [];

        // Load SVG Assets
        const imgPlayer = new Image(); imgPlayer.src = '../assets/moneybot-super.jpg';
        const imgPlayerBull = new Image(); imgPlayerBull.src = '../assets/moneybot-celebrating.svg';
        const imgCoin = new Image(); imgCoin.src = '../assets/game-coin-green.svg';
        const imgDebt = new Image(); imgDebt.src = '../assets/brokebot.jpg';

                function drawToken(ctx, img, cx, cy, radius, color) {
            ctx.save();
            ctx.shadowColor = color; ctx.shadowBlur = 15;
            ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI*2);
            ctx.fillStyle = '#111'; ctx.fill();
            ctx.shadowBlur = 0;
            
            ctx.save();
            ctx.clip();
            const aspect = img.width / img.height;
            let dw = radius * 2.2, dh = radius * 2.2;
            if (aspect > 1) dw = dh * aspect; else dh = dw / aspect;
            ctx.drawImage(img, cx - dw/2, cy - dh/2, dw, dh);
            ctx.restore();
            
            ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI*2);
            ctx.lineWidth = 3; ctx.strokeStyle = color; ctx.stroke();
            ctx.restore();
        }

        // Player
        const player = {
            x: width / 2,
            y: height - 120,
            size: 22,
            targetX: width / 2,
            targetY: height - 120,
            color: '#00ff88'
        };

        // Input Handling
        let isDragging = false;
        function updatePlayerPos(clientX, clientY) {
            player.targetX = clientX;
            player.targetY = clientY - 50; // Offset above finger so it's not hidden
        }
        canvas.addEventListener('touchstart', e => { if(state === 'play') { isDragging = true; updatePlayerPos(e.touches[0].clientX, e.touches[0].clientY); }});
        canvas.addEventListener('touchmove', e => { if(isDragging && state === 'play') updatePlayerPos(e.touches[0].clientX, e.touches[0].clientY); });
        canvas.addEventListener('touchend', () => isDragging = false);
        canvas.addEventListener('mousedown', e => { if(state === 'play') { isDragging = true; updatePlayerPos(e.clientX, e.clientY); }});
        canvas.addEventListener('mousemove', e => { if(isDragging && state === 'play') updatePlayerPos(e.clientX, e.clientY); });
        canvas.addEventListener('mouseup', () => isDragging = false);

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            document.getElementById('centerUI').style.display = 'block';
            resetGame();
        }

        function resetGame() {
            state = 'play';
            netWorth = 1000;
            debt = 0;
            frameCount = 0;
            difficultyMultiplier = 1;
            speedMultiplier = 1;
            timeSurvived = 0;
            combo = 0;
            isBullMarket = false;
            bullMarketTimer = 0;
            
            entities = [];
            particles = [];
            floatingTexts = [];
            
            player.x = width / 2;
            player.y = height - 120;
            player.targetX = width / 2;
            player.targetY = height - 120;
            
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('comboDisplay').classList.remove('active');
            document.getElementById('bullDisplay').style.display = 'none';
            
            updateUI();
            requestAnimationFrame(loop);
        }

        function gameOver() {
            state = 'over';
            shakeTime = 20; // Final big shake
            document.getElementById('gameOver').style.display = 'flex';
            document.getElementById('centerUI').style.display = 'none';
            document.getElementById('finalStats').innerHTML = `
                Time Survived: ${Math.floor(timeSurvived/60)}s<br>
                Final Net Worth:<br>
                <span style="color:#00ff88; font-weight:900; font-size:48px;">$${Math.floor(netWorth).toLocaleString()}</span>
            `;
        }

        // JUICE FUNCTIONS
        function createParticleExplosion(x, y, color, count, speed) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * speed,
                    vy: (Math.random() - 0.5) * speed,
                    life: 1,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        function addFloatingText(x, y, text, color) {
            floatingTexts.push({ x, y, text, color, life: 1, vy: -2 });
        }

        function triggerFlash() {
            const flash = document.getElementById('damageFlash');
            flash.style.opacity = '0.4';
            setTimeout(() => flash.style.opacity = '0', 100);
        }

        function pulseUI(id) {
            const el = document.getElementById(id);
            el.classList.add('pulse');
            setTimeout(() => el.classList.remove('pulse'), 150);
        }

        function updateUI() {
            document.getElementById('nwDisplay').innerText = '$' + Math.floor(netWorth).toLocaleString();
            document.getElementById('debtDisplay').innerText = '$' + Math.floor(debt).toLocaleString();
            
            const comboEl = document.getElementById('comboDisplay');
            if (combo >= 3) {
                comboEl.innerText = `${combo}x COMBO!`;
                comboEl.classList.add('active');
            } else {
                comboEl.classList.remove('active');
            }
            
            document.getElementById('bullDisplay').style.display = isBullMarket ? 'block' : 'none';
        }

        // MAIN LOOP
        function loop() {
            if (state !== 'play') return;
            frameCount++;
            timeSurvived++;

            // --- RENDER BACKGROUND ---
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);

            // Draw scrolling grid
            gridOffsetY = (gridOffsetY + 2 * speedMultiplier) % 50;
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let x = 0; x < width; x += 50) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
            for(let y = gridOffsetY - 50; y < height; y += 50) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
            ctx.stroke();

            // Screen Shake Context
            ctx.save();
            if (shakeTime > 0) {
                const dx = (Math.random() - 0.5) * 15;
                const dy = (Math.random() - 0.5) * 15;
                ctx.translate(dx, dy);
                shakeTime--;
            }

            // --- GAME LOGIC ---
            
            // Progression
            difficultyMultiplier = 1 + (timeSurvived / 1800); // Ramps up
            speedMultiplier = 1 + (timeSurvived / 3600); 

            // Finance Engine
            if (frameCount % 60 === 0) {
                // Compound Interest (fast simulation)
                if (netWorth > 0) netWorth *= (isBullMarket ? 1.02 : 1.005); 
                // Debt Drag
                if (debt > 0) {
                    debt *= 1.02;
                    netWorth -= (debt * 0.015);
                }
                if (netWorth < 0) { gameOver(); return; }
                updateUI();
            }

            // Bull Market Timer
            if (isBullMarket) {
                bullMarketTimer--;
                player.color = frameCount % 10 < 5 ? '#00ffff' : '#00ff88'; // Blink player
                if (bullMarketTimer <= 0) {
                    isBullMarket = false;
                    player.color = '#00ff88';
                    updateUI();
                }
            }

            // Player Movement Lerp
            const friction = isDragging ? 0.25 : 0.1;
            player.x += (player.targetX - player.x) * friction;
            player.y += (player.targetY - player.y) * friction;
            player.x = Math.max(player.size, Math.min(width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(height - player.size, player.y));

            // Draw Player Core
            if (imgPlayer.complete && imgPlayerBull.complete) {
                const drawImg = isBullMarket ? imgPlayerBull : imgPlayer;
                const offset = isBullMarket ? Math.sin(frameCount*0.2)*4 : 0;
                drawToken(ctx, drawImg, player.x, player.y + offset, player.size * 1.4, isBullMarket ? '#00ffff' : '#00ff88');
                
            } else {
                ctx.shadowBlur = 25;
                ctx.shadowColor = player.color;
                ctx.fillStyle = player.color;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.size + (isBullMarket ? Math.sin(frameCount*0.2)*4 : 0), 0, Math.PI * 2);
                ctx.fill();
                
                // Draw Player Outline
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            // Spawn Entities
            const spawnRate = 0.06 * difficultyMultiplier;
            if (Math.random() < spawnRate) {
                const rand = Math.random();
                let type = 'asset';
                let size = 16;
                
                if (rand > 0.95 && !isBullMarket) {
                    type = 'powerup'; // Bull market pickup
                    size = 20;
                } else if (rand > 0.45) {
                    type = 'debt'; // Red block
                    size = 18 + Math.random() * 20;
                }

                entities.push({
                    x: Math.random() * (width - size*2) + size,
                    y: -40,
                    size: size,
                    type: type,
                    speed: (3 + Math.random() * 5) * speedMultiplier * (type === 'debt' ? 1.2 : 1),
                    rot: 0,
                    rotSpeed: (Math.random() - 0.5) * 0.1
                });
            }

            // Update & Draw Entities
            for (let i = entities.length - 1; i >= 0; i--) {
                let e = entities[i];
                
                // Magnet effect during bull market
                if (isBullMarket && e.type === 'asset') {
                    const dx = player.x - e.x;
                    const dy = player.y - e.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 250) {
                        e.x += (dx / dist) * 8;
                        e.y += (dy / dist) * 8;
                    }
                }
                
                e.y += e.speed;
                e.rot += e.rotSpeed;

                // Draw based on type
                ctx.save();
                ctx.translate(e.x, e.y);
                ctx.rotate(e.rot);

                if (e.type === 'debt') {
                    if (imgDebt.complete) {
                        drawToken(ctx, imgDebt, 0, 0, e.size * 1.2, '#ff3366');
                    } else {
                        ctx.shadowColor = '#ff3366';
                        ctx.shadowBlur = 15;
                        ctx.fillStyle = '#ff3366';
                        ctx.fillRect(-e.size, -e.size, e.size*2, e.size*2);
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(-e.size, -e.size, e.size*2, e.size*2);
                    }
                } 
                else if (e.type === 'powerup') {
                    ctx.shadowColor = '#00ffff';
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = '#00ffff';
                    ctx.beginPath();
                    ctx.arc(0, 0, e.size, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 20px Inter';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('B', 0, 0);
                }
                else { // Asset
                    if (imgCoin.complete) {
                        drawToken(ctx, imgCoin, 0, 0, e.size * 1.2, '#00ff88');
                    } else {
                        ctx.shadowColor = '#00ff88';
                        ctx.shadowBlur = 15;
                        ctx.fillStyle = '#00ff88';
                        ctx.beginPath();
                        ctx.moveTo(0, -e.size);
                        ctx.lineTo(e.size, 0);
                        ctx.lineTo(0, e.size);
                        ctx.lineTo(-e.size, 0);
                        ctx.fill();
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }
                ctx.restore();

                // Collision
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < player.size + e.size) {
                    if (e.type === 'debt') {
                        // Ouch
                        const penalty = 500 * difficultyMultiplier;
                        debt += penalty;
                        combo = 0;
                        shakeTime = 10;
                        triggerFlash();
                        pulseUI('debtBox');
                        createParticleExplosion(e.x, e.y, '#ff3366', 20, 15);
                        addFloatingText(e.x, e.y, `-$${Math.floor(penalty)}`, '#ff3366');
                        
                    } else if (e.type === 'powerup') {
                        // Bull Market Activation
                        isBullMarket = true;
                        bullMarketTimer = 400;
                        combo += 5;
                        createParticleExplosion(e.x, e.y, '#00ffff', 30, 20);
                        addFloatingText(e.x, e.y, `BULL MARKET!`, '#00ffff');
                        pulseUI('nwBox');
                        
                    } else {
                        // Asset collection
                        combo++;
                        const bonus = 300 * difficultyMultiplier * (1 + (combo * 0.1)) * (isBullMarket ? 2 : 1);
                        netWorth += bonus;
                        createParticleExplosion(e.x, e.y, '#00ff88', 10, 8);
                        addFloatingText(e.x, e.y, `+$${Math.floor(bonus)}`, '#00ff88');
                        pulseUI('nwBox');
                    }
                    
                    entities.splice(i, 1);
                    updateUI();
                    continue;
                }

                // Off screen
                if (e.y > height + 100) {
                    entities.splice(i, 1);
                }
            }

            // Draw Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1;

            // Draw Floating Text
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ft.y += ft.vy;
                ft.life -= 0.02;
                if (ft.life <= 0) { floatingTexts.splice(i, 1); continue; }
                
                ctx.globalAlpha = ft.life;
                ctx.fillStyle = ft.color;
                ctx.font = '900 20px Inter';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 4;
                ctx.fillText(ft.text, ft.x, ft.y);
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            ctx.restore(); // Restore from screen shake

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
