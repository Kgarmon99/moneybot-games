<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bot Shot 2.0 | High Frequency Trading</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            margin: 0; padding: 0; background: #050505; color: #fff;
            font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none;
            user-select: none; -webkit-user-select: none;
        }

        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;
        }

        .hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
        }

        .stat-box {
            background: rgba(10, 10, 10, 0.85); border: 2px solid #00ff88;
            padding: 10px 15px; border-radius: 12px; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            transition: transform 0.1s;
        }
        .stat-box.pulse { transform: scale(1.1); box-shadow: 0 0 30px rgba(0, 255, 136, 0.6); }

        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .stat-value { font-size: 24px; font-weight: 900; color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
        .cap-value { color: #00ccff; text-shadow: 0 0 10px rgba(0, 204, 255, 0.5); border-color: #00ccff; }

        #screens { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(5,5,5,0.9); pointer-events: auto; }

        .title-glow {
            font-size: 54px; font-weight: 900; color: #00ff88; text-transform: uppercase;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.6); margin-bottom: 15px; text-align: center; line-height: 1.1;
        }

        .subtitle { font-size: 16px; color: #aaa; margin-bottom: 40px; text-align: center; max-width: 400px; line-height: 1.5; }

        button {
            background: linear-gradient(90deg, #00ff88, #00cc66); border: none;
            padding: 16px 48px; border-radius: 30px; font-size: 20px; font-weight: 900;
            color: #000; cursor: pointer; box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.1s;
        }
        button:active { transform: scale(0.95); }

        .floating-text {
            position: absolute; font-size: 32px; font-weight: 900; text-shadow: 0 0 20px currentColor;
            pointer-events: none; animation: floatUp 1s ease-out forwards; opacity: 1; z-index: 15;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="ui-layer">
        <div class="hud" id="hud" style="display:none;">
            <div class="stat-box" id="scoreBox">
                <div class="stat-label">AUM (Assets)</div>
                <div class="stat-value" id="scoreDisplay">$0M</div>
            </div>
            <div class="stat-box cap-value" id="capBox" style="border-color:#00ccff;">
                <div class="stat-label">Liquid Capital</div>
                <div class="stat-value" id="capDisplay" style="color:#00ccff;">3 Shots</div>
            </div>
        </div>
    </div>

    <div id="screens">
        <div class="title-glow" id="mainTitle">Bot Shot<br><span style="font-size:32px; color:#00ccff;">High Frequency</span></div>
        <div class="subtitle" id="mainSub">
            Drag to aim your Capital (Cyan) and shoot it into ROI Targets (Green).<br><br>
            Hit targets directly for higher yields. Missing costs Capital!
        </div>
        <button id="mainBtn" onclick="startGame()">Start Trading</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- GAME STATE ---
        let state = 'menu'; // menu, aim, flying, reset, over
        let score = 0; // AUM
        let shots = 3; // Capital
        let level = 1;
        let shakeTime = 0;
        let particles = [];
        let trails = [];
        let combos = 0;

        // --- ENTITIES ---
        const ball = { x: 0, y: 0, r: 15, vx: 0, vy: 0, color: '#00ccff' };
        const anchor = { x: 0, y: 0 };
        const drag = { x: 0, y: 0, active: false };
        let targets = [];
        let obstacles = [];

        // --- INPUT ---
        function getPos(e) {
            if(e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            return { x: e.clientX, y: e.clientY };
        }

        function down(e) {
            if (state !== 'aim') return;
            const p = getPos(e);
            const dx = p.x - ball.x;
            const dy = p.y - ball.y;
            if (dx*dx + dy*dy < 2500) { // Clicked near ball
                drag.active = true;
                drag.x = p.x; drag.y = p.y;
            }
        }

        function move(e) {
            if (!drag.active || state !== 'aim') return;
            const p = getPos(e);
            drag.x = p.x; drag.y = p.y;
        }

        function up() {
            if (!drag.active || state !== 'aim') return;
            drag.active = false;
            
            // Calculate velocity
            const dx = anchor.x - drag.x;
            const dy = anchor.y - drag.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > 20) {
                // Shoot!
                ball.vx = dx * 0.18;
                ball.vy = dy * 0.18;
                state = 'flying';
                shots--; // Spend capital
                updateUI();
                pulseUI('capBox');
            }
        }

        canvas.addEventListener('mousedown', down); canvas.addEventListener('mousemove', move); canvas.addEventListener('mouseup', up);
        canvas.addEventListener('touchstart', down); canvas.addEventListener('touchmove', move); canvas.addEventListener('touchend', up);

        // --- FLOW ---
        function startGame() {
            document.getElementById('screens').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            score = 0;
            shots = 3;
            level = 1;
            combos = 0;
            updateUI();
            setupLevel();
            requestAnimationFrame(loop);
        }

        function gameOver() {
            state = 'over';
            document.getElementById('screens').style.display = 'flex';
            document.getElementById('mainTitle').innerHTML = 'MARGIN CALL<br><span style="font-size:32px;color:#ff3366;">Out of Capital</span>';
            document.getElementById('mainSub').innerHTML = `Final AUM: <span style="color:#00ff88;font-weight:bold;">$${score}M</span><br>Levels Cleared: ${level-1}`;
            document.getElementById('mainBtn').innerText = 'Reinvest';
        }

        function setupLevel() {
            state = 'reset';
            particles = [];
            trails = [];
            
            // Anchor at bottom center
            anchor.x = width / 2;
            anchor.y = height - 100;
            ball.x = anchor.x;
            ball.y = anchor.y;
            ball.vx = 0; ball.vy = 0;

            // Generate Targets based on level
            targets = [];
            obstacles = [];

            const numTargets = 1; // Keep it simple, 1 basket
            const targetY = 150 + Math.random() * (height/3);
            const targetX = width/2 + (Math.random() - 0.5) * (width - 150);
            
            targets.push({
                x: targetX, y: targetY,
                w: 80 - Math.min(level*2, 40), // Shrinks over time
                h: 20,
                color: '#00ff88',
                value: 100 * level
            });

            // Generate Obstacles (Red walls)
            if (level > 2) {
                const numObs = Math.min(level - 1, 4);
                for(let i=0; i<numObs; i++) {
                    obstacles.push({
                        x: Math.random() * (width - 100),
                        y: height/2 + (Math.random() - 0.5) * 200,
                        w: 60 + Math.random() * 100,
                        h: 15,
                        moveType: Math.random() > 0.5 ? 'h' : 'none',
                        speed: (Math.random() > 0.5 ? 1 : -1) * (1 + level*0.2),
                        origX: 0
                    });
                    obstacles[i].origX = obstacles[i].x;
                }
            }

            setTimeout(() => { state = 'aim'; }, 500);
        }

        // --- JUICE ---
        function pulseUI(id) {
            const el = document.getElementById(id);
            el.classList.add('pulse');
            setTimeout(() => el.classList.remove('pulse'), 150);
        }

        function spawnParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    life: 1, color: color, size: Math.random() * 4 + 2
                });
            }
        }

        function spawnText(x, y, text, color) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.color = color;
            el.innerText = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = '$' + score + 'M';
            document.getElementById('capDisplay').innerText = shots + (shots === 1 ? ' Shot' : ' Shots');
        }

        // --- LOOP ---
        function loop() {
            if (state === 'menu' || state === 'over') return;

            // Background
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            if (shakeTime > 0) {
                ctx.translate((Math.random()-0.5)*10, (Math.random()-0.5)*10);
                shakeTime--;
            }

            // Draw Obstacles
            ctx.fillStyle = '#ff3366';
            ctx.shadowColor = '#ff3366';
            ctx.shadowBlur = 10;
            for (let obs of obstacles) {
                if (obs.moveType === 'h') {
                    obs.x += obs.speed;
                    if (obs.x < 0 || obs.x + obs.w > width) obs.speed *= -1;
                }
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            }
            ctx.shadowBlur = 0;

            // Draw Targets
            ctx.fillStyle = '#00ff88';
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 20;
            for (let t of targets) {
                ctx.fillRect(t.x - t.w/2, t.y, t.w, t.h);
                // Draw holo beam upward
                const grad = ctx.createLinearGradient(0, t.y, 0, t.y - 100);
                grad.addColorStop(0, 'rgba(0,255,136,0.3)');
                grad.addColorStop(1, 'rgba(0,255,136,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(t.x - t.w/2 + 5, t.y - 100, t.w - 10, 100);
            }
            ctx.shadowBlur = 0;

            // Draw Slingshot Band
            if (state === 'aim' && drag.active) {
                ctx.strokeStyle = 'rgba(0, 204, 255, 0.5)';
                ctx.lineWidth = 4;
                ctx.setLineDash([10, 10]);
                ctx.beginPath();
                ctx.moveTo(anchor.x, anchor.y);
                ctx.lineTo(drag.x, drag.y);
                ctx.stroke();
                ctx.setLineDash([]);

                // Trajectory Prediction
                ctx.strokeStyle = 'rgba(0, 204, 255, 0.2)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                let px = anchor.x; let py = anchor.y;
                let pvx = (anchor.x - drag.x) * 0.18;
                let pvy = (anchor.y - drag.y) * 0.18;
                ctx.moveTo(px, py);
                for(let i=0; i<15; i++) {
                    pvy += 0.4; // gravity
                    px += pvx; py += pvy;
                    ctx.lineTo(px, py);
                }
                ctx.stroke();
            }

            // Ball Logic
            if (state === 'flying') {
                ball.vy += 0.4; // Gravity
                ball.x += ball.vx;
                ball.y += ball.vy;

                // Trails
                trails.push({x: ball.x, y: ball.y, life: 1});

                // Wall Bounces
                if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx *= -0.7; shakeTime=5; spawnParticles(ball.x, ball.y, '#00ccff', 5); }
                if (ball.x + ball.r > width) { ball.x = width - ball.r; ball.vx *= -0.7; shakeTime=5; spawnParticles(ball.x, ball.y, '#00ccff', 5); }
                if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -0.7; shakeTime=5; spawnParticles(ball.x, ball.y, '#00ccff', 5); }

                // Obstacle Bounce
                for (let obs of obstacles) {
                    if (ball.x > obs.x && ball.x < obs.x + obs.w && ball.y + ball.r > obs.y && ball.y - ball.r < obs.y + obs.h) {
                        ball.vy *= -0.8;
                        ball.y = ball.vy > 0 ? obs.y + obs.h + ball.r : obs.y - ball.r;
                        shakeTime = 8;
                        spawnParticles(ball.x, ball.y, '#ff3366', 15);
                        combos = 0; // Lost combo
                    }
                }

                // Target Hit
                let hitTarget = false;
                for (let t of targets) {
                    if (ball.vy > 0 && ball.x > t.x - t.w/2 && ball.x < t.x + t.w/2 && ball.y + ball.r > t.y && ball.y < t.y + t.h) {
                        hitTarget = true;
                        combos++;
                        const multi = Math.min(combos, 4);
                        const earned = t.value * multi;
                        
                        score += earned;
                        shots += 1; // Refund the shot + profit
                        level++;
                        
                        shakeTime = 15;
                        spawnParticles(ball.x, ball.y, '#00ff88', 40);
                        spawnText(ball.x, ball.y - 30, multi > 1 ? `+$${earned}M (${multi}x!)` : `+$${earned}M`, '#00ff88');
                        
                        pulseUI('scoreBox');
                        updateUI();
                        state = 'reset';
                        setTimeout(setupLevel, 1000);
                        break;
                    }
                }

                // Floor (Miss)
                if (!hitTarget && ball.y > height + 50) {
                    combos = 0;
                    spawnText(width/2, height - 100, "CAPITAL LOST", "#ff3366");
                    if (shots <= 0) {
                        setTimeout(gameOver, 800);
                    } else {
                        state = 'reset';
                        setTimeout(setupLevel, 800);
                    }
                }
            }

            // Draw Trails
            ctx.beginPath();
            for (let i=0; i<trails.length; i++) {
                let t = trails[i];
                t.life -= 0.05;
                if(t.life <= 0) { trails.splice(i, 1); i--; continue; }
                ctx.fillStyle = `rgba(0, 204, 255, ${t.life})`;
                ctx.arc(t.x, t.y, ball.r * t.life, 0, Math.PI*2);
                ctx.fill();
            }

            // Draw Ball
            if (state !== 'reset') {
                const renderX = (state==='aim' && drag.active) ? drag.x : ball.x;
                const renderY = (state==='aim' && drag.active) ? drag.y : ball.y;
                
                ctx.shadowColor = '#00ccff';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#00ccff';
                ctx.beginPath();
                ctx.arc(renderX, renderY, ball.r, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // Draw Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.04;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1;

            ctx.restore();
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
