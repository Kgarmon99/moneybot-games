<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Savings Snake | MoneyBot Gaming</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-light: #69F0AE;
            --moneybot-green-dark: #00C853;
            --moneybot-gold: #FBBF24;
            --moneybot-dark: #0F172A;
            --moneybot-gray: #F5F5F7;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--moneybot-dark);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(15, 23, 42, 0.95);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .back-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.25);
        }
        
        .score-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        
        .score-label {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .score-display {
            font-size: 28px;
            font-weight: 800;
            color: var(--moneybot-green);
        }
        
        .game-area {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        #gameCanvas {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.98) 0%, rgba(0, 0, 0, 0.95) 100%);
            backdrop-filter: blur(20px);
            z-index: 200;
        }
        
        .game-over-screen {
            display: none;
        }
        
        .logo {
            font-size: 80px;
            margin-bottom: 15px;
            animation: slither 2s ease-in-out infinite;
        }
        
        @keyframes slither {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .title {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--moneybot-green) 0%, var(--moneybot-green-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 17px;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 40px;
        }
        
        .high-score {
            background: rgba(255,255,255,0.1);
            padding: 16px 32px;
            border-radius: 16px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .high-score-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .high-score-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--moneybot-gold);
        }
        
        .start-btn {
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: white;
            border: none;
            padding: 22px 70px;
            font-size: 22px;
            font-weight: 800;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0, 230, 118, 0.5);
            transition: all 0.3s;
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <a href="../moneybot-official/" class="back-btn">←</a>
            <div class="score-container">
                <div class="score-label">Savings</div>
                <div class="score-display">$<span id="score">0</span></div>
            </div>
        </div>
        
        <div class="game-area">
            <canvas id="gameCanvas" width="350" height="350"></canvas>
        </div>
    </div>
    
    <div class="start-screen" id="startScreen">
        <div class="logo">🐍</div>
        <div class="title">Savings Snake</div>
        <div class="subtitle">Collect coins, avoid debt traps!<br>Grow your savings</div>
        
        <div class="high-score">
            <div class="high-score-label">Best Savings</div>
            <div class="high-score-value" id="highScore">$0</div>
        </div>
        
        <button class="start-btn" onclick="startGame()">Start Saving</button>
    </div>
    
    <div class="game-over-screen" id="gameOverScreen">
        <div class="logo">💸</div>
        <div class="title" style="font-size: 32px;">Debt Trap!</div>
        <div class="subtitle">You saved $<span id="finalScore">0</span></div>
        <button class="start-btn" onclick="restartGame()">Save Again</button>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const gridSize = 25;
        const tileCount = canvas.width / gridSize;
        
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('savingsSnakeHighScore') || 0;
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15, type: 'coin'};
        let obstacles = [];
        let dx = 0;
        let dy = 0;
        let gameLoop;
        
        document.getElementById('highScore').textContent = '$' + highScore;
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            snake = [{x: 7, y: 7}];
            dx = 1;
            dy = 0;
            obstacles = [];
            
            // Add obstacles
            for (let i = 0; i < 3; i++) {
                obstacles.push({
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                });
            }
            
            placeFood();
            updateScore();
            gameLoop = setInterval(update, 100);
        }
        
        function restartGame() {
            startGame();
        }
        
        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            food.type = Math.random() > 0.2 ? 'coin' : 'bill';
        }
        
        function update() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Wrap around
            if (head.x < 0) head.x = tileCount - 1;
            if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1;
            if (head.y >= tileCount) head.y = 0;
            
            // Check self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            // Check obstacle collision
            if (obstacles.some(obs => obs.x === head.x && obs.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            // Check food
            if (head.x === food.x && head.y === food.y) {
                score += food.type === 'bill' ? 50 : 10;
                placeFood();
                if (navigator.vibrate) navigator.vibrate(20);
                
                // Add new obstacle every 50 points
                if (score % 50 === 0 && obstacles.length < 8) {
                    obstacles.push({
                        x: Math.floor(Math.random() * tileCount),
                        y: Math.floor(Math.random() * tileCount)
                    });
                }
            } else {
                snake.pop();
            }
            
            updateScore();
            draw();
        }
        
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('savingsSnakeHighScore', highScore);
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
        
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        
        function draw() {
            // Clear
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = 'rgba(0, 230, 118, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // Draw obstacles (debt traps)
            ctx.font = '20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            obstacles.forEach(obs => {
                ctx.fillText('💳', obs.x * gridSize + gridSize/2, obs.y * gridSize + gridSize/2);
            });
            
            // Draw food
            const foodEmoji = food.type === 'bill' ? '💵' : '🪙';
            ctx.fillText(foodEmoji, food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2);
            
            // Draw snake
            snake.forEach((segment, i) => {
                ctx.fillStyle = i === 0 ? '#00E676' : '#00C853';
                ctx.fillRect(segment.x * gridSize + 2, segment.y * gridSize + 2, gridSize - 4, gridSize - 4);
                
                // Eyes on head
                if (i === 0) {
                    ctx.fillStyle = 'white';
                    ctx.fillRect(segment.x * gridSize + 6, segment.y * gridSize + 8, 4, 4);
                    ctx.fillRect(segment.x * gridSize + 15, segment.y * gridSize + 8, 4, 4);
                }
            });
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            switch(e.key) {
                case 'ArrowUp': if (dy === 0) { dx = 0; dy = -1; } break;
                case 'ArrowDown': if (dy === 0) { dx = 0; dy = 1; } break;
                case 'ArrowLeft': if (dx === 0) { dx = -1; dy = 0; } break;
                case 'ArrowRight': if (dx === 0) { dx = 1; dy = 0; } break;
            }
        });
        
        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning) return;
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0 && dx === 0) { dx = 1; dy = 0; }
                else if (diffX < 0 && dx === 0) { dx = -1; dy = 0; }
            } else {
                if (diffY > 0 && dy === 0) { dx = 0; dy = 1; }
                else if (diffY < 0 && dy === 0) { dx = 0; dy = -1; }
            }
        });
    </script>
</body>
</html>
