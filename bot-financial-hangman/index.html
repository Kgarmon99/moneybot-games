<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyBot - Financial Hangman</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../moneybot-official/" class="back-btn">← Hub</a>
    
    <div class="game-container">
        <!-- Header -->
        <header class="game-header">
            <h1>💰 FINANCIAL HANGMAN</h1>
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">STREAK</span>
                    <span class="stat-value" id="streak">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">WINS</span>
                    <span class="stat-value" id="wins">0</span>
                </div>
            </div>
        </header>

        <!-- Main Game Area -->
        <main class="game-main">
            <!-- Robot Assembly Visualization -->
            <div class="robot-stage">
                <div class="robot-container">
                    <div class="robot-part" id="part-head">🤖</div>
                    <div class="robot-part" id="part-body">🔋</div>
                    <div class="robot-part" id="part-left-arm">💪</div>
                    <div class="robot-part" id="part-right-arm">💪</div>
                    <div class="robot-part" id="part-left-leg">🦵</div>
                    <div class="robot-part" id="part-right-leg">🦵</div>
                </div>
                <div class="gallows">
                    <div class="gallows-base">💎</div>
                    <div class="gallows-pole"></div>
                    <div class="gallows-top"></div>
                </div>
            </div>

            <!-- Word Display -->
            <div class="word-container">
                <div class="category-hint" id="category">Loading...</div>
                <div class="word-display" id="wordDisplay"></div>
                <div class="hint-text" id="hint"></div>
            </div>

            <!-- Wrong Letters -->
            <div class="wrong-letters">
                <span class="wrong-label">Wrong Guesses:</span>
                <span class="wrong-list" id="wrongList"></span>
            </div>
        </main>

        <!-- Virtual Keyboard -->
        <div class="keyboard-container">
            <div class="keyboard" id="keyboard">
                <!-- Keys generated by JS -->
            </div>
        </div>
    </div>

    <!-- Modal for Win/Lose -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <h2 class="modal-title" id="modalTitle">You Won!</h2>
            <p class="modal-word" id="modalWord">COMPOUND INTEREST</p>
            <p class="modal-desc" id="modalDesc">Interest earned on both principal and accumulated interest.</p>
            <button class="modal-btn" id="modalBtn">Next Word</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
