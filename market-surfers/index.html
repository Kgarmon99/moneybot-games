<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Market Surfers | MoneyBot</title>
    <link rel="icon" type="image/svg+xml" href="../assets/moneybot-idle.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-dark: #00C853;
            --moneybot-gold: #FBBF24;
            --moneybot-dark: #0F172A;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--moneybot-dark);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
        }
        
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.9) 0%, transparent 100%);
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .back-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.25);
        }
        
        .score-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        
        .score-label {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .score-display {
            font-size: 28px;
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .coin-display {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(251, 191, 36, 0.2);
            border: 1px solid var(--moneybot-gold);
            padding: 8px 16px;
            border-radius: 16px;
            margin-top: 4px;
        }
        
        .coin-icon {
            font-size: 16px;
        }
        
        .coin-value {
            font-weight: 700;
            color: var(--moneybot-gold);
            font-size: 16px;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        
        .ui-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
            pointer-events: none;
        }
        
        .power-ups {
            display: flex;
            gap: 12px;
            margin-bottom: 80px;
        }
        
        .power-up {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            opacity: 0.5;
        }
        
        .power-up.active {
            opacity: 1;
            background: rgba(0, 230, 118, 0.3);
            border-color: var(--moneybot-green);
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
        }
        
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.98) 0%, rgba(0, 0, 0, 0.95) 100%);
            backdrop-filter: blur(20px);
            z-index: 200;
        }
        
        .game-over-screen {
            display: none;
        }
        
        .logo-container {
            position: relative;
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 80px;
            filter: drop-shadow(0 10px 30px rgba(0, 230, 118, 0.4));
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .title {
            font-size: 40px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--moneybot-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 40px;
            line-height: 1.5;
        }
        
        .high-score {
            background: rgba(255,255,255,0.1);
            padding: 16px 32px;
            border-radius: 16px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .high-score-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        
        .high-score-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--moneybot-gold);
        }
        
        .start-btn {
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: white;
            border: none;
            padding: 22px 70px;
            font-size: 22px;
            font-weight: 800;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0, 230, 118, 0.5);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 50px rgba(0, 230, 118, 0.6);
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        .instructions {
            margin-top: 40px;
            display: flex;
            gap: 30px;
        }
        
        .instruction-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
        
        .instruction-icon {
            font-size: 28px;
        }
        
        .final-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .final-stat {
            background: rgba(255,255,255,0.1);
            padding: 20px 30px;
            border-radius: 16px;
            text-align: center;
            min-width: 100px;
        }
        
        .final-stat-value {
            font-size: 28px;
            font-weight: 800;
            color: white;
            margin-bottom: 4px;
        }
        
        .final-stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .combo-display {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 42px;
            font-weight: 800;
            color: var(--moneybot-gold);
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.6);
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }
        
        .combo-display.show {
            animation: comboAnim 1s ease-out forwards;
        }
        
        @keyframes comboAnim {
            0% { opacity: 0; transform: translateX(-50%) scale(0.3) rotate(-10deg); }
            20% { opacity: 1; transform: translateX(-50%) scale(1.3) rotate(5deg); }
            100% { opacity: 0; transform: translateX(-50%) scale(1) rotate(0deg) translateY(-80px); }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <a href="../moneybot-official/" class="back-btn">←</a>
            <div class="score-container">
                <div class="score-label">Distance</div>
                <div class="score-display"><span id="score">0</span>m</div>
                <div class="coin-display">
                    <span class="coin-icon">🪙</span>
                    <span class="coin-value" id="coins">0</span>
                </div>
            </div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div class="combo-display" id="comboDisplay">COMBO x3!</div>
        
        <div class="start-screen" id="startScreen">
            <div class="logo-container">
                <div class="logo">🏃</div>
            </div>
            <div class="title">Market Surfers</div>
            <div class="subtitle">Surf the market waves!<br>Dodge bears, collect coins & power-ups</div>
            
            <div class="high-score">
                <div class="high-score-label">Best Run</div>
                <div class="high-score-value" id="highScore">0m</div>
            </div>
            
            <button class="start-btn" onclick="startGame()">Play Now</button>
            
            <div class="instructions">
                <div class="instruction-item">
                    <span class="instruction-icon">👈👉</span>
                    <span>Swipe</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-icon">👆</span>
                    <span>Jump</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-icon">👇</span>
                    <span>Roll</span>
                </div>
            </div>
        </div>
        
        <div class="game-over-screen" id="gameOverScreen">
            <div class="logo" style="font-size: 40px; margin-bottom: 10px;">💥</div>
            <div class="title" style="font-size: 32px;">Market Crash!</div>
            
            <div class="final-stats">
                <div class="final-stat">
                    <div class="final-stat-value"><span id="finalScore">0</span>m</div>
                    <div class="final-stat-label">Distance</div>
                </div>
                <div class="final-stat">
                    <div class="final-stat-value" id="finalCoins">0</div>
                    <div class="final-stat-label">Coins</div>
                </div>
            </div>
            
            <button class="start-btn" onclick="restartGame()">Run Again</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth > 430 ? 430 : window.innerWidth;
        canvas.height = window.innerHeight;
        
        let gameRunning = false;
        let score = 0;
        let coins = 0;
        let highScore = localStorage.getItem('marketSurfersHighScore') || 0;
        let speed = 8;
        let player = { 
            lane: 1, 
            x: canvas.width / 2, 
            y: canvas.height - 180,
            targetX: canvas.width / 2,
            jumping: false,
            jumpHeight: 0,
            rolling: false,
            invincible: false
        };
        let coinItems = [];
        let obstacles = [];
        let powerUps = [];
        let particles = [];
        let lanes = [canvas.width * 0.25, canvas.width * 0.5, canvas.width * 0.75];
        let groundOffset = 0;
        let combo = 0;
        let lastCoinLane = -1;
        
        document.getElementById('highScore').textContent = highScore + 'm';
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            coins = 0;
            speed = 8;
            player.lane = 1;
            player.x = lanes[1];
            player.targetX = lanes[1];
            player.jumping = false;
            player.jumpHeight = 0;
            player.rolling = false;
            player.invincible = false;
            coinItems = [];
            obstacles = [];
            powerUps = [];
            particles = [];
            combo = 0;
            updateUI();
            gameLoop();
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            startGame();
        }
        
        function gameOver() {
            gameRunning = false;
            if (score > highScore) {
                highScore = Math.floor(score);
                localStorage.setItem('marketSurfersHighScore', highScore);
            }
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('finalCoins').textContent = coins;
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('highScore').textContent = highScore + 'm';
        }
        
        function update() {
            score += speed / 10;
            speed += 0.005;
            groundOffset = (groundOffset + speed) % 60;
            
            // Smooth lane transition
            player.x += (player.targetX - player.x) * 0.15;
            
            // Spawn coins in patterns
            if (Math.random() < 0.04) {
                const lane = Math.floor(Math.random() * 3);
                // Create coin lines for combos
                if (lastCoinLane === lane && Math.random() < 0.7) {
                    combo++;
                    if (combo > 2) {
                        const comboEl = document.getElementById('comboDisplay');
                        comboEl.textContent = `COMBO x${combo}!`;
                        comboEl.classList.add('show');
                        setTimeout(() => comboEl.classList.remove('show'), 1000);
                    }
                } else {
                    combo = 1;
                }
                lastCoinLane = lane;
                
                coinItems.push({
                    lane: lane,
                    y: -50,
                    collected: false,
                    value: 10 * combo
                });
            }
            
            // Spawn obstacles
            if (Math.random() < 0.025) {
                const lane = Math.floor(Math.random() * 3);
                const type = Math.random() < 0.6 ? 'barrier' : (Math.random() < 0.5 ? 'train' : 'low');
                obstacles.push({
                    lane: lane,
                    y: -100,
                    type: type
                });
            }
            
            // Spawn power-ups
            if (Math.random() < 0.005) {
                powerUps.push({
                    lane: Math.floor(Math.random() * 3),
                    y: -50,
                    type: Math.random() < 0.5 ? 'magnet' : 'jetpack',
                    collected: false
                });
            }
            
            // Jump physics
            if (player.jumping) {
                player.jumpHeight += 12;
                if (player.jumpHeight > 120) {
                    player.jumping = false;
                }
            } else if (player.jumpHeight > 0) {
                player.jumpHeight -= 12;
            }
            
            // Roll timer
            if (player.rolling) {
                setTimeout(() => { player.rolling = false; }, 800);
            }
            
            // Update coins
            coinItems = coinItems.filter(coin => {
                coin.y += speed;
                
                const playerY = player.y - player.jumpHeight;
                if (!coin.collected && coin.lane === player.lane && 
                    Math.abs(coin.y - playerY) < 50) {
                    coin.collected = true;
                    coins += coin.value;
                    score += coin.value;
                    
                    // Sparkle particles
                    for (let i = 0; i < 8; i++) {
                        particles.push({
                            x: lanes[coin.lane],
                            y: coin.y,
                            vx: (Math.random() - 0.5) * 8,
                            vy: (Math.random() - 0.5) * 8,
                            life: 1,
                            color: '#FBBF24',
                            size: Math.random() * 4 + 2
                        });
                    }
                    
                    if (navigator.vibrate) navigator.vibrate(10);
                    return false;
                }
                
                return coin.y < canvas.height + 50;
            });
            
            // Update power-ups
            powerUps = powerUps.filter(p => {
                p.y += speed;
                
                const playerY = player.y - player.jumpHeight;
                if (!p.collected && p.lane === player.lane && 
                    Math.abs(p.y - playerY) < 50) {
                    p.collected = true;
                    if (p.type === 'jetpack') {
                        player.invincible = true;
                        setTimeout(() => player.invincible = false, 5000);
                    }
                    return false;
                }
                
                return p.y < canvas.height + 50;
            });
            
            // Update obstacles
            obstacles = obstacles.filter(obs => {
                obs.y += speed;
                
                const playerY = player.y - player.jumpHeight;
                const canHit = !player.invincible && 
                    !(player.jumping && obs.type !== 'train') && 
                    !(player.rolling && obs.type === 'low');
                
                if (canHit && obs.lane === player.lane && 
                    Math.abs(obs.y - playerY) < 60) {
                    gameOver();
                }
                
                return obs.y < canvas.height + 100;
            });
            
            // Update particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.life -= 0.03;
                return p.life > 0;
            });
            
            updateUI();
        }
        
        function draw() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a1a3e');
            gradient.addColorStop(0.5, '#0f172a');
            gradient.addColorStop(1, '#1e293b');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // City skyline (parallax)
            ctx.fillStyle = 'rgba(30, 41, 59, 0.8)';
            for (let i = 0; i < 12; i++) {
                const x = (i * 60 - score * 0.3) % (canvas.width + 100);
                const height = 80 + Math.sin(i * 234) * 40;
                ctx.fillRect(x, canvas.height - 250 - height, 50, height);
                
                // Building windows
                ctx.fillStyle = 'rgba(251, 191, 36, 0.3)';
                for (let wy = 0; wy < height - 20; wy += 25) {
                    if (Math.random() > 0.3) {
                        ctx.fillRect(x + 10, canvas.height - 250 - height + wy + 10, 8, 12);
                        ctx.fillRect(x + 28, canvas.height - 250 - height + wy + 10, 8, 12);
                    }
                }
                ctx.fillStyle = 'rgba(30, 41, 59, 0.8)';
            }
            
            // Ground/track
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, canvas.height - 150, canvas.width, 150);
            
            // Track lanes
            ctx.strokeStyle = 'rgba(0, 230, 118, 0.2)';
            ctx.lineWidth = 2;
            lanes.forEach((lane, i) => {
                ctx.beginPath();
                ctx.moveTo(lane, canvas.height - 150);
                ctx.lineTo(lane, canvas.height);
                ctx.stroke();
            });
            
            // Moving track lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.lineWidth = 3;
            for (let i = -60; i < canvas.width + 60; i += 60) {
                const x = i - groundOffset;
                ctx.beginPath();
                ctx.moveTo(x, canvas.height - 150);
                ctx.lineTo(x - 30, canvas.height);
                ctx.stroke();
            }
            
            // Draw coins with glow
            coinItems.forEach(coin => {
                const x = lanes[coin.lane];
                const y = coin.y;
                
                // Glow
                ctx.shadowColor = '#FBBF24';
                ctx.shadowBlur = 20;
                ctx.font = '32px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🪙', x, y);
                ctx.shadowBlur = 0;
            });
            
            // Draw power-ups
            powerUps.forEach(p => {
                if (!p.collected) {
                    const x = lanes[p.lane];
                    const y = p.y;
                    ctx.font = '36px Arial';
                    ctx.fillText(p.type === 'magnet' ? '🧲' : '🚀', x, y);
                }
            });
            
            // Draw obstacles
            obstacles.forEach(obs => {
                const x = lanes[obs.lane];
                const y = obs.y;
                
                ctx.font = '50px Arial';
                if (obs.type === 'barrier') {
                    ctx.fillText('🚧', x, y);
                } else if (obs.type === 'train') {
                    ctx.fillText('🚂', x, y);
                } else if (obs.type === 'low') {
                    ctx.fillText('🐻', x, y);
                }
            });
            
            // Draw player
            const playerX = player.x;
            const playerY = player.y - player.jumpHeight;
            
            // Invincibility glow
            if (player.invincible) {
                ctx.shadowColor = '#00E676';
                ctx.shadowBlur = 30;
            }
            
            // Shadow
            if (!player.jumping) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(playerX, player.y + 45, 25, 10, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Player character
            ctx.font = player.rolling ? '40px Arial' : '55px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            if (player.rolling) {
                ctx.save();
                ctx.translate(playerX, playerY + 20);
                ctx.rotate(Date.now() / 100);
                ctx.fillText('🏃', 0, 0);
                ctx.restore();
            } else {
                ctx.fillText(player.invincible ? '🚀' : '🏃', playerX, playerY);
            }
            
            ctx.shadowBlur = 0;
            
            // Draw particles
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }
        
        function updateUI() {
            document.getElementById('score').textContent = Math.floor(score);
            document.getElementById('coins').textContent = coins;
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            update();
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Controls
        function moveLeft() {
            if (player.lane > 0) {
                player.lane--;
                player.targetX = lanes[player.lane];
            }
        }
        
        function moveRight() {
            if (player.lane < 2) {
                player.lane++;
                player.targetX = lanes[player.lane];
            }
        }
        
        function jump() {
            if (!player.jumping && player.jumpHeight === 0 && !player.rolling) {
                player.jumping = true;
            }
        }
        
        function roll() {
            if (!player.rolling && !player.jumping) {
                player.rolling = true;
            }
        }
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
            if (e.key === 'ArrowUp') jump();
            if (e.key === 'ArrowDown') roll();
        });
        
        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchend', (e) => {
            if (!gameRunning) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 50) moveRight();
                else if (dx < -50) moveLeft();
            } else {
                if (dy < -50) jump();
                else if (dy > 50) roll();
            }
        });
    </script>
</body>
</html>
