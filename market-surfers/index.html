<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Market Surfers | MoneyBot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-light: #69F0AE;
            --moneybot-green-dark: #00C853;
            --moneybot-gold: #FBBF24;
            --moneybot-dark: #0F172A;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--moneybot-dark);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
        }
        
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.9) 0%, transparent 100%);
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            text-decoration: none;
        }
        
        .score-display {
            background: rgba(0, 230, 118, 0.2);
            border: 1px solid var(--moneybot-green);
            padding: 10px 20px;
            border-radius: 20px;
            color: var(--moneybot-green);
            font-weight: 700;
            font-size: 18px;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            z-index: 200;
        }
        
        .game-over-screen {
            display: none;
        }
        
        .logo {
            font-size: 64px;
            margin-bottom: 10px;
        }
        
        .title {
            font-size: 32px;
            font-weight: 800;
            color: white;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 40px;
        }
        
        .start-btn {
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 230, 118, 0.4);
            transition: transform 0.2s;
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        .instructions {
            margin-top: 30px;
            color: rgba(255,255,255,0.5);
            text-align: center;
            font-size: 14px;
        }
        
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        
        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        
        .control-btn:active {
            background: var(--moneybot-green);
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <a href="../moneybot-official/" class="back-btn">←</a>
            <div class="score-display"><span id="score">0</span>m</div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div class="controls">
            <button class="control-btn" id="leftBtn">←</button>
            <button class="control-btn" id="jumpBtn">↑</button>
            <button class="control-btn" id="rightBtn">→</button>
        </div>
        
        <div class="start-screen" id="startScreen">
            <div class="logo">🏃</div>
            <div class="title">Market Surfers</div>
            <div class="subtitle">Dodge the bears, collect the bulls!<br>Run as far as you can</div>
            <button class="start-btn" onclick="startGame()">START RUNNING</button>
            <div class="instructions">Swipe to move • Jump over obstacles<br>Collect coins • Avoid crashes</div>
        </div>
        
        <div class="game-over-screen" id="gameOverScreen">
            <div class="logo">💥</div>
            <div class="title">Market Crash!</div>
            <div class="subtitle">You ran <span id="finalScore">0</span>m</div>
            <button class="start-btn" onclick="restartGame()">RUN AGAIN</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth > 430 ? 430 : window.innerWidth;
        canvas.height = window.innerHeight;
        
        let gameRunning = false;
        let score = 0;
        let speed = 8;
        let player = { lane: 1, y: canvas.height - 200, jumping: false, jumpHeight: 0 };
        let coins = [];
        let obstacles = [];
        let lanes = [canvas.width * 0.25, canvas.width * 0.5, canvas.width * 0.75];
        let groundOffset = 0;
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            speed = 8;
            player.lane = 1;
            player.jumping = false;
            player.jumpHeight = 0;
            coins = [];
            obstacles = [];
            gameLoop();
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            startGame();
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
        
        function update() {
            score += speed / 10;
            speed += 0.01;
            groundOffset = (groundOffset + speed) % 40;
            
            // Spawn coins
            if (Math.random() < 0.03) {
                coins.push({
                    lane: Math.floor(Math.random() * 3),
                    y: -50,
                    collected: false
                });
            }
            
            // Spawn obstacles
            if (Math.random() < 0.02) {
                obstacles.push({
                    lane: Math.floor(Math.random() * 3),
                    y: -50,
                    type: Math.random() < 0.5 ? 'bear' : 'barrier'
                });
            }
            
            // Update player position
            const targetX = lanes[player.lane];
            const currentX = lanes[player.lane];
            
            // Jump physics
            if (player.jumping) {
                player.jumpHeight += 15;
                if (player.jumpHeight > 100) {
                    player.jumping = false;
                }
            } else if (player.jumpHeight > 0) {
                player.jumpHeight -= 15;
            }
            
            // Update coins
            coins = coins.filter(coin => {
                coin.y += speed;
                
                if (!coin.collected && coin.lane === player.lane && 
                    Math.abs(coin.y - (player.y - player.jumpHeight)) < 60) {
                    coin.collected = true;
                    score += 50;
                    if (navigator.vibrate) navigator.vibrate(10);
                }
                
                return coin.y < canvas.height + 50 && !coin.collected;
            });
            
            // Update obstacles
            obstacles = obstacles.filter(obs => {
                obs.y += speed;
                
                if (obs.lane === player.lane && 
                    Math.abs(obs.y - (player.y - player.jumpHeight)) < 60 &&
                    player.jumpHeight < 50) {
                    gameOver();
                }
                
                return obs.y < canvas.height + 50;
            });
            
            document.getElementById('score').textContent = Math.floor(score);
        }
        
        function draw() {
            // Clear
            ctx.fillStyle = '#0F172A';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw parallax buildings
            ctx.fillStyle = 'rgba(30, 41, 59, 0.5)';
            for (let i = 0; i < 8; i++) {
                const x = (i * 80 - score * 0.5) % (canvas.width + 100);
                const height = 100 + Math.sin(i * 123) * 50;
                ctx.fillRect(x, canvas.height - 200 - height, 60, height);
            }
            
            // Draw ground
            ctx.fillStyle = '#1E293B';
            ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
            
            // Draw lane markers
            ctx.strokeStyle = 'rgba(0, 230, 118, 0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 20]);
            lanes.forEach(lane => {
                ctx.beginPath();
                ctx.moveTo(lane, 0);
                ctx.lineTo(lane, canvas.height);
                ctx.stroke();
            });
            ctx.setLineDash([]);
            
            // Draw moving ground lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 2;
            for (let i = -40; i < canvas.width + 40; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i - groundOffset, canvas.height - 100);
                ctx.lineTo(i - groundOffset - 20, canvas.height);
                ctx.stroke();
            }
            
            // Draw player
            const playerX = lanes[player.lane];
            const playerY = player.y - player.jumpHeight;
            
            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.ellipse(playerX, player.y + 40, 20, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Player body
            ctx.font = '50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🏃', playerX, playerY);
            
            // Draw coins
            coins.forEach(coin => {
                ctx.font = '35px Arial';
                ctx.fillText('🪙', lanes[coin.lane], coin.y);
            });
            
            // Draw obstacles
            obstacles.forEach(obs => {
                ctx.font = '40px Arial';
                ctx.fillText(obs.type === 'bear' ? '🐻' : '🚧', lanes[obs.lane], obs.y);
            });
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            update();
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Controls
        function moveLeft() {
            if (player.lane > 0) player.lane--;
        }
        
        function moveRight() {
            if (player.lane < 2) player.lane++;
        }
        
        function jump() {
            if (!player.jumping && player.jumpHeight === 0) {
                player.jumping = true;
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
            if (e.key === 'ArrowUp' || e.key === ' ') jump();
        });
        
        document.getElementById('leftBtn').addEventListener('click', moveLeft);
        document.getElementById('rightBtn').addEventListener('click', moveRight);
        document.getElementById('jumpBtn').addEventListener('click', jump);
        
        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchend', (e) => {
            if (!gameRunning) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 50) moveRight();
                else if (dx < -50) moveLeft();
            } else {
                if (dy < -50) jump();
            }
        });
    </script>
</body>
</html>
