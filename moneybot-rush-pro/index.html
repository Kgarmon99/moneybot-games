<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyBot - Investment Tycoon | MoneyBot</title>
    <link rel="icon" type="image/svg+xml" href="../assets/moneybot-idle.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-light: #69F0AE;
            --moneybot-green-dark: #00C853;
            --moneybot-dark: #1A1A2E;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
            --moneybot-text-secondary: #6B7280;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
            background: var(--moneybot-gray);
            min-height: 100vh;
            color: var(--moneybot-text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Animated Background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 230, 118, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 230, 118, 0.05) 0%, transparent 50%),
                var(--moneybot-gray);
            pointer-events: none;
            z-index: 0;
        }
        
        /* App Container */
        .app {
            position: relative;
            z-index: 1;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--moneybot-gray);
        }
        
        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(0, 230, 118, 0.1);
            color: var(--moneybot-green);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
            text-decoration: none;
        }
        
        .back-btn:hover {
            background: rgba(0, 230, 118, 0.2);
            transform: translateX(-2px);
        }
        
        .back-btn:active {
            transform: scale(0.92);
        }
        
        .header-logo img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
        }
        
        .header-title {
            font-weight: 700;
            font-size: 17px;
            letter-spacing: -0.3px;
        }
        
        .header-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(0, 230, 118, 0.1);
            color: var(--moneybot-green);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
        }
        
        .icon-btn:active {
            transform: scale(0.92);
            background: rgba(0, 230, 118, 0.2);
        }
        
        /* Main Balance Card */
        .balance-card {
            background: linear-gradient(135deg, var(--moneybot-green) 0%, var(--moneybot-green-dark) 100%);
            margin: 20px;
            padding: 28px;
            border-radius: 24px;
            color: white;
            box-shadow: 
                0 20px 40px rgba(0, 230, 118, 0.3),
                inset 0 1px 0 rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }
        
        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: shimmer 8s infinite linear;
        }
        
        @keyframes shimmer {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .balance-label {
            font-size: 14px;
            font-weight: 500;
            opacity: 0.9;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .balance-amount {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 16px;
            font-feature-settings: 'tnum';
        }
        
        .balance-stats {
            display: flex;
            gap: 20px;
        }
        
        .balance-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .balance-stat.positive {
            color: rgba(255,255,255,0.9);
        }
        
        /* Click Area */
        .click-area {
            margin: 0 20px 20px;
            background: white;
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            transition: all 0.3s var(--ease-spring);
            position: relative;
            overflow: hidden;
        }
        
        .click-area:active {
            transform: scale(0.98);
            box-shadow: var(--shadow-sm);
        }
        
        .click-coin {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, var(--moneybot-green) 0%, var(--moneybot-green-dark) 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 
                0 20px 40px rgba(0, 230, 118, 0.4),
                inset 0 -4px 0 rgba(0,0,0,0.1),
                inset 0 4px 0 rgba(255,255,255,0.2);
            transition: all 0.2s var(--ease-spring);
            position: relative;
        }
        
        .click-coin::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
        }
        
        .click-area:active .click-coin {
            transform: scale(0.95);
            box-shadow: 
                0 10px 20px rgba(0, 230, 118, 0.3),
                inset 0 -2px 0 rgba(0,0,0,0.1);
        }
        
        .click-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--moneybot-text);
            margin-bottom: 6px;
        }
        
        .click-subtext {
            font-size: 14px;
            color: var(--moneybot-text-secondary);
        }
        
        /* Floating Numbers */
        .floating-number {
            position: fixed;
            font-size: 24px;
            font-weight: 800;
            color: var(--moneybot-green);
            pointer-events: none;
            animation: floatUp 1s var(--ease-out-expo) forwards;
            z-index: 1000;
            text-shadow: 0 2px 10px rgba(0, 230, 118, 0.3);
        }
        
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1.3);
            }
        }
        
        /* Section */
        .section {
            margin: 0 20px 20px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        
        .section-action {
            font-size: 15px;
            font-weight: 600;
            color: var(--moneybot-green);
            background: none;
            border: none;
            cursor: pointer;
        }
        
        /* Investment Cards */
        .investment-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .investment-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s var(--ease-out-expo);
            cursor: pointer;
        }
        
        .investment-card:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow-md);
        }
        
        .investment-card:active {
            transform: scale(0.98);
        }
        
        .investment-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(0, 230, 118, 0.1);
        }
        
        .investment-info {
            flex: 1;
        }
        
        .investment-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 2px;
        }
        
        .investment-return {
            font-size: 13px;
            color: var(--moneybot-text-secondary);
        }
        
        .investment-owned {
            text-align: right;
        }
        
        .investment-count {
            font-weight: 700;
            font-size: 18px;
            color: var(--moneybot-green);
        }
        
        .investment-label {
            font-size: 12px;
            color: var(--moneybot-text-secondary);
        }
        
        /* Upgrade Button */
        .upgrade-btn {
            background: var(--moneybot-green);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
            white-space: nowrap;
        }
        
        .upgrade-btn:hover {
            background: var(--moneybot-green-dark);
            transform: scale(1.05);
        }
        
        .upgrade-btn:active {
            transform: scale(0.95);
        }
        
        .upgrade-btn:disabled {
            background: #E5E7EB;
            color: #9CA3AF;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Stats Bar */
        .stats-bar {
            background: white;
            margin: 0 20px 20px;
            padding: 16px;
            border-radius: 16px;
            display: flex;
            justify-content: space-around;
            box-shadow: var(--shadow-sm);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-weight: 700;
            font-size: 20px;
            color: var(--moneybot-text);
            margin-bottom: 2px;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--moneybot-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        /* Progress Ring */
        .progress-ring {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: white;
            border-radius: 50%;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s var(--ease-spring);
        }
        
        .progress-ring:hover {
            transform: scale(1.1);
        }
        
        .progress-ring svg {
            transform: rotate(-90deg);
        }
        
        .progress-ring circle {
            fill: none;
            stroke-width: 4;
        }
        
        .progress-ring .bg {
            stroke: #E5E7EB;
        }
        
        .progress-ring .progress {
            stroke: var(--moneybot-green);
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s var(--ease-out-expo);
        }
        
        .progress-text {
            position: absolute;
            font-weight: 700;
            font-size: 14px;
            color: var(--moneybot-green);
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    
    <div class="app">
        <header class="header">
            <div class="header-logo">
                <a href="../moneybot-official/" class="back-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </a>
                <img src="../moneybot-official/assets/logo.jpg" alt="MoneyBot">
                <span class="header-title">MoneyBot</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="showAchievements()">🏆</button>
                <button class="icon-btn" onclick="showSettings()">⚙️</button>
            </div>
        </header>
        
        <div class="balance-card">
            <div class="balance-label">Total Portfolio Value</div>
            <div class="balance-amount" id="balance">$0</div>
            <div class="balance-stats">
                <div class="balance-stat positive">
                    <span>📈</span>
                    <span id="perSecond">+$0/sec</span>
                </div>
                <div class="balance-stat positive">
                    <span>💰</span>
                    <span id="perClick">+$1/click</span>
                </div>
            </div>
        </div>
        
        <div class="click-area" id="clickArea">
            <div class="click-coin">💵</div>
            <div class="click-text">Tap to Invest</div>
            <div class="click-subtext">Every click earns money</div>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalClicks">0</div>
                <div class="stat-label">Clicks</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">Level</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="achievements">0</div>
                <div class="stat-label">Badges</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">Investments</h2>
                <button class="section-action" onclick="showAllInvestments()">View All</button>
            </div>
            <div class="investment-list" id="investmentList">
                <!-- Investments populated by JS -->
            </div>
        </div>
        
        <div class="progress-ring" onclick="showProgress()">
            <svg width="48" height="48">
                <circle class="bg" cx="24" cy="24" r="20"></circle>
                <circle class="progress" cx="24" cy="24" r="20" 
                    stroke-dasharray="125.6" 
                    stroke-dashoffset="125.6"
                    id="progressCircle"></circle>
            </svg>
            <span class="progress-text" id="progressPercent">0%</span>
        </div>
    </div>
    
    <script>
        // Game State
        let state = {
            cash: 0,
            totalClicks: 0,
            perClick: 1,
            perSecond: 0,
            level: 1,
            xp: 0,
            xpNeeded: 100,
            achievements: [],
            investments: [
                { id: 'savings', name: 'Savings Account', icon: '🏦', return: 1, cost: 50, owned: 0 },
                { id: 'stocks', name: 'Stock Portfolio', icon: '📈', return: 5, cost: 250, owned: 0 },
                { id: 'realEstate', name: 'Real Estate', icon: '🏢', return: 25, cost: 1000, owned: 0 },
                { id: 'crypto', name: 'Crypto Mining', icon: '₿', return: 100, cost: 5000, owned: 0 },
                { id: 'business', name: 'Business Empire', icon: '🏭', return: 500, cost: 25000, owned: 0 }
            ]
        };
        
        // Load saved game
        function loadGame() {
            const saved = localStorage.getItem('investmentTycoon');
            if (saved) {
                const loaded = JSON.parse(saved);
                state = { ...state, ...loaded };
            }
            updateUI();
            renderInvestments();
        }
        
        // Save game
        function saveGame() {
            localStorage.setItem('investmentTycoon', JSON.stringify(state));
        }
        
        // Format currency
        function formatMoney(amount) {
            if (amount >= 1e12) return '$' + (amount / 1e12).toFixed(2) + 'T';
            if (amount >= 1e9) return '$' + (amount / 1e9).toFixed(2) + 'B';
            if (amount >= 1e6) return '$' + (amount / 1e6).toFixed(2) + 'M';
            if (amount >= 1e3) return '$' + (amount / 1e3).toFixed(2) + 'K';
            return '$' + Math.floor(amount).toLocaleString();
        }
        
        // Update UI
        function updateUI() {
            document.getElementById('balance').textContent = formatMoney(state.cash);
            document.getElementById('perSecond').textContent = '+' + formatMoney(state.perSecond) + '/sec';
            document.getElementById('perClick').textContent = '+' + formatMoney(state.perClick) + '/click';
            document.getElementById('totalClicks').textContent = state.totalClicks.toLocaleString();
            document.getElementById('level').textContent = state.level;
            document.getElementById('achievements').textContent = state.achievements.length;
            
            // Update progress ring
            const progress = (state.xp / state.xpNeeded) * 100;
            const circle = document.getElementById('progressCircle');
            const circumference = 2 * Math.PI * 20;
            const offset = circumference - (progress / 100) * circumference;
            circle.style.strokeDashoffset = offset;
            document.getElementById('progressPercent').textContent = Math.floor(progress) + '%';
        }
        
        // Render investments
        function renderInvestments() {
            const list = document.getElementById('investmentList');
            list.innerHTML = state.investments.map(inv => `
                <div class="investment-card" onclick="buyInvestment('${inv.id}')">
                    <div class="investment-icon">${inv.icon}</div>
                    <div class="investment-info">
                        <div class="investment-name">${inv.name}</div>
                        <div class="investment-return">+${formatMoney(inv.return)}/sec</div>
                    </div>
                    <div class="investment-owned">
                        <div class="investment-count">${inv.owned}</div>
                        <div class="investment-label">owned</div>
                    </div>
                    <button class="upgrade-btn" ${state.cash < inv.cost ? 'disabled' : ''}>
                        ${formatMoney(inv.cost)}
                    </button>
                </div>
            `).join('');
        }
        
        // Click handler
        document.getElementById('clickArea').addEventListener('click', function(e) {
            state.cash += state.perClick;
            state.totalClicks++;
            state.xp += 1;
            
            // Floating number
            const float = document.createElement('div');
            float.className = 'floating-number';
            float.textContent = '+' + formatMoney(state.perClick);
            float.style.left = e.clientX + 'px';
            float.style.top = e.clientY + 'px';
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 1000);
            
            // Haptic feedback
            if (navigator.vibrate) navigator.vibrate(10);
            
            // Check level up
            if (state.xp >= state.xpNeeded) {
                state.level++;
                state.xp = 0;
                state.xpNeeded = Math.floor(state.xpNeeded * 1.5);
            }
            
            updateUI();
            renderInvestments();
            saveGame();
        });
        
        // Buy investment
        function buyInvestment(id) {
            const inv = state.investments.find(i => i.id === id);
            if (inv && state.cash >= inv.cost) {
                state.cash -= inv.cost;
                inv.owned++;
                inv.cost = Math.floor(inv.cost * 1.15);
                state.perSecond += inv.return;
                
                if (navigator.vibrate) navigator.vibrate(20);
                
                updateUI();
                renderInvestments();
                saveGame();
            }
        }
        
        // Passive income
        setInterval(() => {
            if (state.perSecond > 0) {
                state.cash += state.perSecond;
                updateUI();
                renderInvestments();
                saveGame();
            }
        }, 1000);
        
        // Placeholder functions
        function showAchievements() { alert('Achievements coming soon!'); }
        function showSettings() { alert('Settings coming soon!'); }
        function showAllInvestments() { alert('All investments view coming soon!'); }
        function showProgress() { alert('Progress details coming soon!'); }
        
        // Initialize
        loadGame();
    </script>
</body>
</html>
