<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Insurance Defender | MoneyBot Games</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #000;
            color: #0f0;
            overflow: hidden;
            touch-action: none;
        }
        #game {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .top-bar {
            background: #000;
            border-bottom: 2px solid #0f0;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .logo-link { text-decoration: none; }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 10px;
            background: rgba(0,255,0,0.1);
            border: 1px solid #0f0;
            border-radius: 4px;
        }
        .logo-icon { font-size: 18px; }
        .logo-text {
            font-size: 13px;
            font-weight: 800;
            color: #0f0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-box {
            background: rgba(0,255,0,0.1);
            border: 1px solid #0f0;
            border-radius: 4px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 13px;
            min-width: 80px;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-box .icon { font-size: 14px; }
        .stat-box .value { color: #0f0; text-shadow: 0 0 10px #0f0; }
        .stat-box.lives { border-color: #ff4444; }
        .stat-box.lives .value { color: #ff4444; text-shadow: 0 0 10px #ff4444; }
        
        .wave-box {
            background: #0f0;
            color: #000;
            border-radius: 4px;
            padding: 6px 16px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .control-btns {
            display: flex;
            gap: 6px;
        }
        .control-btn {
            background: #000;
            border: 1px solid #0f0;
            border-radius: 4px;
            padding: 6px 12px;
            color: #0f0;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .control-btn:hover { background: rgba(0,255,0,0.1); box-shadow: 0 0 10px rgba(0,255,0,0.3); }
        .control-btn.active {
            background: #0f0;
            color: #000;
        }
        
        .game-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .wave-btn-container {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .start-wave-btn {
            background: #0f0;
            border: none;
            border-radius: 4px;
            padding: 12px 28px;
            color: #000;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,255,0,0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'JetBrains Mono', monospace;
        }
        .start-wave-btn:hover { box-shadow: 0 0 30px rgba(0,255,0,0.6); transform: scale(1.02); }
        .start-wave-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #333; color: #666; box-shadow: none; }
        
        .side-panel {
            position: absolute;
            right: 10px;
            top: 60px;
            width: 140px;
            background: rgba(0,0,0,0.95);
            border: 1px solid #0f0;
            border-radius: 4px;
            padding: 12px;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        .side-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #0f0;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        .next-enemies {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
        }
        .enemy-preview {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        
        .tower-bar {
            background: #000;
            border-top: 2px solid #0f0;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            flex-shrink: 0;
            box-shadow: 0 -5px 20px rgba(0,255,0,0.1);
        }
        .tower-card {
            background: #000;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px;
            min-width: 65px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
        }
        .tower-card:hover { border-color: #0f0; transform: translateY(-2px); box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        .tower-card.selected {
            border-color: #0f0;
            background: rgba(0,255,0,0.1);
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
        }
        .tower-card.disabled { opacity: 0.3; cursor: not-allowed; }
        .tower-card.disabled .tower-cost { color: #ff4444; }
        
        .tower-icon-wrap {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            margin: 0 auto 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .tower-card.health .tower-icon-wrap { background: linear-gradient(135deg, #00C853, #00a344); box-shadow: 0 0 10px rgba(0,200,83,0.4); }
        .tower-card.life .tower-icon-wrap { background: linear-gradient(135deg, #00a344, #00802b); box-shadow: 0 0 10px rgba(0,163,68,0.4); }
        .tower-card.home .tower-icon-wrap { background: linear-gradient(135deg, #00e676, #00c853); box-shadow: 0 0 10px rgba(0,230,118,0.4); }
        .tower-card.auto .tower-icon-wrap { background: linear-gradient(135deg, #69f0ae, #00c853); box-shadow: 0 0 10px rgba(105,240,174,0.4); }
        .tower-card.umbrella .tower-icon-wrap { background: linear-gradient(135deg, #ffd700, #ffab00); box-shadow: 0 0 15px rgba(255,215,0,0.6); }
        
        .tower-name { font-size: 9px; font-weight: 700; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
        .tower-cost { font-size: 11px; color: #0f0; font-weight: 800; }
        
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-overlay.active { display: flex; }
        .upgrade-modal {
            background: #000;
            border: 2px solid #0f0;
            border-radius: 4px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 40px rgba(0,255,0,0.3);
        }
        .upgrade-header {
            text-align: center;
            margin-bottom: 16px;
        }
        .upgrade-header h2 {
            font-size: 18px;
            font-weight: 800;
            color: #0f0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .upgrade-paths {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .upgrade-path {
            background: rgba(0,255,0,0.05);
            border: 1px solid #333;
            border-radius: 4px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
        }
        .upgrade-path:hover { border-color: #0f0; background: rgba(0,255,0,0.1); }
        .upgrade-path.maxed { border-color: #ffd700; background: rgba(255,215,0,0.1); }
        .upgrade-path-name { font-size: 11px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .upgrade-levels { display: flex; justify-content: center; gap: 4px; margin-bottom: 8px; }
        .upgrade-level { width: 14px; height: 14px; border-radius: 50%; background: #111; border: 1px solid #333; }
        .upgrade-level.active { background: #0f0; box-shadow: 0 0 10px rgba(0,255,0,0.5); border-color: #0f0; }
        .upgrade-level.max { background: #ffd700; box-shadow: 0 0 10px rgba(255,215,0,0.5); border-color: #ffd700; }
        .upgrade-cost { font-size: 13px; font-weight: 800; color: #0f0; }
        
        .sell-section { display: flex; gap: 10px; }
        .sell-btn, .close-modal {
            flex: 1;
            padding: 12px;
            border: 1px solid;
            border-radius: 4px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'JetBrains Mono', monospace;
        }
        .sell-btn { background: transparent; border-color: #ff4444; color: #ff4444; }
        .sell-btn:hover { background: rgba(255,68,68,0.1); box-shadow: 0 0 10px rgba(255,68,68,0.3); }
        .close-modal { background: transparent; border-color: #0f0; color: #0f0; }
        .close-modal:hover { background: rgba(0,255,0,0.1); box-shadow: 0 0 10px rgba(0,255,0,0.3); }
        
        .game-over {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .game-over.active { display: flex; }
        .game-over h1 { font-size: 42px; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 4px; }
        .game-over.victory h1 { color: #0f0; text-shadow: 0 0 20px #0f0; }
        .game-over.defeat h1 { color: #ff4444; text-shadow: 0 0 20px #ff4444; }
        .final-stats {
            background: rgba(0,255,0,0.05);
            border: 1px solid #0f0;
            border-radius: 4px;
            padding: 24px 40px;
            margin-bottom: 24px;
            text-align: center;
        }
        .final-stat { font-size: 16px; margin: 10px 0; text-transform: uppercase; letter-spacing: 1px; }
        .final-stat span { color: #0f0; font-weight: 800; text-shadow: 0 0 10px #0f0; }
        .restart-btn {
            background: #0f0;
            border: none;
            border-radius: 4px;
            padding: 16px 40px;
            color: #000;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'JetBrains Mono', monospace;
            box-shadow: 0 0 20px rgba(0,255,0,0.4);
        }
        .restart-btn:hover { box-shadow: 0 0 30px rgba(0,255,0,0.6); }
    </style>
</head>
<body>
    <div id="game">
        <div class="top-bar">
            <a href="../moneybot-official/" class="logo-link">
                <div class="logo">
                    <span class="logo-icon">🤖</span>
                    <span class="logo-text">MoneyBot</span>
                </div>
            </a>
            <div class="stat-box lives">
                <span class="icon">❤️</span>
                <span class="value" id="lives">20</span>
            </div>
            <div class="wave-box">Wave <span id="wave">1</span>/25</div>
            <div class="stat-box">
                <span class="icon">💰</span>
                <span class="value" id="money">650</span>
            </div>
            <div class="control-btns">
                <button class="control-btn" id="speedBtn">1x</button>
            </div>
        </div>
        
        <div class="game-area">
            <canvas id="canvas"></canvas>
            
            <div class="wave-btn-container">
                <button class="start-wave-btn" id="startWave">Start Wave</button>
            </div>
            
            <div class="side-panel">
                <div class="side-title">Next Wave</div>
                <div class="next-enemies" id="nextEnemies"></div>
            </div>
            
            <div class="modal-overlay" id="upgradeModal">
                <div class="upgrade-modal">
                    <div class="upgrade-header">
                        <h2 id="modalTitle">Tower</h2>
                    </div>
                    <div class="upgrade-paths" id="upgradePaths"></div>
                    <div class="sell-section">
                        <button class="sell-btn" id="sellBtn">Sell</button>
                        <button class="close-modal" onclick="closeUpgrade()">Close</button>
                    </div>
                </div>
            </div>
            
            <div class="game-over" id="gameOver">
                <h1>Game Over</h1>
                <div class="final-stats">
                    <div class="final-stat">Waves: <span id="finalWave">0</span></div>
                    <div class="final-stat">Money: <span id="finalMoney">0</span></div>
                    <div class="final-stat">Kills: <span id="finalKills">0</span></div>
                </div>
                <button class="restart-btn" onclick="restartGame()">Play Again</button>
            </div>
        </div>
        
        <div class="tower-bar">
            <div class="tower-card health" data-type="health" data-cost="150">
                <div class="tower-icon-wrap">🏥</div>
                <div class="tower-name">Health</div>
                <div class="tower-cost">$150</div>
            </div>
            <div class="tower-card life" data-type="life" data-cost="250">
                <div class="tower-icon-wrap">🛡️</div>
                <div class="tower-name">Life</div>
                <div class="tower-cost">$250</div>
            </div>
            <div class="tower-card home" data-type="home" data-cost="350">
                <div class="tower-icon-wrap">🏠</div>
                <div class="tower-name">Home</div>
                <div class="tower-cost">$350</div>
            </div>
            <div class="tower-card auto" data-type="auto" data-cost="200">
                <div class="tower-icon-wrap">🚗</div>
                <div class="tower-name">Auto</div>
                <div class="tower-cost">$200</div>
            </div>
            <div class="tower-card umbrella" data-type="umbrella" data-cost="1200">
                <div class="tower-icon-wrap">☂️</div>
                <div class="tower-name">Umbrella</div>
                <div class="tower-cost">$1200</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Game state
        let game = {
            money: 650, lives: 20, wave: 1, maxWaves: 25,
            waveActive: false, gameSpeed: 1,
            enemies: [], towers: [], projectiles: [], particles: [],
            selectedTowerType: null, selectedTower: null,
            totalEarned: 650, enemiesKilled: 0,
            mouseX: 0, mouseY: 0
        };
        
        const towerTypes = {
            health: { 
                name: 'Health Insurance', cost: 150, damage: 15, range: 100, fireRate: 350, 
                color: '#00C853', speed: 10,
                paths: { a: { name: 'Rapid' }, b: { name: 'Strong' } }
            },
            life: { 
                name: 'Life Insurance', cost: 250, damage: 60, range: 160, fireRate: 1000, 
                color: '#00a344', speed: 7,
                paths: { a: { name: 'Range' }, b: { name: 'Power' } }
            },
            home: { 
                name: 'Home Insurance', cost: 350, damage: 35, range: 120, fireRate: 700, 
                color: '#00e676', speed: 6, area: true,
                paths: { a: { name: 'Splash' }, b: { name: 'Burn' } }
            },
            auto: { 
                name: 'Auto Insurance', cost: 200, damage: 25, range: 110, fireRate: 450, 
                color: '#69f0ae', speed: 12, stun: true,
                paths: { a: { name: 'Fast' }, b: { name: 'Stun' } }
            },
            umbrella: { 
                name: 'Umbrella Policy', cost: 1200, damage: 120, range: 200, fireRate: 500, 
                color: '#ffd700', speed: 15, chain: 3,
                paths: { a: { name: 'Chain' }, b: { name: 'Blast' } }
            }
        };
        
        const enemyTypes = {
            medical: { name: 'Medical Bill', health: 30, speed: 1.8, reward: 15, color: '#ff5252', icon: '+' },
            car: { name: 'Car Accident', health: 55, speed: 2.2, reward: 25, color: '#448aff', icon: '🚗' },
            home: { name: 'Home Damage', health: 90, speed: 1.2, reward: 40, color: '#ffab40', icon: '🏠' },
            lawsuit: { name: 'Lawsuit', health: 180, speed: 0.9, reward: 80, color: '#e040fb', icon: '⚖️' },
            catastrophe: { name: 'Catastrophe', health: 600, speed: 0.6, reward: 250, color: '#ff1744', icon: '💀', boss: true },
            fraud: { name: 'Fraud', health: 100, speed: 3, reward: 100, color: '#ff00ff', icon: '🎭', stealth: true }
        };
        
        const waves = [
            { enemies: [{ type: 'medical', count: 6, interval: 900 }] },
            { enemies: [{ type: 'medical', count: 10, interval: 800 }] },
            { enemies: [{ type: 'medical', count: 8, interval: 700 }, { type: 'car', count: 4, interval: 1100 }] },
            { enemies: [{ type: 'car', count: 8, interval: 900 }] },
            { enemies: [{ type: 'medical', count: 15, interval: 500 }, { type: 'home', count: 3, interval: 1400 }] },
            { enemies: [{ type: 'home', count: 6, interval: 1100 }] },
            { enemies: [{ type: 'car', count: 12, interval: 600 }, { type: 'lawsuit', count: 3, interval: 1800 }] },
            { enemies: [{ type: 'lawsuit', count: 5, interval: 1300 }] },
            { enemies: [{ type: 'medical', count: 20, interval: 350 }, { type: 'car', count: 12, interval: 550 }, { type: 'home', count: 6, interval: 900 }] },
            { enemies: [{ type: 'catastrophe', count: 1, interval: 100 }] },
            { enemies: [{ type: 'lawsuit', count: 10, interval: 900 }, { type: 'fraud', count: 3, interval: 1500 }] },
            { enemies: [{ type: 'home', count: 12, interval: 700 }, { type: 'lawsuit', count: 6, interval: 1100 }] },
            { enemies: [{ type: 'car', count: 20, interval: 400 }, { type: 'catastrophe', count: 1, interval: 2500 }] },
            { enemies: [{ type: 'fraud', count: 8, interval: 600 }] },
            { enemies: [{ type: 'medical', count: 30, interval: 250 }, { type: 'home', count: 12, interval: 600 }, { type: 'lawsuit', count: 8, interval: 900 }] },
            { enemies: [{ type: 'catastrophe', count: 2, interval: 3500 }] },
            { enemies: [{ type: 'lawsuit', count: 15, interval: 700 }, { type: 'fraud', count: 10, interval: 800 }] },
            { enemies: [{ type: 'medical', count: 40, interval: 180 }, { type: 'car', count: 25, interval: 280 }, { type: 'home', count: 18, interval: 400 }] },
            { enemies: [{ type: 'catastrophe', count: 3, interval: 3000 }, { type: 'lawsuit', count: 10, interval: 600 }] },
            { enemies: [{ type: 'fraud', count: 20, interval: 400 }] },
            { enemies: [{ type: 'lawsuit', count: 25, interval: 500 }, { type: 'catastrophe', count: 2, interval: 4000 }] },
            { enemies: [{ type: 'medical', count: 50, interval: 150 }, { type: 'car', count: 35, interval: 200 }, { type: 'home', count: 25, interval: 300 }, { type: 'fraud', count: 15, interval: 500 }] },
            { enemies: [{ type: 'catastrophe', count: 4, interval: 3500 }] },
            { enemies: [{ type: 'lawsuit', count: 30, interval: 400 }, { type: 'catastrophe', count: 3, interval: 2500 }] },
            { enemies: [{ type: 'catastrophe', count: 6, interval: 3000 }] }
        ];
        
        let path = [];
        function generatePath() {
            path = [];
            const w = canvas.width, h = canvas.height;
            const pad = 60;
            path.push({ x: -20, y: pad + 40 });
            path.push({ x: w * 0.2, y: pad + 40 });
            path.push({ x: w * 0.2, y: h * 0.4 });
            path.push({ x: w * 0.5, y: h * 0.4 });
            path.push({ x: w * 0.5, y: pad + 40 });
            path.push({ x: w * 0.8, y: pad + 40 });
            path.push({ x: w * 0.8, y: h * 0.65 });
            path.push({ x: w * 0.3, y: h * 0.65 });
            path.push({ x: w * 0.3, y: h - pad });
            path.push({ x: w + 20, y: h - pad });
        }
        
        function resize() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            generatePath();
        }
        window.addEventListener('resize', resize);
        
        class Tower {
            constructor(x, y, type) {
                this.x = x; this.y = y; this.type = type;
                this.level = 1; this.pathA = 0; this.pathB = 0;
                this.lastFire = 0; this.angle = 0;
                this.totalSpent = towerTypes[type].cost;
                const def = towerTypes[type];
                this.damage = def.damage; this.range = def.range;
                this.fireRate = def.fireRate; this.color = def.color;
            }
            
            upgrade(path) {
                const lvl = path === 'a' ? this.pathA : this.pathB;
                if (lvl >= 3) return false;
                const cost = Math.floor(towerTypes[this.type].cost * 0.6 * (lvl + 1));
                if (game.money < cost) return false;
                game.money -= cost;
                this.totalSpent += cost;
                if (path === 'a') this.pathA++; else this.pathB++;
                this.recalcStats();
                return true;
            }
            
            getSellValue() { return Math.floor(this.totalSpent * 0.7); }
            
            recalcStats() {
                const def = towerTypes[this.type];
                this.damage = def.damage; this.range = def.range; this.fireRate = def.fireRate;
                for (let i = 0; i < this.pathA; i++) { this.damage *= 1.4; this.fireRate *= 0.75; }
                for (let i = 0; i < this.pathB; i++) { this.damage *= 1.4; this.range *= 1.2; }
            }
            
            update() {
                let target = null, bestDist = Infinity;
                for (const e of game.enemies) {
                    const d = Math.hypot(e.x - this.x, e.y - this.y);
                    if (d <= this.range && d < bestDist) { bestDist = d; target = e; }
                }
                if (target) {
                    this.angle = Math.atan2(target.y - this.y, target.x - this.x);
                    if (Date.now() - this.lastFire > this.fireRate / game.gameSpeed) {
                        this.fire(target);
                        this.lastFire = Date.now();
                    }
                }
            }
            
            fire(target) {
                const def = towerTypes[this.type];
                game.projectiles.push(new Projectile(this.x, this.y, target, this.damage, def.speed, def.color, def.area, def.stun, def.chain));
            }
            
            draw() {
                if (game.selectedTower === this) {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0,200,83,0.1)'; ctx.fill();
                    ctx.strokeStyle = 'rgba(0,200,83,0.3)'; ctx.lineWidth = 2; ctx.stroke();
                }
                const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 35);
                g.addColorStop(0, this.color + '40'); g.addColorStop(1, 'transparent');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(this.x, this.y, 35, 0, Math.PI * 2); ctx.fill();
                
                ctx.beginPath(); ctx.arc(this.x, this.y, 22, 0, Math.PI * 2);
                ctx.fillStyle = '#1a1a2e'; ctx.fill();
                ctx.strokeStyle = this.color; ctx.lineWidth = 3; ctx.stroke();
                
                for (let i = 0; i < this.pathA + this.pathB; i++) {
                    const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
                    ctx.beginPath(); ctx.arc(this.x + Math.cos(a) * 28, this.y + Math.sin(a) * 28, 4, 0, Math.PI * 2);
                    ctx.fillStyle = i < this.pathA ? '#00C853' : '#ffd700'; ctx.fill();
                }
                
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.fillStyle = this.color; ctx.fillRect(0, -5, 28, 10);
                ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
                ctx.restore();
            }
        }
        
        class Enemy {
            constructor(type) {
                this.type = type;
                const def = enemyTypes[type];
                this.maxHealth = def.health * (1 + game.wave * 0.15);
                this.health = this.maxHealth;
                this.speed = def.speed; this.reward = def.reward;
                this.color = def.color; this.icon = def.icon;
                this.boss = def.boss; this.stealth = def.stealth;
                this.pathIndex = 0; this.x = path[0].x; this.y = path[0].y;
                this.stunned = 0; this.pulse = 0;
            }
            
            update() {
                this.pulse += 0.1;
                if (this.stunned > 0) { this.stunned--; return; }
                const target = path[this.pathIndex + 1];
                if (!target) return;
                const dx = target.x - this.x, dy = target.y - this.y;
                const dist = Math.hypot(dx, dy);
                if (dist < 5) {
                    this.pathIndex++;
                    if (this.pathIndex >= path.length - 1) this.reachEnd();
                } else {
                    this.x += (dx / dist) * this.speed * game.gameSpeed;
                    this.y += (dy / dist) * this.speed * game.gameSpeed;
                }
            }
            
            takeDamage(dmg) {
                this.health -= dmg;
                if (this.health <= 0) this.die();
            }
            
            stun() { this.stunned = 60; }
            
            die() {
                game.money += this.reward; game.totalEarned += this.reward; game.enemiesKilled++;
                for (let i = 0; i < (this.boss ? 20 : 10); i++) game.particles.push(new Particle(this.x, this.y, this.color));
                game.enemies.splice(game.enemies.indexOf(this), 1);
                updateUI();
            }
            
            reachEnd() {
                game.lives--;
                game.enemies.splice(game.enemies.indexOf(this), 1);
                updateUI();
                if (game.lives <= 0) endGame(false);
            }
            
            draw() {
                if (this.stealth) ctx.globalAlpha = 0.5 + Math.sin(this.pulse) * 0.2;
                if (this.boss) {
                    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 30);
                    g.addColorStop(0, this.color + '60'); g.addColorStop(1, 'transparent');
                    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(this.x, this.y, 30, 0, Math.PI * 2); ctx.fill();
                }
                const w = this.boss ? 50 : 30, h = 5;
                ctx.fillStyle = '#000'; ctx.fillRect(this.x - w/2 - 1, this.y - 25, w + 2, h + 2);
                const pct = this.health / this.maxHealth;
                ctx.fillStyle = pct > 0.6 ? '#00C853' : pct > 0.3 ? '#ffaa00' : '#ff4444';
                ctx.fillRect(this.x - w/2, this.y - 24, w * pct, h);
                
                ctx.beginPath(); ctx.arc(this.x, this.y, this.boss ? 18 : 12, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
                ctx.strokeStyle = this.boss ? '#ffd700' : '#fff'; ctx.lineWidth = this.boss ? 3 : 2; ctx.stroke();
                
                ctx.fillStyle = '#fff'; ctx.font = `bold ${this.boss ? 16 : 12}px Arial`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(this.icon, this.x, this.y);
                ctx.globalAlpha = 1;
            }
        }
        
        class Projectile {
            constructor(x, y, target, damage, speed, color, area, stun, chain) {
                this.x = x; this.y = y; this.target = target; this.damage = damage;
                this.speed = speed; this.color = color; this.area = area; this.stun = stun; this.chain = chain;
                this.trail = [];
            }
            
            update() {
                if (!game.enemies.includes(this.target)) { this.remove(); return; }
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 6) this.trail.shift();
                const dx = this.target.x - this.x, dy = this.target.y - this.y;
                const dist = Math.hypot(dx, dy);
                if (dist < 12) this.hit();
                else { this.x += (dx / dist) * this.speed * game.gameSpeed; this.y += (dy / dist) * this.speed * game.gameSpeed; }
            }
            
            hit() {
                if (this.area) {
                    for (const e of game.enemies) {
                        const d = Math.hypot(e.x - this.x, e.y - this.y);
                        if (d < 60) e.takeDamage(this.damage * (1 - d / 60));
                    }
                    for (let i = 0; i < 15; i++) game.particles.push(new Particle(this.x, this.y, this.color));
                } else {
                    this.target.takeDamage(this.damage);
                    if (this.stun) this.target.stun();
                    if (this.chain) this.chainLightning(this.target, this.chain);
                }
                this.remove();
            }
            
            chainLightning(from, remaining) {
                if (remaining <= 0) return;
                let closest = null, bestDist = 100;
                for (const e of game.enemies) {
                    if (e === from) continue;
                    const d = Math.hypot(e.x - from.x, e.y - from.y);
                    if (d < bestDist && d < 120) { bestDist = d; closest = e; }
                }
                if (closest) {
                    closest.takeDamage(this.damage * 0.7);
                    game.particles.push(new ChainParticle(from.x, from.y, closest.x, closest.y, this.color));
                    this.chainLightning(closest, remaining - 1);
                }
            }
            
            remove() { game.projectiles.splice(game.projectiles.indexOf(this), 1); }
            
            draw() {
                for (let i = 0; i < this.trail.length; i++) {
                    const p = this.trail[i], a = i / this.trail.length;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 3 * a, 0, Math.PI * 2);
                    ctx.fillStyle = this.color + Math.floor(a * 255).toString(16).padStart(2, '0'); ctx.fill();
                }
                ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
                ctx.beginPath(); ctx.arc(this.x, this.y, 10, 0, Math.PI * 2);
                ctx.fillStyle = this.color + '40'; ctx.fill();
            }
        }
        
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const a = Math.random() * Math.PI * 2;
                const s = Math.random() * 4 + 2;
                this.vx = Math.cos(a) * s; this.vy = Math.sin(a) * s;
                this.life = 30; this.size = Math.random() * 4 + 2;
            }
            update() { this.x += this.vx * game.gameSpeed; this.y += this.vy * game.gameSpeed; this.life -= game.gameSpeed; this.size *= 0.95; }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life / 30);
                ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        class ChainParticle {
            constructor(x1, y1, x2, y2, color) { this.x1 = x1; this.y1 = y1; this.x2 = x2; this.y2 = y2; this.color = color; this.life = 12; }
            update() { this.life -= game.gameSpeed; }
            draw() { ctx.globalAlpha = Math.max(0, this.life / 12); ctx.strokeStyle = this.color; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(this.x1, this.y1); ctx.lineTo(this.x2, this.y2); ctx.stroke(); ctx.globalAlpha = 1; }
        }
        
        async function startWave() {
            if (game.waveActive || game.wave > game.maxWaves) return;
            game.waveActive = true;
            document.getElementById('startWave').disabled = true;
            document.getElementById('startWave').textContent = 'Wave ' + game.wave;
            document.querySelector('.side-panel').style.display = 'none';
            
            const wave = waves[game.wave - 1];
            for (const group of wave.enemies) {
                for (let i = 0; i < group.count; i++) {
                    game.enemies.push(new Enemy(group.type));
                    await new Promise(r => setTimeout(r, group.interval / game.gameSpeed));
                }
            }
        }
        
        function checkWaveEnd() {
            if (game.waveActive && game.enemies.length === 0) {
                game.waveActive = false;
                game.money += 50 + game.wave * 10; game.totalEarned += 50 + game.wave * 10;
                game.wave++;
                document.getElementById('startWave').disabled = false;
                document.getElementById('startWave').textContent = 'Start Wave';
                document.querySelector('.side-panel').style.display = 'block';
                updateNextWave(); updateUI();
                if (game.wave > game.maxWaves) endGame(true);
            }
        }
        
        function updateNextWave() {
            if (game.wave > game.maxWaves) return;
            const container = document.getElementById('nextEnemies');
            container.innerHTML = '';
            const wave = waves[game.wave - 1];
            for (const group of wave.enemies) {
                for (let i = 0; i < Math.min(group.count, 6); i++) {
                    const div = document.createElement('div');
                    div.className = 'enemy-preview';
                    div.style.background = enemyTypes[group.type].color;
                    div.textContent = enemyTypes[group.type].icon;
                    container.appendChild(div);
                }
            }
        }
        
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left, y = e.clientY - rect.top;
            
            for (const t of game.towers) {
                if (Math.hypot(x - t.x, y - t.y) < 28) { showUpgrade(t); return; }
            }
            
            if (game.selectedTowerType) {
                const cost = towerTypes[game.selectedTowerType].cost;
                if (game.money >= cost && canPlace(x, y)) {
                    game.money -= cost;
                    game.towers.push(new Tower(x, y, game.selectedTowerType));
                    for (let i = 0; i < 10; i++) game.particles.push(new Particle(x, y, '#00C853'));
                    updateUI();
                }
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            game.mouseX = e.clientX - rect.left;
            game.mouseY = e.clientY - rect.top;
        });
        
        function canPlace(x, y) {
            if (y > canvas.height - 20) return false;
            for (let i = 0; i < path.length - 1; i++) {
                const d = pointToLine(x, y, path[i].x, path[i].y, path[i+1].x, path[i+1].y);
                if (d < 35) return false;
            }
            for (const t of game.towers) if (Math.hypot(x - t.x, y - t.y) < 50) return false;
            return true;
        }
        
        function pointToLine(px, py, x1, y1, x2, y2) {
            const A = px - x1, B = py - y1, C = x2 - x1, D = y2 - y1;
            const dot = A * C + B * D, lenSq = C * C + D * D;
            let param = lenSq !== 0 ? dot / lenSq : -1;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; }
            else if (param > 1) { xx = x2; yy = y2; }
            else { xx = x1 + param * C; yy = y1 + param * D; }
            return Math.hypot(px - xx, py - yy);
        }
        
        document.querySelectorAll('.tower-card').forEach(card => {
            card.addEventListener('click', () => {
                const type = card.dataset.type, cost = parseInt(card.dataset.cost);
                if (game.money < cost) return;
                document.querySelectorAll('.tower-card').forEach(c => c.classList.remove('selected'));
                if (game.selectedTowerType === type) {
                    game.selectedTowerType = null;
                } else {
                    game.selectedTowerType = type;
                    card.classList.add('selected');
                }
            });
        });
        
        document.getElementById('speedBtn').addEventListener('click', () => {
            game.gameSpeed = game.gameSpeed === 1 ? 2 : 1;
            document.getElementById('speedBtn').textContent = game.gameSpeed + 'x';
            document.getElementById('speedBtn').classList.toggle('active', game.gameSpeed === 2);
        });
        
        document.getElementById('startWave').addEventListener('click', startWave);
        
        function showUpgrade(tower) {
            game.selectedTower = tower;
            document.getElementById('modalTitle').textContent = towerTypes[tower.type].name;
            const container = document.getElementById('upgradePaths');
            container.innerHTML = '';
            
            ['a', 'b'].forEach(path => {
                const lvl = path === 'a' ? tower.pathA : tower.pathB;
                const maxed = lvl >= 3;
                const cost = Math.floor(towerTypes[tower.type].cost * 0.6 * (lvl + 1));
                const pathDef = towerTypes[tower.type].paths[path];
                
                const div = document.createElement('div');
                div.className = 'upgrade-path' + (maxed ? ' maxed' : '');
                div.innerHTML = `
                    <div class="upgrade-path-name">${pathDef.name}</div>
                    <div class="upgrade-levels">${[0,1,2].map(i => `<div class="upgrade-level ${i < lvl ? (maxed ? 'max' : 'active') : ''}"></div>`).join('')}</div>
                    <div class="upgrade-cost">${maxed ? 'MAXED' : '$' + cost}</div>
                `;
                if (!maxed && game.money >= cost) {
                    div.addEventListener('click', () => { tower.upgrade(path); showUpgrade(tower); updateUI(); });
                }
                container.appendChild(div);
            });
            
            document.getElementById('sellBtn').textContent = 'Sell ($' + tower.getSellValue() + ')';
            document.getElementById('upgradeModal').classList.add('active');
        }
        
        function closeUpgrade() {
            document.getElementById('upgradeModal').classList.remove('active');
            game.selectedTower = null;
        }
        
        document.getElementById('sellBtn').addEventListener('click', () => {
            if (game.selectedTower) {
                game.money += game.selectedTower.getSellValue();
                game.towers.splice(game.towers.indexOf(game.selectedTower), 1);
                closeUpgrade(); updateUI();
            }
        });
        
        function updateUI() {
            document.getElementById('money').textContent = game.money;
            document.getElementById('lives').textContent = game.lives;
            document.getElementById('wave').textContent = Math.min(game.wave, game.maxWaves);
            
            document.querySelectorAll('.tower-card').forEach(card => {
                const cost = parseInt(card.dataset.cost);
                card.classList.toggle('disabled', game.money < cost);
            });
        }
        
        function endGame(victory) {
            const screen = document.getElementById('gameOver');
            screen.classList.add('active', victory ? 'victory' : 'defeat');
            document.querySelector('.game-over h1').textContent = victory ? 'Victory!' : 'Game Over';
            document.getElementById('finalWave').textContent = game.wave - 1;
            document.getElementById('finalMoney').textContent = game.totalEarned;
            document.getElementById('finalKills').textContent = game.enemiesKilled;
        }
        
        function restartGame() {
            game = { money: 650, lives: 20, wave: 1, maxWaves: 25, waveActive: false, gameSpeed: 1,
                enemies: [], towers: [], projectiles: [], particles: [],
                selectedTowerType: null, selectedTower: null,
                totalEarned: 650, enemiesKilled: 0, mouseX: 0, mouseY: 0 };
            document.getElementById('gameOver').classList.remove('active', 'victory', 'defeat');
            document.getElementById('startWave').disabled = false;
            document.getElementById('startWave').textContent = 'Start Wave';
            document.querySelector('.side-panel').style.display = 'block';
            document.querySelectorAll('.tower-card').forEach(c => c.classList.remove('selected'));
            updateNextWave(); updateUI();
        }
        
        function drawPath() {
            ctx.strokeStyle = '#00C85315'; ctx.lineWidth = 50; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.beginPath();
            for (let i = 0; i < path.length; i++) { if (i === 0) ctx.moveTo(path[i].x, path[i].y); else ctx.lineTo(path[i].x, path[i].y); }
            ctx.stroke();
            
            ctx.strokeStyle = '#1a1a3e'; ctx.lineWidth = 36; ctx.stroke();
            ctx.strokeStyle = '#00C853'; ctx.lineWidth = 3; ctx.setLineDash([10, 8]); ctx.stroke(); ctx.setLineDash([]);
            
            ctx.fillStyle = '#00C853'; ctx.beginPath(); ctx.arc(path[0].x, path[0].y, 15, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center'; ctx.fillText('START', path[0].x, path[0].y + 3);
            
            ctx.fillStyle = '#ff4444'; ctx.beginPath(); ctx.arc(path[path.length-1].x, path[path.length-1].y, 15, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.fillText('END', path[path.length-1].x, path[path.length-1].y + 3);
        }
        
        function drawPlacementPreview() {
            if (!game.selectedTowerType) return;
            const def = towerTypes[game.selectedTowerType];
            const canPlace = canPlaceTower(game.mouseX, game.mouseY);
            
            ctx.beginPath(); ctx.arc(game.mouseX, game.mouseY, def.range, 0, Math.PI * 2);
            ctx.fillStyle = canPlace ? 'rgba(0,200,83,0.1)' : 'rgba(255,68,68,0.1)'; ctx.fill();
            ctx.strokeStyle = canPlace ? 'rgba(0,200,83,0.4)' : 'rgba(255,68,68,0.4)'; ctx.lineWidth = 2; ctx.stroke();
            
            ctx.beginPath(); ctx.arc(game.mouseX, game.mouseY, 22, 0, Math.PI * 2);
            ctx.fillStyle = canPlace ? def.color + '60' : '#ff444460'; ctx.fill();
            ctx.strokeStyle = canPlace ? def.color : '#ff4444'; ctx.lineWidth = 3; ctx.stroke();
        }
        
        function canPlaceTower(x, y) {
            if (y > canvas.height - 20) return false;
            for (let i = 0; i < path.length - 1; i++) {
                const d = pointToLine(x, y, path[i].x, path[i].y, path[i+1].x, path[i+1].y);
                if (d < 35) return false;
            }
            for (const t of game.towers) if (Math.hypot(x - t.x, y - t.y) < 50) return false;
            return true;
        }
        
        function loop() {
            ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawPath();
            drawPlacementPreview();
            
            for (const t of game.towers) { t.update(); t.draw(); }
            for (const e of game.enemies) { e.update(); e.draw(); }
            for (const p of game.projectiles) { p.update(); p.draw(); }
            
            for (let i = game.particles.length - 1; i >= 0; i--) {
                const p = game.particles[i]; p.update(); p.draw();
                if (p.life <= 0) game.particles.splice(i, 1);
            }
            
            checkWaveEnd();
            requestAnimationFrame(loop);
        }
        
        resize();
        updateNextWave();
        updateUI();
        loop();
    </script>
</body>
</html>
