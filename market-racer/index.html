<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Market Racer | MoneyBot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-light: #69F0AE;
            --moneybot-green-dark: #00C853;
            --moneybot-gold: #FBBF24;
            --moneybot-dark: #1A1A2E;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
            --moneybot-text-secondary: #6B7280;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
            background: var(--moneybot-dark);
            min-height: 100vh;
            color: white;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        /* App Container */
        .app {
            position: relative;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--moneybot-dark);
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(0, 230, 118, 0.15);
            color: var(--moneybot-green);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
            text-decoration: none;
        }
        
        .back-btn:hover {
            background: rgba(0, 230, 118, 0.25);
            transform: translateX(-2px);
        }
        
        .back-btn:active {
            transform: scale(0.92);
        }
        
        .header-title {
            font-weight: 700;
            font-size: 17px;
            letter-spacing: -0.3px;
            color: white;
        }
        
        /* Stats */
        .header-stats {
            display: flex;
            gap: 12px;
        }
        
        .stat-badge {
            background: rgba(0, 230, 118, 0.15);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            color: var(--moneybot-green);
            border: 1px solid rgba(0, 230, 118, 0.3);
        }
        
        .stat-badge.coins {
            background: rgba(251, 191, 36, 0.15);
            color: var(--moneybot-gold);
            border-color: rgba(251, 191, 36, 0.3);
        }
        
        /* Game Container */
        .game-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* Start Screen */
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(26, 26, 46, 0.95) 0%, rgba(0,0,0,0.98) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 40px 20px;
        }
        
        .start-screen.hidden {
            display: none;
        }
        
        .game-logo {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .game-title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .game-subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            margin-bottom: 40px;
            text-align: center;
        }
        
        .start-btn {
            background: linear-gradient(135deg, var(--moneybot-green) 0%, var(--moneybot-green-dark) 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0, 230, 118, 0.4);
            transition: all 0.3s var(--ease-spring);
        }
        
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(0, 230, 118, 0.5);
        }
        
        .start-btn:active {
            transform: scale(0.96);
        }
        
        .instructions {
            margin-top: 40px;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            line-height: 1.8;
        }
        
        .instruction-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        /* Game Over Screen */
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            padding: 40px 20px;
        }
        
        .game-over.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .crash-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .crash-title {
            font-size: 28px;
            font-weight: 800;
            color: #EF4444;
            margin-bottom: 30px;
        }
        
        .final-stats {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 24px 32px;
            margin-bottom: 30px;
            display: flex;
            gap: 40px;
        }
        
        .final-stat {
            text-align: center;
        }
        
        .final-stat-value {
            font-size: 32px;
            font-weight: 800;
            color: white;
            margin-bottom: 4px;
        }
        
        .final-stat-value.coins {
            color: var(--moneybot-gold);
        }
        
        .final-stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .restart-btn {
            background: var(--moneybot-green);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
        }
        
        .restart-btn:active {
            transform: scale(0.96);
        }
        
        /* Touch Controls */
        .touch-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none;
            z-index: 50;
        }
        
        .touch-area {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            pointer-events: auto;
            transition: all 0.2s;
        }
        
        .touch-area:active {
            background: rgba(0, 230, 118, 0.3);
            border-color: var(--moneybot-green);
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-logo">
                <a href="../moneybot-official/" class="back-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </a>
                <span class="header-title">Market Racer</span>
            </div>
            <div class="header-stats">
                <div class="stat-badge"><span id="distance">0</span>m</div>
                <div class="stat-badge coins">🪙 <span id="coins">0</span></div>
            </div>
        </header>
        
        <div class="game-container">
            <canvas id="game-canvas"></canvas>
            
            <div class="start-screen" id="startScreen">
                <div class="game-logo">🏎️</div>
                <div class="game-title">Market Racer</div>
                <div class="game-subtitle">Navigate the market highway</div>
                <button class="start-btn" onclick="startGame()">START RACING</button>
                <div class="instructions">
                    <div class="instruction-item">← → Swipe or arrows to switch lanes</div>
                    <div class="instruction-item">🪙 Collect coins for bonus points</div>
                    <div class="instruction-item">🔴 Avoid market crash obstacles</div>
                </div>
            </div>
            
            <div class="game-over" id="gameOver">
                <div class="crash-icon">💥</div>
                <div class="crash-title">MARKET CRASH!</div>
                <div class="final-stats">
                    <div class="final-stat">
                        <div class="final-stat-value" id="finalDistance">0</div>
                        <div class="final-stat-label">Meters</div>
                    </div>
                    <div class="final-stat">
                        <div class="final-stat-value coins" id="finalCoins">0</div>
                        <div class="final-stat-label">Coins</div>
                    </div>
                </div>
                <button class="restart-btn" onclick="restartGame()">RACE AGAIN</button>
            </div>
            
            <div class="touch-controls" id="touchControls" style="display: none;">
                <div class="touch-area" onclick="moveLane(-1)">←</div>
                <div class="touch-area" onclick="moveLane(1)">→</div>
            </div>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        let gameRunning = false;
        let player = { lane: 1, x: 0, y: 0, width: 50, height: 80 };
        let coins = [];
        let obstacles = [];
        let distance = 0;
        let coinCount = 0;
        let speed = 6;
        let lanes = [];
        let particles = [];
        let roadOffset = 0;
        
        function resize() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            lanes = [canvas.width * 0.25, canvas.width * 0.5, canvas.width * 0.75];
            player.y = canvas.height - 180;
        }
        
        function startGame() {
            gameRunning = true;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('touchControls').style.display = 'flex';
            resetGame();
            gameLoop();
        }
        
        function resetGame() {
            player.lane = 1;
            player.x = lanes[1];
            coins = [];
            obstacles = [];
            particles = [];
            distance = 0;
            coinCount = 0;
            speed = 6;
            updateDisplay();
        }
        
        function restartGame() {
            document.getElementById('gameOver').classList.remove('show');
            startGame();
        }
        
        function updateDisplay() {
            document.getElementById('distance').textContent = Math.floor(distance);
            document.getElementById('coins').textContent = coinCount;
        }
        
        function createParticle(x, y, color) {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1,
                    color: color
                });
            }
        }
        
        function drawRoad() {
            // Background
            ctx.fillStyle = '#0F172A';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Road gradient
            const roadGradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
            roadGradient.addColorStop(0, '#1A1A2E');
            roadGradient.addColorStop(0.3, '#2D2D44');
            roadGradient.addColorStop(0.5, '#3D3D54');
            roadGradient.addColorStop(0.7, '#2D2D44');
            roadGradient.addColorStop(1, '#1A1A2E');
            ctx.fillStyle = roadGradient;
            ctx.fillRect(canvas.width * 0.1, 0, canvas.width * 0.8, canvas.height);
            
            // Lane lines
            ctx.strokeStyle = 'rgba(0, 230, 118, 0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([30, 30]);
            roadOffset = (roadOffset + speed) % 60;
            
            lanes.forEach(lane => {
                ctx.beginPath();
                ctx.moveTo(lane, -60 + roadOffset);
                ctx.lineTo(lane, canvas.height);
                ctx.stroke();
            });
            ctx.setLineDash([]);
            
            // Road edges
            ctx.strokeStyle = 'rgba(0, 230, 118, 0.5)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(canvas.width * 0.1, 0);
            ctx.lineTo(canvas.width * 0.1, canvas.height);
            ctx.moveTo(canvas.width * 0.9, 0);
            ctx.lineTo(canvas.width * 0.9, canvas.height);
            ctx.stroke();
        }
        
        function drawPlayer() {
            // Smooth lane transition
            player.x += (lanes[player.lane] - player.x) * 0.15;
            
            const x = player.x - player.width/2;
            const y = player.y;
            
            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.ellipse(player.x, y + player.height - 5, 25, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Car body
            const carGradient = ctx.createLinearGradient(x, y, x, y + player.height);
            carGradient.addColorStop(0, '#00E676');
            carGradient.addColorStop(1, '#00C853');
            ctx.fillStyle = carGradient;
            ctx.fillRect(x, y, player.width, player.height);
            
            // Car details
            ctx.fillStyle = '#69F0AE';
            ctx.fillRect(x + 5, y + 10, player.width - 10, 20);
            
            // Windshield
            ctx.fillStyle = '#1A1A2E';
            ctx.fillRect(x + 8, y + 15, player.width - 16, 12);
            
            // Headlights
            ctx.fillStyle = '#FBBF24';
            ctx.beginPath();
            ctx.arc(x + 10, y + player.height - 10, 6, 0, Math.PI * 2);
            ctx.arc(x + player.width - 10, y + player.height - 10, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // Glow
            ctx.shadowColor = '#00E676';
            ctx.shadowBlur = 20;
            ctx.strokeStyle = '#00E676';
            ctx.lineWidth = 2;
            ctx.strokeRect(x - 2, y - 2, player.width + 4, player.height + 4);
            ctx.shadowBlur = 0;
        }
        
        function drawCoins() {
            coins = coins.filter(coin => {
                coin.y += speed;
                
                // Collision
                if (!coin.collected && 
                    Math.abs(coin.x - player.x) < 40 && 
                    Math.abs(coin.y - player.y - player.height/2) < 50) {
                    coin.collected = true;
                    coinCount += 10;
                    createParticle(coin.x, coin.y, '#FBBF24');
                    if (navigator.vibrate) navigator.vibrate(20);
                    updateDisplay();
                }
                
                if (!coin.collected) {
                    // Glow
                    ctx.shadowColor = '#FBBF24';
                    ctx.shadowBlur = 15;
                    
                    ctx.fillStyle = '#FBBF24';
                    ctx.beginPath();
                    ctx.arc(coin.x, coin.y, 18, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                    
                    // Inner
                    ctx.fillStyle = '#FDE68A';
                    ctx.beginPath();
                    ctx.arc(coin.x - 3, coin.y - 3, 10, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // $ symbol
                    ctx.fillStyle = '#92400E';
                    ctx.font = 'bold 16px -apple-system, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('$', coin.x, coin.y + 5);
                }
                
                return coin.y < canvas.height + 50 && !coin.collected;
            });
        }
        
        function drawObstacles() {
            obstacles = obstacles.filter(obs => {
                obs.y += speed;
                
                // Collision
                if (obs.lane === player.lane && 
                    Math.abs(obs.y - player.y - player.height/2) < 50) {
                    gameOver();
                    return false;
                }
                
                // Draw crash obstacle
                ctx.fillStyle = '#EF4444';
                ctx.beginPath();
                ctx.arc(obs.x, obs.y, 30, 0, Math.PI * 2);
                ctx.fill();
                
                // Inner
                ctx.fillStyle = '#7F1D1D';
                ctx.beginPath();
                ctx.arc(obs.x, obs.y, 20, 0, Math.PI * 2);
                ctx.fill();
                
                // Icon
                ctx.fillStyle = 'white';
                ctx.font = 'bold 24px -apple-system, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('📉', obs.x, obs.y + 8);
                
                return obs.y < canvas.height + 50;
            });
        }
        
        function drawParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.life -= 0.03;
                
                if (p.life > 0) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 6, 6);
                    ctx.globalAlpha = 1;
                    return true;
                }
                return false;
            });
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            drawRoad();
            drawPlayer();
            drawCoins();
            drawObstacles();
            drawParticles();
            
            // Spawn coins
            if (Math.random() < 0.025) {
                coins.push({
                    x: lanes[Math.floor(Math.random() * 3)],
                    y: -50,
                    collected: false
                });
            }
            
            // Spawn obstacles
            if (Math.random() < 0.02) {
                const lane = Math.floor(Math.random() * 3);
                obstacles.push({
                    lane: lane,
                    x: lanes[lane],
                    y: -50
                });
            }
            
            distance += speed / 10;
            speed += 0.003;
            updateDisplay();
            
            requestAnimationFrame(gameLoop);
        }
        
        function moveLane(direction) {
            if (!gameRunning) return;
            const newLane = player.lane + direction;
            if (newLane >= 0 && newLane < 3) {
                player.lane = newLane;
                if (navigator.vibrate) navigator.vibrate(10);
            }
        }
        
        function gameOver() {
            gameRunning = false;
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            document.getElementById('finalDistance').textContent = Math.floor(distance);
            document.getElementById('finalCoins').textContent = coinCount;
            document.getElementById('gameOver').classList.add('show');
            document.getElementById('touchControls').style.display = 'none';
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLane(-1);
            if (e.key === 'ArrowRight') moveLane(1);
        });
        
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        
        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > 50) {
                moveLane(diff > 0 ? 1 : -1);
            }
        });
        
        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
