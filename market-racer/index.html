<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyBot - Market Racer | MoneyBot Gaming</title>
    <link rel="icon" type="image/svg+xml" href="../assets/moneybot-idle.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-light: #69F0AE;
            --moneybot-green-dark: #00C853;
            --moneybot-gold: #FBBF24;
            --moneybot-dark: #FFFFFF;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--moneybot-dark);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
        }
        
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: #FFFFFF 0%, transparent 100%);
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: rgba(255,255,255,0.15);
            
            border: 1px solid rgba(255,255,255,0.1);
            color: #0F172A;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .back-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.25);
        }
        
        .score-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        
        .score-label {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .score-display {
            font-size: 28px;
            font-weight: 800;
            color: #0F172A;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .coin-display {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(251, 191, 36, 0.2);
            border: 1px solid var(--moneybot-gold);
            padding: 6px 14px;
            border-radius: 16px;
            margin-top: 4px;
        }
        
        .coin-icon {
            font-size: 16px;
        }
        
        .coin-value {
            font-weight: 700;
            color: var(--moneybot-gold);
            font-size: 16px;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #FFFFFF 0%, transparent 100%);
            
            z-index: 200;
        }
        
        .game-over-screen {
            display: none;
        }
        
        .logo {
            font-size: 80px;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 30px rgba(0, 230, 118, 0.4));
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .title {
            font-size: 40px;
            font-weight: 800;
            background: #FFFFFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 17px;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 40px;
            line-height: 1.5;
        }
        
        .high-score {
            background: rgba(255,255,255,0.1);
            padding: 16px 32px;
            border-radius: 16px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .high-score-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        
        .high-score-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--moneybot-gold);
        }
        
        .start-btn {
            background: #FFFFFF, var(--moneybot-green-dark));
            color: #0F172A;
            border: none;
            padding: 22px 70px;
            font-size: 22px;
            font-weight: 800;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0, 230, 118, 0.5);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 50px rgba(0, 230, 118, 0.6);
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        .instructions {
            margin-top: 40px;
            display: flex;
            gap: 30px;
        }
        
        .instruction-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
        
        .instruction-icon {
            font-size: 28px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <a href="../moneybot-official/" class="back-btn">←</a>
            <div class="score-container">
                <div class="score-label">Distance</div>
                <div class="score-display"><span id="score">0</span>m</div>
                <div class="coin-display">
                    <span class="coin-icon">🪙</span>
                    <span class="coin-value" id="coins">0</span>
                </div>
            </div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div class="start-screen" id="startScreen">
            <div class="logo">🏎️</div>
            <div class="title">Market Racer</div>
            <div class="subtitle">Race through the markets!<br>Collect coins, avoid crashes</div>
            
            <div class="high-score">
                <div class="high-score-label">Best Run</div>
                <div class="high-score-value" id="highScore">0m</div>
            </div>
            
            <button class="start-btn" onclick="startGame()">Race Now</button>
            
            <div class="instructions">
                <div class="instruction-item">
                    <span class="instruction-icon">👈👉</span>
                    <span>Swipe</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-icon">🪙</span>
                    <span>Collect</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-icon">🐻</span>
                    <span>Avoid</span>
                </div>
            </div>
        </div>
        
        <div class="game-over-screen" id="gameOverScreen">
            <div class="logo" style="font-size: 40px; margin-bottom: 10px;">💥</div>
            <div class="title" style="font-size: 32px;">Crash!</div>
            <div class="subtitle">You raced <span id="finalScore">0</span>m</div>
            <button class="start-btn" onclick="restartGame()">Race Again</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth > 430 ? 430 : window.innerWidth;
        canvas.height = window.innerHeight;
        
        let gameRunning = false;
        let score = 0;
        let coins = 0;
        let highScore = localStorage.getItem('marketRacerHighScore') || 0;
        let speed = 5;
        let player = { lane: 1, x: canvas.width / 2, y: canvas.height - 150 };
        let coinItems = [];
        let obstacles = [];
        let particles = [];
        let lanes = [canvas.width * 0.25, canvas.width * 0.5, canvas.width * 0.75];
        let groundOffset = 0;
        
        document.getElementById('highScore').textContent = highScore + 'm';
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            coins = 0;
            speed = 5;
            player.lane = 1;
            coinItems = [];
            obstacles = [];
            particles = [];
            gameLoop();
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            startGame();
        }
        
        function gameOver() {
            gameRunning = false;
            if (score > highScore) {
                highScore = Math.floor(score);
                localStorage.setItem('marketRacerHighScore', highScore);
            }
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
        
        function update() {
            score += speed / 10;
            speed += 0.01;
            groundOffset = (groundOffset + speed) % 40;
            
            // Spawn coins
            if (Math.random() < 0.03) {
                coinItems.push({
                    lane: Math.floor(Math.random() * 3),
                    y: -50,
                    collected: false
                });
            }
            
            // Spawn obstacles
            if (Math.random() < 0.025) {
                obstacles.push({
                    lane: Math.floor(Math.random() * 3),
                    y: -50,
                    type: Math.random() < 0.5 ? 'bear' : 'barrier'
                });
            }
            
            // Update player position
            player.x += (lanes[player.lane] - player.x) * 0.15;
            
            // Update coins
            coinItems = coinItems.filter(coin => {
                coin.y += speed;
                
                if (!coin.collected && coin.lane === player.lane && Math.abs(coin.y - player.y) < 50) {
                    coin.collected = true;
                    coins++;
                    score += 50;
                    
                    // Particles
                    for (let i = 0; i < 5; i++) {
                        particles.push({
                            x: lanes[coin.lane],
                            y: coin.y,
                            vx: (Math.random() - 0.5) * 6,
                            vy: (Math.random() - 0.5) * 6,
                            life: 1,
                            color: '#FBBF24'
                        });
                    }
                    
                    if (navigator.vibrate) navigator.vibrate(10);
                }
                
                return coin.y < canvas.height + 50 && !coin.collected;
            });
            
            // Update obstacles
            obstacles = obstacles.filter(obs => {
                obs.y += speed;
                
                if (obs.lane === player.lane && Math.abs(obs.y - player.y) < 50) {
                    gameOver();
                }
                
                return obs.y < canvas.height + 50;
            });
            
            // Update particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                return p.life > 0;
            });
            
            document.getElementById('score').textContent = Math.floor(score);
            document.getElementById('coins').textContent = coins;
        }
        
        function draw() {
            // Clear with trail effect
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw background buildings
            ctx.fillStyle = 'rgba(30, 41, 59, 0.5)';
            for (let i = 0; i < 10; i++) {
                const x = (i * 150 - score * 0.2) % (canvas.width + 200) - 100;
                const height = 100 + Math.sin(i * 123) * 50;
                ctx.fillRect(x, canvas.height - 100 - height, 80, height);
            }
            
            // Draw ground
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
            
            // Lane markers
            ctx.strokeStyle = 'rgba(0, 230, 118, 0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 20]);
            lanes.forEach(lane => {
                ctx.beginPath();
                ctx.moveTo(lane, 0);
                ctx.lineTo(lane, canvas.height);
                ctx.stroke();
            });
            ctx.setLineDash([]);
            
            // Moving grid on ground
            groundOffset = (groundOffset + speed) % 40;
            ctx.strokeStyle = 'transparent';
            ctx.lineWidth = 1;
            for (let i = -40; i < canvas.width + 40; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i - groundOffset, canvas.height - 100);
                ctx.lineTo(i - groundOffset - 20, canvas.height);
                ctx.stroke();
            }
            
            // Draw player
            ctx.font = '50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🏎️', player.x, player.y);
            
            // Draw coins
            coinItems.forEach(coin => {
                ctx.font = '35px Arial';
                ctx.fillText('🪙', lanes[coin.lane], coin.y);
            });
            
            // Draw obstacles
            obstacles.forEach(obs => {
                ctx.font = '40px Arial';
                ctx.fillText(obs.type === 'bear' ? '🐻' : '🚧', lanes[obs.lane], obs.y);
            });
            
            // Draw particles
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            update();
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Controls
        function moveLeft() {
            if (player.lane > 0) player.lane--;
        }
        
        function moveRight() {
            if (player.lane < 2) player.lane++;
        }
        
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
        });
        
        // Touch controls
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        
        document.addEventListener('touchend', (e) => {
            if (!gameRunning) return;
            const touchEndX = e.changedTouches[0].clientX;
            if (touchEndX < touchStartX - 50) moveLeft();
            if (touchEndX > touchStartX + 50) moveRight();
        });
    </script>
</body>
</html>
