<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Market Racer | MoneyBot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-light: #69F0AE;
            --moneybot-green-dark: #00C853;
            --moneybot-gold: #FBBF24;
            --moneybot-dark: #0F172A;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--moneybot-dark);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
        }
        
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.9) 0%, transparent 100%);
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            text-decoration: none;
        }
        
        .score-display {
            background: rgba(0, 230, 118, 0.2);
            border: 1px solid var(--moneybot-green);
            padding: 10px 20px;
            border-radius: 20px;
            color: var(--moneybot-green);
            font-weight: 700;
            font-size: 18px;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            z-index: 200;
        }
        
        .game-over-screen {
            display: none;
        }
        
        .logo {
            font-size: 64px;
            margin-bottom: 10px;
        }
        
        .title {
            font-size: 32px;
            font-weight: 800;
            color: white;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 40px;
        }
        
        .start-btn {
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 230, 118, 0.4);
            transition: transform 0.2s;
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        .instructions {
            margin-top: 30px;
            color: rgba(255,255,255,0.5);
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <a href="../moneybot-official/" class="back-btn">←</a>
            <div class="score-display"><span id="score">0</span>m</div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div class="start-screen" id="startScreen">
            <div class="logo">🏎️</div>
            <div class="title">Market Racer</div>
            <div class="subtitle">Race through the markets!<br>Collect coins, avoid crashes</div>
            <button class="start-btn" onclick="startGame()">RACE NOW</button>
            <div class="instructions">Swipe left/right to change lanes<br>Tap to boost</div>
        </div>
        
        <div class="game-over-screen" id="gameOverScreen">
            <div class="logo">💥</div>
            <div class="title">Crash!</div>
            <div class="subtitle">You raced <span id="finalScore">0</span>m</div>
            <button class="start-btn" onclick="restartGame()">RACE AGAIN</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth > 430 ? 430 : window.innerWidth;
        canvas.height = window.innerHeight;
        
        let gameRunning = false;
        let score = 0;
        let speed = 5;
        let player = { lane: 1, x: canvas.width / 2, y: canvas.height - 150 };
        let coins = [];
        let obstacles = [];
        let particles = [];
        let lanes = [canvas.width * 0.25, canvas.width * 0.5, canvas.width * 0.75];
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            speed = 5;
            player.lane = 1;
            coins = [];
            obstacles = [];
            particles = [];
            gameLoop();
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            startGame();
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
        
        function update() {
            score += speed / 10;
            speed += 0.01;
            
            // Spawn coins
            if (Math.random() < 0.02) {
                coins.push({
                    lane: Math.floor(Math.random() * 3),
                    y: -50,
                    collected: false
                });
            }
            
            // Spawn obstacles
            if (Math.random() < 0.015) {
                obstacles.push({
                    lane: Math.floor(Math.random() * 3),
                    y: -50
                });
            }
            
            // Update coins
            coins = coins.filter(coin => {
                coin.y += speed;
                
                if (!coin.collected && coin.lane === player.lane && Math.abs(coin.y - player.y) < 50) {
                    coin.collected = true;
                    score += 50;
                    if (navigator.vibrate) navigator.vibrate(10);
                }
                
                return coin.y < canvas.height + 50 && !coin.collected;
            });
            
            // Update obstacles
            obstacles = obstacles.filter(obs => {
                obs.y += speed;
                
                if (obs.lane === player.lane && Math.abs(obs.y - player.y) < 50) {
                    gameOver();
                }
                
                return obs.y < canvas.height + 50;
            });
            
            document.getElementById('score').textContent = Math.floor(score);
        }
        
        function draw() {
            // Clear
            ctx.fillStyle = '#0F172A';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw road
            ctx.fillStyle = '#1E293B';
            ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
            
            // Draw lanes
            ctx.strokeStyle = 'rgba(0, 230, 118, 0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 20]);
            lanes.forEach(lane => {
                ctx.beginPath();
                ctx.moveTo(lane, 0);
                ctx.lineTo(lane, canvas.height);
                ctx.stroke();
            });
            ctx.setLineDash([]);
            
            // Draw player
            player.x += (lanes[player.lane] - player.x) * 0.1;
            ctx.font = '50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🏎️', player.x, player.y);
            
            // Draw coins
            coins.forEach(coin => {
                ctx.font = '35px Arial';
                ctx.fillText('🪙', lanes[coin.lane], coin.y);
            });
            
            // Draw obstacles
            obstacles.forEach(obs => {
                ctx.font = '40px Arial';
                ctx.fillText('📉', lanes[obs.lane], obs.y);
            });
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            update();
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft' && player.lane > 0) player.lane--;
            if (e.key === 'ArrowRight' && player.lane < 2) player.lane++;
        });
        
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        
        document.addEventListener('touchend', (e) => {
            if (!gameRunning) return;
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchEndX - touchStartX;
            
            if (Math.abs(diff) > 50) {
                if (diff > 0 && player.lane < 2) player.lane++;
                else if (diff < 0 && player.lane > 0) player.lane--;
            }
        });
    </script>
</body>
</html>
