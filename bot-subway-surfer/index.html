<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyBot Subway Surfer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
        body { background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .ui { position: absolute; top: 0; left: 0; right: 0; padding: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .score-box { text-align: right; }
        .score-label { font-size: 12px; color: #FFD700; font-weight: 700; letter-spacing: 2px; }
        .score-value { font-size: 48px; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .coins-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 20px; margin-top: 10px; }
        .coin-icon { width: 24px; height: 24px; background: linear-gradient(135deg, #FFD700, #FFA500); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #8B4513; font-size: 14px; }
        .coins-value { font-size: 20px; font-weight: 800; color: #FFD700; }
        .back-btn { width: 44px; height: 44px; background: rgba(255,255,255,0.15); border: none; border-radius: 50%; color: #fff; font-size: 20px; pointer-events: auto; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .overlay.hidden { display: none; }
        .logo { width: 100px; height: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 30px rgba(34,197,94,0.5)); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .title { font-size: 36px; font-weight: 900; color: #fff; margin-bottom: 10px; }
        .title span { color: #22C55E; }
        .btn { background: linear-gradient(135deg, #22C55E, #16A34A); color: #fff; border: none; padding: 20px 60px; border-radius: 50px; font-size: 24px; font-weight: 900; cursor: pointer; margin-top: 30px; box-shadow: 0 10px 40px rgba(34,197,94,0.4); }
        .game-over-title { font-size: 48px; font-weight: 900; color: #ef4444; margin-bottom: 20px; }
        .final-score { font-size: 72px; font-weight: 900; color: #fff; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    
    <div class="ui">
        <a href="../moneybot-official/" class="back-btn">←</a>
        <div class="score-box">
            <div class="score-label">SCORE</div>
            <div class="score-value" id="score">0</div>
            <div class="coins-box">
                <div class="coin-icon">$</div>
                <div class="coins-value" id="coins">0</div>
            </div>
        </div>
    </div>
    
    <div class="overlay" id="startScreen">
        <img src="assets/player-rembg.png" class="logo" alt="MoneyBot">
        <div class="title">Subway<span>Surfer</span></div>
        <button class="btn" onclick="game.start()">PLAY</button>
    </div>
    
    <div class="overlay hidden" id="gameOverScreen">
        <div class="game-over-title">GAME OVER</div>
        <div class="final-score" id="finalScore">0</div>
        <button class="btn" onclick="game.restart()">AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const LANE_WIDTH = 100;
        const PLAYER_Y = 0.75; // Player at 75% down screen
        const HORIZON_Y = 0.3; // Horizon at 30% down screen
        
        const playerImg = new Image();
        playerImg.src = 'assets/player-rembg.png';
        
        const game = {
            state: 'menu',
            score: 0,
            coinCount: 0,
            highScore: parseInt(localStorage.getItem('subway_highScore')) || 0,
            lane: 1,
            targetLane: 1,
            laneX: 0,
            speed: 5,
            worldY: 0,
            
            items: [], // trains, coins
            particles: [],
            
            resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                this.laneX = canvas.width / 2;
            },
            
            start() {
                this.state = 'playing';
                this.score = 0;
                this.coinCount = 0;
                this.lane = 1;
                this.targetLane = 1;
                this.speed = 5;
                this.worldY = 0;
                this.items = [];
                this.particles = [];
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameOverScreen').classList.add('hidden');
                this.loop();
            },
            
            restart() {
                this.start();
            },
            
            gameOver() {
                this.state = 'gameover';
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('subway_highScore', this.highScore);
                }
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOverScreen').classList.remove('hidden');
            },
            
            move(dir) {
                if (this.state !== 'playing') return;
                const newLane = this.targetLane + dir;
                if (newLane >= 0 && newLane <= 2) {
                    this.targetLane = newLane;
                }
            },
            
            jump() {
                // Jump animation could be added here
            },
            
            getLaneCenter(lane) {
                const trackWidth = LANE_WIDTH * 3;
                const startX = (canvas.width - trackWidth) / 2;
                return startX + lane * LANE_WIDTH + LANE_WIDTH / 2;
            },
            
            spawnItem() {
                const lane = Math.floor(Math.random() * 3);
                const isTrain = Math.random() > 0.5;
                
                this.items.push({
                    type: isTrain ? 'train' : 'coin',
                    lane: lane,
                    y: -200, // Start above horizon
                    width: isTrain ? 80 : 30,
                    height: isTrain ? 120 : 30,
                    collected: false
                });
            },
            
            spawnCoinLine() {
                const lane = Math.floor(Math.random() * 3);
                for (let i = 0; i < 5; i++) {
                    this.items.push({
                        type: 'coin',
                        lane: lane,
                        y: -200 - i * 80,
                        width: 30,
                        height: 30,
                        collected: false
                    });
                }
            },
            
            update() {
                if (this.state !== 'playing') return;
                
                // Update score
                this.score += 1;
                this.speed = Math.min(15, 5 + this.score / 500);
                document.getElementById('score').textContent = this.score;
                document.getElementById('coins').textContent = this.coinCount;
                
                // Smooth lane transition
                const targetX = this.getLaneCenter(this.targetLane);
                this.laneX += (targetX - this.laneX) * 0.15;
                if (Math.abs(this.laneX - targetX) < 1) {
                    this.lane = this.targetLane;
                }
                
                // Spawn items
                if (Math.random() < 0.02) this.spawnItem();
                if (Math.random() < 0.015) this.spawnCoinLine();
                
                // Update items
                const playerY = canvas.height * PLAYER_Y;
                
                for (let i = this.items.length - 1; i >= 0; i--) {
                    const item = this.items[i];
                    
                    // Move item down (toward player)
                    item.y += this.speed;
                    
                    // Get item's screen position with perspective
                    const itemScreen = this.getScreenPos(item.lane, item.y);
                    const playerScreen = { x: this.laneX, y: playerY, scale: 1 };
                    
                    // Check collision
                    if (!item.collected && itemScreen.y > playerY - 50 && itemScreen.y < playerY + 50) {
                        const laneMatch = Math.abs(item.lane - this.lane) < 0.5;
                        
                        if (laneMatch) {
                            if (item.type === 'train') {
                                this.gameOver();
                                return;
                            } else if (item.type === 'coin') {
                                item.collected = true;
                                this.coinCount++;
                                this.score += 50;
                                this.createParticles(itemScreen.x, itemScreen.y, '#FFD700');
                            }
                        }
                    }
                    
                    // Remove off-screen items
                    if (item.y > canvas.height + 200) {
                        this.items.splice(i, 1);
                    }
                }
                
                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.5;
                    p.life -= 0.05;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
            },
            
            getScreenPos(lane, worldY) {
                // Simple perspective: items start small at horizon, get bigger as they approach
                const horizonY = canvas.height * HORIZON_Y;
                const playerY = canvas.height * PLAYER_Y;
                const totalDist = playerY - horizonY;
                
                // Normalize Y position (0 at horizon, 1 at player)
                let t = (worldY - (-500)) / 1500; // Map worldY to 0-1 range
                t = Math.max(0, Math.min(1, t));
                
                // Perspective scale (0.3 at horizon, 1 at player)
                const scale = 0.3 + t * 0.7;
                
                // Screen Y position
                const screenY = horizonY + t * totalDist;
                
                // Lane position with perspective (narrower at horizon)
                const laneCenter = this.getLaneCenter(lane);
                const centerX = canvas.width / 2;
                const offsetX = (laneCenter - centerX) * scale;
                const screenX = centerX + offsetX;
                
                return { x: screenX, y: screenY, scale: scale };
            },
            
            createParticles(x, y, color) {
                for (let i = 0; i < 8; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 10,
                        vy: -Math.random() * 10 - 5,
                        life: 1,
                        color: color
                    });
                }
            },
            
            draw() {
                // Clear
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const horizonY = canvas.height * HORIZON_Y;
                
                // Draw sky gradient
                const skyGrad = ctx.createLinearGradient(0, 0, 0, horizonY);
                skyGrad.addColorStop(0, '#050510');
                skyGrad.addColorStop(1, '#1a1a2e');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, canvas.width, horizonY);
                
                // Draw city buildings
                this.drawCity(horizonY);
                
                // Draw track
                this.drawTrack(horizonY);
                
                // Draw items (back to front)
                this.items.sort((a, b) => a.y - b.y);
                this.items.forEach(item => {
                    if (!item.collected) {
                        const pos = this.getScreenPos(item.lane, item.y);
                        if (pos.y > horizonY - 50) {
                            if (item.type === 'train') {
                                this.drawTrain(pos.x, pos.y, pos.scale);
                            } else {
                                this.drawCoin(pos.x, pos.y, pos.scale);
                            }
                        }
                    }
                });
                
                // Draw player
                this.drawPlayer();
                
                // Draw particles
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
            },
            
            drawCity(horizonY) {
                const buildings = [
                    { x: 0.1, w: 0.08, h: 0.4 },
                    { x: 0.2, w: 0.06, h: 0.5 },
                    { x: 0.75, w: 0.1, h: 0.45 },
                    { x: 0.85, w: 0.08, h: 0.35 },
                ];
                
                buildings.forEach(b => {
                    const x = b.x * canvas.width;
                    const w = b.w * canvas.width;
                    const h = b.h * horizonY;
                    
                    ctx.fillStyle = '#0d0d18';
                    ctx.fillRect(x, horizonY - h, w, h);
                    
                    // Windows
                    ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
                    for (let wy = horizonY - h + 20; wy < horizonY - 10; wy += 30) {
                        for (let wx = x + 10; wx < x + w - 5; wx += 20) {
                            if (Math.random() > 0.4) {
                                ctx.fillRect(wx, wy, 10, 15);
                            }
                        }
                    }
                });
            },
            
            drawTrack(horizonY) {
                const playerY = canvas.height * PLAYER_Y;
                const trackWidth = LANE_WIDTH * 3;
                
                // Track ground
                ctx.fillStyle = '#1a1a2e';
                ctx.beginPath();
                ctx.moveTo((canvas.width - trackWidth * 0.3) / 2, horizonY);
                ctx.lineTo((canvas.width + trackWidth * 0.3) / 2, horizonY);
                ctx.lineTo((canvas.width + trackWidth) / 2, playerY);
                ctx.lineTo((canvas.width - trackWidth) / 2, playerY);
                ctx.closePath();
                ctx.fill();
                
                // Lane lines
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 2;
                for (let i = 1; i < 3; i++) {
                    const x1 = (canvas.width - trackWidth * 0.3) / 2 + i * (trackWidth * 0.3 / 3);
                    const x2 = (canvas.width - trackWidth) / 2 + i * LANE_WIDTH;
                    ctx.beginPath();
                    ctx.moveTo(x1, horizonY);
                    ctx.lineTo(x2, playerY);
                    ctx.stroke();
                }
                
                // Third rail
                ctx.strokeStyle = '#dc2626';
                ctx.lineWidth = 4;
                const railX1 = (canvas.width - trackWidth * 0.3) / 2 - 10;
                const railX2 = (canvas.width - trackWidth) / 2 - 20;
                ctx.beginPath();
                ctx.moveTo(railX1, horizonY);
                ctx.lineTo(railX2, playerY);
                ctx.stroke();
            },
            
            drawTrain(x, y, scale) {
                const w = 80 * scale;
                const h = 120 * scale;
                
                // Train body
                const grad = ctx.createLinearGradient(x - w/2, y - h, x + w/2, y - h);
                grad.addColorStop(0, '#dc2626');
                grad.addColorStop(0.5, '#ef4444');
                grad.addColorStop(1, '#b91c1c');
                ctx.fillStyle = grad;
                ctx.fillRect(x - w/2, y - h, w, h);
                
                // Window
                ctx.fillStyle = '#1e3a5f';
                ctx.fillRect(x - w/2 + w*0.1, y - h + h*0.15, w*0.8, h*0.2);
                
                // Headlights
                ctx.shadowColor = '#fef08a';
                ctx.shadowBlur = 20 * scale;
                ctx.fillStyle = '#fef08a';
                ctx.beginPath();
                ctx.arc(x - w/3, y - h*0.1, 8*scale, 0, Math.PI*2);
                ctx.arc(x + w/3, y - h*0.1, 8*scale, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // Stripe
                ctx.fillStyle = '#991b1b';
                ctx.fillRect(x - w/2, y - h*0.4, w, h*0.08);
            },
            
            drawCoin(x, y, scale) {
                const size = 25 * scale;
                const rotation = (Date.now() / 150) % (Math.PI * 2);
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 15 * scale;
                
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.ellipse(0, 0, size, size * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#FFA500';
                ctx.beginPath();
                ctx.ellipse(0, 0, size * 0.7, size * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            },
            
            drawPlayer() {
                const playerY = canvas.height * PLAYER_Y;
                const size = 70;
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(this.laneX, playerY + 30, 30, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Glow
                ctx.shadowColor = '#22C55E';
                ctx.shadowBlur = 20;
                
                // Player
                if (playerImg.complete) {
                    ctx.drawImage(playerImg, this.laneX - size/2, playerY - size, size, size);
                } else {
                    ctx.fillStyle = '#22C55E';
                    ctx.fillRect(this.laneX - size/2, playerY - size, size, size);
                }
                
                ctx.shadowBlur = 0;
            },
            
            loop() {
                if (this.state !== 'playing') return;
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        };
        
        game.resize();
        window.addEventListener('resize', () => game.resize());
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') game.move(-1);
            if (e.key === 'ArrowRight') game.move(1);
            if (e.key === 'ArrowUp') game.jump();
        });
        
        // Touch controls
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        }, { passive: true });
        
        canvas.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) > 50) {
                game.move(dx > 0 ? 1 : -1);
            }
        }, { passive: true });
    </script>
</body>
</html>
