<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyBot Subway Surfer</title>
    <link rel="icon" type="image/png" href="assets/player-rembg.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            overflow: hidden;
            touch-action: none;
        }
        
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            backdrop-filter: blur(10px);
        }
        
        .score-container {
            text-align: right;
        }
        
        .score-label {
            font-size: 12px;
            color: #FFD700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }
        
        .score-value {
            font-size: 42px;
            font-weight: 900;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            line-height: 1;
        }
        
        .coins-container {
            position: absolute;
            top: 80px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        
        .coin-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #8B4513;
            font-size: 14px;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        
        .coins-value {
            font-size: 20px;
            font-weight: 800;
            color: #FFD700;
        }
        
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: auto;
            backdrop-filter: blur(20px);
        }
        
        .overlay.hidden {
            display: none;
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo-img {
            width: 120px;
            height: 120px;
            filter: drop-shadow(0 10px 30px rgba(34,197,94,0.4));
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        .game-title {
            font-size: 48px;
            font-weight: 900;
            color: white;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 40px rgba(34,197,94,0.5);
        }
        
        .game-title span {
            color: #22C55E;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #22C55E, #16A34A);
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(34,197,94,0.4);
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(34,197,94,0.6);
        }
        
        .instructions {
            display: flex;
            gap: 40px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        
        .instruction-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .key {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
        }
        
        .game-over-title {
            font-size: 56px;
            font-weight: 900;
            color: #ef4444;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(239,68,68,0.5);
        }
        
        .final-score-label {
            font-size: 16px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .final-score {
            font-size: 80px;
            font-weight: 900;
            color: white;
            margin-bottom: 10px;
        }
        
        .high-score {
            font-size: 18px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 40px;
        }
        
        .high-score span {
            color: #FFD700;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer">
        <div class="top-bar">
            <a href="../moneybot-official/" class="back-btn">←</a>
            <div class="score-container">
                <div class="score-label">Score</div>
                <div class="score-value" id="scoreDisplay">0</div>
            </div>
        </div>
        
        <div class="coins-container">
            <div class="coin-icon">$</div>
            <div class="coins-value" id="coinsDisplay">0</div>
        </div>
    </div>
    
    <!-- Start Screen -->
    <div class="overlay" id="startScreen">
        <div class="logo-container">
            <img src="assets/player-rembg.png" class="logo-img" alt="MoneyBot">
            <div class="game-title">Subway<span>Surfer</span></div>
        </div>
        <button class="start-btn" onclick="game.start()">Play</button>
        <div class="instructions">
            <div class="instruction-item">
                <div class="key">←→</div>
                <span>Switch Lanes</span>
            </div>
            <div class="instruction-item">
                <div class="key">↑</div>
                <span>Jump</span>
            </div>
            <div class="instruction-item">
                <div class="key">↓</div>
                <span>Roll</span>
            </div>
        </div>
    </div>
    
    <!-- Game Over Screen -->
    <div class="overlay hidden" id="gameOverScreen">
        <div class="game-over-title">Game Over</div>
        <div class="final-score-label">Final Score</div>
        <div class="final-score" id="finalScore">0</div>
        <div class="high-score">Best: <span id="highScore">0</span></div>
        <button class="start-btn" onclick="game.restart()">Try Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game settings
        const SETTINGS = {
            laneCount: 3,
            laneWidth: 120,
            playerSize: 70,
            jumpHeight: 120,
            jumpDuration: 500,
            rollDuration: 600,
            baseSpeed: 10,
            maxSpeed: 25,
            gravity: 0.8,
            cameraHeight: 300,
            horizonY: 0.35, // 35% from top
        };
        
        // Load assets
        const playerImg = new Image();
        playerImg.src = 'assets/player-rembg.png';
        
        // Game state
        const game = {
            state: 'menu',
            score: 0,
            coins: 0,
            highScore: parseInt(localStorage.getItem('subway_highScore')) || 0,
            speed: SETTINGS.baseSpeed,
            lane: 1,
            
            // Player state
            x: 0,
            y: 0,
            z: 0,
            targetX: 0,
            isJumping: false,
            isRolling: false,
            jumpStartTime: 0,
            rollStartTime: 0,
            yVelocity: 0,
            
            // World
            worldZ: 0,
            obstacles: [],
            coinItems: [],
            particles: [],
            trains: [],
            
            resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                this.horizonY = canvas.height * SETTINGS.horizonY;
                this.updateLanePosition();
            },
            
            updateLanePosition() {
                const centerX = canvas.width / 2;
                const offset = (this.lane - 1) * SETTINGS.laneWidth;
                this.targetX = centerX + offset;
            },
            
            start() {
                this.state = 'playing';
                this.score = 0;
                this.coins = 0;
                this.speed = SETTINGS.baseSpeed;
                this.lane = 1;
                this.x = canvas.width / 2;
                this.targetX = this.x;
                this.y = 0;
                this.z = 0;
                this.isJumping = false;
                this.isRolling = false;
                this.yVelocity = 0;
                this.worldZ = 0;
                this.obstacles = [];
                this.coinItems = [];
                this.particles = [];
                this.trains = [];
                
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameOverScreen').classList.add('hidden');
                
                this.loop();
            },
            
            restart() {
                this.start();
            },
            
            gameOver() {
                this.state = 'gameover';
                
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('subway_highScore', this.highScore);
                }
                
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('highScore').textContent = this.highScore;
                document.getElementById('gameOverScreen').classList.remove('hidden');
            },
            
            moveLeft() {
                if (this.state === 'playing' && this.lane > 0) {
                    this.lane--;
                    this.updateLanePosition();
                    this.createDustParticles();
                }
            },
            
            moveRight() {
                if (this.state === 'playing' && this.lane < SETTINGS.laneCount - 1) {
                    this.lane++;
                    this.updateLanePosition();
                    this.createDustParticles();
                }
            },
            
            jump() {
                if (this.state === 'playing' && !this.isJumping && !this.isRolling && this.y === 0) {
                    this.isJumping = true;
                    this.jumpStartTime = Date.now();
                    this.yVelocity = -15;
                    this.createDustParticles();
                }
            },
            
            roll() {
                if (this.state === 'playing' && !this.isRolling && !this.isJumping && this.y === 0) {
                    this.isRolling = true;
                    this.rollStartTime = Date.now();
                }
            },
            
            createDustParticles() {
                for (let i = 0; i < 8; i++) {
                    this.particles.push({
                        x: this.x + (Math.random() - 0.5) * 40,
                        y: this.getScreenY(0) + 30,
                        vx: (Math.random() - 0.5) * 5,
                        vy: -Math.random() * 3 - 1,
                        life: 1,
                        size: Math.random() * 8 + 4,
                        color: `rgba(200, 200, 200, ${Math.random() * 0.5 + 0.3})`
                    });
                }
            },
            
            createCoinParticles(x, y) {
                for (let i = 0; i < 10; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 10,
                        vy: -Math.random() * 8 - 2,
                        life: 1,
                        size: Math.random() * 6 + 3,
                        color: '#FFD700'
                    });
                }
            },
            
            // Convert 3D world position to screen position
            worldToScreen(worldX, worldY, worldZ) {
                const relativeZ = worldZ - this.worldZ;
                if (relativeZ <= 0) return null;
                
                const scale = SETTINGS.cameraHeight / (SETTINGS.cameraHeight + relativeZ);
                const screenX = canvas.width / 2 + (worldX - canvas.width / 2) * scale;
                const screenY = this.horizonY + (canvas.height - this.horizonY) * (1 - scale) + worldY * scale;
                
                return { x: screenX, y: screenY, scale: scale };
            },
            
            getScreenY(worldY) {
                const scale = SETTINGS.cameraHeight / (SETTINGS.cameraHeight + 200);
                return this.horizonY + (canvas.height - this.horizonY) * (1 - scale) + worldY * scale;
            },
            
            spawnObstacle() {
                const lane = Math.floor(Math.random() * SETTINGS.laneCount);
                const type = Math.random() > 0.4 ? 'train' : 'barrier';
                const z = this.worldZ + 2000;
                
                this.trains.push({
                    lane: lane,
                    z: z,
                    type: type,
                    length: type === 'train' ? 400 : 100,
                    height: type === 'train' ? 120 : 60,
                    collected: false
                });
            },
            
            spawnCoins() {
                const pattern = Math.floor(Math.random() * 4);
                const baseZ = this.worldZ + 1500;
                
                if (pattern === 0) {
                    // Line in one lane
                    const lane = Math.floor(Math.random() * SETTINGS.laneCount);
                    for (let i = 0; i < 6; i++) {
                        this.coinItems.push({
                            lane: lane,
                            z: baseZ + i * 80,
                            y: 30,
                            collected: false
                        });
                    }
                } else if (pattern === 1) {
                    // Arc across lanes
                    for (let i = 0; i < 5; i++) {
                        const lane = i;
                        if (lane < SETTINGS.laneCount) {
                            this.coinItems.push({
                                lane: lane,
                                z: baseZ + Math.abs(i - 2) * 60,
                                y: 30 + Math.sin(i * 0.5) * 40,
                                collected: false
                            });
                        }
                    }
                } else if (pattern === 2) {
                    // Triple line
                    for (let l = 0; l < SETTINGS.laneCount; l++) {
                        for (let i = 0; i < 4; i++) {
                            this.coinItems.push({
                                lane: l,
                                z: baseZ + i * 100,
                                y: 30,
                                collected: false
                            });
                        }
                    }
                } else {
                    // Jump arc
                    const lane = 1;
                    for (let i = 0; i < 7; i++) {
                        this.coinItems.push({
                            lane: lane,
                            z: baseZ + i * 70,
                            y: 30 + Math.sin(i * 0.4) * 60,
                            collected: false
                        });
                    }
                }
            },
            
            update() {
                if (this.state !== 'playing') return;
                
                // Update score and speed
                this.score += Math.floor(this.speed / 3);
                this.speed = Math.min(SETTINGS.maxSpeed, SETTINGS.baseSpeed + this.score / 800);
                
                document.getElementById('scoreDisplay').textContent = this.score;
                document.getElementById('coinsDisplay').textContent = this.coins;
                
                // Move world
                this.worldZ += this.speed;
                
                // Smooth lane transition
                this.x += (this.targetX - this.x) * 0.15;
                
                // Physics
                if (this.isJumping) {
                    this.y += this.yVelocity;
                    this.yVelocity += SETTINGS.gravity;
                    
                    if (this.y >= 0) {
                        this.y = 0;
                        this.isJumping = false;
                        this.yVelocity = 0;
                        this.createDustParticles();
                    }
                }
                
                // Roll timer
                if (this.isRolling) {
                    if (Date.now() - this.rollStartTime > SETTINGS.rollDuration) {
                        this.isRolling = false;
                    }
                }
                
                // Spawn objects
                if (Math.random() < 0.02) this.spawnObstacle();
                if (Math.random() < 0.03) this.spawnCoins();
                
                // Update trains
                for (let i = this.trains.length - 1; i >= 0; i--) {
                    const train = this.trains[i];
                    const relativeZ = train.z - this.worldZ;
                    
                    // Check collision
                    if (!train.collected && train.lane === this.lane && relativeZ > 100 && relativeZ < 300) {
                        const playerHeight = this.isRolling ? 30 : (this.isJumping ? 0 : 70);
                        const playerY = this.y;
                        
                        if (playerY < train.height - playerHeight) {
                            this.gameOver();
                            return;
                        }
                    }
                    
                    if (relativeZ < -500) {
                        this.trains.splice(i, 1);
                    }
                }
                
                // Update coins
                for (let i = this.coinItems.length - 1; i >= 0; i--) {
                    const coin = this.coinItems[i];
                    const relativeZ = coin.z - this.worldZ;
                    
                    if (!coin.collected && coin.lane === this.lane && relativeZ > 150 && relativeZ < 250) {
                        const dy = Math.abs(this.y - coin.y);
                        if (dy < 50 || (this.isJumping && coin.y > 30)) {
                            coin.collected = true;
                            this.coins++;
                            this.score += 50;
                            const pos = this.worldToScreen(this.x, this.y, coin.z);
                            if (pos) this.createCoinParticles(pos.x, pos.y);
                        }
                    }
                    
                    if (relativeZ < -100) {
                        this.coinItems.splice(i, 1);
                    }
                }
                
                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.3;
                    p.life -= 0.03;
                    
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }
            },
            
            draw() {
                // Clear
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw sky gradient
                const skyGrad = ctx.createLinearGradient(0, 0, 0, this.horizonY);
                skyGrad.addColorStop(0, '#0f0f1a');
                skyGrad.addColorStop(1, '#1a1a2e');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, canvas.width, this.horizonY);
                
                // Draw city skyline
                this.drawCity();
                
                // Draw tracks
                this.drawTracks();
                
                // Draw objects sorted by Z (back to front)
                const allObjects = [
                    ...this.trains.map(t => ({ ...t, type: 'train' })),
                    ...this.coinItems.map(c => ({ ...c, type: 'coin' }))
                ].sort((a, b) => b.z - a.z);
                
                for (const obj of allObjects) {
                    if (obj.type === 'train') {
                        this.drawTrain(obj);
                    } else if (obj.type === 'coin' && !obj.collected) {
                        this.drawCoin(obj);
                    }
                }
                
                // Draw player
                this.drawPlayer();
                
                // Draw particles
                this.drawParticles();
            },
            
            drawCity() {
                const buildings = [
                    { x: 0.1, w: 0.08, h: 0.4, color: '#0a0a14' },
                    { x: 0.2, w: 0.06, h: 0.5, color: '#0d0d18' },
                    { x: 0.75, w: 0.1, h: 0.45, color: '#0a0a14' },
                    { x: 0.85, w: 0.08, h: 0.35, color: '#0d0d18' },
                ];
                
                buildings.forEach(b => {
                    const x = b.x * canvas.width;
                    const w = b.w * canvas.width;
                    const h = b.h * this.horizonY;
                    
                    ctx.fillStyle = b.color;
                    ctx.fillRect(x, this.horizonY - h, w, h);
                    
                    // Windows
                    ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
                    for (let wy = this.horizonY - h + 20; wy < this.horizonY - 10; wy += 25) {
                        for (let wx = x + 10; wx < x + w - 5; wx += 20) {
                            if (Math.random() > 0.3) {
                                ctx.fillRect(wx, wy, 8, 12);
                            }
                        }
                    }
                });
            },
            
            drawTracks() {
                const trackWidth = SETTINGS.laneWidth * SETTINGS.laneCount;
                
                // Draw track bed
                for (let z = 0; z < 3000; z += 100) {
                    const p1 = this.worldToScreen(canvas.width/2 - trackWidth/2, 0, this.worldZ + z);
                    const p2 = this.worldToScreen(canvas.width/2 + trackWidth/2, 0, this.worldZ + z);
                    const p3 = this.worldToScreen(canvas.width/2 + trackWidth/2, 0, this.worldZ + z + 100);
                    const p4 = this.worldToScreen(canvas.width/2 - trackWidth/2, 0, this.worldZ + z + 100);
                    
                    if (!p1 || !p2 || !p3 || !p4) continue;
                    
                    ctx.fillStyle = '#2a2a3a';
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.lineTo(p3.x, p3.y);
                    ctx.lineTo(p4.x, p4.y);
                    ctx.closePath();
                    ctx.fill();
                    
                    // Sleepers
                    ctx.fillStyle = '#3a3a4a';
                    const sleeperZ = this.worldZ + z + 50;
                    const s1 = this.worldToScreen(canvas.width/2 - trackWidth/2 + 10, 0, sleeperZ);
                    const s2 = this.worldToScreen(canvas.width/2 + trackWidth/2 - 10, 0, sleeperZ);
                    if (s1 && s2) {
                        ctx.fillRect(s1.x, s1.y - 5 * s1.scale, s2.x - s1.x, 10 * s1.scale);
                    }
                }
                
                // Lane lines
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 2;
                for (let i = 1; i < SETTINGS.laneCount; i++) {
                    const x = canvas.width/2 - trackWidth/2 + i * SETTINGS.laneWidth;
                    ctx.beginPath();
                    ctx.moveTo(x, this.horizonY);
                    ctx.lineTo(x + (canvas.width/2 - x) * 0.3, canvas.height);
                    ctx.stroke();
                }
                
                // Third rail
                ctx.strokeStyle = '#dc2626';
                ctx.lineWidth = 4;
                const railX = canvas.width/2 - trackWidth/2 - 20;
                ctx.beginPath();
                ctx.moveTo(railX, this.horizonY);
                ctx.lineTo(railX + (canvas.width/2 - railX) * 0.25, canvas.height);
                ctx.stroke();
            },
            
            drawTrain(train) {
                const centerX = canvas.width/2 - (SETTINGS.laneCount - 1) * SETTINGS.laneWidth / 2 + train.lane * SETTINGS.laneWidth;
                const front = this.worldToScreen(centerX, 0, train.z);
                const back = this.worldToScreen(centerX, 0, train.z + train.length);
                
                if (!front || !back) return;
                
                const width = 100 * front.scale;
                const height = train.height * front.scale;
                
                // Train body
                const grad = ctx.createLinearGradient(front.x - width/2, front.y - height, front.x + width/2, front.y - height);
                if (train.type === 'train') {
                    grad.addColorStop(0, '#dc2626');
                    grad.addColorStop(0.5, '#ef4444');
                    grad.addColorStop(1, '#b91c1c');
                } else {
                    grad.addColorStop(0, '#ea580c');
                    grad.addColorStop(0.5, '#f97316');
                    grad.addColorStop(1, '#c2410c');
                }
                
                ctx.fillStyle = grad;
                ctx.fillRect(front.x - width/2, front.y - height, width, height);
                
                // Windows
                ctx.fillStyle = '#1e3a5f';
                ctx.fillRect(front.x - width/2 + 10, front.y - height + 15, width - 20, height * 0.25);
                
                // Headlights
                ctx.shadowColor = '#fef08a';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#fef08a';
                ctx.beginPath();
                ctx.arc(front.x - width/3, front.y - 15, 8 * front.scale, 0, Math.PI * 2);
                ctx.arc(front.x + width/3, front.y - 15, 8 * front.scale, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // Stripe
                ctx.fillStyle = train.type === 'train' ? '#991b1b' : '#9a3412';
                ctx.fillRect(front.x - width/2, front.y - height * 0.4, width, height * 0.1);
            },
            
            drawCoin(coin) {
                const centerX = canvas.width/2 - (SETTINGS.laneCount - 1) * SETTINGS.laneWidth / 2 + coin.lane * SETTINGS.laneWidth;
                const pos = this.worldToScreen(centerX, coin.y, coin.z);
                
                if (!pos) return;
                
                const size = 25 * pos.scale;
                const rotation = (Date.now() / 200) % (Math.PI * 2);
                
                ctx.save();
                ctx.translate(pos.x, pos.y);
                ctx.rotate(rotation);
                
                // Glow
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 15;
                
                // Coin body
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.ellipse(0, 0, size, size * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Inner
                ctx.fillStyle = '#FFA500';
                ctx.beginPath();
                ctx.ellipse(0, 0, size * 0.7, size * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            },
            
            drawPlayer() {
                const pos = this.worldToScreen(this.x, this.y, this.worldZ + 200);
                if (!pos) return;
                
                const size = SETTINGS.playerSize * pos.scale;
                const groundY = pos.y;
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(pos.x, groundY + 5, size * 0.6, size * 0.15, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Player Y position (jumping)
                let playerY = groundY - size/2;
                if (this.isJumping) {
                    playerY += this.y * pos.scale;
                }
                
                // Roll effect
                let drawSize = size;
                if (this.isRolling) {
                    drawSize = size * 0.6;
                    playerY = groundY - drawSize/2;
                }
                
                // Glow
                ctx.shadowColor = '#22C55E';
                ctx.shadowBlur = 20;
                
                // Draw player image
                if (playerImg.complete) {
                    ctx.drawImage(playerImg, pos.x - drawSize/2, playerY - drawSize/2, drawSize, drawSize);
                } else {
                    ctx.fillStyle = '#22C55E';
                    ctx.fillRect(pos.x - drawSize/2, playerY - drawSize/2, drawSize, drawSize);
                }
                
                ctx.shadowBlur = 0;
            },
            
            drawParticles() {
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
            },
            
            loop() {
                if (this.state !== 'playing') return;
                
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        };
        
        // Initialize
        game.resize();
        window.addEventListener('resize', () => game.resize());
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (game.state === 'playing') {
                if (e.key === 'ArrowLeft') game.moveLeft();
                if (e.key === 'ArrowRight') game.moveRight();
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    game.jump();
                }
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    game.roll();
                }
            }
        });
        
        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });
        
        canvas.addEventListener('touchend', (e) => {
            if (game.state !== 'playing') return;
            
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 50) game.moveRight();
                else if (dx < -50) game.moveLeft();
            } else {
                if (dy < -50) game.jump();
                else if (dy > 50) game.roll();
            }
        }, { passive: true });
    </script>
</body>
</html>
