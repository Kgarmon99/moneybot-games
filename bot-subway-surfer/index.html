<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyBot Subway Surfer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
        body { background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .ui { position: absolute; top: 0; left: 0; right: 0; padding: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .back-btn { width: 44px; height: 44px; background: rgba(255,255,255,0.15); border: none; border-radius: 50%; color: #fff; font-size: 20px; pointer-events: auto; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .score-box { text-align: right; }
        .score-label { font-size: 12px; color: #FFD700; font-weight: 700; letter-spacing: 2px; }
        .score-value { font-size: 48px; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .coins-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 20px; margin-top: 10px; }
        .coin-icon { width: 24px; height: 24px; background: linear-gradient(135deg, #FFD700, #FFA500); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #8B4513; font-size: 14px; }
        .coins-value { font-size: 20px; font-weight: 800; color: #FFD700; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .overlay.hidden { display: none; }
        .logo { width: 100px; height: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 30px rgba(34,197,94,0.5)); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .title { font-size: 36px; font-weight: 900; color: #fff; margin-bottom: 10px; }
        .title span { color: #22C55E; }
        .btn { background: linear-gradient(135deg, #22C55E, #16A34A); color: #fff; border: none; padding: 20px 60px; border-radius: 50px; font-size: 24px; font-weight: 900; cursor: pointer; margin-top: 30px; box-shadow: 0 10px 40px rgba(34,197,94,0.4); }
        .game-over-title { font-size: 48px; font-weight: 900; color: #ef4444; margin-bottom: 20px; }
        .final-score { font-size: 72px; font-weight: 900; color: #fff; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    
    <div class="ui">
        <a href="../moneybot-official/" class="back-btn">←</a>
        <div class="score-box">
            <div class="score-label">SCORE</div>
            <div class="score-value" id="score">0</div>
            <div class="coins-box">
                <div class="coin-icon">$</div>
                <div class="coins-value" id="coins">0</div>
            </div>
        </div>
    </div>
    
    <div class="overlay" id="startScreen">
        <img src="assets/player-rembg.png" class="logo" alt="MoneyBot">
        <div class="title">Subway<span>Surfer</span></div>
        <button class="btn" onclick="game.start()">PLAY</button>
    </div>
    
    <div class="overlay hidden" id="gameOverScreen">
        <div class="game-over-title">GAME OVER</div>
        <div class="final-score" id="finalScore">0</div>
        <button class="btn" onclick="game.restart()">AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        // Game constants
        const LANE_WIDTH = 100;
        const PLAYER_Y = 0.8;
        const HORIZON_Y = 0.25;
        
        const playerImg = new Image();
        playerImg.src = 'assets/player-rembg.png';
        
        const game = {
            state: 'menu',
            score: 0,
            coinCount: 0,
            highScore: parseInt(localStorage.getItem('subway_highScore')) || 0,
            lane: 1,
            targetLane: 1,
            laneX: 0,
            speed: 0,
            baseSpeed: 8,
            
            items: [],
            particles: [],
            
            resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                this.laneX = this.getLaneX(1);
            },
            
            getLaneX(lane) {
                const trackWidth = LANE_WIDTH * 3;
                const startX = (canvas.width - trackWidth) / 2;
                return startX + lane * LANE_WIDTH + LANE_WIDTH / 2;
            },
            
            start() {
                this.state = 'playing';
                this.score = 0;
                this.coinCount = 0;
                this.lane = 1;
                this.targetLane = 1;
                this.laneX = this.getLaneX(1);
                this.speed = this.baseSpeed;
                this.items = [];
                this.particles = [];
                
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameOverScreen').classList.add('hidden');
                
                this.loop();
            },
            
            restart() {
                this.start();
            },
            
            gameOver() {
                this.state = 'gameover';
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('subway_highScore', this.highScore);
                }
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOverScreen').classList.remove('hidden');
            },
            
            move(dir) {
                if (this.state !== 'playing') return;
                const newLane = this.targetLane + dir;
                if (newLane >= 0 && newLane <= 2) {
                    this.targetLane = newLane;
                }
            },
            
            spawnItem() {
                const lane = Math.floor(Math.random() * 3);
                const isTrain = Math.random() > 0.6;
                
                this.items.push({
                    type: isTrain ? 'train' : 'coin',
                    lane: lane,
                    y: -100,
                    z: 2000,
                    width: isTrain ? 90 : 35,
                    height: isTrain ? 140 : 35,
                    collected: false
                });
            },
            
            spawnCoinLine() {
                const lane = Math.floor(Math.random() * 3);
                const pattern = Math.floor(Math.random() * 3);
                
                if (pattern === 0) {
                    // Straight line
                    for (let i = 0; i < 6; i++) {
                        this.items.push({
                            type: 'coin',
                            lane: lane,
                            y: -100 - i * 70,
                            z: 2000 + i * 70,
                            width: 35,
                            height: 35,
                            collected: false
                        });
                    }
                } else if (pattern === 1) {
                    // Arc
                    for (let i = 0; i < 5; i++) {
                        this.items.push({
                            type: 'coin',
                            lane: lane,
                            y: -100 - i * 60,
                            z: 2000 + i * 60,
                            width: 35,
                            height: 35,
                            arcOffset: Math.sin(i * 0.5) * 30,
                            collected: false
                        });
                    }
                } else {
                    // Triple row
                    for (let l = 0; l < 3; l++) {
                        for (let i = 0; i < 4; i++) {
                            this.items.push({
                                type: 'coin',
                                lane: l,
                                y: -100 - i * 80,
                                z: 2000 + i * 80,
                                width: 35,
                                height: 35,
                                collected: false
                            });
                        }
                    }
                }
            },
            
            update() {
                if (this.state !== 'playing') return;
                
                // Update score and speed
                this.score++;
                this.speed = Math.min(20, this.baseSpeed + this.score / 300);
                document.getElementById('score').textContent = this.score;
                document.getElementById('coins').textContent = this.coinCount;
                
                // Smooth lane movement
                const targetX = this.getLaneX(this.targetLane);
                this.laneX += (targetX - this.laneX) * 0.2;
                this.lane = Math.round(this.laneX / LANE_WIDTH - 0.5 + 1);
                
                // Spawn items
                if (Math.random() < 0.015) this.spawnItem();
                if (Math.random() < 0.01) this.spawnCoinLine();
                
                // Update items
                const playerY = canvas.height * PLAYER_Y;
                
                for (let i = this.items.length - 1; i >= 0; i--) {
                    const item = this.items[i];
                    
                    // Move item toward player (increase y position)
                    item.y += this.speed;
                    item.z -= this.speed;
                    
                    // Get screen position
                    const pos = this.worldToScreen(item.lane, item.y, item.z, item.arcOffset || 0);
                    
                    // Check collision
                    if (!item.collected && pos.y > playerY - 60 && pos.y < playerY + 40) {
                        const dx = Math.abs(pos.x - this.laneX);
                        
                        if (dx < 50 * pos.scale) {
                            if (item.type === 'train') {
                                this.gameOver();
                                return;
                            } else if (item.type === 'coin') {
                                item.collected = true;
                                this.coinCount++;
                                this.score += 10;
                                this.createSparkles(pos.x, pos.y);
                            }
                        }
                    }
                    
                    // Remove off-screen items
                    if (item.y > canvas.height + 200) {
                        this.items.splice(i, 1);
                    }
                }
                
                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.5;
                    p.life -= 0.04;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
            },
            
            worldToScreen(lane, worldY, worldZ, arcOffset = 0) {
                const horizonY = canvas.height * HORIZON_Y;
                const playerY = canvas.height * PLAYER_Y;
                const totalDist = 2000;
                
                // Progress from 0 (horizon) to 1 (player)
                let t = (worldY + 100) / totalDist;
                t = Math.max(0, Math.min(1, t));
                
                // Scale: small at horizon (0.2), full at player (1)
                const scale = 0.2 + t * 0.8;
                
                // Y position: starts at horizon, goes to player Y
                const screenY = horizonY + (playerY - horizonY) * t;
                
                // X position with perspective
                const laneX = this.getLaneX(lane);
                const centerX = canvas.width / 2;
                const offsetFromCenter = laneX - centerX;
                const screenX = centerX + offsetFromCenter * scale + arcOffset * scale;
                
                return { x: screenX, y: screenY, scale: scale };
            },
            
            createSparkles(x, y) {
                for (let i = 0; i < 10; i++) {
                    const angle = (Math.PI * 2 * i) / 10;
                    const speed = Math.random() * 8 + 4;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 5,
                        life: 1,
                        color: '#FFD700',
                        size: Math.random() * 6 + 3
                    });
                }
            },
            
            draw() {
                // Background
                const horizonY = canvas.height * HORIZON_Y;
                
                // Sky
                const skyGrad = ctx.createLinearGradient(0, 0, 0, horizonY);
                skyGrad.addColorStop(0, '#0a0a1a');
                skyGrad.addColorStop(1, '#1a1a3a');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, canvas.width, horizonY);
                
                // City
                this.drawCity(horizonY);
                
                // Track
                this.drawTrack(horizonY);
                
                // Sort items by Y (back to front)
                this.items.sort((a, b) => a.y - b.y);
                
                // Draw items
                this.items.forEach(item => {
                    if (!item.collected) {
                        const pos = this.worldToScreen(item.lane, item.y, item.z, item.arcOffset || 0);
                        if (pos.y > horizonY - 50) {
                            if (item.type === 'train') {
                                this.drawTrain(pos.x, pos.y, pos.scale);
                            } else {
                                this.drawCoin(pos.x, pos.y, pos.scale);
                            }
                        }
                    }
                });
                
                // Draw player
                this.drawPlayer();
                
                // Draw particles
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
            },
            
            drawCity(horizonY) {
                const buildings = [
                    { x: 0.05, w: 0.12, h: 0.5 },
                    { x: 0.18, w: 0.08, h: 0.6 },
                    { x: 0.75, w: 0.1, h: 0.55 },
                    { x: 0.88, w: 0.1, h: 0.45 },
                ];
                
                buildings.forEach(b => {
                    const x = b.x * canvas.width;
                    const w = b.w * canvas.width;
                    const h = b.h * horizonY;
                    
                    ctx.fillStyle = '#0f0f1f';
                    ctx.fillRect(x, horizonY - h, w, h);
                    
                    // Windows
                    ctx.fillStyle = 'rgba(255, 200, 50, 0.4)';
                    for (let wy = horizonY - h + 30; wy < horizonY - 20; wy += 40) {
                        for (let wx = x + 15; wx < x + w - 10; wx += 25) {
                            if ((wx + wy) % 50 < 30) {
                                ctx.fillRect(wx, wy, 12, 18);
                            }
                        }
                    }
                });
            },
            
            drawTrack(horizonY) {
                const playerY = canvas.height * PLAYER_Y;
                const trackWidth = LANE_WIDTH * 3;
                
                // Track surface
                ctx.fillStyle = '#1a1a2a';
                ctx.beginPath();
                ctx.moveTo(canvas.width/2 - trackWidth*0.25, horizonY);
                ctx.lineTo(canvas.width/2 + trackWidth*0.25, horizonY);
                ctx.lineTo(canvas.width/2 + trackWidth*0.8, playerY);
                ctx.lineTo(canvas.width/2 - trackWidth*0.8, playerY);
                ctx.closePath();
                ctx.fill();
                
                // Lane dividers
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 2;
                for (let i = 1; i < 3; i++) {
                    const t = i / 3;
                    const x1 = canvas.width/2 - trackWidth*0.25 + t * trackWidth*0.5;
                    const x2 = canvas.width/2 - trackWidth*0.8 + t * trackWidth*1.6;
                    ctx.beginPath();
                    ctx.moveTo(x1, horizonY);
                    ctx.lineTo(x2, playerY);
                    ctx.stroke();
                }
                
                // Third rail (left side)
                ctx.strokeStyle = '#dc2626';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(canvas.width/2 - trackWidth*0.28, horizonY);
                ctx.lineTo(canvas.width/2 - trackWidth*0.85, playerY);
                ctx.stroke();
            },
            
            drawTrain(x, y, scale) {
                const w = 100 * scale;
                const h = 160 * scale;
                
                // Body
                const grad = ctx.createLinearGradient(x - w/2, y - h, x + w/2, y);
                grad.addColorStop(0, '#b91c1c');
                grad.addColorStop(0.5, '#ef4444');
                grad.addColorStop(1, '#991b1b');
                ctx.fillStyle = grad;
                ctx.fillRect(x - w/2, y - h, w, h);
                
                // Window
                ctx.fillStyle = '#1e3a5f';
                ctx.fillRect(x - w/2 + w*0.15, y - h + h*0.12, w*0.7, h*0.18);
                
                // Door
                ctx.fillStyle = '#7f1d1d';
                ctx.fillRect(x - w*0.2, y - h + h*0.35, w*0.4, h*0.5);
                
                // Stripe
                ctx.fillStyle = '#fca5a5';
                ctx.fillRect(x - w/2, y - h*0.45, w, h*0.06);
                
                // Headlights
                ctx.shadowColor = '#fef08a';
                ctx.shadowBlur = 30 * scale;
                ctx.fillStyle = '#fef08a';
                ctx.beginPath();
                ctx.arc(x - w*0.25, y - h*0.08, 10*scale, 0, Math.PI*2);
                ctx.arc(x + w*0.25, y - h*0.08, 10*scale, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            },
            
            drawCoin(x, y, scale) {
                const size = 30 * scale;
                const rot = Date.now() / 150;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.scale(Math.sin(rot), 1);
                
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 20 * scale;
                
                // Outer
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(0, 0, size, 0, Math.PI * 2);
                ctx.fill();
                
                // Inner
                ctx.fillStyle = '#FFA500';
                ctx.beginPath();
                ctx.arc(0, 0, size * 0.7, 0, Math.PI * 2);
                ctx.fill();
                
                // $ symbol
                ctx.fillStyle = '#8B4513';
                ctx.font = `bold ${size}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', 0, 2);
                
                ctx.restore();
            },
            
            drawPlayer() {
                const playerY = canvas.height * PLAYER_Y;
                const size = 80;
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.ellipse(this.laneX, playerY + 35, 35, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Glow
                ctx.shadowColor = '#22C55E';
                ctx.shadowBlur = 25;
                
                // Player
                if (playerImg.complete) {
                    ctx.drawImage(playerImg, this.laneX - size/2, playerY - size, size, size);
                } else {
                    ctx.fillStyle = '#22C55E';
                    ctx.fillRect(this.laneX - size/2, playerY - size, size, size);
                }
                
                ctx.shadowBlur = 0;
            },
            
            loop() {
                if (this.state !== 'playing') return;
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        };
        
        game.resize();
        window.addEventListener('resize', () => game.resize());
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') game.move(-1);
            if (e.key === 'ArrowRight') game.move(1);
        });
        
        // Touch
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        }, { passive: true });
        
        canvas.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) > 40) game.move(dx > 0 ? 1 : -1);
        }, { passive: true });
    </script>
</body>
</html>
