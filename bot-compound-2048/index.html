<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyBot - Compound 2048 | MoneyBot</title>
    <link rel="icon" type="image/svg+xml" href="../assets/moneybot-idle.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-light: #69F0AE;
            --moneybot-green-dark: #00C853;
            --moneybot-dark: #1A1A2E;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
            --moneybot-text-secondary: #6B7280;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--moneybot-gray);
            min-height: 100vh;
            color: var(--moneybot-text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 230, 118, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 230, 118, 0.05) 0%, transparent 50%),
                var(--moneybot-gray);
            pointer-events: none;
            z-index: 0;
        }
        
        .app {
            position: relative;
            z-index: 1;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--moneybot-gray);
        }
        
        .header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(0, 230, 118, 0.1);
            color: var(--moneybot-green);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
            text-decoration: none;
        }
        
        .back-btn:hover {
            background: rgba(0, 230, 118, 0.2);
            transform: translateX(-2px);
        }
        
        .back-btn svg {
            width: 20px;
            height: 20px;
        }
        
        .header-logo img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
        }
        
        .header-title {
            font-weight: 700;
            font-size: 17px;
            letter-spacing: -0.3px;
        }
        
        .game-container {
            padding: 20px;
        }
        
        .score-card {
            background: #FFFFFF 0%, var(--moneybot-green-dark) 100%);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            color: #0F172A;
            box-shadow: 0 20px 40px rgba(0, 230, 118, 0.3);
        }
        
        .score-label {
            font-size: 13px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .score-value {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        
        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        
        .stat-card-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--moneybot-green);
            margin-bottom: 4px;
        }
        
        .stat-card-label {
            font-size: 12px;
            color: var(--moneybot-text-secondary);
            text-transform: uppercase;
        }
        
        .game-board-container {
            background: white;
            border-radius: 24px;
            padding: 16px;
            box-shadow: var(--shadow-md);
            margin-bottom: 20px;
        }
        
        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        
        .tile {
            aspect-ratio: 1;
            background: #F5F5F7;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.15s var(--ease-spring);
            position: relative;
        }
        
        .tile.new {
            animation: tileAppear 0.3s var(--ease-spring);
        }
        
        .tile.merged {
            animation: tileMerge 0.3s var(--ease-spring);
        }
        
        @keyframes tileAppear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes tileMerge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .tile[data-value="2"] { background: #FFFFFF; color: #64748B; }
        .tile[data-value="4"] { background: #FFFFFF; color: #64748B; }
        .tile[data-value="8"] { background: #BFDBFE; color: #1E40AF; }
        .tile[data-value="16"] { background: #93C5FD; color: #1E3A8A; }
        .tile[data-value="32"] { background: #60A5FA; color: #0F172A; }
        .tile[data-value="64"] { background: #3B82F6; color: #0F172A; }
        .tile[data-value="128"] { background: #2563EB; color: #0F172A; }
        .tile[data-value="256"] { background: var(--moneybot-green); color: #0F172A; }
        .tile[data-value="512"] { background: var(--moneybot-green-dark); color: #0F172A; }
        .tile[data-value="1024"] { background: #FFFFFF; color: #0F172A; font-size: 14px; }
        .tile[data-value="2048"] { background: #FFFFFF, var(--moneybot-gold)); color: #0F172A; font-size: 14px; box-shadow: 0 0 20px rgba(0, 230, 118, 0.5); }
        
        .controls {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            flex: 1;
            background: var(--moneybot-green);
            color: #0F172A;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
            box-shadow: 0 4px 12px rgba(0, 230, 118, 0.3);
        }
        
        .btn:hover {
            background: var(--moneybot-green-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 230, 118, 0.4);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-secondary {
            background: white;
            color: var(--moneybot-text);
            box-shadow: var(--shadow-sm);
        }
        
        .btn-secondary:hover {
            background: #F5F5F7;
            box-shadow: var(--shadow-md);
        }
        
        .instructions {
            text-align: center;
            color: var(--moneybot-text-secondary);
            font-size: 14px;
            margin-top: 20px;
            line-height: 1.5;
        }
        
        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            
        }
        
        .game-over-overlay.show {
            display: flex;
        }
        
        .game-over-card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            animation: slideUp 0.3s var(--ease-spring);
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .game-over-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--moneybot-green);
        }
        
        .game-over-score {
            font-size: 48px;
            font-weight: 800;
            color: var(--moneybot-text);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    
    <div class="app">
        <header class="header">
            <div class="header-logo">
                <a href="../moneybot-official/" class="back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </a>
                <img src="../moneybot-official/assets/logo.jpg" alt="MoneyBot">
                <span class="header-title">MoneyBot</span>
            </div>
        </header>
        
        <div class="game-container">
            <div class="score-card">
                <div class="score-label">Current Portfolio</div>
                <div class="score-value" id="score">$0</div>
            </div>
            
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-card-value" id="best">$0</div>
                    <div class="stat-card-label">Best</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-value" id="moves">0</div>
                    <div class="stat-card-label">Moves</div>
                </div>
            </div>
            
            <div class="game-board-container">
                <div id="game-board"></div>
            </div>
            
            <div class="controls">
                <button class="btn btn-secondary" onclick="undoMove()">↩️ Undo</button>
                <button class="btn" onclick="newGame()">New Game</button>
            </div>
            
            <p class="instructions">Swipe or use arrow keys to merge tiles.<br>Reach $1M to win!</p>
        </div>
    </div>
    
    <div class="game-over-overlay" id="gameOver">
        <div class="game-over-card">
            <div class="game-over-title">🎉 You Won!</div>
            <div class="game-over-score" id="finalScore">$0</div>
            <button class="btn" onclick="newGame()" style="width: 100%;">Play Again</button>
        </div>
    </div>
    
    <script>
        let grid = [];
        let score = 0;
        let best = localStorage.getItem('compound2048-best') || 0;
        let moves = 0;
        let previousGrid = null;
        let previousScore = 0;
        
        function init() {
            document.getElementById('best').textContent = '$' + best;
            newGame();
        }
        
        function newGame() {
            grid = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            moves = 0;
            previousGrid = null;
            addRandomTile();
            addRandomTile();
            render();
            updateUI();
            document.getElementById('gameOver').classList.remove('show');
        }
        
        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) empty.push({r, c});
                }
            }
            if (empty.length > 0) {
                const {r, c} = empty[Math.floor(Math.random() * empty.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }
        
        function render() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    if (grid[r][c] !== 0) {
                        tile.textContent = '$' + grid[r][c];
                        tile.dataset.value = grid[r][c];
                    }
                    board.appendChild(tile);
                }
            }
        }
        
        function updateUI() {
            document.getElementById('score').textContent = '$' + score;
            document.getElementById('moves').textContent = moves;
            if (score > best) {
                best = score;
                localStorage.setItem('compound2048-best', best);
                document.getElementById('best').textContent = '$' + best;
            }
        }
        
        function move(direction) {
            previousGrid = grid.map(row => [...row]);
            previousScore = score;
            
            let moved = false;
            const newGrid = grid.map(row => [...row]);
            
            if (direction === 'left' || direction === 'right') {
                for (let r = 0; r < 4; r++) {
                    let row = [...newGrid[r]];
                    if (direction === 'right') row.reverse();
                    
                    row = slide(row);
                    row = merge(row);
                    row = slide(row);
                    
                    if (direction === 'right') row.reverse();
                    
                    for (let c = 0; c < 4; c++) {
                        if (newGrid[r][c] !== row[c]) moved = true;
                        newGrid[r][c] = row[c];
                    }
                }
            } else {
                for (let c = 0; c < 4; c++) {
                    let col = [newGrid[0][c], newGrid[1][c], newGrid[2][c], newGrid[3][c]];
                    if (direction === 'down') col.reverse();
                    
                    col = slide(col);
                    col = merge(col);
                    col = slide(col);
                    
                    if (direction === 'down') col.reverse();
                    
                    for (let r = 0; r < 4; r++) {
                        if (newGrid[r][c] !== col[r]) moved = true;
                        newGrid[r][c] = col[r];
                    }
                }
            }
            
            if (moved) {
                grid = newGrid;
                moves++;
                addRandomTile();
                render();
                updateUI();
                checkWin();
                if (navigator.vibrate) navigator.vibrate(10);
            }
        }
        
        function slide(row) {
            const filtered = row.filter(x => x !== 0);
            while (filtered.length < 4) filtered.push(0);
            return filtered;
        }
        
        function merge(row) {
            for (let i = 0; i < 3; i++) {
                if (row[i] !== 0 && row[i] === row[i + 1]) {
                    row[i] *= 2;
                    score += row[i];
                    row[i + 1] = 0;
                }
            }
            return row;
        }
        
        function undoMove() {
            if (previousGrid) {
                grid = previousGrid.map(row => [...row]);
                score = previousScore;
                moves = Math.max(0, moves - 1);
                render();
                updateUI();
            }
        }
        
        function checkWin() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 2048) {
                        document.getElementById('finalScore').textContent = '$' + score;
                        document.getElementById('gameOver').classList.add('show');
                    }
                }
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
            if (e.key === 'ArrowUp') move('up');
            if (e.key === 'ArrowDown') move('down');
        });
        
        let touchStartX, touchStartY;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) move('right');
                else if (dx < -30) move('left');
            } else {
                if (dy > 30) move('down');
                else if (dy < -30) move('up');
            }
        });
        
        init();
    </script>
</body>
</html>
