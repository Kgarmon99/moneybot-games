<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wealth Tower | MoneyBot Gaming</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-light: #69F0AE;
            --moneybot-green-dark: #00C853;
            --moneybot-gold: #FBBF24;
            --moneybot-dark: #1A1A2E;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #B8E6F0 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: rgba(0, 230, 118, 0.1);
            border: none;
            color: var(--moneybot-green);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .back-btn:active {
            transform: scale(0.95);
            background: rgba(0, 230, 118, 0.2);
        }
        
        .header-title {
            font-weight: 800;
            font-size: 20px;
            color: var(--moneybot-text);
        }
        
        .score-display {
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.4);
        }
        
        .game-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .controls {
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        
        .drop-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: white;
            border: none;
            padding: 20px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 25px rgba(0, 230, 118, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .drop-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0, 230, 118, 0.5);
        }
        
        .drop-btn:active {
            transform: scale(0.98);
        }
        
        .perfect-indicator {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: 800;
            color: var(--moneybot-gold);
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }
        
        .perfect-indicator.show {
            animation: perfectPop 1s ease-out;
        }
        
        @keyframes perfectPop {
            0% { opacity: 0; transform: translateX(-50%) scale(0.3); }
            20% { opacity: 1; transform: translateX(-50%) scale(1.3); }
            100% { opacity: 0; transform: translateX(-50%) scale(1) translateY(-100px); }
        }
        
        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(135, 206, 235, 0.98) 0%, rgba(224, 246, 255, 0.98) 100%);
            backdrop-filter: blur(20px);
            z-index: 200;
        }
        
        .game-over-screen {
            display: none;
        }
        
        .logo {
            font-size: 80px;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.2));
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .title {
            font-size: 38px;
            font-weight: 800;
            color: var(--moneybot-text);
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        
        .subtitle {
            color: rgba(0,0,0,0.6);
            font-size: 17px;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 40px;
            line-height: 1.5;
        }
        
        .high-score {
            background: rgba(255,255,255,0.8);
            padding: 20px 40px;
            border-radius: 16px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .high-score-label {
            font-size: 13px;
            color: rgba(0,0,0,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        
        .high-score-value {
            font-size: 40px;
            font-weight: 800;
            color: var(--moneybot-green);
        }
        
        .start-btn {
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: white;
            border: none;
            padding: 24px 80px;
            font-size: 24px;
            font-weight: 800;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0, 230, 118, 0.5);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 50px rgba(0, 230, 118, 0.6);
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        .instructions {
            margin-top: 40px;
            color: rgba(0,0,0,0.5);
            text-align: center;
            font-size: 15px;
            line-height: 1.6;
        }
        
        .final-score {
            font-size: 56px;
            font-weight: 800;
            color: var(--moneybot-green);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-logo">
                <a href="../moneybot-official/" class="back-btn">←</a>
                <span class="header-title">Wealth Tower</span>
            </div>
            <div class="score-display">Score: <span id="score">0</span></div>
        </div>
        
        <div class="game-area">
            <canvas id="gameCanvas"></canvas>
            <div class="perfect-indicator" id="perfectIndicator">PERFECT! 🌟</div>
        </div>
        
        <div class="controls">
            <button class="drop-btn" id="dropBtn" onclick="dropBlock()">DROP BLOCK</button>
        </div>
    </div>
    
    <div class="start-screen" id="startScreen">
        <div class="logo">🏢</div>
        <div class="title">Wealth Tower</div>
        <div class="subtitle">Stack investment floors with perfect timing!<br>Build the tallest wealth tower</div>
        
        <div class="high-score">
            <div class="high-score-label">Best Tower</div>
            <div class="high-score-value" id="highScore">0</div>
        </div>
        
        <button class="start-btn" onclick="startGame()">Build Now</button>
        
        <div class="instructions">
            Tap to drop blocks • Stack perfectly for bonuses<br>
            Don't miss the tower or it's game over!
        </div>
    </div>
    
    <div class="game-over-screen" id="gameOverScreen">
        <div class="logo">🏗️</div>
        <div class="title">Tower Collapsed!</div>
        <div class="final-score" id="finalScore">0</div>
        <div class="subtitle">floors built</div>
        <button class="start-btn" onclick="restartGame()">Build Again</button>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const gameArea = document.querySelector('.game-area');
            canvas.width = gameArea.clientWidth;
            canvas.height = gameArea.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('wealthTowerHighScore') || 0;
        let blocks = [];
        let currentBlock = null;
        let swingAngle = 0;
        let swingSpeed = 0.03;
        let swingDirection = 1;
        let blockWidth = 120;
        let blockHeight = 40;
        let towerHeight = 0;
        let perfectStreak = 0;
        
        document.getElementById('highScore').textContent = highScore;
        
        function initBlock() {
            const lastBlock = blocks[blocks.length - 1];
            const baseX = lastBlock ? lastBlock.x : canvas.width / 2;
            
            currentBlock = {
                x: baseX + Math.sin(swingAngle) * 150,
                y: 100,
                width: blockWidth,
                height: blockHeight,
                color: `hsl(${160 + Math.random() * 40}, 70%, 50%)`,
                dropped: false
            };
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            blocks = [];
            towerHeight = 0;
            perfectStreak = 0;
            swingSpeed = 0.03;
            
            // Add base block
            blocks.push({
                x: canvas.width / 2,
                y: canvas.height - 100,
                width: blockWidth,
                height: blockHeight,
                color: '#00E676'
            });
            
            initBlock();
            gameLoop();
        }
        
        function restartGame() {
            startGame();
        }
        
        function dropBlock() {
            if (!gameRunning || !currentBlock || currentBlock.dropped) return;
            
            currentBlock.dropped = true;
            
            const lastBlock = blocks[blocks.length - 1];
            const overlap = calculateOverlap(currentBlock, lastBlock);
            
            if (overlap <= 0) {
                // Missed - game over
                gameOver();
                return;
            }
            
            // Cut block to overlap size
            const newWidth = overlap;
            const offsetX = currentBlock.x - lastBlock.x;
            currentBlock.width = newWidth;
            currentBlock.x = lastBlock.x + (offsetX > 0 ? offsetX : 0);
            
            // Check for perfect placement
            const isPerfect = Math.abs(offsetX) < 5;
            
            if (isPerfect) {
                perfectStreak++;
                score += 10 * perfectStreak;
                
                const perfectEl = document.getElementById('perfectIndicator');
                perfectEl.textContent = perfectStreak > 1 ? `PERFECT x${perfectStreak}! 🔥` : 'PERFECT! 🌟';
                perfectEl.classList.add('show');
                setTimeout(() => perfectEl.classList.remove('show'), 1000);
                
                if (navigator.vibrate) navigator.vibrate([30, 20, 30]);
            } else {
                perfectStreak = 0;
                score += 5;
                if (navigator.vibrate) navigator.vibrate(20);
            }
            
            // Add block to tower
            blocks.push({
                x: currentBlock.x,
                y: lastBlock.y - blockHeight,
                width: currentBlock.width,
                height: blockHeight,
                color: currentBlock.color
            });
            
            towerHeight++;
            
            // Increase difficulty
            swingSpeed = Math.min(0.08, 0.03 + towerHeight * 0.002);
            
            // Scroll tower down if too high
            if (blocks.length > 8) {
                blocks.forEach(block => block.y += blockHeight);
            }
            
            document.getElementById('score').textContent = score;
            
            // Next block
            setTimeout(() => initBlock(), 200);
        }
        
        function calculateOverlap(block1, block2) {
            const left1 = block1.x - block1.width / 2;
            const right1 = block1.x + block1.width / 2;
            const left2 = block2.x - block2.width / 2;
            const right2 = block2.x + block2.width / 2;
            
            const overlapLeft = Math.max(left1, left2);
            const overlapRight = Math.min(right1, right2);
            
            return Math.max(0, overlapRight - overlapLeft);
        }
        
        function gameOver() {
            gameRunning = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('wealthTowerHighScore', highScore);
            }
            document.getElementById('finalScore').textContent = towerHeight;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
        
        function update() {
            if (!gameRunning || !currentBlock || currentBlock.dropped) return;
            
            swingAngle += swingSpeed * swingDirection;
            
            if (Math.abs(swingAngle) > Math.PI / 2.5) {
                swingDirection *= -1;
            }
            
            const lastBlock = blocks[blocks.length - 1];
            currentBlock.x = lastBlock.x + Math.sin(swingAngle) * 150;
        }
        
        function draw() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.5, '#E0F6FF');
            gradient.addColorStop(1, '#B8E6F0');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            for (let i = 0; i < 5; i++) {
                const x = (i * 150 + Date.now() * 0.02) % (canvas.width + 200) - 100;
                const y = 50 + i * 30;
                ctx.beginPath();
                ctx.arc(x, y, 40, 0, Math.PI * 2);
                ctx.arc(x + 30, y - 10, 35, 0, Math.PI * 2);
                ctx.arc(x + 60, y, 40, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw tower blocks
            blocks.forEach((block, index) => {
                // Block shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.fillRect(block.x - block.width / 2 + 4, block.y + 4, block.width, block.height);
                
                // Block body
                ctx.fillStyle = block.color;
                ctx.fillRect(block.x - block.width / 2, block.y, block.width, block.height);
                
                // Block highlight
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(block.x - block.width / 2, block.y, block.width, 5);
                
                // Block border
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.lineWidth = 2;
                ctx.strokeRect(block.x - block.width / 2, block.y, block.width, block.height);
                
                // Floor number on top block
                if (index === blocks.length - 1) {
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 16px Inter';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(index + 1, block.x, block.y + block.height / 2);
                }
            });
            
            // Draw swinging block
            if (currentBlock && !currentBlock.dropped) {
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.fillRect(currentBlock.x - currentBlock.width / 2 + 4, currentBlock.y + 4, currentBlock.width, currentBlock.height);
                
                // Block
                ctx.fillStyle = currentBlock.color;
                ctx.fillRect(currentBlock.x - currentBlock.width / 2, currentBlock.y, currentBlock.width, currentBlock.height);
                
                // Highlight
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(currentBlock.x - currentBlock.width / 2, currentBlock.y, currentBlock.width, 5);
                
                // Border
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.lineWidth = 2;
                ctx.strokeRect(currentBlock.x - currentBlock.width / 2, currentBlock.y, currentBlock.width, currentBlock.height);
                
                // Guide line
                ctx.strokeStyle = 'rgba(0, 230, 118, 0.3)';
                ctx.setLineDash([5, 5]);
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(currentBlock.x, currentBlock.y + currentBlock.height);
                ctx.lineTo(currentBlock.x, canvas.height);
                ctx.stroke();
                ctx.setLineDash([]);
            }
            
            // Draw ground
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            
            ctx.fillStyle = '#388E3C';
            ctx.fillRect(0, canvas.height - 25, canvas.width, 5);
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            update();
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Keyboard control
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                dropBlock();
            }
        });
        
        // Touch control
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            dropBlock();
        });
    </script>
</body>
</html>
