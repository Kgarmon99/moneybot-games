<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wealth Tower | MoneyBot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-light: #69F0AE;
            --moneybot-green-dark: #00C853;
            --moneybot-gold: #FBBF24;
            --moneybot-dark: #1A1A2E;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: linear-gradient(180deg, #1A1A2E 0%, #0F0F1A 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
        }
        
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(26,26,46,0.9) 0%, transparent 100%);
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            text-decoration: none;
            transition: all 0.2s var(--ease-out-expo);
        }
        
        .back-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.25);
        }
        
        .score-display {
            background: rgba(0, 230, 118, 0.2);
            border: 1px solid var(--moneybot-green);
            padding: 10px 20px;
            border-radius: 20px;
            color: var(--moneybot-green);
            font-weight: 700;
            font-size: 18px;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        
        .stats-overlay {
            position: absolute;
            top: 80px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 50;
        }
        
        .stat-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 12px 20px;
            text-align: center;
            min-width: 80px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--moneybot-green);
            margin-bottom: 2px;
        }
        
        .stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .perfect-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
            color: var(--moneybot-gold);
            text-shadow: 0 0 40px rgba(251, 191, 36, 0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 60;
        }
        
        .perfect-text.show {
            animation: perfectPop 0.8s var(--ease-spring) forwards;
        }
        
        @keyframes perfectPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-60px); }
        }
        
        .drop-btn {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: 800;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 230, 118, 0.4);
            transition: all 0.2s var(--ease-spring);
            z-index: 100;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .drop-btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(0, 230, 118, 0.3);
        }
        
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(26,26,46,0.98) 0%, rgba(0,0,0,0.95) 100%);
            backdrop-filter: blur(20px);
            z-index: 200;
        }
        
        .game-over-screen {
            display: none;
        }
        
        .logo-container {
            position: relative;
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 80px;
            filter: drop-shadow(0 10px 30px rgba(0, 230, 118, 0.4));
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .title {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, var(--moneybot-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 40px;
            line-height: 1.5;
        }
        
        .high-score {
            background: rgba(255,255,255,0.1);
            padding: 16px 32px;
            border-radius: 16px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .high-score-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        
        .high-score-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--moneybot-gold);
        }
        
        .start-btn {
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: white;
            border: none;
            padding: 22px 70px;
            font-size: 22px;
            font-weight: 800;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0, 230, 118, 0.5);
            transition: all 0.3s var(--ease-spring);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 50px rgba(0, 230, 118, 0.6);
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        .instructions {
            margin-top: 40px;
            display: flex;
            gap: 30px;
        }
        
        .instruction-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
        
        .instruction-icon {
            font-size: 28px;
        }
        
        .final-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .final-stat {
            background: rgba(255,255,255,0.1);
            padding: 20px 30px;
            border-radius: 16px;
            text-align: center;
            min-width: 100px;
        }
        
        .final-stat-value {
            font-size: 28px;
            font-weight: 800;
            color: white;
            margin-bottom: 4px;
        }
        
        .final-stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <a href="../moneybot-official/" class="back-btn">←</a>
            <div class="score-display">$<span id="value">0</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div class="stats-overlay">
            <div class="stat-box">
                <div class="stat-value" id="floors">0</div>
                <div class="stat-label">Floors</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">Streak</div>
            </div>
        </div>
        
        <div class="perfect-text" id="perfectText">PERFECT! 🎯</div>
        
        <button class="drop-btn" id="dropBtn" onclick="dropFloor()">DROP FLOOR</button>
        
        <div class="start-screen" id="startScreen">
            <div class="logo-container">
                <div class="logo">🏢</div>
            </div>
            <div class="title">Wealth Tower</div>
            <div class="subtitle">Stack floors to build your wealth!<br>Time it perfectly for bonuses</div>
            
            <div class="high-score">
                <div class="high-score-label">Best Tower</div>
                <div class="high-score-value" id="highScore">0 floors</div>
            </div>
            
            <button class="start-btn" onclick="startGame()">BUILD NOW</button>
            
            <div class="instructions">
                <div class="instruction-item">
                    <span class="instruction-icon">👆</span>
                    <span>Tap to Drop</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-icon">🎯</span>
                    <span>Perfect = Bonus</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-icon">🏗️</span>
                    <span>Build Higher</span>
                </div>
            </div>
        </div>
        
        <div class="game-over-screen" id="gameOverScreen">
            <div class="logo" style="font-size: 60px; margin-bottom: 10px;">🏗️</div>
            <div class="title" style="font-size: 32px;">Tower Complete!</div>
            
            <div class="final-stats">
                <div class="final-stat">
                    <div class="final-stat-value" id="finalFloors">0</div>
                    <div class="final-stat-label">Floors</div>
                </div>
                <div class="final-stat">
                    <div class="final-stat-value" id="finalStreak">0</div>
                    <div class="final-stat-label">Best Streak</div>
                </div>
                <div class="final-stat">
                    <div class="final-stat-value" id="finalValue">$0</div>
                    <div class="final-stat-label">Value</div>
                </div>
            </div>
            
            <button class="start-btn" onclick="restartGame()">BUILD AGAIN</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth > 430 ? 430 : window.innerWidth;
        canvas.height = window.innerHeight;
        
        const FLOOR_HEIGHT = 36;
        const FLOOR_WIDTH = 180;
        const COLORS = ['#00E676', '#00C853', '#69F0AE', '#00BFA5', '#1DE9B6', '#64FFDA'];
        
        let floors = [];
        let currentFloor = null;
        let swinging = true;
        let swingAngle = 0;
        let swingSpeed = 0.025;
        let score = 0;
        let perfectStreak = 0;
        let bestStreak = 0;
        let highScore = localStorage.getItem('wealthTowerHighScore') || 0;
        let gameOver = false;
        let gameRunning = false;
        
        document.getElementById('highScore').textContent = highScore + ' floors';
        
        function resize() {
            canvas.width = window.innerWidth > 430 ? 430 : window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        function init() {
            resize();
            floors.push({ 
                x: canvas.width/2 - FLOOR_WIDTH/2, 
                y: canvas.height - 100, 
                width: FLOOR_WIDTH, 
                color: COLORS[0] 
            });
            createNewFloor();
        }
        
        function createNewFloor() {
            const color = COLORS[floors.length % COLORS.length];
            currentFloor = { x: 0, y: 120, width: FLOOR_WIDTH, color: color, angle: 0 };
            swinging = true;
        }
        
        function dropFloor() {
            if (!swinging || gameOver || !gameRunning) return;
            swinging = false;
            
            if (navigator.vibrate) navigator.vibrate(15);
            
            const lastFloor = floors[floors.length - 1];
            const overlap = Math.max(0, Math.min(currentFloor.x + currentFloor.width, lastFloor.x + lastFloor.width) - Math.max(currentFloor.x, lastFloor.x));
            
            if (overlap <= 0) {
                gameOver = true;
                endGame();
                return;
            }
            
            const isPerfect = Math.abs(currentFloor.x - lastFloor.x) < 5;
            if (isPerfect) {
                currentFloor.x = lastFloor.x;
                perfectStreak++;
                if (perfectStreak > bestStreak) bestStreak = perfectStreak;
                score += 1000 * perfectStreak;
                
                const perfectText = document.getElementById('perfectText');
                perfectText.textContent = perfectStreak > 1 ? `PERFECT x${perfectStreak}! 🎯` : 'PERFECT! 🎯';
                perfectText.classList.add('show');
                
                if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
                setTimeout(() => perfectText.classList.remove('show'), 800);
            } else {
                perfectStreak = 0;
                currentFloor.width = overlap;
                if (currentFloor.x < lastFloor.x) {
                    currentFloor.x = lastFloor.x;
                }
                score += overlap * 10;
            }
            
            currentFloor.y = lastFloor.y - FLOOR_HEIGHT;
            floors.push(currentFloor);
            
            updateDisplay();
            
            if (floors.length < 100) {
                setTimeout(createNewFloor, 400);
            } else {
                setTimeout(endGame, 500);
            }
        }
        
        function updateDisplay() {
            document.getElementById('floors').textContent = floors.length;
            document.getElementById('value').textContent = score.toLocaleString();
            document.getElementById('streak').textContent = perfectStreak;
        }
        
        function endGame() {
            gameRunning = false;
            if (floors.length > highScore) {
                highScore = floors.length;
                localStorage.setItem('wealthTowerHighScore', highScore);
            }
            document.getElementById('finalFloors').textContent = floors.length;
            document.getElementById('finalStreak').textContent = bestStreak;
            document.getElementById('finalValue').textContent = '$' + score.toLocaleString();
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('highScore').textContent = highScore + ' floors';
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            floors = [];
            score = 0;
            perfectStreak = 0;
            bestStreak = 0;
            gameOver = false;
            init();
            updateDisplay();
            gameLoop();
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            startGame();
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            // Clear with gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a1a3e');
            gradient.addColorStop(0.5, '#0f172a');
            gradient.addColorStop(1, '#1e293b');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid lines
            ctx.strokeStyle = 'rgba(0, 230, 118, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            
            // Draw floors
            floors.forEach((floor, i) => {
                // Floor shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(floor.x + 4, floor.y + 4, floor.width, FLOOR_HEIGHT);
                
                // Floor body with gradient
                const floorGrad = ctx.createLinearGradient(floor.x, floor.y, floor.x, floor.y + FLOOR_HEIGHT);
                floorGrad.addColorStop(0, floor.color);
                floorGrad.addColorStop(1, adjustColor(floor.color, -30));
                ctx.fillStyle = floorGrad;
                ctx.fillRect(floor.x, floor.y, floor.width, FLOOR_HEIGHT);
                
                // Floor highlight
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(floor.x, floor.y, floor.width, 3);
                
                // Floor number
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.font = 'bold 14px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(i + 1, floor.x + floor.width/2, floor.y + FLOOR_HEIGHT/2 + 5);
            });
            
            // Update and draw current floor
            if (swinging && currentFloor) {
                swingAngle += swingSpeed;
                currentFloor.x = canvas.width/2 - currentFloor.width/2 + Math.sin(swingAngle) * (canvas.width/2 - currentFloor.width - 40);
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(currentFloor.x + 4, currentFloor.y + 4, currentFloor.width, FLOOR_HEIGHT);
                
                // Floor with gradient
                const floorGrad = ctx.createLinearGradient(currentFloor.x, currentFloor.y, currentFloor.x, currentFloor.y + FLOOR_HEIGHT);
                floorGrad.addColorStop(0, currentFloor.color);
                floorGrad.addColorStop(1, adjustColor(currentFloor.color, -30));
                ctx.fillStyle = floorGrad;
                ctx.globalAlpha = 0.9;
                ctx.fillRect(currentFloor.x, currentFloor.y, currentFloor.width, FLOOR_HEIGHT);
                ctx.globalAlpha = 1;
                
                // Glow effect
                ctx.shadowColor = currentFloor.color;
                ctx.shadowBlur = 20;
                ctx.strokeStyle = currentFloor.color;
                ctx.lineWidth = 2;
                ctx.strokeRect(currentFloor.x, currentFloor.y, currentFloor.width, FLOOR_HEIGHT);
                ctx.shadowBlur = 0;
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        function adjustColor(color, amount) {
            const num = parseInt(color.replace('#', ''), 16);
            const r = Math.max(0, Math.min(255, (num >> 16) + amount));
            const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amount));
            const b = Math.max(0, Math.min(255, (num & 0x0000FF) + amount));
            return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
        }
        
        window.addEventListener('resize', resize);
        
        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            dropFloor();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                dropFloor();
            }
        });
    </script>
</body>
</html>
