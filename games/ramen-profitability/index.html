<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ramen Profitability — YC Startup School</title>
  <link rel="stylesheet" href="../yc-dark-theme.css">
</head>
<body>
  <div id="game-shell">
    <header class="hud">
      <div class="hud-brand">
        <span class="logo">¥</span>
        <span class="title">Ramen</span>
      </div>
      <div class="hud-stats">
        <div class="stat-pill">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat-pill">
          <span class="stat-label">Month</span>
          <span class="stat-value" id="round">1</span>
        </div>
      </div>
    </header>

    <main class="play-area">
      <div class="decision-panel">
        <div class="panel-title" id="card-category">Month 1</div>
        <div class="scenario-text" id="card-question">Loading...</div>
        <div class="choice-grid" id="choices"></div>
      </div>
    </main>

    <div class="modal-overlay" id="start-screen">
      <div class="modal-card">
        <div class="modal-mascot">¥</div>
        <h1>Ramen Profitability</h1>
        <p class="modal-subtitle">Default alive</p>
        <div class="lesson-badge">
          <span class="lesson-label">YC Lesson</span>
          <span class="lesson-text">Default alive</span>
        </div>
        <button class="btn-primary" id="start-btn">Start</button>
      </div>
    </div>

    <div class="modal-overlay hidden" id="win-screen">
      <div class="modal-card">
        <div class="modal-mascot">✓</div>
        <h1>Profitable!</h1>
        <p class="modal-subtitle" id="win-reason">You're ramen profitable!</p>
        <button class="btn-primary" id="replay-btn">Play Again</button>
      </div>
    </div>

    <div class="modal-overlay hidden" id="loss-screen">
      <div class="modal-card">
        <div class="modal-mascot">◯</div>
        <h1>Burning Cash</h1>
        <p class="modal-subtitle" id="loss-reason">Not sustainable.</p>
        <div class="tip-box">
          <strong>YC Lesson:</strong>
          <p id="loss-tip">Revenue must cover expenses, even if it's ramen-level.</p>
        </div>
        <button class="btn-primary" id="try-again-btn">Try Again</button>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
