<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Collector | MoneyBot Gaming</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-dark: #00C853;
            --moneybot-dark: #1A1A2E;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--moneybot-dark);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .back-btn:active {
            background: rgba(255,255,255,0.2);
            transform: scale(0.95);
        }
        
        .score-display {
            background: rgba(0, 230, 118, 0.2);
            border: 1px solid var(--moneybot-green);
            padding: 10px 20px;
            border-radius: 16px;
            color: var(--moneybot-green);
            font-weight: 800;
            font-size: 18px;
        }
        
        .game-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
        }
        
        #gameCanvas {
            background: #0a0a1a;
            border-radius: 16px;
            box-shadow: 0 0 50px rgba(0, 230, 118, 0.15);
            max-width: 100%;
            max-height: 70vh;
        }
        
        .controls {
            padding: 15px 20px 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
            background: rgba(26, 26, 46, 0.95);
        }
        
        .control-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(0, 230, 118, 0.3);
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .control-btn:active {
            background: var(--moneybot-green);
            transform: scale(0.92);
            border-color: var(--moneybot-green);
        }
        
        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(26, 26, 46, 0.98);
            backdrop-filter: blur(20px);
            z-index: 200;
        }
        
        .game-over-screen {
            display: none;
        }
        
        .logo {
            font-size: 80px;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 30px rgba(251, 191, 36, 0.4));
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .title {
            font-size: 38px;
            font-weight: 800;
            color: white;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 17px;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 40px;
            line-height: 1.5;
        }
        
        .start-btn {
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: white;
            border: none;
            padding: 22px 70px;
            font-size: 22px;
            font-weight: 800;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0, 230, 118, 0.5);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        .final-score {
            font-size: 56px;
            font-weight: 800;
            color: var(--moneybot-green);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <a href="../moneybot-official/" class="back-btn">←</a>
            <div class="score-display">Score: <span id="score">0</span></div>
        </div>
        
        <div class="game-container">
            <canvas id="gameCanvas" width="340" height="440"></canvas>
        </div>
        
        <div class="controls">
            <button class="control-btn" id="leftBtn">←</button>
            <button class="control-btn" id="upBtn">↑</button>
            <button class="control-btn" id="downBtn">↓</button>
            <button class="control-btn" id="rightBtn">→</button>
        </div>
    </div>
    
    <div class="start-screen" id="startScreen">
        <div class="logo">🪙</div>
        <div class="title">Coin Collector</div>
        <div class="subtitle">Eat all the coins! Avoid the debt ghosts!<br>Use arrow keys or buttons to move</div>
        <button class="start-btn" onclick="startGame()">PLAY NOW</button>
    </div>
    
    <div class="game-over-screen" id="gameOverScreen">
        <div class="logo">👻</div>
        <div class="title">Game Over!</div>
        <div class="final-score" id="finalScore">0</div>
        <div class="subtitle">coins collected</div>
        <button class="start-btn" onclick="restartGame()">PLAY AGAIN</button>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const CELL_SIZE = 20;
        const COLS = 17;
        const ROWS = 22;
        
        // Simple maze - 1 = wall, 0 = coin, 2 = empty
        const mazeLayout = [
            "11111111111111111",
            "10000001000000001",
            "10111011101110101",
            "10000000000000001",
            "10111010111011101",
            "10001000000000001",
            "11101110111011101",
            "10000000000000001",
            "10111011101110101",
            "10000000000000001",
            "10111010111011101",
            "10000000000000001",
            "11101110111011101",
            "10000000000000001",
            "10111011101110101",
            "10000000000000001",
            "10111010111011101",
            "10000000000000001",
            "11101110111011101",
            "10000000000000001",
            "10111011101110101",
            "10000000000000001",
            "11111111111111111"
        ];
        
        let board = [];
        let player = { x: 1, y: 1, dir: 'right', nextDir: 'right' };
        let ghosts = [];
        let score = 0;
        let gameRunning = false;
        let gameInterval;
        
        function initGame() {
            board = [];
            score = 0;
            player = { x: 1, y: 1, dir: 'right', nextDir: 'right' };
            
            // Parse maze
            for (let row = 0; row < ROWS; row++) {
                board[row] = [];
                for (let col = 0; col < COLS; col++) {
                    const char = mazeLayout[row][col];
                    if (char === '1') {
                        board[row][col] = 'wall';
                    } else if (char === '0') {
                        board[row][col] = 'coin';
                    }
                }
            }
            
            // Add ghosts
            ghosts = [
                { x: 15, y: 1, dir: 'left', color: '#FF5252' },
                { x: 15, y: 20, dir: 'up', color: '#FF9800' },
                { x: 1, y: 20, dir: 'right', color: '#2196F3' }
            ];
            
            document.getElementById('score').textContent = score;
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            initGame();
            gameRunning = true;
            gameInterval = setInterval(gameStep, 150);
            draw();
        }
        
        function restartGame() {
            startGame();
        }
        
        function gameOver() {
            gameRunning = false;
            clearInterval(gameInterval);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
        
        function canMove(x, y) {
            if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return false;
            return board[y][x] !== 'wall';
        }
        
        function gameStep() {
            if (!gameRunning) return;
            
            // Update player direction
            if (player.nextDir !== player.dir) {
                let nx = player.x;
                let ny = player.y;
                
                if (player.nextDir === 'up') ny--;
                else if (player.nextDir === 'down') ny++;
                else if (player.nextDir === 'left') nx--;
                else if (player.nextDir === 'right') nx++;
                
                if (canMove(nx, ny)) {
                    player.dir = player.nextDir;
                }
            }
            
            // Move player
            let newX = player.x;
            let newY = player.y;
            
            if (player.dir === 'up') newY--;
            else if (player.dir === 'down') newY++;
            else if (player.dir === 'left') newX--;
            else if (player.dir === 'right') newX++;
            
            if (canMove(newX, newY)) {
                player.x = newX;
                player.y = newY;
                
                // Collect coin
                if (board[player.y][player.x] === 'coin') {
                    board[player.y][player.x] = 'empty';
                    score += 10;
                    document.getElementById('score').textContent = score;
                    if (navigator.vibrate) navigator.vibrate(10);
                }
            }
            
            // Check win
            let coinsLeft = 0;
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col] === 'coin') coinsLeft++;
                }
            }
            
            if (coinsLeft === 0) {
                gameOver();
                return;
            }
            
            // Move ghosts
            ghosts.forEach(ghost => {
                const dirs = ['up', 'down', 'left', 'right'];
                let moved = false;
                
                // Try to move toward player
                const dx = player.x - ghost.x;
                const dy = player.y - ghost.y;
                
                let preferredDirs = [];
                if (Math.abs(dx) > Math.abs(dy)) {
                    preferredDirs = dx > 0 ? ['right', 'up', 'down', 'left'] : ['left', 'up', 'down', 'right'];
                } else {
                    preferredDirs = dy > 0 ? ['down', 'left', 'right', 'up'] : ['up', 'left', 'right', 'down'];
                }
                
                for (let dir of preferredDirs) {
                    let nx = ghost.x;
                    let ny = ghost.y;
                    
                    if (dir === 'up') ny--;
                    else if (dir === 'down') ny++;
                    else if (dir === 'left') nx--;
                    else if (dir === 'right') nx++;
                    
                    if (canMove(nx, ny)) {
                        ghost.x = nx;
                        ghost.y = ny;
                        ghost.dir = dir;
                        moved = true;
                        break;
                    }
                }
                
                // Check collision with player
                if (ghost.x === player.x && ghost.y === player.y) {
                    gameOver();
                }
            });
            
            draw();
        }
        
        function draw() {
            // Clear
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw maze
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const x = col * CELL_SIZE;
                    const y = row * CELL_SIZE;
                    
                    if (board[row][col] === 'wall') {
                        ctx.fillStyle = '#1e3a8a';
                        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                        ctx.strokeStyle = '#3b82f6';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);
                    } else if (board[row][col] === 'coin') {
                        ctx.font = '14px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('🪙', x + CELL_SIZE/2, y + CELL_SIZE/2);
                    }
                }
            }
            
            // Draw player
            ctx.font = '18px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('😀', player.x * CELL_SIZE + CELL_SIZE/2, player.y * CELL_SIZE + CELL_SIZE/2);
            
            // Draw ghosts
            ghosts.forEach(ghost => {
                ctx.font = '18px Arial';
                ctx.fillText('👻', ghost.x * CELL_SIZE + CELL_SIZE/2, ghost.y * CELL_SIZE + CELL_SIZE/2);
            });
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key === 'ArrowUp') player.nextDir = 'up';
            if (e.key === 'ArrowDown') player.nextDir = 'down';
            if (e.key === 'ArrowLeft') player.nextDir = 'left';
            if (e.key === 'ArrowRight') player.nextDir = 'right';
        });
        
        document.getElementById('upBtn').addEventListener('click', () => { if (gameRunning) player.nextDir = 'up'; });
        document.getElementById('downBtn').addEventListener('click', () => { if (gameRunning) player.nextDir = 'down'; });
        document.getElementById('leftBtn').addEventListener('click', () => { if (gameRunning) player.nextDir = 'left'; });
        document.getElementById('rightBtn').addEventListener('click', () => { if (gameRunning) player.nextDir = 'right'; });
    </script>
</body>
</html>
