<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financial Wordle | MoneyBot</title>
    <link rel="icon" type="image/svg+xml" href="../assets/moneybot-idle.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-light: #69F0AE;
            --moneybot-green-dark: #00C853;
            --moneybot-gold: #FBBF24;
            --moneybot-dark: #1A1A2E;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
            --correct: #00E676;
            --present: #FBBF24;
            --absent: #94A3B8;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: linear-gradient(180deg, #1A1A2E 0%, #0F0F1A 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            text-decoration: none;
            transition: all 0.2s var(--ease-out-expo);
        }
        
        .back-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.25);
        }
        
        .header-title {
            font-weight: 700;
            font-size: 20px;
            color: white;
            letter-spacing: -0.3px;
        }
        
        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s var(--ease-out-expo);
        }
        
        .icon-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.25);
        }
        
        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0 20px 20px;
            align-items: center;
        }
        
        .info-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
        }
        
        .info-title {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        
        .info-subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
        }
        
        .game-board {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .row {
            display: flex;
            gap: 8px;
        }
        
        .tile {
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            color: white;
            transition: all 0.3s var(--ease-spring);
        }
        
        .tile.filled {
            border-color: var(--moneybot-green);
            background: rgba(0, 230, 118, 0.1);
            transform: scale(1.05);
        }
        
        .tile.correct {
            background: var(--correct);
            border-color: var(--correct);
            animation: flipCorrect 0.6s var(--ease-spring);
            box-shadow: 0 4px 12px rgba(0, 230, 118, 0.4);
        }
        
        .tile.present {
            background: var(--present);
            border-color: var(--present);
            animation: flipPresent 0.6s var(--ease-spring);
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.4);
        }
        
        .tile.absent {
            background: var(--absent);
            border-color: var(--absent);
            animation: flipAbsent 0.6s var(--ease-spring);
        }
        
        @keyframes flipCorrect {
            0% { transform: rotateX(0) scale(1); }
            50% { transform: rotateX(90deg) scale(0.9); }
            100% { transform: rotateX(0) scale(1.05); }
        }
        
        @keyframes flipPresent {
            0% { transform: rotateX(0) scale(1); }
            50% { transform: rotateX(90deg) scale(0.9); }
            100% { transform: rotateX(0) scale(1.05); }
        }
        
        @keyframes flipAbsent {
            0% { transform: rotateX(0); }
            50% { transform: rotateX(90deg); }
            100% { transform: rotateX(0); }
        }
        
        .message {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: white;
            margin-bottom: 12px;
        }
        
        .message.show {
            animation: messagePop 0.3s var(--ease-spring);
        }
        
        @keyframes messagePop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }
        
        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }
        
        .key {
            min-width: 32px;
            height: 48px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            max-width: 42px;
            transition: all 0.15s var(--ease-out-expo);
        }
        
        .key:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .key:active {
            transform: scale(0.92);
            background: rgba(255,255,255,0.15);
        }
        
        .key.wide {
            min-width: 48px;
            max-width: 64px;
            font-size: 13px;
        }
        
        .key.correct {
            background: var(--correct);
            border-color: var(--correct);
            box-shadow: 0 4px 12px rgba(0, 230, 118, 0.4);
        }
        
        .key.present {
            background: var(--present);
            border-color: var(--present);
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.4);
        }
        
        .key.absent {
            background: var(--absent);
            border-color: var(--absent);
        }
        
        .definition-card {
            background: linear-gradient(135deg, var(--moneybot-green) 0%, var(--moneybot-green-dark) 100%);
            margin-top: 16px;
            padding: 24px;
            border-radius: 16px;
            color: white;
            box-shadow: 0 12px 32px rgba(0, 230, 118, 0.3);
            display: none;
            animation: slideUp 0.5s var(--ease-spring);
            width: 100%;
        }
        
        .definition-card.show {
            display: block;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .definition-word {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        
        .definition-text {
            font-size: 15px;
            line-height: 1.5;
            opacity: 0.95;
        }
        
        .new-game-btn {
            margin-top: 16px;
            background: linear-gradient(135deg, var(--moneybot-green) 0%, var(--moneybot-green-dark) 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 230, 118, 0.4);
            transition: all 0.2s var(--ease-spring);
            display: none;
            width: 100%;
        }
        
        .new-game-btn.show {
            display: block;
            animation: slideUp 0.5s var(--ease-spring);
        }
        
        .new-game-btn:active {
            transform: scale(0.96);
        }
        
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(26,26,46,0.98) 0%, rgba(0,0,0,0.95) 100%);
            backdrop-filter: blur(20px);
            z-index: 200;
        }
        
        .logo {
            font-size: 80px;
            filter: drop-shadow(0 10px 30px rgba(0, 230, 118, 0.4));
            animation: float 3s ease-in-out infinite;
            margin-bottom: 20px;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .title {
            font-size: 40px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--moneybot-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 40px;
            line-height: 1.5;
        }
        
        .start-btn {
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: white;
            border: none;
            padding: 22px 70px;
            font-size: 22px;
            font-weight: 800;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0, 230, 118, 0.5);
            transition: all 0.3s var(--ease-spring);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        .instructions {
            margin-top: 40px;
            display: flex;
            gap: 30px;
        }
        
        .instruction-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
        
        .instruction-icon {
            font-size: 28px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <a href="../moneybot-official/" class="back-btn">←</a>
            <div class="header-title">Financial Wordle</div>
            <button class="icon-btn" onclick="initGame()">🔄</button>
        </div>
        
        <div class="game-container">
            <div class="info-card">
                <div class="info-title">Guess the Finance Term</div>
                <div class="info-subtitle">5 letters • Learn as you play</div>
            </div>
            
            <div class="game-board" id="gameBoard"></div>
            
            <div class="message" id="message"></div>
            
            <div class="keyboard" id="keyboard"></div>
            
            <div class="definition-card" id="definition">
                <div class="definition-word" id="defWord"></div>
                <div class="definition-text" id="defText"></div>
            </div>
            
            <button class="new-game-btn" id="newGameBtn" onclick="initGame()">Play Again</button>
        </div>
        
        <div class="start-screen" id="startScreen">
            <div class="logo">🎯</div>
            <div class="title">Financial Wordle</div>
            <div class="subtitle">Guess finance terms in 6 tries!<br>Learn money vocabulary as you play</div>
            
            <button class="start-btn" onclick="startGame()">PLAY NOW</button>
            
            <div class="instructions">
                <div class="instruction-item">
                    <span class="instruction-icon">🟩</span>
                    <span>Correct Spot</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-icon">🟨</span>
                    <span>Wrong Spot</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-icon">⬜</span>
                    <span>Not in Word</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const WORDS = [
            { word: 'ASSET', def: 'Something valuable that you own (cash, stocks, property)' },
            { word: 'DEBIT', def: 'Money taken out of your account' },
            { word: 'CREDIT', def: 'Money borrowed that must be paid back' },
            { word: 'EQUITY', def: 'Ownership value in an asset after debts are paid' },
            { word: 'YIELD', def: 'Income return on an investment' },
            { word: 'TRADE', def: 'Buying and selling financial instruments' },
            { word: 'STOCK', def: 'Ownership share in a company' },
            { word: 'BONDS', def: 'Loans made to governments or corporations' },
            { word: 'FUNDS', def: 'Pools of money invested in various assets' },
            { word: 'RATES', def: 'The cost of borrowing money or return on savings' },
            { word: 'PRICE', def: 'The amount of money needed to purchase something' },
            { word: 'VALUE', def: 'The worth of an asset or investment' },
            { word: 'SAVED', def: 'Money set aside for future use' },
            { word: 'SPEND', def: 'To use money to buy goods or services' },
            { word: 'EARN', def: 'To receive money for work or investments' }
        ];
        
        let targetWord, currentRow = 0, currentTile = 0, gameOver = false;
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            initGame();
        }
        
        function initGame() {
            targetWord = WORDS[Math.floor(Math.random() * WORDS.length)];
            currentRow = 0;
            currentTile = 0;
            gameOver = false;
            document.getElementById('message').textContent = '';
            document.getElementById('definition').classList.remove('show');
            document.getElementById('newGameBtn').classList.remove('show');
            createBoard();
            createKeyboard();
        }
        
        function createBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                for (let j = 0; j < 5; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.dataset.row = i;
                    tile.dataset.col = j;
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }
        
        function createKeyboard() {
            const keys = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
            const keyboard = document.getElementById('keyboard');
            keyboard.innerHTML = '';
            
            keys.forEach((row, i) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'keyboard-row';
                
                if (i === 2) {
                    const enterKey = document.createElement('button');
                    enterKey.className = 'key wide';
                    enterKey.textContent = 'ENTER';
                    enterKey.onclick = () => submitGuess();
                    rowDiv.appendChild(enterKey);
                }
                
                row.split('').forEach(key => {
                    const btn = document.createElement('button');
                    btn.className = 'key';
                    btn.textContent = key;
                    btn.onclick = () => addLetter(key);
                    btn.id = `key-${key}`;
                    rowDiv.appendChild(btn);
                });
                
                if (i === 2) {
                    const backKey = document.createElement('button');
                    backKey.className = 'key wide';
                    backKey.innerHTML = '⌫';
                    backKey.onclick = () => removeLetter();
                    rowDiv.appendChild(backKey);
                }
                
                keyboard.appendChild(rowDiv);
            });
        }
        
        function addLetter(letter) {
            if (gameOver || currentTile >= 5) return;
            const tile = document.querySelector(`.tile[data-row="${currentRow}"][data-col="${currentTile}"]`);
            tile.textContent = letter;
            tile.classList.add('filled');
            currentTile++;
            if (navigator.vibrate) navigator.vibrate(5);
        }
        
        function removeLetter() {
            if (currentTile === 0) return;
            currentTile--;
            const tile = document.querySelector(`.tile[data-row="${currentRow}"][data-col="${currentTile}"]`);
            tile.textContent = '';
            tile.classList.remove('filled');
            if (navigator.vibrate) navigator.vibrate(5);
        }
        
        function submitGuess() {
            if (currentTile < 5) {
                showMessage('Not enough letters!');
                return;
            }
            
            let guess = '';
            for (let i = 0; i < 5; i++) {
                guess += document.querySelector(`.tile[data-row="${currentRow}"][data-col="${i}"]`).textContent;
            }
            
            const target = targetWord.word;
            const tiles = document.querySelectorAll(`.tile[data-row="${currentRow}"]`);
            
            for (let i = 0; i < 5; i++) {
                const letter = guess[i];
                const tile = tiles[i];
                const key = document.getElementById(`key-${letter}`);
                
                setTimeout(() => {
                    if (letter === target[i]) {
                        tile.classList.add('correct');
                        key.classList.remove('present', 'absent');
                        key.classList.add('correct');
                    } else if (target.includes(letter)) {
                        tile.classList.add('present');
                        if (!key.classList.contains('correct')) {
                            key.classList.add('present');
                        }
                    } else {
                        tile.classList.add('absent');
                        key.classList.add('absent');
                    }
                    if (navigator.vibrate) navigator.vibrate(10);
                }, i * 150);
            }
            
            if (guess === target) {
                gameOver = true;
                setTimeout(() => {
                    showMessage('🎉 Correct!');
                    showDefinition();
                    if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
                }, 900);
            } else if (currentRow === 5) {
                gameOver = true;
                setTimeout(() => {
                    showMessage(`The word was: ${target}`);
                    showDefinition();
                }, 900);
            } else {
                currentRow++;
                currentTile = 0;
            }
        }
        
        function showMessage(msg) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2000);
        }
        
        function showDefinition() {
            document.getElementById('defWord').textContent = targetWord.word;
            document.getElementById('defText').textContent = targetWord.def;
            document.getElementById('definition').classList.add('show');
            document.getElementById('newGameBtn').classList.add('show');
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitGuess();
            else if (e.key === 'Backspace') removeLetter();
            else if (/^[a-zA-Z]$/.test(e.key)) addLetter(e.key.toUpperCase());
        });
    </script>
</body>
</html>
