<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio Balancer | MoneyBot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        
        :root {
            --moneybot-green: #00E676;
            --moneybot-green-light: #69F0AE;
            --moneybot-green-dark: #00C853;
            --moneybot-gold: #FBBF24;
            --moneybot-dark: #1A1A2E;
            --moneybot-gray: #F5F5F7;
            --moneybot-text: #1A1A2E;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: linear-gradient(180deg, #1A1A2E 0%, #0F0F1A 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            text-decoration: none;
            transition: all 0.2s var(--ease-out-expo);
        }
        
        .back-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.25);
        }
        
        .score-display {
            background: rgba(0, 230, 118, 0.2);
            border: 1px solid var(--moneybot-green);
            padding: 10px 20px;
            border-radius: 20px;
            color: var(--moneybot-green);
            font-weight: 700;
            font-size: 18px;
        }
        
        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0 20px 20px;
        }
        
        .level-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .level-label {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        
        .level-number {
            font-size: 36px;
            font-weight: 800;
            color: var(--moneybot-green);
            margin-bottom: 12px;
        }
        
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--moneybot-green), var(--moneybot-green-light));
            border-radius: 4px;
            transition: width 0.5s var(--ease-out-expo);
        }
        
        .game-board {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }
        
        .tile {
            aspect-ratio: 1;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s var(--ease-spring);
            position: relative;
            overflow: hidden;
            background: rgba(255,255,255,0.1);
        }
        
        .tile::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .tile:hover::before {
            opacity: 1;
        }
        
        .tile:active {
            transform: scale(0.9);
        }
        
        .tile.selected {
            transform: scale(1.1);
            box-shadow: 0 0 0 3px var(--moneybot-green), 0 8px 24px rgba(0, 230, 118, 0.4);
            z-index: 10;
        }
        
        .tile.matched {
            animation: matchPop 0.5s var(--ease-spring);
        }
        
        @keyframes matchPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }
        
        .tile-cash { background: linear-gradient(135deg, #10B981, #059669); }
        .tile-stocks { background: linear-gradient(135deg, #3B82F6, #2563EB); }
        .tile-bonds { background: linear-gradient(135deg, #8B5CF6, #7C3AED); }
        .tile-crypto { background: linear-gradient(135deg, #F59E0B, #D97706); }
        .tile-gold { background: linear-gradient(135deg, #FBBF24, #F59E0B); }
        .tile-real-estate { background: linear-gradient(135deg, #EF4444, #DC2626); }
        
        .power-ups {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .power-up {
            flex: 1;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
        }
        
        .power-up:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.15);
            border-color: var(--moneybot-green);
        }
        
        .power-up:active {
            transform: scale(0.95);
        }
        
        .power-up-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .power-up-name {
            font-weight: 600;
            font-size: 13px;
            color: white;
            margin-bottom: 4px;
        }
        
        .power-up-count {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        
        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 800;
            color: var(--moneybot-gold);
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.6);
            pointer-events: none;
            opacity: 0;
            z-index: 1000;
        }
        
        .combo-display.show {
            animation: comboAnim 1s var(--ease-out-expo) forwards;
        }
        
        @keyframes comboAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(1); }
        }
        
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(26,26,46,0.98) 0%, rgba(0,0,0,0.95) 100%);
            backdrop-filter: blur(20px);
            z-index: 200;
        }
        
        .game-over-screen {
            display: none;
        }
        
        .logo {
            font-size: 80px;
            filter: drop-shadow(0 10px 30px rgba(0, 230, 118, 0.4));
            animation: float 3s ease-in-out infinite;
            margin-bottom: 20px;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .title {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, var(--moneybot-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 40px;
            line-height: 1.5;
        }
        
        .start-btn {
            background: linear-gradient(135deg, var(--moneybot-green), var(--moneybot-green-dark));
            color: white;
            border: none;
            padding: 22px 70px;
            font-size: 22px;
            font-weight: 800;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0, 230, 118, 0.5);
            transition: all 0.3s var(--ease-spring);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        .instructions {
            margin-top: 40px;
            display: flex;
            gap: 30px;
        }
        
        .instruction-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
        
        .instruction-icon {
            font-size: 28px;
        }
        
        .final-score {
            font-size: 64px;
            font-weight: 800;
            color: var(--moneybot-gold);
            margin-bottom: 8px;
        }
        
        .final-score-label {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <a href="../moneybot-official/" class="back-btn">←</a>
            <div class="score-display">Score: <span id="score">0</span></div>
        </div>
        
        <div class="game-container" id="gameContainer">
            <div class="level-card">
                <div class="level-label">Current Level</div>
                <div class="level-number" id="level">1</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="game-board">
                <div class="grid" id="grid"></div>
            </div>
            
            <div class="power-ups">
                <div class="power-up" onclick="usePowerUp('shuffle')">
                    <div class="power-up-icon">🔄</div>
                    <div class="power-up-name">Shuffle</div>
                    <div class="power-up-count" id="shuffleCount">3 left</div>
                </div>
                <div class="power-up" onclick="usePowerUp('hint')">
                    <div class="power-up-icon">💡</div>
                    <div class="power-up-name">Hint</div>
                    <div class="power-up-count" id="hintCount">3 left</div>
                </div>
                <div class="power-up" onclick="usePowerUp('bomb')">
                    <div class="power-up-icon">💣</div>
                    <div class="power-up-name">Bomb</div>
                    <div class="power-up-count" id="bombCount">2 left</div>
                </div>
            </div>
        </div>
        
        <div class="combo-display" id="comboDisplay">COMBO x3!</div>
        
        <div class="start-screen" id="startScreen">
            <div class="logo">📊</div>
            <div class="title">Portfolio Balancer</div>
            <div class="subtitle">Match 3+ assets to balance your portfolio!<br>Swap adjacent tiles to create matches</div>
            
            <button class="start-btn" onclick="startGame()">PLAY NOW</button>
            
            <div class="instructions">
                <div class="instruction-item">
                    <span class="instruction-icon">👆</span>
                    <span>Select & Swap</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-icon">3️⃣</span>
                    <span>Match 3+</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-icon">⚡</span>
                    <span>Use Power-ups</span>
                </div>
            </div>
        </div>
        
        <div class="game-over-screen" id="gameOverScreen">
            <div class="logo" style="font-size: 60px; margin-bottom: 10px;">🎉</div>
            <div class="final-score" id="finalScore">0</div>
            <div class="final-score-label">Final Score</div>
            <button class="start-btn" onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>
    
    <script>
        const assets = ['💵', '📈', '📜', '₿', '🥇', '🏢'];
        const assetNames = ['cash', 'stocks', 'bonds', 'crypto', 'gold', 'real-estate'];
        let grid = [];
        let selectedTile = null;
        let score = 0;
        let level = 1;
        let combo = 0;
        let powerUps = { shuffle: 3, hint: 3, bomb: 2 };
        let gameRunning = false;
        
        function initGrid() {
            grid = [];
            for (let i = 0; i < 36; i++) {
                grid.push({
                    id: i,
                    type: Math.floor(Math.random() * 6),
                    matched: false
                });
            }
            // Ensure no initial matches
            while (hasMatches()) {
                for (let i = 0; i < 36; i++) {
                    grid[i].type = Math.floor(Math.random() * 6);
                }
            }
            renderGrid();
        }
        
        function hasMatches() {
            // Check horizontal
            for (let row = 0; row < 6; row++) {
                for (let col = 0; col < 4; col++) {
                    const idx = row * 6 + col;
                    const type = grid[idx].type;
                    if (grid[idx + 1].type === type && grid[idx + 2].type === type) {
                        return true;
                    }
                }
            }
            // Check vertical
            for (let col = 0; col < 6; col++) {
                for (let row = 0; row < 4; row++) {
                    const idx = row * 6 + col;
                    const type = grid[idx].type;
                    if (grid[idx + 6].type === type && grid[idx + 12].type === type) {
                        return true;
                    }
                }
            }
            return false;
        }
        
        function renderGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = grid.map((tile, i) => `
                <div class="tile tile-${assetNames[tile.type]} ${tile.matched ? 'matched' : ''} ${selectedTile === i ? 'selected' : ''}" 
                     onclick="selectTile(${i})"
                     style="${tile.matched ? 'visibility: hidden;' : ''}">
                    ${assets[tile.type]}
                </div>
            `).join('');
        }
        
        function selectTile(index) {
            if (!gameRunning || grid[index].matched) return;
            
            if (selectedTile === null) {
                selectedTile = index;
                if (navigator.vibrate) navigator.vibrate(5);
            } else if (selectedTile === index) {
                selectedTile = null;
            } else {
                // Check if adjacent
                const row1 = Math.floor(selectedTile / 6);
                const col1 = selectedTile % 6;
                const row2 = Math.floor(index / 6);
                const col2 = index % 6;
                
                const isAdjacent = Math.abs(row1 - row2) + Math.abs(col1 - col2) === 1;
                
                if (isAdjacent) {
                    // Swap
                    const temp = grid[selectedTile].type;
                    grid[selectedTile].type = grid[index].type;
                    grid[index].type = temp;
                    
                    if (navigator.vibrate) navigator.vibrate(10);
                    
                    // Check matches
                    setTimeout(() => checkMatches(), 100);
                }
                
                selectedTile = null;
            }
            
            renderGrid();
        }
        
        function checkMatches() {
            let matches = [];
            
            // Check horizontal
            for (let row = 0; row < 6; row++) {
                for (let col = 0; col < 4; col++) {
                    const idx = row * 6 + col;
                    const type = grid[idx].type;
                    if (grid[idx + 1].type === type && grid[idx + 2].type === type) {
                        matches.push(idx, idx + 1, idx + 2);
                    }
                }
            }
            
            // Check vertical
            for (let col = 0; col < 6; col++) {
                for (let row = 0; row < 4; row++) {
                    const idx = row * 6 + col;
                    const type = grid[idx].type;
                    if (grid[idx + 6].type === type && grid[idx + 12].type === type) {
                        matches.push(idx, idx + 6, idx + 12);
                    }
                }
            }
            
            if (matches.length > 0) {
                // Remove duplicates
                matches = [...new Set(matches)];
                
                // Mark matched
                matches.forEach(idx => {
                    grid[idx].matched = true;
                });
                
                // Score
                const points = matches.length * 10 * (combo + 1);
                score += points;
                combo++;
                
                // Show combo
                if (combo > 1) {
                    const comboEl = document.getElementById('comboDisplay');
                    comboEl.textContent = `COMBO x${combo}!`;
                    comboEl.classList.add('show');
                    setTimeout(() => comboEl.classList.remove('show'), 1000);
                }
                
                if (navigator.vibrate) navigator.vibrate([20, 10, 20]);
                
                updateUI();
                renderGrid();
                
                // Refill after delay
                setTimeout(() => refillGrid(), 300);
            } else {
                combo = 0;
            }
        }
        
        function refillGrid() {
            grid.forEach((tile, i) => {
                if (tile.matched) {
                    tile.type = Math.floor(Math.random() * 6);
                    tile.matched = false;
                }
            });
            renderGrid();
            
            // Check for new matches
            setTimeout(() => checkMatches(), 100);
        }
        
        function usePowerUp(type) {
            if (!gameRunning || powerUps[type] <= 0) return;
            
            powerUps[type]--;
            updateUI();
            
            if (type === 'shuffle') {
                grid.forEach(tile => {
                    tile.type = Math.floor(Math.random() * 6);
                    tile.matched = false;
                });
                renderGrid();
                if (navigator.vibrate) navigator.vibrate(30);
            } else if (type === 'hint') {
                // Highlight a possible match
                alert('Hint: Look for 3 matching assets in a row!');
            } else if (type === 'bomb') {
                // Clear random tiles
                for (let i = 0; i < 6; i++) {
                    const idx = Math.floor(Math.random() * 36);
                    grid[idx].matched = true;
                }
                renderGrid();
                setTimeout(() => refillGrid(), 300);
                if (navigator.vibrate) navigator.vibrate(30);
            }
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score.toLocaleString();
            document.getElementById('level').textContent = level;
            document.getElementById('progress').style.width = (score % 1000) / 10 + '%';
            document.getElementById('shuffleCount').textContent = powerUps.shuffle + ' left';
            document.getElementById('hintCount').textContent = powerUps.hint + ' left';
            document.getElementById('bombCount').textContent = powerUps.bomb + ' left';
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            level = 1;
            combo = 0;
            powerUps = { shuffle: 3, hint: 3, bomb: 2 };
            initGrid();
            updateUI();
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            startGame();
        }
        
        // Init
        initGrid();
        updateUI();
    </script>
</body>
</html>
