<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cash Dash 2.0 | High Speed Runner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            margin: 0; padding: 0; background: #050505; color: #fff;
            font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none;
            user-select: none; -webkit-user-select: none;
        }

        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;
        }

        .hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
        }

        .stat-box {
            background: rgba(10, 10, 10, 0.85); border: 2px solid #00ff88;
            padding: 10px 15px; border-radius: 12px; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            transition: transform 0.1s;
        }
        .stat-box.pulse { transform: scale(1.1); box-shadow: 0 0 30px rgba(0, 255, 136, 0.6); }

        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .stat-value { font-size: 24px; font-weight: 900; color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
        .distance-value { color: #00ccff; text-shadow: 0 0 10px rgba(0, 204, 255, 0.5); border-color: #00ccff; }

        #centerUI {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            text-align: center; pointer-events: none; z-index: 10;
        }

        .combo-text {
            font-size: 36px; font-weight: 900; color: #ffcc00;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.8);
            opacity: 0; transition: opacity 0.2s, transform 0.1s;
        }
        .combo-text.active { opacity: 1; transform: scale(1.2); }

        #screens { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(5,5,5,0.9); pointer-events: auto; }

        .title-glow {
            font-size: 64px; font-weight: 900; color: #00ff88; text-transform: uppercase;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.6); margin-bottom: 15px; text-align: center; line-height: 1.1;
        }

        .subtitle { font-size: 16px; color: #aaa; margin-bottom: 40px; text-align: center; max-width: 400px; line-height: 1.5; }

        button {
            background: linear-gradient(90deg, #00ff88, #00cc66); border: none;
            padding: 16px 48px; border-radius: 30px; font-size: 20px; font-weight: 900;
            color: #000; cursor: pointer; box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.1s;
        }
        button:active { transform: scale(0.95); }

        .floating-text {
            position: absolute; font-size: 32px; font-weight: 900; text-shadow: 0 0 20px currentColor;
            pointer-events: none; animation: floatUp 1s ease-out forwards; opacity: 1; z-index: 15; text-align: center; width: 100px; margin-left: -50px;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
        
        #damageFlash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #ff3366; opacity: 0; pointer-events: none; z-index: 15; transition: opacity 0.1s;
        }
        
        .controls-hint {
            position: absolute; bottom: 40px; left: 0; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); font-size: 14px; text-transform: uppercase; letter-spacing: 2px;
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="damageFlash"></div>

    <div class="ui-layer">
        <div class="hud" id="hud" style="display:none;">
            <div class="stat-box" id="scoreBox">
                <div class="stat-label">Net Worth</div>
                <div class="stat-value" id="scoreDisplay">$0</div>
            </div>
            <div class="stat-box distance-value" id="distBox" style="border-color:#00ccff;">
                <div class="stat-label">Velocity</div>
                <div class="stat-value" id="distDisplay" style="color:#00ccff;">1.0x</div>
            </div>
        </div>
        
        <div id="centerUI" style="display:none;">
            <div class="combo-text" id="comboDisplay">2x COMBO!</div>
        </div>
        
        <div class="controls-hint" id="controlsHint" style="display:none;">
            Tap Left / Right to Switch Lanes
        </div>
    </div>

    <div id="screens">
        <div class="title-glow" id="mainTitle">CASH DASH<br><span style="font-size:32px; color:#00ccff;">High Speed</span></div>
        <div class="subtitle" id="mainSub">
            Tap Left or Right to switch lanes.<br><br>
            <span style="color:#00ff88;font-weight:bold;">🟩 Collect Yield:</span> Build Combos<br>
            <span style="color:#ff3366;font-weight:bold;">🟥 Dodge Expenses:</span> Avoid going broke!<br><br>
            Speed increases over time. Don't hit zero!
        </div>
        <button id="mainBtn" onclick="startGame()">Start Sprint</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            // Recalculate lanes
            lanes = [width*0.25, width*0.5, width*0.75];
        }
        window.addEventListener('resize', resize);

        // --- GAME STATE ---
        let state = 'menu'; 
        let score = 1000; 
        let speed = 5;
        let speedMult = 1.0;
        let distance = 0;
        let shakeTime = 0;
        let combos = 0;
        let frameCount = 0;
        let bgOffsetY = 0;
        
        let lanes = []; // Calculated in resize()
        
        // Load SVG Assets
        const imgPlayer = new Image(); imgPlayer.src = '../assets/moneybot-running.svg';
        const imgCoin = new Image(); imgCoin.src = '../assets/game-coin-green.svg';
        const imgDebt = new Image(); imgDebt.src = '../assets/game-obstacle-debt.svg';
        const player = { laneIndex: 1, x: 0, y: 0, size: 24, color: '#00ff88' };
        let items = [];
        let particles = [];
        let speedLines = [];

        // --- INPUT ---
        canvas.addEventListener('touchstart', handleInput);
        canvas.addEventListener('mousedown', handleInput);

        function handleInput(e) {
            if (state !== 'play') return;
            let cx = e.touches ? e.touches[0].clientX : e.clientX;
            
            // Tap left half = move left, Tap right half = move right
            if (cx < width/2 && player.laneIndex > 0) {
                player.laneIndex--;
            } else if (cx >= width/2 && player.laneIndex < 2) {
                player.laneIndex++;
            }
        }

        // --- FLOW ---
        function startGame() {
            resize();
            document.getElementById('screens').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            document.getElementById('centerUI').style.display = 'block';
            document.getElementById('controlsHint').style.display = 'block';
            
            score = 1000;
            speed = 8;
            speedMult = 1.0;
            distance = 0;
            combos = 0;
            frameCount = 0;
            items = [];
            particles = [];
            
            player.laneIndex = 1;
            player.x = lanes[1];
            player.y = height - 120;
            
            state = 'play';
            updateUI();
            requestAnimationFrame(loop);
        }

        function gameOver() {
            state = 'over';
            shakeTime = 20;
            triggerFlash();
            document.getElementById('screens').style.display = 'flex';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('centerUI').style.display = 'none';
            document.getElementById('controlsHint').style.display = 'none';
            
            document.getElementById('mainTitle').innerHTML = 'BANKRUPT<br><span style="font-size:32px;color:#ff3366;">Out of Cash</span>';
            document.getElementById('mainSub').innerHTML = `Final Distance: <span style="color:#00ccff;font-weight:bold;">${Math.floor(distance)}m</span><br>Max Combo: ${combos}x`;
            document.getElementById('mainBtn').innerText = 'Sprint Again';
        }

        // --- JUICE ---
        function pulseUI(id) {
            const el = document.getElementById(id);
            el.classList.add('pulse');
            setTimeout(() => el.classList.remove('pulse'), 150);
        }

        function triggerFlash() {
            const flash = document.getElementById('damageFlash');
            flash.style.opacity = '0.5';
            setTimeout(() => flash.style.opacity = '0', 100);
        }

        function spawnParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    life: 1, color: color, size: Math.random() * 4 + 2
                });
            }
        }

        function spawnText(x, y, text, color) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.color = color;
            el.innerText = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = '$' + score.toLocaleString();
            document.getElementById('distDisplay').innerText = speedMult.toFixed(1) + 'x';
            
            const comboEl = document.getElementById('comboDisplay');
            if (combos >= 3) {
                comboEl.innerText = `${combos}x COMBO!`;
                comboEl.classList.add('active');
            } else {
                comboEl.classList.remove('active');
            }
        }

        // --- LOOP ---
        function loop() {
            if (state !== 'play' && state !== 'over') return;

            // --- RENDER BACKGROUND ---
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            if (shakeTime > 0) {
                ctx.translate((Math.random()-0.5)*15, (Math.random()-0.5)*15);
                shakeTime--;
            }

            // Draw Parallax Grid & Lanes
            bgOffsetY = (bgOffsetY + speed * speedMult) % 50;
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.05)';
            ctx.lineWidth = 2;
            
            // Vertical Lanes
            ctx.beginPath();
            ctx.setLineDash([20, 20]);
            ctx.moveTo(lanes[0] + (lanes[1]-lanes[0])/2, 0); ctx.lineTo(lanes[0] + (lanes[1]-lanes[0])/2, height);
            ctx.moveTo(lanes[1] + (lanes[2]-lanes[1])/2, 0); ctx.lineTo(lanes[1] + (lanes[2]-lanes[1])/2, height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Speed Lines (Stars)
            if (Math.random() < 0.2 * speedMult) {
                speedLines.push({ x: Math.random()*width, y: -50, length: 20 + Math.random()*50, speed: speed * speedMult * 1.5 });
            }
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 1;
            for(let i=speedLines.length-1; i>=0; i--) {
                let sl = speedLines[i];
                sl.y += sl.speed;
                ctx.beginPath(); ctx.moveTo(sl.x, sl.y); ctx.lineTo(sl.x, sl.y - sl.length); ctx.stroke();
                if(sl.y > height + 100) speedLines.splice(i, 1);
            }

            if (state === 'play') {
                frameCount++;
                distance += (speed * speedMult) / 100;
                
                // Ramp difficulty
                speedMult = 1 + (distance / 500);

                // Spawn Items
                const spawnRate = Math.max(10, 30 - speedMult*2);
                if (frameCount % Math.floor(spawnRate) === 0) {
                    const lane = Math.floor(Math.random() * 3);
                    const isExpense = Math.random() > 0.6;
                    
                    items.push({
                        laneIndex: lane,
                        x: lanes[lane],
                        y: -50,
                        type: isExpense ? 'expense' : 'yield',
                        size: isExpense ? 22 : 18,
                        rot: 0
                    });
                }

                // Player Movement (Lerp)
                player.x += (lanes[player.laneIndex] - player.x) * 0.3;

                // Update Items
                for(let i=items.length-1; i>=0; i--) {
                    let item = items[i];
                    item.y += speed * speedMult;
                    item.rot += 0.05;

                    // Draw Item
                    ctx.save();
                    ctx.translate(item.x, item.y);
                    
                    if (item.type === 'expense') {
                        if (imgDebt.complete) {
                            ctx.drawImage(imgDebt, -item.size * 1.5, -item.size * 1.5, item.size * 3, item.size * 3);
                        } else {
                            ctx.fillStyle = '#ff3366';
                            ctx.fillRect(-item.size, -item.size, item.size*2, item.size*2);
                        }
                    } else {
                        if (imgCoin.complete) {
                            ctx.drawImage(imgCoin, -item.size * 1.5, -item.size * 1.5, item.size * 3, item.size * 3);
                        } else {
                            ctx.fillStyle = '#00ff88';
                            ctx.beginPath();
                            ctx.arc(0, 0, item.size, 0, Math.PI*2);
                            ctx.fill();
                        }
                    }
                    ctx.restore();

                    // Collision Check
                    const dx = player.x - item.x;
                    const dy = player.y - item.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist < player.size + item.size) {
                        if (item.type === 'expense') {
                            // Hit Expense
                            const penalty = 200 * speedMult;
                            score -= penalty;
                            combos = 0;
                            shakeTime = 15;
                            triggerFlash();
                            pulseUI('scoreBox');
                            spawnParticles(item.x, item.y, '#ff3366', 20);
                            spawnText(item.x, item.y - 20, `-$${Math.floor(penalty)}`, '#ff3366');
                            
                            if (score <= 0) { score = 0; updateUI(); gameOver(); return; }
                        } else {
                            // Hit Yield
                            combos++;
                            const multi = Math.min(combos, 5);
                            const bonus = 100 * multi;
                            score += bonus;
                            spawnParticles(item.x, item.y, '#00ff88', 10);
                            spawnText(item.x, item.y - 20, `+$${bonus}`, '#00ff88');
                            pulseUI('scoreBox');
                        }
                        
                        items.splice(i, 1);
                        updateUI();
                        continue;
                    }

                    // Missed item
                    if (item.y > height + 50) {
                        if (item.type === 'yield') combos = 0; // Break combo if you miss cash
                        items.splice(i, 1);
                    }
                }

                // Draw Player
                if (imgPlayer.complete) {
                    ctx.drawImage(imgPlayer, player.x - player.size * 1.5, player.y - player.size * 2, player.size * 3, player.size * 4);
                } else {
                    ctx.shadowColor = player.color;
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = player.color;
                    
                    // Add thrust tail
                    ctx.beginPath();
                    ctx.moveTo(player.x - player.size*0.8, player.y);
                    ctx.lineTo(player.x + player.size*0.8, player.y);
                    ctx.lineTo(player.x, player.y + player.size*2);
                    ctx.fillStyle = 'rgba(0, 255, 136, 0.5)';
                    ctx.fill();
                    
                    ctx.fillStyle = player.color;
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }

            // Draw Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.05;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1;

            ctx.restore();
            if(state === 'play' || state === 'over') requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
